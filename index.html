<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2026古诗文1600题 · 刷题小站</title>
<style>
  :root{
    --paper:#f7f2e7;
    --paper-dark:#efe6d3;
    --ink:#2b2925;
    --ink-soft:#6b6357;
    --vermilion:#b8362b;
    --vermilion-dark:#8f2a21;
    --gold:#c19a3d;
    --green:#3d7a4f;
    --green-bg:#e6f2e8;
    --red-bg:#fbe7e5;
    --card-shadow: 0 2px 10px rgba(43,41,37,0.08), 0 1px 2px rgba(43,41,37,0.06);
    --radius: 16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-size:17px;
    font-family:"Noto Serif SC","STSong","Songti SC","PingFang SC","Microsoft YaHei",serif;
    background:
      radial-gradient(circle at 10% 0%, #fffdf8 0%, var(--paper) 45%),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  #app{max-width:720px;margin:0 auto;padding:16px 16px 60px;}
  header.top{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 4px 10px;
  }
  header.top h1{
    font-size:24px;margin:0;font-weight:700;color:var(--vermilion-dark);
    letter-spacing:.5px;
  }
  header.top .sub{font-size:15px;color:var(--ink-soft);margin-top:2px;}
  .pill-stat{
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .stat-card{
    background:#fff;border-radius:14px;padding:12px 10px;text-align:center;
    box-shadow:var(--card-shadow); flex:1;
  }
  .stat-card .num{font-size:26px;font-weight:700;color:var(--vermilion);}
  .stat-card .lab{font-size:13px;color:var(--ink-soft);margin-top:2px;}

  .section-title{
    font-size:17px;color:var(--ink-soft);margin:22px 4px 10px;font-weight:700;
    display:flex;align-items:center;gap:6px;
  }
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .menu-card{
    background:#fff;border:none;border-radius:var(--radius);padding:16px 14px;
    box-shadow:var(--card-shadow); text-align:left;cursor:pointer;
    display:flex;flex-direction:column;gap:6px;position:relative;
    transition:transform .12s ease;
    font-family:inherit;
  }
  .menu-card:active{transform:scale(0.97);}
  .menu-card .emoji{font-size:30px;}
  .menu-card .title{font-size:18px;font-weight:700;color:var(--ink);}
  .menu-card .desc{font-size:14px;color:var(--ink-soft);}
  .menu-card.wide{grid-column:1 / -1;flex-direction:row;align-items:center;justify-content:space-between;}
  .badge{
    background:var(--vermilion);color:#fff;font-size:13.5px;border-radius:999px;
    padding:2px 8px;font-weight:700;
  }
  .badge.gold{background:var(--gold);}
  .badge.muted{background:#c9c2b2;}

  .group-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .group-cell{
    background:#fff;border-radius:12px;padding:10px 4px;text-align:center;
    box-shadow:var(--card-shadow);cursor:pointer;border:none;font-family:inherit;
  }
  .group-cell .g-title{font-size:16px;font-weight:700;}
  .group-cell .g-prog{font-size:13px;color:var(--ink-soft);margin-top:4px;}
  .group-cell.done{background:var(--green-bg);}
  .group-cell.done .g-title{color:var(--green);}

  .jumpbar{display:flex;gap:8px;margin-top:8px;}
  .jumpbar input{
    flex:1;padding:12px 14px;border-radius:10px;border:1px solid #ddd3bd;
    font-size:17px;font-family:inherit;background:#fff;
  }
  .btn{
    background:var(--vermilion);color:#fff;border:none;border-radius:10px;
    padding:13px 18px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .btn.secondary{background:#fff;color:var(--vermilion);border:1px solid var(--vermilion);}
  .btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid #ddd3bd;}
  .btn:disabled{opacity:.5;}

  .footer-note{
    text-align:center;color:var(--ink-soft);font-size:13.5px;margin-top:30px;line-height:1.8;
  }

  /* Practice view */
  .practice-top{
    display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;
  }
  .icon-btn{
    background:#fff;border:none;border-radius:10px;width:42px;height:42px;
    box-shadow:var(--card-shadow);font-size:19px;cursor:pointer;
  }
  .icon-btn.active{color:var(--gold);}
  .progress-track{
    flex:1;height:8px;background:#e7ded0;border-radius:999px;overflow:hidden;margin:0 8px;
  }
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--vermilion));width:0%;transition:width .25s ease;}
  .progress-label{font-size:14px;color:var(--ink-soft);white-space:nowrap;}

  .qcard{
    background:#fff;border-radius:var(--radius);padding:20px 18px;box-shadow:var(--card-shadow);
  }
  .qcard .qnum{font-size:14.5px;color:var(--gold);font-weight:700;margin-bottom:6px;}
  .qcard .qstem{font-size:22px;line-height:1.7;font-weight:600;color:var(--ink);white-space:pre-wrap;}

  .options{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
  .opt{
    display:flex;align-items:center;gap:10px;text-align:left;
    background:var(--paper-dark);border:1.5px solid transparent;border-radius:12px;
    padding:14px 16px;font-size:18px;line-height:1.55;cursor:pointer;font-family:inherit;color:var(--ink);
  }
  .opt .letter{
    flex:none;width:30px;height:30px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--ink-soft);
    box-shadow:0 1px 2px rgba(0,0,0,.08);
  }
  .opt.correct{background:var(--green-bg);border-color:var(--green);}
  .opt.correct .letter{background:var(--green);color:#fff;}
  .opt.wrong{background:var(--red-bg);border-color:var(--vermilion);}
  .opt.wrong .letter{background:var(--vermilion);color:#fff;}
  .opt.disabled{cursor:default;}

  .explain{
    margin-top:16px;background:#fbf7ee;border-left:4px solid var(--gold);
    border-radius:8px;padding:14px 16px;font-size:16.5px;line-height:1.85;color:#4a4436;
    display:none;
  }
  .explain .exp-title{font-weight:700;color:var(--gold);margin-bottom:6px;font-size:16px;}

  .practice-actions{display:flex;gap:10px;margin-top:16px;}
  .practice-actions .btn{flex:1;padding:15px;font-size:18px;}

  .hint{text-align:center;font-size:14px;color:var(--ink-soft);margin-top:10px;}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:15px;
    opacity:0;transition:all .3s ease;pointer-events:none;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.25);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hidden{display:none !important;}
  .empty-state{text-align:center;padding:40px 10px;color:var(--ink-soft);}
  .empty-state .emoji{font-size:40px;display:block;margin-bottom:10px;}

  .summary-card{
    background:#fff;border-radius:var(--radius);padding:28px 20px;text-align:center;box-shadow:var(--card-shadow);
  }
  .summary-card .big-emoji{font-size:52px;}
  .summary-card h2{margin:8px 0 4px;font-size:24px;}
  .summary-card .score{font-size:40px;font-weight:800;color:var(--vermilion);margin:10px 0;}
  .summary-actions{display:flex;flex-direction:column;gap:10px;margin-top:18px;}

  @media (max-width:380px){
    .group-grid{grid-template-columns:repeat(4,1fr);}
    .qcard .qstem{font-size:16.5px;}
  }

  #loginScreen{
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 10% 0%, #fffdf8 0%, var(--paper) 45%),
      var(--paper);
    padding:20px;
  }
  .login-card{
    background:#fff;border-radius:var(--radius);box-shadow:var(--card-shadow);
    padding:32px 26px;max-width:340px;width:100%;text-align:center;
  }
  .login-card .lock{font-size:38px;}
  .login-card h2{margin:10px 0 4px;font-size:19px;color:var(--vermilion-dark);}
  .login-card .lsub{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}
  .login-card input{
    width:100%;padding:12px 14px;border-radius:10px;border:1px solid #ddd3bd;
    font-size:16px;font-family:inherit;background:var(--paper-dark);margin-bottom:10px;
  }
  .login-card .btn{width:100%;margin-top:4px;}
  .login-error{color:var(--vermilion);font-size:13px;min-height:18px;margin-top:8px;}
</style>
</head>
<body>
<div id="loginScreen" style="display:none;">
  <div class="login-card">
    <div class="lock">🔒</div>
    <h2>古诗文1600题 · 刷题小站</h2>
    <div class="lsub">请输入用户名和密码后进入</div>
    <form id="loginForm">
      <input id="loginUser" type="text" placeholder="用户名" autocomplete="username">
      <input id="loginPass" type="password" placeholder="密码" autocomplete="current-password">
      <button type="submit" class="btn">进入</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const QUESTIONS = [{"id":1,"stem":"诗句 “梅子金黄杏子肥，麦花雪白菜花稀” 描写的是（ ）的场景。","options":["春季","夏季","秋季","冬季"],"answer":1,"explanation":"梅子在夏季会成熟变为金黄色，杏子到了夏季会生长得饱满肥硕，麦花这里指的是荞麦花，在夏季开放，花色洁白， 而油菜花在春末开放后，到了夏季会逐渐凋谢变得稀疏，这些景物的状态都对应着夏季的田园特征。 诗句出自宋代诗人范成大的《四时田园杂兴・其二》：梅子金黄杏子肥，麦花雪白菜花稀。日长篱落无人过，惟有蜻蜓蛱蝶飞。 意思是一树树梅子变得金黄，杏子也越长越大了；荞麦花一片雪白，油菜花倒显得稀稀落落。白天的时长变长，篱笆的影子随着太阳 升高缩短，没有行人经过；只有蜻蜓和粉蝶，绕着篱笆飞来飞去。"},{"id":2,"stem":"“但使龙城飞将在” 中的 “飞将” 是（ ）","options":["指南宋的岳飞","指汉代的李广","指三国的周瑜","指东汉的曹操"],"answer":1,"explanation":"这里的 “飞将” 指的是汉代名将李广，李广在镇守边境抵御匈奴期间，作战勇猛、行动机敏，匈奴人对他十分忌惮， 称呼他为 “飞将军”，“龙城” 是汉代的地名，和李广抗击匈奴的事迹相关。 诗句出自唐代诗人王昌龄的《出塞二首・其一》：秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。意思是依 旧是秦汉时期的明月和边关，万里出征的将士还没有回来。倘若龙城的飞将军李广如今还在，绝不会让匈奴的兵马南下越过阴山。"},{"id":3,"stem":"在十二生肖中，“申” 代表的是（ ）","options":["马","羊","猴","鸡"],"answer":2,"explanation":"十二生肖与十二地支有固定的对应关系，十二地支依次为子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥，分别 对应十二生肖的鼠、牛、虎、兔、龙、蛇、马、羊、猴、鸡、狗、猪，所以 “申” 对应的动物是猴。"},{"id":4,"stem":"下列并非描绘春景的是（ ）","options":["风吹柳花满店香，吴姬压酒劝客尝","忽如一夜春风来，千树万树梨花开","碧玉妆成一树高，万条垂下绿丝绦","几处早莺争暖树，谁家新燕啄春泥"],"answer":1,"explanation":"选项 A 的 “柳花” 指春季柳树的柳絮，对应的是春日景致；选项 C 出自贺知章的《咏柳》，描写的是春季柳树的 清新形态；选项 D 出自白居易的《钱塘湖春行》，早莺争抢向阳树枝、新燕啄泥筑巢都是春季的典型景象，这三个选项描绘的都是春 景。而选项 B 中的 “梨花” 并不是真正的梨花，是诗人岑参将边塞冬季的雪花比作梨花，这句诗描写的是冬季的雪景，并非春景。"},{"id":5,"stem":"下列诗句不是描写秋景的是（ ）","options":["明月松间照，清泉石上流。","倚杖柴门外，临风听暮蝉。","千嶂里，长烟落日孤城闭。","黑云翻墨未遮山，白雨跳珠乱入船。"],"answer":3,"explanation":"选项 A 出自王维的《山居秋暝》，描写的是秋日山林傍晚的清新景致；选项 B 出自王维的《辋川闲居赠裴秀才迪》， “暮蝉” 指秋日傍晚的蝉，对应的是秋景；选项 C 出自范仲淹的《渔家傲・秋思》，标题中的 “秋思” 已经点明这是秋季的边塞 景色。而选项 D 描写的是夏日的暴雨场景，并非秋景。"},{"id":6,"stem":"写下 “少年辛苦终身事，莫向光阴惰寸功” 的唐代诗人是（ ）","options":["李白","杜荀鹤","王维","颜真卿"],"answer":1,"explanation":"这句诗的作者是唐代诗人杜荀鹤，这句诗是杜荀鹤用来劝勉晚辈的话语，意在强调年少时的努力对一生都有重要的影 响，不可虚度光阴。"},{"id":7,"stem":"温庭筠被誉为（ ）的鼻祖。","options":["花间词派","新乐府诗","婉约派","边塞诗"],"answer":0,"explanation":"花间词派是晚唐至五代时期的词派，词作大多以描写闺中女子的情思、贵族的闲情逸致为主，词风细腻华丽，温庭筠 的词作风格贴合花间词派的特点，同时他是花间派中创作最早、影响力最大的词人，因此被尊为花间词派的鼻祖。"},{"id":8,"stem":"“洛阳纸贵” 这个典故的主人公是（ ）","options":["李格非","司马相如","左思","陆机"],"answer":2,"explanation":"“洛阳纸贵” 的典故出自《晋书・左思传》，左思花费了数年时间创作《三都赋》，这篇赋描写了蜀都、吴都、魏都 的风土人情与风貌，最初这篇作品没有得到重视，后来得到了张华、皇甫谧等当时名士的推崇，洛阳的豪贵之家都争相传抄这篇赋， 使得洛阳的纸张供不应求，价格上涨，所以这个典故的主人公是左思。"},{"id":9,"stem":"成语 “高山仰止” 出自（ ）","options":["《论语》","《孟子》","《诗经》","《老子》"],"answer":2,"explanation":"1 19959276711（vx 同号） 【知识小链接】“高山仰止” 出自《诗经・小雅・车舝》，原句为 “高山仰止，景行行止”，这句话最初是用来赞叹高山值得瞻仰， 坦途值得行走，后来逐渐演变为成语，用来比喻对高尚的品德、品行高洁之人的仰慕与崇敬。"},{"id":10,"stem":"农历八月为（ ）","options":["孟秋","仲秋","季秋","晚秋"],"answer":1,"explanation":"农历的四季会按照孟、仲、季来划分每个季节的三个月，孟代表每季的第一个月，仲代表每季的第二个月，季代表每 季的第三个月。秋季对应的农历月份是七月、八月、九月，其中七月是孟秋，八月是仲秋，九月是季秋，农历八月也正是中秋佳节所 在的月份。"},{"id":11,"stem":"以下事物与其代称对应不正确的是（ ）","options":["“尺素” 代指书籍","“双鲤” 代指书信","“丝竹” 代指音乐","“手谈” 代指下围棋"],"answer":0,"explanation":"选项 A：“尺素” 是古代用来书写文字的小幅丝织品，古人常会在这种丝织品上书写书信并寄送，所以 “尺素” 代 指的是书信，并非书籍，这个对应不正确。 选项 B：“双鲤” 的代称源于古代的书信传递方式，古人会将书信放置在刻成鲤鱼形状的木盒中，因此后来用 “双鲤” 代指书信。 选项 C：“丝竹” 里的 “丝” 指弦乐器，“竹” 指管乐器，二者都是古代常见的乐器类别，所以合起来用来代指音乐。 选项 D：“手谈” 是下围棋的代称，因为下围棋的过程中，对弈的双方不需要用语言交流，只通过手部落子的动作来传递对弈的思路， 所以被称为手谈。"},{"id":12,"stem":"有 “孤篇横绝全唐” 之誉的一首唐诗是（）。","options":["《春江花月夜》","《送杜少府之任蜀州》","《登幽州台歌》","《滕王阁诗》"],"answer":0,"explanation":"“孤篇横绝全唐” 是后世学者对唐代诗人张若虚《春江花月夜》的评价，张若虚流传至今的诗作数量极少，而这一首 《春江花月夜》以春江、明月为核心意象，将自然景致、游子与思妇的相思情愫，以及对宇宙人生的哲思交融在一起，意境空灵悠远， 辞藻清丽优美，在唐诗中拥有独特且极高的艺术地位，因此得到了这样的赞誉。"},{"id":13,"stem":"“诚斋” 是诗人（ ）的书房。","options":["陆游","杨万里","王安石","范成大"],"answer":1,"explanation":"杨万里，字廷秀，号诚斋，“诚斋” 就是他的书房的名字，同时这个名字也成为了他的号，杨万里的诗作风格清新活 泼、浅近生动，他的这种诗风也被后世称为 “诚斋体”，在南宋诗坛有不小的影响力。"},{"id":14,"stem":"以下（ ）没有运用夸张手法。","options":["危楼高百尺，手可摘星辰","飞流直下三千尺，疑是银河落九天","白日依山尽，黄河入海流","两岸猿声啼不住，轻舟已过万重山"],"answer":2,"explanation":"选项 A 出自李白的《夜宿山寺》，“高百尺”“手可摘星辰” 是运用了夸张的手法，极度夸大了楼的高度，现实中不存在这样的高 楼，也无法伸手摘到星辰，以此突出楼的高峻。 选项 B 出自李白的《望庐山瀑布》，“三千尺” 是对瀑布长度的夸张，同时将瀑布比作银河从九天落下，也是夸张的表达，用来凸 显庐山瀑布的磅礴气势。 选项 C 出自王之涣的《登鹳雀楼》，这两句是对自然景象的写实描写，描绘的是夕阳靠着山峦落下、黄河奔腾着流入大海的真实画面， 没有使用夸张的修辞手法。 选项 D 出自李白的《早发白帝城》，“万重山” 是夸张的说法，并非真的有一万重山，以此来突出轻舟行驶的速度之快。"},{"id":15,"stem":"韩愈被世人称为 “韩昌黎” 是因为他的（）。","options":["郡望","就职地","官职","籍贯"],"answer":0,"explanation":"郡望指的是古代某一姓氏家族的发源地，或是家族在历史上曾显贵的地域，韩愈的籍贯是河内河阳（今河南孟州）， 而昌黎（今辽宁义县一带）是韩姓的郡望，因此世人将韩愈称为 “韩昌黎”。"},{"id":16,"stem":"我国古代的很多事物都有自己的雅称，古代学生入学送教师的礼物可称为（ ）","options":["谢仪","润笔","束脩","尺素"],"answer":2,"explanation":"选项 C：束脩原本指的是一束干肉，在古代，学生入学拜师的时候，会将束脩作为送给老师的见面礼，后来 “束脩” 也逐渐成为了 拜师礼或者学费的代称。 选项 A：谢仪是用来答谢他人帮忙时所赠送的礼金，和入学送老师的礼物无关。 选项 B：润笔是古时候对文人、书画家创作作品后，给予的酬劳，也就是现在所说的稿费。 选项 D：尺素是古代对书信的代称，并非指代送给老师的礼物。 19959276711（vx 同号）"},{"id":17,"stem":"姑苏城外寒山寺，夜半钟声到客船”中“姑苏”指的是（）","options":["长安","苏州","洛阳","杭州"],"answer":1,"explanation":"姑苏：苏州的别称，因城西南有姑苏山而得名。苏州古称平江，又称姑苏，位于江苏省东南太湖之滨，长江三角洲中 部，是中国著名的历史文化名城。 诗句出自唐代诗人张继的羁旅诗《枫桥夜泊》：月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。意思是月亮 已落下乌鸦啼叫寒气满天，江边枫树与船上渔火，难抵我独自傍愁而眠。姑苏城外那寒山古寺，半夜里敲响的钟声传到了我乘坐的客 船。"},{"id":18,"stem":"课本中学过的李白《望庐山瀑布》一诗在体裁上看属于（ ）","options":["抒情诗","七言绝句","送别诗","五言绝句"],"answer":1,"explanation":"古代诗歌又可分为近体诗和古体诗。 古体诗是唐代以前的诗歌，形式较为自由，不讲究格律，押韵较为灵活，篇幅和句式也没有严格限制。古体诗包括《诗经》、《楚辞》 、 汉魏乐府古辞、南北朝乐府民歌等。古体诗的形式多样，有四言、五言、六言、七言以及杂言体。 近体诗又称今体诗或格律诗，是唐代形成的一种讲究平仄、对仗和押韵的诗歌体裁。近体诗包括绝句和律诗。绝句由四句组成，分为 五言绝句和七言绝句；律诗由八句组成，分为五言律诗和七言律诗。超过八句的称为排律。"},{"id":19,"stem":"下列哪句诗的作者是杜甫？（ ）","options":["桃花潭水深千尺，不及汪伦送我情","停车坐爱枫林晚，霜叶红于二月花","路人借问遥招手，怕得鱼惊不应人","两个黄鹂鸣翠柳，一行白鹭上青天"],"answer":3,"explanation":"“桃花潭水深千尺，不及汪伦送我情”出自唐代李白的《赠汪伦》； “停车坐爱枫林晚，霜叶红于二月花”出自唐代杜牧的《山行》； “路人借问遥招手，怕得鱼惊不应人”出自唐代胡令能《小儿垂钓》； “两个黄鹂鸣翠柳，一行白鹭上青天”出自唐代杜甫的《绝句》。"},{"id":20,"stem":"诗句“平生不敢轻言语，一叫千门万户开”说的是（ ）","options":["犬","鹅","鸡","画眉鸟"],"answer":2,"explanation":"诗句出自明代唐寅的《画鸡》： 头上红冠不用裁，满身雪白走将来。平生不敢轻言语，一叫千门万户开。"},{"id":21,"stem":"“遥望洞庭山水翠，白银盘里一青螺”运用了（）","options":["比喻","排比","对偶","夸张"],"answer":0,"explanation":"诗句出自唐代刘禹锡的《望洞庭》，意思是遥望洞庭，山青水绿，林木葱茏的洞庭山耸立在泛着白光的洞庭湖里，就 像白银盘里的一只青螺。"},{"id":22,"stem":"“又疑瑶台镜，飞在青云端”的作者是（）","options":["杜甫","王维","李白","白居易"],"answer":2,"explanation":"诗句出自唐代李白的《古朗月行》，意思是又怀疑是瑶台仙镜，飞在夜空青云之上。"},{"id":23,"stem":"“欲穷千里目，更上一层楼”的作者是（）","options":["王之涣","贺知章","王昌龄","李白"],"answer":0,"explanation":"诗句出自唐代王之涣的《登鹳雀楼》：白日依山尽，黄河入海流。欲穷千里目，更上一层楼。意思是站在高楼上，只 见夕阳依傍着山峦慢慢沉落，滔滔黄河朝着大海汹涌奔流。想要看到千里之外的风光，那就要再登上更高的一层楼。"},{"id":24,"stem":"诗句“水光潋滟晴方好，山色空蒙雨亦奇”描写的是（ ）的景象。","options":["颍州西湖","武汉东湖","金陵玄武湖","杭州西湖"],"answer":3,"explanation":"出自宋代苏轼的《饮湖上初晴后雨二首·其二》：水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总 相宜。此句既写了西湖的水光山色，也写了西湖的晴雨时的不同景色，可想见诗人即景挥毫时的兴会及其洒脱的性格、开阔的胸怀。"},{"id":25,"stem":"下列称呼不当的是（ ）","options":["家兄是对自己兄长的称呼。","令爱是对对方子女的称呼。","令堂是对对方母亲的尊称。","先考、先父称已亡故父亲。"],"answer":1,"explanation":"3 19959276711（vx 同号） 【知识小链接】 别人的儿子为令郎，别人的女儿为令媛或令爱。 古人对别人称自己长辈时，一般先冠以\"家\"字，称父亲为家父或家严，母亲为家母或家慈。称呼别人的家人则冠以\"令\"字，如：称别人 的父亲为令尊，别人的母亲为令堂，别人的儿子为令郎，别人的女儿为令媛或令爱。这是对别人一种尊称，相当于\"你的\"或\"您的\"。 口诀：家大舍小令外人"},{"id":26,"stem":"诗句“不知细叶谁裁出，二月春风似剪刀”描写的植物是（）","options":["杨","柳","竹","海棠"],"answer":1,"explanation":"诗句出自唐代贺知章的《咏柳》：碧玉妆成一树高，万条垂下绿丝绦。不知细叶谁裁出，二月春风似剪刀。"},{"id":27,"stem":"“潮平两岸阔”的下一句是（ ）","options":["江春入旧年","风正一帆悬","行舟绿水前","归雁洛阳边"],"answer":1,"explanation":"本句出自唐代诗人王湾的《次北固山下》。客路青山外，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江春 入旧年。乡书何处达？归雁洛阳边。 诗意：旅途在青山外，在碧绿的江水前行舟。潮水涨满，两岸之间水面宽阔，顺风行船恰好把帆儿高悬。夜幕还没有褪尽，旭日已在 江上电由升起，还在旧年时分，江南已有了春天的气息。寄出去的家信不知何时才能到达，希望北归的大雁捎到洛阳去。"},{"id":28,"stem":"苏轼《水调歌头·明月几时有》小序中说：“丙辰中秋，欢饮达旦，大醉，作此篇。兼怀子由。”“子由”指的是（ ）","options":["苏轼的父亲","苏轼的哥哥","苏轼的弟弟","苏轼的妹妹"],"answer":2,"explanation":"子由是苏轼的弟弟苏辙的字。小序的意思是丙辰年（公元 1076 年）的中秋节，通宵痛饮直至天明，大醉，趁兴写下这 篇文章，同时抒发对弟弟子由的怀念之情。《水调歌头·明月几时有》是中秋望月怀人之作，表达了对胞弟苏辙的无限思念。"},{"id":29,"stem":"王之涣《凉州词》（黄河远上白云间）的诗歌风格是（ ）","options":["清新自然","悲凉苍劲","沉郁顿挫","自由飘逸"],"answer":1,"explanation":"王之涣《凉州词》：黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。 诗意：黄河好像从白云间奔流而来，玉门关孤独地耸峙在高山中。何必用羌笛吹起那哀怨的《杨柳曲》去埋怨春光迟迟不来呢，春风 根本吹不到玉门关外。王之涣这首写戍边士兵的怀乡情。 写得苍凉慷慨，悲而不失其壮，虽极力渲染戍卒不得还乡的怨情，但丝毫没有半点颓丧消沉的情调，充分表现出盛唐诗人的豁达广阔 胸怀。"},{"id":30,"stem":"以下诗句中，不是描写初春景象的是（）","options":["诗家清晨在新春，绿柳才黄半未匀","天街小雨润如酥，草色遥看近却无","忽如一夜春风来，千树万树梨花开","蒌蒿满地芦芽短，正是河豚欲上时"],"answer":2,"explanation":"“忽如一夜春风来，千树万树梨花开”出自唐代岑参的《白雪歌送武判官归京》诗句中的“梨花”指雪花积在树枝上， 像梨花开了一样。"},{"id":31,"stem":"“分野中峰变，阴晴众壑殊”的作者有（）之称。","options":["诗仙","诗圣","诗魔","诗佛"],"answer":3,"explanation":"诗句出自唐代王维的《终南山》。王维字摩诘，号摩诘居士，有“诗佛”之称。"},{"id":32,"stem":"在十二生肖中，“申”代表的是（）","options":["马","羊","猴","鸡"],"answer":2,"explanation":"十二生肖是十二地支的形象化代表，即子（鼠）、丑（牛）、寅（虎）、卯（兔）、辰（龙）、巳（蛇）、午（马）、 未（羊）、申（猴）、酉（鸡）、戌（狗）、亥（猪）。"},{"id":33,"stem":"“厌以腥膏，眠以毡罽”句中“厌”的意思是（）","options":["讨厌","厌恶","满足","厌烦"],"answer":2,"explanation":"出自清代乐钧的《世无良猫》。“厌以腥膏，眠以毡罽”的意思是用鱼和肥肉喂养它，用毡子和毯子给猫睡。厌的意 思是满足。"},{"id":34,"stem":"“少小虽非投笔吏，论功还欲请长缨”化用了（ ）投笔从戎的典故。","options":["班固","班彪","班超","班昭"],"answer":2,"explanation":"唐·祖咏《望蓟门》投笔吏化用了班超投笔从戎的典故。汉人班超家贫，常为官府抄书以谋生，曾投笔叹曰：“大丈 夫当立功异域以取封侯，安能久事笔砚间。”后终以公封定远侯。 19959276711（vx 同号）"},{"id":35,"stem":"中国古代第一部诗歌总集是（ ）","options":["《论语》","《诗经》","《春秋》","《易经》"],"answer":1,"explanation":"《诗经》是中国古代诗歌的开端，最早的一部诗歌总集。"},{"id":36,"stem":"下列不属于杜甫的称号的是（ ）","options":["杜樊川","杜拾遗","杜工部","杜少陵"],"answer":0,"explanation":"杜甫字子美，自号少陵野老，唐代伟大的现实主义诗人，与李白又合称“大李杜”，杜甫也常被称为“老杜”。后世 称其杜拾遗、杜工部，也称他杜少陵、杜草堂。 杜牧号樊川居士，晚年长居樊川别舍，世称杜樊川。"},{"id":37,"stem":"下列选项中不是杭州古称的是（）","options":["临安","钱塘","武林","武陵"],"answer":3,"explanation":"杭州别名：临安，钱塘，武林，杭城，江干。 武陵：郡名，今武陵山区或湖南常德一带。"},{"id":38,"stem":"下列不属于浪漫主义文学家的是（）","options":["庄子","孔子","屈原","李白"],"answer":1,"explanation":"庄子的代表作《庄子》想象奇幻，构思巧妙，多彩的思想世界和文学意境，文笔汪洋恣肆，具有浪漫主义的艺术风格，瑰丽诡谲，意 出尘外。 屈原的《楚辞》开创了中国浪漫主义文学先河。 李白是唐代伟大的浪漫主义诗人，被后人誉为“诗仙”。"},{"id":39,"stem":"下列诗句中描写的是早春之景的是（ ）","options":["梅子留酸软齿牙，芭蕉分绿与窗纱","乳鸭池塘水浅深，熟梅天气半晴朗","天街小雨润如酥，草色遥看近却无","枯藤老树昏鸦，小桥流水人家"],"answer":2,"explanation":"“梅子留酸软齿牙，芭蕉分绿与窗纱”出自宋代杨万里的《闲居初夏午睡起·其一》，描写的是初夏之景，这句话意思是梅子味道很 酸，吃过之后，余酸还残留在牙齿之间；芭蕉初长，而绿阴映衬到纱窗上。 “乳鸭池塘水浅深，熟梅天气半晴朗”描写的是初夏之景，出自宋代戴复古的《初夏游张园》。诗句意思是小鸭在池塘中或浅或深的 水里嬉戏，梅子已经成熟了，天气半晴半阴。 “天街小雨润如酥，草色遥看近却无”出自唐代韩愈的《早春呈水部张十八员外》，意思是京城的街道上空丝雨纷纷，雨丝就像乳汁 般细密而滋润，小草钻出地面，远望草色依稀连成一片，近看时却显得稀疏零星。 “枯藤老树昏鸦，小桥流水人家”描写的是秋景，出自元代马致远的《天净沙·秋思》意思是天色黄昏，一群乌鸦落在枯藤缠绕的老 树上，发出凄厉的哀鸣。小桥下流水哗哗作响，小桥边庄户人家炊烟袅袅。"},{"id":40,"stem":"阁中帝子今何在，槛外（ ）空自流。","options":["湘江","长江","大江","九江"],"answer":1,"explanation":"“阁中帝子今何在？槛外长江空自流。”出自唐代王勃的《滕王阁序》。解释：昔日游赏于高阁中的滕王如今已不知 哪里去了，只有那栏杆外的滔滔江水空自向远方奔流。"},{"id":41,"stem":"白日放歌须纵酒，（ ）作伴好还乡。","options":["知音","青春","良人","诗书"],"answer":1,"explanation":"白日放歌须纵酒，青春作伴好还乡。出自唐代杜甫的《闻官军收河南河北》解释：太阳高照、日光耀耀，放声高歌痛 饮美酒，趁着明媚春光与妻儿一同返回家乡。"},{"id":42,"stem":"下列不属于初唐四杰的是（ ）","options":["王勃","杨炯","卢纶","骆宾王"],"answer":2,"explanation":"初唐四杰是中国唐代初年，文学家王勃、杨炯、卢照邻、骆宾王的合称，简称为“王杨卢骆”，卢纶字允言，唐代诗 人。“大历十才子”之一。"},{"id":43,"stem":"诗句“黄鹤一去不复返，白云千载空悠悠。”中“悠悠”的意思是（ ）","options":["闲散","忧思","悬在空中摆动","控制"],"answer":2,"explanation":"5 19959276711（vx 同号） 【知识小链接】诗句出自唐代崔颢的《黄鹤楼》，意思是黄鹤一去再也没有回来，千百年来只看见悠悠的白云。"},{"id":44,"stem":"“独在异乡为异客，每逢佳节倍思亲”中的“客”是（ ）","options":["孟浩然","韦应物","王安石","王维"],"answer":3,"explanation":"诗句出自唐代王维的《九月九日忆山东兄弟》，是诗人十七岁时在长安所作，意思是独自远离家乡难免总有一点凄凉， 每到重阳佳节倍加思念远方的亲人。“客”指诗人自己。"},{"id":45,"stem":"开创中国浪漫主义文学先河的是（ ）","options":["《诗经》","《楚辞》","《古诗十九首》","《左传》"],"answer":1,"explanation":"《诗经》开创了中国现实主义文学先河。《楚辞》开创了中国浪漫主义文学先河。"},{"id":46,"stem":"“行到水穷处，坐看云起时”出自（）的诗作。","options":["王昌龄","孟浩然","王维","刘禹锡"],"answer":2,"explanation":"诗句出自唐代王维的《终南别业》，意思是间或走到水的尽头去寻求源流，间或坐看上升的云雾千变万化。"},{"id":47,"stem":"在杜甫的《望岳》（其一）这首诗中，最能体现诗人希望攀登绝顶，俯视一切的雄心壮志的诗句是（）","options":["岱宗夫如何？齐鲁青未了","造化钟神秀，阴阳割昏晓","荡胸生层云，决眦入归鸟","会当凌绝顶，一览众山小"],"answer":3,"explanation":"《望岳》译文：巍峨的泰山，到底如何雄伟？走出齐鲁，依然可见那青青的峰顶。神奇自然汇聚了千种美景，山南山 北分隔出清晨和黄昏。层层白云，荡涤胸中沟壑；翩翩归鸟，飞入赏景眼圈。定要登上泰山顶峰，俯瞰群山，豪情满怀。 最能体现出诗人希望攀登绝顶，俯视一切的雄心壮志的诗句是“会当凌绝顶，一览众山小。”"},{"id":48,"stem":"“细雨鱼儿出，微风燕子斜”出自（）","options":["《水槛遣心二首》","《村居》","《过故人庄》","《杭州春望》"],"answer":0,"explanation":"诗句出自唐代杜甫的《水槛遣心二首》，意思是细雨蒙蒙，鱼儿欢快地跃出水面；微风习习，燕子倾斜着掠过天空。"},{"id":49,"stem":"“爆竹声中一岁除，春风送暖入屠苏”，这里的“屠苏”指的是（）","options":["苏州","房屋","酒","庄稼"],"answer":2,"explanation":"诗句出自宋代王安石的《元日》，意思是爆竹声中旧的一年已经过去，迎着和暖的春风开怀畅饮屠苏酒。 屠苏：指屠苏酒，饮屠苏酒也是古代过年时的一种习俗，大年初一全家合饮这种用屠苏草浸泡的酒，以驱邪避瘟疫，求得长寿。"},{"id":50,"stem":"在中国传统文化中，鸿雁是（ ）的代称。","options":["兄弟","伴侣","书信","朋友"],"answer":2,"explanation":"鸿雁：在中国古代，鸿雁可作书信的代称。鸿雁是大型候鸟，每年秋季南迁，常常引起游子思乡怀亲之情和羁旅伤感。 鸿雁传书指通信，也可代表思念，相思。"},{"id":51,"stem":"“独在异乡为异客，每逢佳节倍思亲”中的“佳节”是（ ）","options":["春节","元宵节","重阳节","中秋节"],"answer":2,"explanation":"诗句出自唐代王维的《九月九日忆山东兄弟》，意思是独自远离家乡难免总有一点凄凉，每到重阳佳节倍加思念远方 的亲人。“佳节”是美好的节日，这里指重阳节。"},{"id":52,"stem":"“吴宫花草埋幽径，晋代衣冠成古丘”使用了（ ）的修辞手法","options":["拟人","夸张","对偶","比喻"],"answer":2,"explanation":"出自唐代李白的《登金陵凤凰台》：“凤凰台上凤凰游，凤去台空江自流。吴宫花草埋幽径，晋代衣冠成古丘。三山 半落青天外，二水中分白鹭洲。总为浮云能蔽日，长安不见使人愁。”"},{"id":53,"stem":"写下“榆柳萧疏楼阁闲，月明直见嵩山雪”的是唐代诗人（）","options":["孟浩然","孟郊","韩愈","刘禹锡"],"answer":1,"explanation":"诗句出自唐代孟郊的《洛桥晚望》，意思是叶落枝秃的榆柳掩映着静谧的楼台亭阁，万籁俱寂，悄无人声。在明静的 月光下，一眼便看到了嵩山上那皑皑白雪。 19959276711（vx 同号）"},{"id":54,"stem":"下列不属于编年体史书的是（ ）","options":["《春秋》","《史记》","《左传》","《资治通鉴》"],"answer":1,"explanation":"史书体例，主要有五种：(1)编年体 (2)纪传体 (3)纪事本末体 (4)国别体 (5)断代体 编年体：以年代为线索编排有关历史事件。编年体史书以时间为中心，按年、月、日顺序记述史事。因为它以时间为经，以史事为纬， 比较容易反映出同一时期各个历史事件的联系。 纪传体：东亚史书的一种形式，以为人物立传记（皇帝的传记称“纪”，一般人的称“传”，特殊情形的人物称“载记”，记载制度、 风俗、经济等称“志”，以表格排列历史大事称“表”）的方式记叙史实。 国别体是以国家为单位，分别记叙历史事件。"},{"id":55,"stem":"“渭城朝雨浥轻尘，客舍青青柳色新”出自王维的一首（ ）","options":["山水诗","田园诗","咏物诗","送别诗"],"answer":3,"explanation":"诗句出自唐代王维的送别诗《送元二使安西》，意思是清晨的微雨湿润了渭城地面的灰尘，空气清新，旅舍更加青翠。"},{"id":56,"stem":"子曰：“诗三百，一言以蔽之，曰“思无邪’。\"其中“子”指的是（）","options":["曾子","孟子","孔子","庄子"],"answer":2,"explanation":"这句话中的“子”指孔子。 “诗三百”指《诗经》，其中的代表部分为“国风”，因此后人常将其与屈原的《离骚》合称“诗骚”，作为文采的代名词。"},{"id":57,"stem":"以下（ ）没有运用夸张手法","options":["危楼高百尺，手可摘星辰。","飞流直下三千尺，疑是银河落九天。","生当作人杰，死亦为鬼雄。","天台一万八千丈，对此欲倒东南倾。"],"answer":2,"explanation":"A 出自唐代李白的《夜宿山寺》，意思是山上寺院好似有百丈之高，站在上边仿佛都能摘下星辰。 B 出自唐代李白的《望庐山瀑布》，意思是高崖上飞腾直落的瀑布好像有几千尺，让人怀疑是银河从天上泻落到人间。 C 出自宋代李清照的《夏日绝句》，意思是生时应当做人中豪杰，死后也要做鬼中英雄。 D 出自唐代诗人李白作品《梦游天姥吟留别》，意思是天台山虽高四万八千丈，但对着这天姥山，（却矮小得）好像要向东南方倾倒 一样。"},{"id":58,"stem":"下列不属于“江南三大名楼”的是（）","options":["滕王阁","黄鹤楼","岳阳楼","鹳雀楼"],"answer":3,"explanation":"江南三大名楼指的是：江西南昌的滕王阁、湖北武汉的黄鹤楼，湖南岳阳的岳阳楼。"},{"id":59,"stem":"“白也诗无敌，飘然思不群”中“白”是指（）","options":["李白","白居易","白朴","白行简"],"answer":0,"explanation":"出自唐代杜甫的《春日忆李白》：“白也诗无敌，飘然思不群。清新庾开府，俊逸鲍参军。渭北春天树，江东日暮云。 何时一樽酒，重与细论文。”这一句是说：李白的诗作无人能敌，他那高超的才思也远远的超出一般人。"},{"id":60,"stem":"雁引愁心去，（）衔好月来。","options":["鸦","雀","楼","山"],"answer":3,"explanation":"“雁引愁心去，山衔好月来。”出自唐代李白的《与夏十二登岳阳楼》。解释：南飞的大雁带走我忧戚烦闷的心情， 远处的山峰衔来一轮美好的明月。"},{"id":61,"stem":"以下与《送灵激上人》的作者身处同一朝代的是（ ）","options":["杜牧","苏轼","王冕","袁枚"],"answer":0,"explanation":"《送灵激上人》的作者是唐代诗人刘长卿。 杜牧字牧之，唐朝文学家。 苏轼，字子瞻，又字和仲，号铁冠道人、东坡居士，世称苏东坡、苏仙、坡仙，北宋文学家，书法家、画家。 王冕字元章，号竹斋、煮石山农，亦号食中翁、梅花屋主等，元朝画家、诗人、书法家、篆刻家。 袁枚字子才，号简斋，晚年自号仓山居士、随园主人、随园老人，是清代诗人、散文家。"},{"id":62,"stem":"“两情若是久长时，又岂在朝朝暮暮”出自一首（ ）","options":["渔家傲","鹊桥仙","鹧鸪天","苏幕遮"],"answer":1,"explanation":"7 19959276711（vx 同号） 【知识小链接】出自北宋秦观的《鹊桥仙》：“纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。柔情似水， 佳期如梦，忍顾鹊桥归路。两情若是久长时，又岂在朝朝暮暮。”"},{"id":63,"stem":"被认为是中国古代山水诗的开创者的诗人是（）","options":["陶渊明","谢灵运","谢眺","王维"],"answer":1,"explanation":"山水诗，是指描写山水风景的诗。起源于先秦两汉，产生于魏晋时期，并在南朝至晚唐随着中国诗歌发展与文学环境 变迁而不断演变。 山水诗鼻祖是东晋的谢灵运。谢灵运所开创的山水诗，把自然界的美景引进诗中，使山水诗成为独立的审美对象。"},{"id":64,"stem":"下列不属于“唐宋八大家”之一的是（）","options":["韩愈","柳宗元","欧阳修","范仲淹"],"answer":3,"explanation":"唐宋八大家，又称为“唐宋散文八大家”，是唐代和宋代八位散文家的合称，分别为唐代韩愈、柳宗元和宋代欧阳修、 苏洵、苏轼、苏辙、王安石、曾巩八位。 其中韩愈、柳宗元是唐代古文运动的领袖。 欧阳修、三苏（苏轼、苏辙、苏洵）等四人是宋代古文运动的核心人物。 王安石、曾巩是临川文学的代表人物。他们先后掀起的古文革新浪潮，使诗文发展的陈旧面貌焕然一新。"},{"id":65,"stem":"六一居士是（）","options":["白居易","欧阳修","苏轼","李清照"],"answer":1,"explanation":"欧阳修，字永叔，号醉翁，晚号六一居士，北宋政治家、文学家、史学家。"},{"id":66,"stem":"成语“出裘发粟”出自（ ）","options":["《吕氏春秋》","《晏子春秋》","《孟子》","《庄子》"],"answer":1,"explanation":"出自《晏子春秋》，为第二十篇。 “出裘发粟”指景公能虚心听取下属的意见，并采取措施改正错误。后来意思是领导或个人能虚心听取下属的意见，并采取措施改正 错误。 选文内容：景公之时，雨雪三日而不霁，公被狐白之裘，坐于堂侧阶。晏子入见，立有间，公曰：“怪哉！雨雪三日而天不寒。”晏 子对曰：“天不寒乎？”公笑。晏子曰：“婴闻古之贤君，饱而知人之饥，温而知人之寒，逸而知人之劳，今君不知也。”公曰：“善！ 寡人闻命矣。”乃出裘发粟以与饥寒者。令所睹于涂者，无所问乡；所睹于里者，无问其家；循国计数，无言其名。士既事者兼月， 疾者兼岁。孔子闻之，曰：“晏子能明其所欲，景公能行其所善也。”"},{"id":67,"stem":"白居易，字乐天，号（ ）","options":["四明狂客","西湖居士","香山居士","易安居士"],"answer":2,"explanation":"白居易，字乐天，号香山居士，又号醉吟先生。唐代现实主义诗人、唐代三大诗人之一。"},{"id":68,"stem":"有“七绝圣手”之称的诗人是（ ）","options":["杜甫","刘禹锡","刘长卿","王昌龄"],"answer":3,"explanation":"王昌龄字少伯，盛唐时期边塞诗人、大臣，有“诗家夫子王江宁”之誉，又被后人誉为“七绝圣手”。"},{"id":69,"stem":"从孙仲谋这个名字可以推断，他在兄弟排行是（）","options":["大哥","老二","老三","老小"],"answer":1,"explanation":"古代兄弟排行称谓以伯、仲、叔、季来表示兄弟间的排行顺序，伯为老大，仲为老二，叔为老三，季排行最小。孙仲 谋排行第二。"},{"id":70,"stem":"沾衣欲湿（）雨，吹面不寒杨柳风。","options":["桃花","荷花","杏花","菊花"],"answer":2,"explanation":"“沾衣欲湿杏花雨，吹面不寒杨柳风。”出自宋代志南的《绝句》 解释：杏花时节的蒙蒙细雨，像故意要沾湿我的衣裳似的下个不停；吹拂着脸庞的微风已感觉不到寒意，嫩绿的柳条随风舞动，格外 轻飏。"},{"id":71,"stem":"请为古诗排序（）①商女不知亡国恨②隔江犹唱后庭花③烟笼寒水月笼沙④夜泊秦淮近酒家","options":["2431","1243","3412","4132"],"answer":2,"explanation":"出自杜牧的《泊秦淮》：烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。意思是如烟的水汽 笼罩在秦淮河上，月光映照着江边的沙岸。宁静的夜里把船停在岸边，靠在酒家。这时，从江对岸传来歌声，这是不知亡国之恨的歌 19959276711（vx 同号） 女在唱《玉树后庭花》。"},{"id":72,"stem":"“山随平野尽”的下一句是（ ）","options":["月涌大江流","江入大荒流","来从楚国游","万里送行舟"],"answer":1,"explanation":"“山随平野尽，江入大荒流”出自唐代诗人李白作品《渡荆门送别》。意思是青山渐渐消失，平野一望无边。长江滔 滔奔涌，流入广袤荒原。"},{"id":73,"stem":"“遥知兄弟登高处，遍插茱萸少一人”中，“一人”是指（）。","options":["王之涣","杜甫","王维","李白"],"answer":2,"explanation":"诗句出自王维诗《九月九日忆山东兄弟》，意思是远远想到兄弟们身佩茱萸登上高处，也会因为少我一人而生遗憾之 情。王维写作此诗时，独自一人漂泊在洛阳与长安之间，“一人”是指王维自己。"},{"id":74,"stem":"李清照“何须浅碧轻红色，自是花中第一流”说的是（ ）","options":["桂花","梅花","菊花","百合"],"answer":0,"explanation":"出自宋代李清照的《鹧鸪天·桂花》：“暗淡轻黄体性柔，情疏迹远只香留。何须浅碧轻红色，自是花中第一流。”"},{"id":75,"stem":"“枝上柳绵吹又少，天涯何处无芳草”出自（）的作品。","options":["苏轼","欧阳修","屈原","辛弃疾"],"answer":0,"explanation":"出自北宋苏轼的《蝶恋花·春景》：“花褪残红青杏小。燕子飞时，绿水人家绕。枝上柳绵吹又少，天涯何处无芳草！ 墙里秋千墙外道。墙外行人，墙里佳人笑。笑渐不闻声渐悄，多情却被无情恼。”"},{"id":76,"stem":"王湾的《次北固山下》从体裁上看是一首（ ）","options":["赠别诗","思乡诗","五言绝句","五言律诗"],"answer":3,"explanation":"全诗：“客路青山下，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江春入旧年。乡书何处达，归雁洛阳边。 ” 本诗一共八句，每句五个字，被称为五言律诗，也叫五律。"},{"id":77,"stem":"以下表达爱国情感的诗句作者不是陆游的是（）","options":["一闻战鼓意气生，犹能为国平燕赵。","夜阑卧听风吹雨，铁马冰河入梦来。","死去元知万事空，但患不见九州同。","人生自古谁无死，留取丹心照汗青。"],"answer":3,"explanation":"“人生自古谁无死，留取丹心照汗青”出自宋代文天祥的《过零丁洋》：“辛苦遭逢起一经，干戈寥落四周星。山河 破碎风飘絮，身世浮沉雨打萍。惶恐滩头说惶恐，零丁洋里叹零丁。人生自古谁无死？留取丹心照汗青。”"},{"id":78,"stem":"“功盖三分国，名成八阵图”说的是（）","options":["杜甫","曹操","诸葛亮","霍去病"],"answer":2,"explanation":"出自唐代杜甫的《八阵图》“功盖三分国，名成八阵图”，这两句赞颂诸葛亮的丰功伟绩。"},{"id":79,"stem":"“影入平羌江水流”中的“影”指（）","options":["船影","人影","月影","水影"],"answer":2,"explanation":"出自唐代李白的《峨眉山月歌》，意思是流动的平羌江上，倒映着精亮月影。影指的是月光的倒影。"},{"id":80,"stem":"农历八月为（）","options":["孟秋","仲秋","季秋","晚秋"],"answer":1,"explanation":"秋天还可以分孟秋、仲秋、季秋三个阶段。在古代，一年分为四个季节，每个季节各占三个月，这三个季节分别可以 用“孟、仲、季”来表示。农历八月为仲秋。"},{"id":81,"stem":"下列诗句不是描写夏景的是（ ）","options":["水晶帘动微风起，满架蔷薇一院香。","接天莲叶无穷碧，映日荷花别样红。","惆怅东栏一株雪，人生看得几清明。","黄梅时节家家雨，青草池塘处处蛙。"],"answer":2,"explanation":"C 出自宋代苏轼的《东栏梨花》，意思是开在东栏边的一株梨花让人失意伤感，人生短暂，能看得了多少个清明节啊！"},{"id":82,"stem":"从《黄鹤楼送孟浩然之广陵》的题目中可知，孟浩然要去的地方是（ ）。","options":["杭州","扬州","苏州","常州 9 19959276711（vx 同号）"],"answer":1,"explanation":"出自唐代李白的《黄鹤楼送孟浩然之广陵》：“故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际 流。”广陵即扬州。"},{"id":83,"stem":"成语“名落孙山”中“孙山”指的是（）","options":["一个地名","一座山","一种官职","一个人名"],"answer":3,"explanation":"成语“名落孙山”意思是名字落在榜末孙山的后面。指考试或选拔没有录取。出自宋代范公偁的《过庭录》：\"吴人孙 山，滑稽才子也。赴举他郡，乡人讬以子偕往。乡人子失意，山缀榜末，先归。乡人问其子得失，山曰：‘解名尽处是孙山，贤郎更 在孙山外。’\""},{"id":84,"stem":"下列不属于“二十四节气”的是（）","options":["惊蛰","清明","寒食","处暑"],"answer":2,"explanation":"二十四节气： 春——立春、雨水、惊蛰、春分、清明、谷雨、 夏——立夏、小满、芒种、夏至、小暑、大暑、 秋——立秋、处暑、白露、秋分、寒露、霜降、 冬——立冬、小雪、大雪、冬至、小寒、大寒。 处暑之前的节气是立秋。"},{"id":85,"stem":"下面为作者登乐游原后而作的诗句是（）","options":["念天地之悠悠，独怆然而涕下","白日依山尽，黄河入海流","夕阳无限好，只是近黄昏","日照香炉生紫烟，遥看瀑布挂前川"],"answer":2,"explanation":"乐游原在长安（今西安）城南，地势较高，是唐代的游览胜地。李商隐《登乐游原》 向晚意不适，驱车登古原。 夕阳无限好，只是近黄昏。 李商隐身处的晚唐，总有一种极致奢华过后的颓废感，故而此诗理解为李商隐对唐帝国的感叹。"},{"id":86,"stem":"苍苍（），杳杳钟声晚。","options":["寒山寺","大林寺","竹林寺","破山寺"],"answer":2,"explanation":"“苍苍竹林寺，杳杳钟声晚。”出自唐代刘长卿的《送灵澈上人》 意思是青苍的竹林寺，近晚时传来深远的钟声。"},{"id":87,"stem":"“一骑红尘妃子笑，无人知是荔枝来。”句中“妃子”指的是（）","options":["赵飞燕","杨玉环","王昭君","武则天"],"answer":1,"explanation":"出自唐代杜牧的《过华清宫绝句三首》，解释：一骑驰来烟尘滚滚妃子欢心一笑，无人知道是南方送了荔枝鲜果来。 此诗通过送荔枝这一典型事件，鞭挞了玄宗与杨贵妃骄奢淫逸的生活，"},{"id":88,"stem":"以善于描写边塞风光著称的诗人是（）","options":["李商隐","柳宗元","白居易","高适"],"answer":3,"explanation":"高适，字达夫，唐朝中期名臣、边塞诗人。"},{"id":89,"stem":"下列作者为孟浩然的是（）","options":["《题破山寺后禅院》","《夜归鹿门山歌》","《子夜吴歌》","《白雪歌送武判官归京》"],"answer":1,"explanation":"《题破山寺后禅院》作者是唐代的常建， 《子夜吴歌》作者是唐代李白， 《白雪歌送武判官归京》作者是唐代岑参。"},{"id":90,"stem":"“昌黎先生”是（）","options":["韩愈","柳宗元","苏轼","王安石"],"answer":0,"explanation":"韩愈字退之，世称“韩昌黎”“昌黎先生”。"},{"id":91,"stem":"下列不是出自边塞诗的是（ ）","options":["但使龙城飞将在，不教胡马度阴山。","忽如一夜春风来，千树万树梨花开。 10 19959276711（vx 同号）","秦时明月汉时关，万里长征人未还。","寒雨连江夜入吴，平明送客楚山孤。"],"answer":3,"explanation":"“寒雨连江夜入吴，平明送客楚山孤”出自唐代王昌龄送别诗《芙蓉楼送辛渐》"},{"id":92,"stem":"以下（）是对自己父亲的敬称。","options":["令尊","家慈","令堂","家严"],"answer":3,"explanation":"令尊是敬辞，指说话者对方的父亲。也叫“令严”。令堂是对别人母亲的尊称。家慈又称“家母”。是在别人面前对 自己母亲的谦称。与“家严”相对。家严、家父，对人称自己的父亲。"},{"id":93,"stem":"有“诗狂\"之称的唐代诗人是（ ）","options":["杜甫","白居易","贺知章","刘禹锡"],"answer":2,"explanation":"作者称号： 李白——诗仙王维——诗佛白居易——诗魔苏轼——诗神 杜甫——诗圣李贺——诗鬼王勃——诗杰孟郊——诗囚 贺知章——诗狂刘禹锡——诗豪贾岛——诗奴陈子昂——诗骨"},{"id":94,"stem":"白露之后的节气是（ ）。","options":["立秋","秋分","霜降","寒露"],"answer":1,"explanation":"24 节气分别为. 立春、雨水、惊蛰、春分、清明、谷雨、 立夏、小满、芒种、夏至、小署、大署、 立秋、处署、白露、秋分、寒露、霜降、 立冬、小雪、大雪、冬至、小寒、大寒"},{"id":95,"stem":"“鳏寡孤独”中“孤”指的是（ ）","options":["无妻","无夫","少而无父","老而无子"],"answer":2,"explanation":"《孟子•梁惠王下》曰：“老而无妻曰鳏，老而无夫曰寡，老而无子曰独，幼而无父曰孤。”《礼记》曰：“矜（鳏）、 寡、孤、独、废疾者皆有所养。” 年老的男人没有妻子的叫\"鳏\"（鳏夫，读 guān）， 年老的女人没有丈夫的叫\"寡\"（寡妇）， 年老而没有子女的叫\"独\"， 幼年死去父亲的叫\"孤\"（孤儿孤女）。 幼年死去母亲故古文一般写作\"幼年丧母\"或\"襁褓时丧母\"。"},{"id":96,"stem":"下列不属于书法“宋四家”的是（）","options":["米芾","秦观","黄庭坚","苏轼"],"answer":1,"explanation":"宋四家是中国北宋时期四位书法家苏轼、黄庭坚、米芾和蔡襄的合称。这四个人大致可以代表宋代的书法风格，而且 成就最高，故称“宋四家”。"},{"id":97,"stem":"“三月不知肉味”原为孔子用来形容（）的独特魅力。","options":["书箱","绘画","音乐","美食"],"answer":2,"explanation":"三月不知肉味原为孔子用来形容音乐的独特魅力。孔子在齐国的时候听到了《韶》乐，被深深吸引，以至于三月不知 肉味。他说，“想不到《韶》乐的美达到了这样迷人的地步。”"},{"id":98,"stem":"下列不是月亮代称的是（ ）","options":["蝉娟","玉盘","金乌","蟾宫"],"answer":2,"explanation":"古代神话传说太阳中有三足乌，因用为太阳的代称。"},{"id":99,"stem":"“羲和”是指我国古代传说中的（）","options":["月神","风神","日神","雨神"],"answer":2,"explanation":"羲和，中国上古神话中的太阳女神与制定时历的女神，中国最早的天文学家和历法制定者。"},{"id":100,"stem":"诗句“劝君更尽一杯酒，西出阳关无故人”中的“君”是（ ）","options":["王维","高适","董大","元二 11 19959276711（vx 同号）"],"answer":3,"explanation":"诗句出自唐代王维的《送元二使安西》，“君”是元二。"},{"id":101,"stem":"下列不是清明节习俗的是（ ）。","options":["放风筝","扫墓","插茱萸","春游"],"answer":2,"explanation":"插茱萸是重阳节的风俗，《九月九日忆山东兄弟》里面说道“遍插茱萸少一人”，农历九月九就是重阳节。"},{"id":102,"stem":"“醉卧沙场君莫笑”的下一句是（ ）","options":["轻舟已过万重山","春风不改旧时波","路上行人欲断魂","古来征战几人回"],"answer":3,"explanation":"诗句出自唐代王翰的边塞诗《凉州词》：葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回？"},{"id":103,"stem":"竹外（）三两枝，春江水暖鸭先知。","options":["杏花","梨花","桃花","红花"],"answer":2,"explanation":"诗句出自宋代苏轼的《惠崇春江晚景》，意思是竹林外两三枝桃花初放，鸭子在水中游戏，它们最先察觉了初春江水 的回暖。"},{"id":104,"stem":"下列哪一个称号不是属于李白的（）。","options":["青莲居士","少陵野老","诗仙","谪仙人"],"answer":1,"explanation":"少陵野老是指唐代著名诗人杜甫。他在晚年时期，曾任少陵县尉，因此被称为“少陵野老”。"},{"id":105,"stem":"情投意合的朋友叫“莫逆之交”，辈分不同、年龄相差较大的朋友叫“忘年交”，亲如兄弟的朋友叫（ ）","options":["刎颈之交","金兰之交","布衣之交","平民之交"],"answer":1,"explanation":"情谊契合、亲如兄弟的朋友叫“金兰之交”； 同生死、共患难的朋友叫“刎颈之交”； 以平民身份相交往的朋友叫“布衣之交”。"},{"id":106,"stem":"以下不是古代中国别称的选项是（）","options":["九州","赤县","神州","荆国"],"answer":3,"explanation":"古代中国的别称有神州（也叫赤县神州）、九州、华夏、中夏、中原、函夏、九牧、九域、中华、海内等。“中国” 一词最早出现在《诗经》。"},{"id":107,"stem":"下列作者不是杜甫的是（ ）","options":["落花人独立，微雨燕双飞","细雨鱼儿出，微风燕子斜","迟日江山丽，春风花草香","烽火连三月，家书抵万金"],"answer":0,"explanation":"A 出自宋代晏几道的《临江仙·梦后楼台高锁》。 B 出自杜甫的《水槛遣心二首》； C 出自杜甫的《绝句二首》 D 出自杜甫的《春望》"},{"id":108,"stem":"成语“柳暗花明”出自古诗（ ）","options":["《江南》","《忆江南》","《游山西村》","《商山早行》"],"answer":2,"explanation":"“柳暗花明”出自宋代陆游的七言律诗《游山西村》。原义是形容柳树成荫，繁花似锦的春天景象，比喻在曲折艰辛 之后，忽然绝处逢生，另有一番情景。"},{"id":109,"stem":"“乱入池中看不见，闻歌始觉有人来”两句诗的作者是（ ）","options":["王昌龄","王勃","白居易","刘禹锡"],"answer":0,"explanation":"诗句出自唐代王昌龄的《采莲曲二首》。解释：混入莲池中不见了踪影，听到歌声四起才觉察到有人前来。"},{"id":110,"stem":"“四书五经”中“四书”是指《大学》《中庸》《论语》（ ）","options":["《孔子》","《老子》","《苟子》","《孟子》"],"answer":3,"explanation":"12 19959276711（vx 同号） 四书是指《大学》《中庸》《论语》和《孟子》； 五经是指《诗经》《尚书》《礼记》《周易》《春秋》，简称为“诗、书、礼、易、春秋”。"},{"id":111,"stem":"苏轼《饮湖上初晴雨后》中的“湖”指的是（）","options":["洞庭湖","白马湖","西湖","太湖"],"answer":2,"explanation":"《饮湖上初晴后雨》全诗：水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。“湖”指的是西 湖。"},{"id":112,"stem":"“知有儿童挑促织，夜深篱落一灯明”中的“促织”指的是（）","options":["蟋蟀","蚂炸","蜘蛛","蚂蚁"],"answer":0,"explanation":"诗句出自宋代叶绍翁的《夜书所见》。解释：忽然看到远处篱笆下的一点灯火，料想是孩子们在捉蟋蟀。促织俗称蟋 蟀。"},{"id":113,"stem":"《乌衣巷》描写的景致位于（）","options":["长安","洛阳","金陵","姑苏"],"answer":2,"explanation":"《乌衣巷》是唐代诗人刘禹锡所作。乌衣巷：金陵城内街名，位于秦淮河之南，与朱雀桥相近。三国时期吴国曾设军 营于此，为禁军驻地。由于当时禁军身着黑色军服，所以此地俗语称乌衣巷。"},{"id":114,"stem":"对诗句“我寄愁心与明月，随君直到夜郎西”以下描述正确的一项是（ ）","options":["“我”指的是王昌龄","夜郎是人名","从诗句中可以体会到亲情的珍贵","这句诗表达了作者对朋友的关心"],"answer":3,"explanation":"诗句出自唐代李白的《闻王昌龄左迁龙标遥有此寄》，意思是我把我忧愁的心思寄托给明月，希望能随着风一直陪着 你到夜郎以西。其中，“我”指李白，夜郎是地名，这句诗表达了作者对朋友的关心。"},{"id":115,"stem":"下列不属于“岁寒三友”的一项是（）","options":["梅","菊","松","竹"],"answer":1,"explanation":"岁寒三友指松、竹、梅。松、竹经冬不凋，梅花耐寒开放，因此有“岁寒三友”之称。出自宋·林景熙《王云梅舍记》。"},{"id":116,"stem":"诗句“解落三秋叶，能开二月花”描绘的是（）","options":["风","云","雷","电"],"answer":0,"explanation":"诗句出自唐代李峤的《风》，意思是能吹落秋天金黄的树叶，能吹开春天美丽的鲜花。这首诗写出了风的力量。"},{"id":117,"stem":"“儿童（）学归来早，忙趁（ ）风放纸。”括号内应填入（ ）","options":["放；东","放；春","散；东","散；春"],"answer":2,"explanation":"“儿童散学归来早，忙趁东风放纸鸢”的意思是：村里的孩子们放了学急忙跑回家，趁着东风把风筝放上蓝天。出自 清代诗人高鼎的《村居》。"},{"id":118,"stem":"“又疑瑶台镜，飞在青云端”的作者是（）","options":["杜甫","王维","李白","白居易"],"answer":2,"explanation":"诗句出自唐代李白的《古朗月行》，意思是又怀疑是瑶台仙镜，飞在夜空青云之上。"},{"id":119,"stem":"“千门万户瞳瞳日，总把新桃换旧符”描绘的是（ ）。","options":["冬至","春节","元宵节","元旦"],"answer":1,"explanation":"出自宋代王安石的《元日》 解释：初升的太阳照耀着千家万户，大家都把旧的桃符取下换上新的桃符。 赏析：此句描写了新年元日热闹、欢乐和万象更新的情景，充分表现出过年的欢乐气氛，富有浓厚的生活气息，也表达出诗人对革新 政治充满着信心。"},{"id":120,"stem":"诗句“梅须逊雪三分白，雪却输梅一段香”运用的修辞手法是（）","options":["对偶","比喻","对比","夸张"],"answer":2,"explanation":"诗句宋代卢钺的《雪梅》，意思是梅花也许比不上雪花的晶莹洁白，雪花却输给梅花的清香芬芳。对比是把具有明显 差异、矛盾和对立的双方安排在一起，进行对照比较的表现手法。句中梅”与“雪”对比，突出了梅香、雪白。 19959276711（vx 同号）"},{"id":121,"stem":"从体裁上看，苏轼的《题西林壁》是一首（）","options":["题壁诗","哲理诗","七言绝句","山水诗"],"answer":2,"explanation":"《题西林壁》是宋代文学家苏轼的诗作。 这是一首诗中有画的写景诗，又是一首哲理诗，哲理蕴含在对庐山景色的描绘之中。 从诗歌体裁上分为：古代诗歌和新诗两类，古代诗歌又可分为近体诗和古体诗（古风），近体诗又分为格律诗（律诗〔五言律诗、七 言律诗〕、绝句、词、曲；新诗包括自由诗（五四以来产生的白话诗）、散文诗、民歌。"},{"id":122,"stem":"对“孤舟蓑笠翁”中的“蓑笠翁”理解正确的一项是（）","options":["披蓑衣的渔翁","戴斗笠的渔翁","渔翁","披蓑衣，戴斗笠的渔翁"],"answer":3,"explanation":"出自唐代柳宗元的《江雪》：“千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。”“蓑笠翁”指披蓑衣，戴斗 笠的渔翁，"},{"id":123,"stem":"诗句“蒌蒿满地芦芽短，正是河豚欲上时”描写的是（ ）情景","options":["春季","夏季","秋季","冬季"],"answer":0,"explanation":"诗句出自宋代苏轼的《惠崇春江晚景二首》，解释：河滩上长满了蒌蒿，芦苇也长出短短的新芽，而河豚此时正要逆 流而上，从大海回游到江河里来了。此句描写了一派春意盎然、欣欣向荣的景象。"},{"id":124,"stem":"“日出江花红胜火，春来江水绿如蓝”出自（）","options":["清平乐","卜算子","丑奴儿","忆江南"],"answer":3,"explanation":"诗句出自唐朝白居易的《忆江南》：“江南好，风景旧曾谙。日出江花红胜火，春来江水绿如蓝。能不忆江南？”"},{"id":125,"stem":"“停车坐爱枫林晚，霜叶红于二月花”中“坐”的意思是（）","options":["坐车","因为","坐下","只是"],"answer":1,"explanation":"出自唐代杜牧的《山行》，意思是只因爱那枫林晚景我把马车停下，霜染的枫叶胜过鲜艳二月的花。坐：因为。"},{"id":126,"stem":"诗句“水光潋滟晴方好，山色空蒙雨亦奇”描写的是（ ）的景象","options":["颖州西湖","武汉东湖","金陵玄武湖","杭州西湖"],"answer":3,"explanation":"“水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。”这是一首赞美西湖美景的诗。此诗不是 描写西湖的一处之景、一时之景，而是对西湖美景的全面描写概括品评，尤其是后二句，被认为是对西湖的恰当评语。"},{"id":127,"stem":"“千门万户瞳瞳日，总把新桃换旧符。”描绘的传统节日是（）","options":["元旦","春节","元宵","腊八"],"answer":1,"explanation":"出自宋代王安石的《元日》 解释：初升的太阳照耀着千家万户，大家都把旧的桃符取下换上新的桃符。 赏析：此句描写了新年元日热闹、欢乐和万象更新的情景，充分表现出过年的欢乐气氛，富有浓厚的生活气息，也表达出诗人对革新 政治充满着信心。"},{"id":128,"stem":"成语（）与李清照《夏日绝句》中所提及的历史人物无关。","options":["四面楚歌","破釜沉舟","霸王别姬","卧薪尝胆"],"answer":1,"explanation":"《夏日绝句》：“生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。”公元 1127 年（靖康二年），金兵入侵中原， 掳走徽、钦二帝，赵宋王朝被迫南逃。李清照之夫赵明诚出任建康知府。后城中爆发叛乱，赵明诚不思平叛，反而临阵脱逃。李清照 为国为夫感到耻辱，在路过乌江时，有感于项羽的悲壮，创作此诗。卧薪尝胆的相关人物是勾践。"},{"id":129,"stem":"“秦时明月汉时关，万里长征人未还”出自（）","options":["塞下曲","从军行","凉州词","出塞"],"answer":3,"explanation":"诗句出自唐代王昌龄《出塞》：秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。"},{"id":130,"stem":"“可怜九月初三夜，露似真珠月似弓”的作者是（ ）","options":["杜甫","孟浩然","王维","白居易"],"answer":3,"explanation":"诗句出自唐代白居易的《暮江吟》，意思是最可爱的是那九月初三之夜，露珠似颗颗珍珠，朗朗新月形如弯弓。 19959276711（vx 同号）"},{"id":131,"stem":"下列与苏轼无关的是（ ）","options":["东坡居士","豪放派诗人","书法家","醉翁亭"],"answer":3,"explanation":"苏轼，字子瞻，又字和仲，号铁冠道人、东坡居士，世称苏东坡、苏仙、坡仙，北宋文学家，书法家、画家。其词开 豪放一派，与辛弃疾同是豪放派代表，并称“苏辛”。"},{"id":132,"stem":"“萧萧梧叶送寒声，江上秋风动客情”出自（）","options":["李贺","李商隐","叶绍翁","辛弃疾"],"answer":2,"explanation":"诗句出自宋代叶绍翁的《夜书所见》，意思是瑟瑟的秋风吹动梧桐树叶，送来阵阵寒意，江上秋风吹来不禁思念起自 己的家乡。"},{"id":133,"stem":"下列故事中，（ ）是杨万里的作品。","options":["《池上》","《惠崇春江晚景》","《山行》","《宿新市徐公店》"],"answer":3,"explanation":"A 的作者是白居易， B 的作者是苏轼， C 的作者是范成大。"},{"id":134,"stem":"《九月九日忆山东兄弟》中，“山东”在（）","options":["现在的山东省","现在的河南省","太行山以东","华山以东"],"answer":3,"explanation":"王维写作此诗时，独自一人漂泊在洛阳与长安之间，他是蒲州（今山西永济）人，蒲州在华山东面，所以称故乡的兄 弟为“山东兄弟”。全诗为“独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。”"},{"id":135,"stem":"沾衣欲湿（）雨，吹面不寒杨柳风。","options":["桃花","荷花","杏花","菊花"],"answer":2,"explanation":"“沾衣欲湿杏花雨，吹面不寒杨柳风。”出自宋代志南的《绝句》 解释：杏花时节的蒙蒙细雨，像故意要沾湿我的衣裳似的下个不停；吹拂着脸庞的微风已感觉不到寒意，嫩绿的柳条随风舞动，格外 轻飏。"},{"id":136,"stem":"苏轼的《江城子·乙卯正月二十日夜记梦》是一首（ ）","options":["送别词","山水词","思乡词","悼亡词"],"answer":3,"explanation":"苏轼的《江城子.乙卯正月二十日夜记梦》：十年生死两茫茫，不思量，自难忘。千里孤坟，无处话凄凉。纵使相逢应 不识，尘满面，鬓如霜。夜来幽梦忽还乡，小轩窗，正梳妆。相顾无言，惟有泪千行。料得年年肠断处，明月夜，短松冈。 这是苏轼为悼念原配妻子王弗而写的一首悼亡词，表现了绵绵不尽的哀伤和思念。"},{"id":137,"stem":"“三山五岳”中的西岳是（ ）","options":["泰山","华山","嵩山","衡山"],"answer":1,"explanation":"三山五岳泛指名山或各地。 三山是古代传说中的东海三座仙山，分别是蓬莱（蓬壶）、方丈（方壶）、瀛洲（瀛壶）；五岳指泰山、华山、衡山、恒山、嵩山， 对应东岳、西岳、南岳、北岳、中岳，三山五岳在中国虽不是最高的山，但都高耸于平原或盆地之上，这样也就显得格外险峻。 华山，古称“西岳”，雅称“太华山”，自古以来就有“奇险天下第一山”的说法。"},{"id":138,"stem":"“潮平两岸阔”的下一句是（ ）","options":["江春入旧年","风正一帆悬","行舟绿水前","归雁洛阳边"],"answer":1,"explanation":"本句出自唐代诗人王湾作品《次北固山下》。客路青山外，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江 春入旧年。乡书何处达？归雁洛阳边。 诗意：旅途在青山外，在碧绿的江水前行舟。潮水涨满，两岸之间水面宽阔，顺风行船恰好把帆儿高悬。夜幕还没有褪尽，旭日已在 江上电由升起，还在旧年时分，江南已有了春天的气息。寄出去的家信不知何时才能到达，希望北归的大雁捎到洛阳去。"},{"id":139,"stem":"下列不属于“唐宋八大家”之一的是（ ）","options":["韩愈","柳宗元","欧阳修","范仲淹"],"answer":3,"explanation":"唐宋八大家，又称为\"唐宋散文八大家\"，是唐代和宋代八位散文家的合称，分别为唐代柳宗元、韩愈和宋代欧阳修、苏 洵、苏轼、苏辙、王安石、曾巩八位。 其中韩愈、柳宗元是唐代古文运动的领袖，欧阳修、三苏（苏轼、苏辙、苏洵）等四人是宋代古文运动的核心人物，王安石、曾巩是 19959276711（vx 同号） 临川文学的代表人物。"},{"id":140,"stem":"下列不属于咏物诗的是（ ）","options":["红豆生南国，春来发几枝。","晴川历历汉阳树，芳草萋萋鹦鹉洲。","墙角数枝梅，凌寒独自开。","碧玉妆成一树高，万条垂下绿丝绦。"],"answer":1,"explanation":"B 句出自唐代诗人崔颢作品《黄鹤楼》。 此诗描写了在黄鹤楼上远眺的美好景色，是一首吊古怀乡之佳作。 前四句写登临怀古，后四句写站在黄鹤楼上的所见所思。 诗虽不协律，但音节洪亮而不拗口。信手而就，一气呵成，成为历代所推崇的珍品。"},{"id":141,"stem":"“爆竹声中一岁除，春风送暖入屠苏”，这里的“屠苏”指的是（）","options":["苏州","房屋","酒","庄稼"],"answer":2,"explanation":"诗句出自宋代王安石的《元日》，意思是爆竹声中旧的一年已经过去，迎着和暖的春风开怀畅饮屠苏酒。 屠苏：指屠苏酒，饮屠苏酒也是古代过年时的一种习俗，大年初一全家合饮这种用屠苏草浸泡的酒，以驱邪避瘟疫，求得长寿。"},{"id":142,"stem":"千古名句“海上生明月，天涯共此时。”出自（ ）","options":["《琵琶行》","《望月怀远》","《水调歌头》","《春江花月夜》"],"answer":1,"explanation":"本句出自唐代诗人张九龄作品《望月怀远》。此诗是望月怀思的名篇，是作者在离乡时，望月而思念远方亲人而写的。 起句\"海上生明月\"意境雄浑阔大，是千古佳句。"},{"id":143,"stem":"“仍怜故乡水，万里送行舟”中“怜”的意思是（ ）","options":["怜爱","可惜","怜悯","稀少"],"answer":0,"explanation":"诗句出自李白的《渡荆门送别》，意思是我依然喜爱这来自故乡之水，不远万里来送我东行的小舟。怜：怜爱。"},{"id":144,"stem":"成语“曲径通幽”出自（ ）","options":["《题破山寺后禅院》","《游园不值》","《野色》","《琵琶行》"],"answer":0,"explanation":"成语“曲径通幽”的意思是弯曲的小路通到风景美丽的地方。形容景色雅致迷人出自唐代常建的《题破山寺后禅院》： “清晨入古寺，初日照高林。曲径通幽处，禅房花木深。山光悦鸟性，潭影空人心。万籁此都寂，但余钟磬音。”"},{"id":145,"stem":"人生代代无穷已，江月（ ）望相似。","options":["月月","年年","常常","久久"],"answer":1,"explanation":"诗句出自唐代张若虚的《春江花月夜》，意思是人生一代代地无穷无尽，只有江上的月亮一年年地总是相像。"},{"id":146,"stem":"下列属于婉约词代表人物的是（）","options":["白居易","辛弃疾","苏轼","李清照"],"answer":3,"explanation":"婉约词，中国古代词学流派之一，形成于晚唐。这一类词修辞婉转、表现细腻。在取材上，多写儿女之情、离别之情； 在表现手法上，多用含蓄蕴藉的方法表现情绪。代表词人有柳永、李清照等。"},{"id":147,"stem":"杨花落尽（）啼，闻道龙标过五溪。","options":["杜鹃","布谷","鹧鸪","子规"],"answer":3,"explanation":"诗句出自唐代李白的《闻王昌龄左迁龙标遥有此寄》：“杨花落尽子规啼，闻道龙标过五溪。我寄愁心与明月，随君 直到夜郎西。”"},{"id":148,"stem":"有“五言长城”之称的诗人是（）","options":["杜甫","刘禹锡","刘长卿","王昌龄"],"answer":2,"explanation":"五言长城出自《新唐书·秦系传》：“长卿自以为五言长城，系用偏师攻之，虽老益壮。”其意思是指善于作五言诗 的好手，特指唐代诗人刘长卿。"},{"id":149,"stem":"在杜甫的《望岳》（其一）这首诗中，最能体现诗人希望攀登绝顶，俯视一切的雄心壮志的诗句是（）","options":["岱宗夫如何？齐鲁青未了。","造化钟神秀，阴阳割昏晓。","荡胸生层云，决眦入归鸟。","会当凌绝顶，一览众山小。"],"answer":3,"explanation":"《望岳》译文：巍峨的泰山，到底如何雄伟？走出齐鲁，依然可见那青青的峰顶。神奇自然汇聚了千种美景，山南山 19959276711（vx 同号） 北分隔出清晨和黄昏。层层白云，荡涤胸中沟壑；翩翩归鸟，飞入赏景眼圈。定要登上泰山顶峰，俯瞰群山，豪情满怀。最能体现出 诗人希望攀登绝顶，俯视一切的雄心壮志的诗句是“会当凌绝顶，一览众山小。”"},{"id":150,"stem":"“雨雪三日而不霁”中“雨雪”的意思是（）","options":["下雨","下雪","雨夹雪","先雨后雪"],"answer":1,"explanation":"雨（yù）：名词作动词，下，落，降。“雨雪”意思是下雪。"},{"id":151,"stem":"（）的诗作风格独树一帜，活泼自然，饶有谐趣，被成为“诚斋体”。","options":["辛弃疾","白居易","范成大","杨万里"],"answer":3,"explanation":"诚斋体因杨万里而得名。杨万里号诚斋，故称为诚斋体。他的早期诗歌学习江西诗派，最后摆脱前人的束缚而自成一 家，取得了更高的成就。诚斋体的风格特征是活泼自然，饶有谐趣。"},{"id":152,"stem":"“枝上柳绵吹又少，天涯何处无芳草”出自（）的作品。","options":["苏轼","欧阳修","屈原","辛弃疾"],"answer":0,"explanation":"出自北宋苏轼的《蝶恋花·春景》：“花褪残红青杏小。燕子飞时，绿水人家绕。枝上柳绵吹又少，天涯何处无芳草！ 墙里秋千墙外道。墙外行人，墙里佳人笑。笑渐不闻声渐悄，多情却被无情恼。”"},{"id":153,"stem":"下列诗句中没有错别字的一组是（ ）","options":["春江潮水连海平，海上明月共潮升。","江流宛转绕芳甸，月照花林皆似散。","可怜楼上月徘徊，应照离人装镜台。","鸿雁长飞光不度，鱼龙潜跃水成文。"],"answer":3,"explanation":"A 春江潮水连海平，海上明月共潮生。 B 江流宛转绕芳甸，月照花林皆似霰。 C 可怜楼上月徘徊，应照离人妆镜台。"},{"id":154,"stem":"下列诗句不是描写秋景的是（ ）","options":["竹喧归浣女，莲动下渔舟。","萧萧梧叶送寒声，江上秋风动客情。","一曲高歌一樽酒，一人独钓一江秋。","行到中庭数花朵，蜻蜓飞上玉搔头。"],"answer":3,"explanation":"D 出自唐朝刘禹锡的《和乐天春词》“新妆面面下朱楼，深锁春光一院愁。行到中庭数花朵蜻蜓飞上玉搔头。”描写 的是春景。"},{"id":155,"stem":"“海内存知己，天涯若比邻”出自一首（）","options":["哲理诗","送别诗","山水诗","咏怀诗"],"answer":1,"explanation":"出自唐代王勃的《送杜少府之任蜀州》：“城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天涯 若比邻。无为在歧路，儿女共沾巾。”此诗是送别诗的名作，诗意在慰勉友人勿在离别之时悲哀。"},{"id":156,"stem":"下列不属于杜甫的称号是（ ）","options":["杜樊川","杜拾遗","杜工部","杜少陵"],"answer":0,"explanation":"杜甫，字子美，自号少陵野老，唐代伟大的现实主义诗人，与李白合称“李杜”，后世称其杜拾遗、杜工部，也称他 杜少陵、杜草堂。 杜樊川——杜牧。"},{"id":157,"stem":"下列不属于初唐四杰的是（ ）","options":["王勃","杨炯","卢纶","骆宾王"],"answer":2,"explanation":"初唐四杰是中国唐代初年，文学家王勃、杨炯、卢照邻、骆宾王的合称，简称为“王杨卢骆”，卢纶字允言，唐代诗 人。“大历十才子”之一。"},{"id":158,"stem":"“阁中帝子今何在，槛外长江空自流”出自王勃的（）","options":["《滕王阁序》","《滕王阁诗》","《登快阁》","《登滕王阁》"],"answer":1,"explanation":"句子出自王勃的《滕王阁诗》，意思是昔日游赏于高阁中的滕王如今已不知哪里去了，只有那栏杆外的滔滔江水空自 向远方奔流。"},{"id":159,"stem":"白居易，字乐天，号（ ）","options":["四明狂客","西湖居士","香山居士","易安居士 17 19959276711（vx 同号）"],"answer":2,"explanation":"香山居士——白居易； 四明狂客——贺知章； 西湖居士——李雨棠； 易安居士——李清照。"},{"id":160,"stem":"“渭城朝雨浥轻尘，客舍青青柳色新”出自王维的一首（ ）","options":["山水诗","田园诗","咏物诗","送别诗"],"answer":3,"explanation":"出自唐代王维的《送元二使安西》：“渭城朝雨浥轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。” 此诗是王维送朋友去西北边疆时作的诗，后有乐人谱曲，名为“阳关三叠”。 元二奉命出使安西都护府，王维到渭城为之饯行，写下这首诗。"},{"id":161,"stem":"“独在异乡为异客，每逢佳节倍思亲”中的“客”是（ ）","options":["孟浩然","韦应物","王安石","王维"],"answer":3,"explanation":"出自唐代王维的《九月九日忆山东兄弟》：“独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。 ” 该句的意思是：诗人王维一个人独自在他乡作客，每逢节日加倍思念远方的亲人。"},{"id":162,"stem":"刘基的诗句“古来英雄士，各已归山河”中“归山河”指的是（ ）","options":["埋葬的山陵","回归山林隐居","游览山中景色","辞官回乡"],"answer":0,"explanation":"“山阿”指的是山岳、小陵。出自明代刘基的《绝句·人生无百岁》：“人生无百岁，百岁复如何？古来英雄士，各 已归山河。”该句意思是：古往今来的英雄壮士，现在都化为尘土洒落在江河之中。“山河”指坟墓所在。"},{"id":163,"stem":"以下（ ）不是李白的作品。","options":["《峨眉山月歌》","《登金陵凤凰台》","《雁门太守行》","《渡荆门送别》"],"answer":2,"explanation":"《雁门太守行》是唐代李贺的作品，全诗：“黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。 半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。”"},{"id":164,"stem":"诗句“报君黄金台上意，提携玉龙为君死”中的“玉龙”是（）","options":["雪山的名称","宝剑的名称","将士的名字","一种珠宝"],"answer":1,"explanation":"本句出自唐朝李贺的《雁门太守行》，意思是为了报答国君的赏赐和厚爱，手操宝剑甘愿为国血战到死。玉龙：宝剑 的代称。"},{"id":165,"stem":"“望海楼明照曙霞，护江堤白踏晴沙”描绘的是（）的象。","options":["苏州","湖州","杭州","潮州"],"answer":2,"explanation":"出自唐代白居易的《杭州春望》：“望海楼明照曙霞，护江堤白踏晴沙。涛声夜入伍员庙，柳色春藏苏小家。红袖织 绫夸柿蒂，青旗沽酒趁梨花。谁开湖寺西南路，草绿裙腰一道斜。”"},{"id":166,"stem":"“山随平野尽”的下一句是（）","options":["月涌大江流","江入大荒流","来从楚国游","万里送行舟"],"answer":1,"explanation":"“山随平野尽，江入大荒流”出自唐代诗人李白作品《渡荆门送别》。意思是青山渐渐消失，平野一望无边。长江滔 滔奔涌，流入广袤荒原。"},{"id":167,"stem":"周邦彦的《苏幕遮·燎沉香》写了（）的景色","options":["春季","夏季","秋季","冬季"],"answer":1,"explanation":"全诗是：“燎沉香，消溽暑。鸟雀呼晴，侵晓窥檐语。叶上初阳干宿雨，水面清圆，一一风荷举。故乡遥，何日去？ 家住吴门，久作长安旅。五月渔郎相忆否。小楫轻舟，梦入芙蓉浦。”这首词虽写久居汴京与消夏思归的情思，但却以描绘荷花的风 神而著称于世。"},{"id":168,"stem":"以下属于李白所作律诗的是（）","options":["《早发白帝城》","《黄鹤楼送孟浩然之广陵》","《春夜洛城闻笛》","《登金陵凤凰台》"],"answer":3,"explanation":"《登金陵凤凰台》是七言律诗，是李白登金陵凤凰台时创作的怀古抒情诗。 诗歌体裁可分为：古代诗歌和新诗两类，古代诗歌又可分为近体诗和古体诗（古风），近体诗又分为格律诗（律诗（五言律诗、七言 19959276711（vx 同号） 律诗）、绝句（五言绝句、七言绝句））、词、曲；新诗包括自由诗（五四以来产生的白话诗）、散文诗（以散文形式表现抒情诗内 容）、民歌（民间流传，集体创作的诗）。"},{"id":169,"stem":"“好峰随处改，幽径独行迷”出自（）","options":["王维《山居秋暝》","谢灵运《泰山吟》","杜牧《山行》","梅尧臣《鲁山山行》"],"answer":3,"explanation":"出自宋代梅尧臣的《鲁山山行》：“适与野情惬，千山高复低。好峰随处改，幽径独行迷。 霜落熊升树，林空鹿饮溪。人家在何许？云外一声鸡。”这首五言律诗写鲁山行的野景、野趣，突出表现山林的幽静和山行者的愉悦 心情。"},{"id":170,"stem":"下列不属于浪漫主义文学家的是（）","options":["庄子","孔子","屈原","李白"],"answer":1,"explanation":"庄子的代表作《庄子》想象奇幻，构思巧妙，多彩的思想世界和文学意境，文笔汪洋恣肆，具有浪漫主义的艺术风格， 瑰丽诡谲，意出尘外。屈原的《楚辞》开创了中国浪漫主义文学先河。李白是唐代伟大的浪漫主义诗人，被后人誉为“诗仙”。"},{"id":171,"stem":"被后世赞为“杜甫生平第一首快诗”的是（ ）","options":["《闻官军收河南河北》","《春夜喜雨》","《登高》","《春望》"],"answer":0,"explanation":"763 年，这一年出现了一件大好事，即长达八年之久的安史之乱进入尾声，官军向安禄山的老窝河北范阳一带进发，叛 军史朝义兵败自杀，其他叛军将领也多投降，唐朝官兵全部平息了这场祸乱。这时期的杜甫流离辗转在四川成都一带，官军大捷的消 息传到成都，杜甫听到后无比兴奋激动，随即写下了被称为“生平第一快诗”的《闻官军收河南河北》：“剑外忽传收蓟北，初闻涕 泪满衣裳。却看妻子愁何在，漫卷诗书喜欲狂。白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。”"},{"id":172,"stem":"“得鱼忘筌”出自（）","options":["《尚书》","《庄子》","《列子》","《山海经》"],"answer":1,"explanation":"“得鱼忘筌”最早出自战国·庄周《庄子·外物》。原意是领会精神实质的人，无须再用语言来交谈，现比喻事情成 功以后就忘了本来依靠的东西；筌：捕鱼用的竹器。"},{"id":173,"stem":"“少小虽非投笔吏，论功还欲请长缨”化用了（ ）投笔从戎的典故。","options":["班固","班彪","班超","班昭"],"answer":2,"explanation":"投笔吏：汉班超家贫，常为官府抄书以谋生，曾投笔叹曰：“大丈夫当立功异域以取封侯，安能久事笔砚间。”后终以功封定远侯。 论功：论功行封。请缨：汉终军曾向汉武帝请求：“愿受长缨，必羁南越王而致之阙下。”后被南越相所杀，年仅二十余岁。缨：绳。"},{"id":174,"stem":"“人间四月芳菲尽，山寺桃花始盛开”中的“寺”指的是（）","options":["竹林寺","西林寺","大林寺","少林寺"],"answer":2,"explanation":"出自《大林寺桃花》，唐朝诗人白居易所写，“寺”指的是大林寺。"},{"id":175,"stem":"开创中国浪漫主义文学先河的是（）","options":["《诗经》","《楚辞》","《古诗十九首》","《左传》"],"answer":0,"explanation":"《诗经》开创了中国现实主义文学先河。《楚辞》开创了中国浪漫主义文学先河。"},{"id":176,"stem":"“中岁颇好道”的王维被尊称为（）","options":["诗魔","诗鬼","诗佛","诗王"],"answer":2,"explanation":"诗王、诗魔——白居易；诗鬼——李贺；诗佛——王维。"},{"id":177,"stem":"从《芙蓉楼送辛渐》诗中可知，辛渐要去的地方是（ ）","options":["长安","楚山","岳阳","洛阳"],"answer":3,"explanation":"本句出自唐代诗人王昌龄作品《芙蓉楼送辛渐二首》 寒雨连江夜入吴，平明送客楚山孤。洛阳亲友如相问，一片冰心在玉壶。 诗意：冷雨连夜洒遍吴地江天，清晨送走你后，独自面对着楚山离愁无限！到了洛阳，如果洛阳亲友问起我来，就请转告他们，我的 心依然像玉壶里的冰那样晶莹纯洁！"},{"id":178,"stem":"以下表达爱国情感的诗句作者不是陆游的是（ ）","options":["一闻战鼓意气生，犹能为国平燕赵。","夜阑卧听风吹雨，铁马冰河入梦来。 19 19959276711（vx 同号）","死去元知万事空，但悲不见九州同。","人生自古谁无死，留取丹心照汗青。"],"answer":3,"explanation":"“人生自古谁无死，留取丹心照汗青”出自宋代文天祥的《过零丁洋》：“辛苦遭逢起一经，干戈寥落四周星。山河 破碎风飘絮，身世浮沉雨打萍。惶恐滩头说惶恐，零丁洋里叹零丁。人生自古谁无死？留取丹心照汗青。”"},{"id":179,"stem":"下列不属于编年体史书的是（ ）","options":["《春秋》","《史记》","《左传》","《资治通鉴》"],"answer":1,"explanation":"《春秋》是中国第一部编年体史书， 《史记》是中国历史上第一部纪传体通史。 《左氏春秋传》（简称《左传》）相传是由春秋末年鲁国的左丘明所著的先秦散文著作，是中国现存第一部叙事详细的编年体史书。 《资治通鉴》是中国第一部编年体通史。"},{"id":180,"stem":"“两情若是久长时，又岂在朝朝暮暮”出自一首（ ）","options":["渔家傲","鹊桥仙","鹧鸪天","苏幕遮"],"answer":1,"explanation":"出自北宋秦观的《鹊桥仙》：“纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。柔情似水， 佳期如梦，忍顾鹊桥归路。两情若是久长时，又岂在朝朝暮暮。”"},{"id":181,"stem":"稼轩体是（）作品的艺术风格","options":["杨万里","辛弃疾","李清照","陆游"],"answer":1,"explanation":"“稼轩体”是辛弃疾词的风格特征，辛弃疾号稼轩，是一位具有英雄气慨的词人，才气纵横，笔力超拔。他的词不仅 内容丰富，在艺术上驰骋百家，转益多师，而且有极大的开拓和创新。他以散文句法入词，以经子诗赋之语入词，以词说理，带来了 词体的大解放。无论作长调或小令，都充分表现了自己的才情和体现了自己的人格。他继苏轼之后极大地开拓了词境，使词在与乐分 离之后，仍能够作为一种内容充实，、形式多样化的新体格健诗独立存在。他的词不仅“横绝六合，扫空万古”，而且“包罗万象”。 这种在宋代词坛别开生面、既慷慨豪放又温婉妩媚，而以豪放悲壮为主导风格的词，人们称之为“稼轩体”。"},{"id":182,"stem":"《阳关三叠》古琴曲是根据下面哪位诗人的作品谱写的？（）","options":["王维","李白","李贺","李商隐"],"answer":0,"explanation":"《送元二使安西》是王维送朋友去西北边疆时作的诗，后有乐人谱曲，名为“阳关三叠”。元二奉命出使安西都护府， 王维到渭城为之饯行，写下这首诗。"},{"id":183,"stem":"蟾宫折桂的意思是（ ）","options":["祝福结婚","喜得贵子","科考登第","比赛夺魁"],"answer":2,"explanation":"“蟾宫折桂”意思是指攀折月宫桂花。科举时代比喻应考得中。"},{"id":184,"stem":"下列不属于“岁寒三友”的一项是（）","options":["梅","菊","松","竹"],"answer":1,"explanation":"岁寒三友指松、竹、梅。松、竹经冬不凋，梅花耐寒开放，因此有“岁寒三友”之称。出自宋·林景熙《王云梅舍记》。"},{"id":185,"stem":"古代的“冠礼”（）时举行的加冠之礼，表示其成人。","options":["男子十八岁","男子二十岁","女子十五岁","女子十八岁"],"answer":1,"explanation":"冠礼起源于周代，是中国汉族男子的成年礼，男子二十岁行冠礼。"},{"id":186,"stem":"陆游诗《书愤》“出师一表真名世”中提到的《出师表》的作者是（）","options":["司马光","范仲淹","李白","诸葛亮"],"answer":3,"explanation":"《出师表》是三国时期蜀汉丞相诸葛亮在决定北上伐魏、克复中原之前给后主刘禅上书的表文。"},{"id":187,"stem":"对诗句“我寄愁心与明月，随风直到夜郎西”以下描述正确的一项是（）","options":["“我”指的是王昌龄","夜郎是人名","从诗句中可以体会到亲情的珍贵","这句诗表达了作者对朋友的关心"],"answer":3,"explanation":"出自唐代李白的《闻王昌龄左迁龙标遥有此寄》，意思是我把我忧愁的心思寄托给明月，希望能随着你一直到夜郎以 西。其中，“我”指的是李白，夜郎是地名，这句诗表达了作者对朋友的关心。当时王昌龄从江宁丞被贬为龙标县尉，李白在扬州听 到好友被贬后写下了这首诗。 19959276711（vx 同号）"},{"id":188,"stem":"以下诗句中描写上元节的是（ ）。","options":["千门万户瞳瞳日，总把新桃换旧符。","今夜偏知春气暖，虫声新透绿窗纱。","东风夜放花千树，更吹落，星如雨。","金风玉露一相逢，便胜却人间无数。"],"answer":2,"explanation":"上元，又称上元节、元宵节、灯节。中国的传统节日，每年农历的正月十五日便是此节。“东风夜放花千树，更吹落， 星如雨”一句出自宋代辛弃疾的《青玉案·元夕》，描写的是正月十五的晚上，满城灯火，尽情狂欢的景象。"},{"id":189,"stem":"诗句“故人具鸡黍，邀我至田家”中“具”的意思是（ ）","options":["工具","都","准备","具体"],"answer":2,"explanation":"出自唐代孟浩然的《过故人庄》：“故人具鸡黍，邀我至田家。绿树村边合，青山郭外斜。 开轩面场圃，把酒话桑麻。待到重阳日，还来就菊花。”该句意思是：老朋友准备丰盛的饭菜，邀请我到他田舍做客。"},{"id":190,"stem":"诗句“云母屏风烛影深，长河渐落晓星沉”描写的是（）的故事。","options":["夸父","精卫","嫦娥","后羿"],"answer":2,"explanation":"出自唐代李商隐的《嫦娥》，此句描绘了是主人公环境和永夜不寐的情景，渲染了清冷的环境氛围，更能展现主人公 孤清凄冷的情怀。"},{"id":191,"stem":"下列诗句描述的是暮春时节的一项是（）","options":["杨花榆荚无才思，惟解漫天作雪飞。","忽如一夜春风来，千树万树梨花开。","乱花渐欲迷人眼，浅草才能没马蹄。","接天莲叶无穷碧，映日荷花别样红。"],"answer":0,"explanation":"暮春、初春和仲春在诗歌中的区别主要体现在描写对象、情感色彩和季节特征上。 描写对象 暮春：暮春时节，繁花凋落，绿叶成荫，雨水较多。诗人常描写落花、凋零的花朵和茂盛的绿叶，表达对春天即将过去的感伤情绪。 例如，杜甫的《春望》中写道：“国破山河在，城春草木深。”这里“草木深”反映了暮春时节草木茂盛的景象。 初春：初春时节，植物刚刚萌芽生长，动物开始繁殖，农夫开始播种。诗人常描写嫩芽、新绿和生机勃勃的景象，表达对春天的期待 和喜悦。例如，杨巨源的《城东早春》中写道：“诗家清景在新春，绿柳才黄半未匀。”这里“绿柳才黄半未匀”描绘了初春柳树刚 冒出嫩芽的景象。 仲春：仲春是春季的中期，气候温和，万物生长旺盛。诗人常描写盛开的花朵、嫩绿的草木和生机勃勃的自然景象，表达对春天的赞 美和对生活的热爱。例如，贺知章的《咏柳》中写道：“碧玉妆成一树高，万条垂下绿丝绦。”这里“二月春风”点明了是仲春景象。 情感色彩 暮春：暮春诗歌常常带有感伤的情绪，诗人感叹春天即将过去，繁花凋零，表达对美好事物消逝的惋惜。例如，杜牧的《秋夕》中写 道：“银烛秋光冷画屏，轻罗小扇扑流萤。”这里“秋夕”虽然不是直接描写暮春，但流露出的凄凉情感与暮春的感伤情绪相呼应。 初春：初春诗歌则充满欢快和期待的情感，诗人赞美新生的生命和自然的复苏，表达对未来的美好憧憬。例如，张若虚的《春江花月 夜》中写道：“滟滟随波千万里，何处春江无月明。”这里描绘了初春江面的美丽景象，充满了生机和希望。 仲春：仲春诗歌通常表达对生活的热爱和对自然的赞美，诗人描绘万物生长的繁荣景象，传递出积极向上的情感。例如，王维的《辋 川别业》中写道：“雨中草色绿堪染，水上桃花红欲然。”这里用青草和桃花的鲜艳色彩描绘了仲春的美景。 季节特征 暮春：暮春是春季的最后阶段，雨水较多，繁花凋落，绿叶茂盛。这个时期的诗歌常常描绘落花、绿叶和即将结束的春天景象。 初春：初春是春季的开始，植物刚刚萌芽生长，动物开始繁殖。这个时期的诗歌常常描绘嫩芽、新绿和生机勃勃的自然景象。 仲春：仲春是春季的中期，气候温和，万物生长旺盛。这个时期的诗歌常常描绘盛开的花朵、嫩绿的草木和生机勃勃的自然景象。"},{"id":192,"stem":"“随风潜入夜，润物细无声”形容的是（ ）。","options":["溪流","春雨","夜雪","微风"],"answer":1,"explanation":"本句出自唐代诗人杜甫作品《春夜喜雨》。此诗运用拟人手法，以极大的喜悦之情细致地描绘了春雨的特点和成都夜 雨的景象，热情地讴歌了来得及时、滋润万物的春雨，是一首传神入化、别具风韵的咏雨诗。 好雨知叩时节，当春乃发生。随风潜入夜，润物细无声。 野径云俱黑，江船火独明。晓看红湿处，花重锦官城。"},{"id":193,"stem":"“一门三父子，都是大文豪。诗赋传千古，峨眉共比高。\"这首诗中的“三父子\"指的是（ ）。","options":["苏洵、苏轼、苏辙","杜甫、杜牧、杜荀鹤","曹操、曹丕、曹植","班彪、班固、班超"],"answer":0,"explanation":"三苏（苏轼、苏辙、苏洵）。"},{"id":194,"stem":"“不畏浮云遮望眼，自缘身在最高层”诗人写这首诗所登的是（ ）。","options":["庐山","泰山","飞来峰","五老峰"],"answer":2,"explanation":"21 19959276711（vx 同号） 【知识小链接】出自北宋诗人王安石的《登飞来峰》，原文为：飞来山上千寻塔，闻说鸡鸣见日升。不畏浮云遮望眼，自缘身在最高 层。"},{"id":195,"stem":"“捐躯赴国难，视死忽如归”出自（）的作品。","options":["岳飞","于谦","曹操","曹植"],"answer":3,"explanation":"出自魏晋曹植的《白马篇》。这是羁旅怀乡之作。离家久远，目睹旅馆门外的渔船即加以艳羡。幽恨乡愁、委实凄绝。 颈联“远梦归侵晓，家书到隔年”意思曲折多层，实乃千锤百炼的警句。"},{"id":196,"stem":"下列不是古人对妻子称呼的一项是（）。","options":["糟糠","拙荆","外子","细君"],"answer":2,"explanation":"外子是古时候妻子对丈夫的称呼，内子是古代妻子的称呼，也称内助，略带有谦虚称，反映了旧社会中习惯上男人出 外谋生，女人在家搞家务。"},{"id":197,"stem":"词句“青山遮不住，毕竟东流去”的词牌名是（ ）。","options":["蝶恋花","菩萨蛮","沁园春","丑奴儿"],"answer":1,"explanation":"南宋词人辛弃疾所作的菩萨蛮，此词写于作者南归十余年之后，用比兴的手法描写作者对祖国的感情。词中\"西北望长 安，可怜无数山\"是宋词中的名句。"},{"id":198,"stem":"下面为作者登乐游原后而作的诗句是（）。","options":["念天地之悠悠，独怆然而涕下。","白日依山尽，黄河入海流。","夕阳无限好，只是近黄昏。","日照香炉生紫烟，遥看瀑布挂前川。"],"answer":2,"explanation":"“夕阳无限好，只是近黄昏”出自唐代李商隐的《登乐游原》。"},{"id":199,"stem":"下列不属于词牌名的一项是（ ）。","options":["江城子","苏幕遮","浣溪沙","塞下曲"],"answer":3,"explanation":"常见的词牌名主要有长相思、渔歌子、苏幕遮、永遇乐、虞美人、清平乐、采桑子、雨霖铃、菩萨蛮、醉花阴、浣溪 沙、临江仙、水调歌头、渔家傲、鹊桥仙、点绛唇、相见欢、捣练子、生查子等。塞下曲是古时的一种军歌。《塞下曲》是唐代王昌 龄所作的乐府曲。"},{"id":200,"stem":"以善于描写边塞风光著称的诗人是（）。","options":["李商隐","柳宗元","白居易","王昌龄"],"answer":3,"explanation":"王昌龄是我国唐代著名的边塞诗人，善于描写边塞风光。"},{"id":201,"stem":"下列全属于敬称的选项是（ ）。","options":["令郎、足下、老夫","令郎、鄙人、陛下","阁下、令郎、陛下","阁下、陛下、鄙人"],"answer":2,"explanation":"老夫、鄙人属于谦称。"},{"id":202,"stem":"下列诗句中，（ ）作者不是杜甫。","options":["国破山河在，城春草木深。","星垂平野阔，月涌大江流。","岱宗夫如何，齐鲁青未了。","明月松间照，清泉石上流。"],"answer":3,"explanation":"D 出自唐代王维的《山居秋暝》。"},{"id":203,"stem":"谥号是古代帝王、贵族、大臣或其他有地位的人死后被加的带有褒贬意义的称号。范仲淹的谥号是（ ）。","options":["武穆","文正","文定","文达"],"answer":1,"explanation":"范仲淹谥号“文正”，世称“范文正公”。"},{"id":204,"stem":"以下诗句中以月渲染凄清的气氛、烘托孤苦的情怀的是（ ）。","options":["露从今夜白，月是故乡明。","海上生明月，天涯共此时。","举杯邀明月，对影成三人。","秦时明月汉时关，万里长征人未还。"],"answer":2,"explanation":"\"举杯邀明月，对影成三人\"是李白《月下独酌》中的千古名句。描写诗人在月夜与\"我外之我\"的影子及月亮一同畅饮的 情景，以奇特的构思、浪漫的想象，深刻地表现出诗人的独斟独酌情景，及举目无知音的孤独之情。 19959276711（vx 同号）"},{"id":205,"stem":"纳兰性德的《长相思·山一程》中写道的“榆关”指的是（）。","options":["山海关","居庸关","玉门关","嘉峪关"],"answer":0,"explanation":"清代纳兰性德的《长相思·山一程》：“山一程，水一程，身向榆关那畔行，夜深千帐灯。风一更，雪一更，聒碎乡 心梦不成，故园无此声。”榆关：即今山海关，在今河北秦皇岛东北；那畔：即山海关的另一边，指身处关外。"},{"id":206,"stem":"“地崩山摧壮士死，然后天梯石栈相钩连”中涉及的典故是（）。","options":["愚公移山","盘古开天","五丁开山","卧薪尝胆"],"answer":2,"explanation":"涉及蜀道的神话。相传秦惠王想征服蜀国，知道蜀王好色，答应送给他五个美女。蜀王派五位壮士去接人。回到梓潼 （今四川剑阁之南）的时候，看见一条大蛇进入穴中，一位壮士抓住了它的尾巴，其余四人也来相助，用力往外拽。不多时，山崩地 裂，壮士和美女都被压死。山分为五岭，入蜀之路遂通。这便是有名的“五丁开山”的故事。"},{"id":207,"stem":"下列不是出自边塞诗的是（ ）。","options":["但使龙城飞将在，不教胡马度明山。","忽如一夜春风来，千树万树梨花开。","秦时明月汉时关，万里长征人未还。","寒雨连江夜入吴，平明送客楚山孤。"],"answer":3,"explanation":"“寒雨连江夜入吴，平明送客楚山孤”出自唐代王昌龄的《芙蓉楼送辛渐》，此诗当作于天宝元年（公元 742 年）， 王昌龄当时为江宁丞。辛渐是王昌龄的朋友，这首诗为在江边离别时所写。"},{"id":208,"stem":"有“书圣”之称的书法家是（ ）。","options":["王羲之","欧阳询","颜真卿","柳公权"],"answer":0,"explanation":"王羲之，字逸少，汉族，东晋时期著名书法家，有\"书圣\"之称。琅琊（今属山东临沂）人，后迁会稽山阴（今浙江绍兴） ， 晚年隐居剡县金庭。王羲之历任秘书郎、宁远将军、江州喇史，后为会稽内史，领右将军。所以也称\"王右军\"。"},{"id":209,"stem":"现在我们常用“阳春白雪”和“下里巴人”指代高雅和通俗。这两个成语最初指的是（）。","options":["文章","人物","音乐","舞蹈"],"answer":2,"explanation":"“阳春白雪”的意思是指战国时代楚国的较高雅的歌曲，后比喻高深的不通俗的文学艺术。 “下里巴人”为其反面，意思是指战国时代楚国民间流行的一种歌曲，今用于比喻通俗的文学艺术。"},{"id":210,"stem":"李白诗“故人西辞黄鹤楼”句中的“故人”是（）。","options":["杜甫","王维","白居易","孟浩然"],"answer":3,"explanation":"出自唐代李白的《黄鹤楼送孟浩然之广陵》：“故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际 流。”故人指的是孟浩然。"},{"id":211,"stem":"我国古代的很多事物都有自己的雅称，我们常把稿费，书画酬金称为（）。","options":["谢仪","润笔","束脩","尺素"],"answer":1,"explanation":"润笔，是指拿毛笔泡水这个动作，使用毛笔时通常会先用水泡一泡，把笔毛泡开、泡软，这样毛笔较容易吸收墨汁， 写字时会感觉比较圆润。因此，后来“润笔”被泛指为请人家写文章、写字、作画的报酬。"},{"id":212,"stem":"曹操诗句：“慨当以慷，忧思难忘，何以解忧？惟有杜康。\"其中的“杜康”是指（）。","options":["人名","美酒","音乐","美女"],"answer":1,"explanation":"出自两汉曹操的《短歌行》。该句意思是：用什么来排解忧闷？唯有豪饮美酒。因此，“杜康”代指酒。"},{"id":213,"stem":"“此地一为别，孤蓬万里征”和“挥手自兹去，萧萧班马鸣\"分别是《送友人》中的（）。","options":["颔联和尾联","颈联和首联","领联和颈联","首联和尾联"],"answer":0,"explanation":"出自唐代李白的《送友人》 青山横北郭，白水绕东城。此地一为别，孤蓬万里征。 浮云游子意，落日故人情。挥手自兹去，萧萧班马鸣。 这是一首情意深长的送别诗，作者通过送别环境的刻画、气氛的渲染，表达出依依惜别之意。 “首联、颔联、颈联、尾联”分别为： 1、首联，是律诗中的第一联，诗的前两句就是首联； 2、颔联，第三，四句就是颔联； 3、颈联，第五，六句就是颈联； 4、尾联，最后两句就是尾联。 19959276711（vx 同号） “首联、颔联、颈联、尾联”通常是出现在七言或者五言律诗当中。"},{"id":214,"stem":"李绅《悯农》诗中“四海无闲田，农夫犹饿死”揭露的是（ ）。","options":["干活不努力","遇到大灾害","制度不合理","有志难报国"],"answer":2,"explanation":"出自唐代李绅的《悯农二首》：“春种一粒粟，秋收万颗子。四海无闲田，农夫犹饿死。”该句意思是：普天之下， 没有荒废不种的田地，却仍然有劳苦农民被饿死。"},{"id":215,"stem":"下列诗句描写的对象，与李白无关的选项是（）。","options":["笔落惊风雨，诗成泣鬼神。","仰天大笑出门去，我辈岂是蓬蒿人。","为人性僻耽佳句，语不惊人死不休。","天子呼来不上船，自称臣是酒中仙。"],"answer":2,"explanation":"出自唐代杜甫的《江上值水如海势聊短述》：“为人性僻耽佳句，语不惊人死不休。老去诗篇浑漫与，春来花鸟莫深 愁。新添水槛供垂钓，故着浮槎替入舟。焉得思如陶谢手，令渠述作与同游。”此诗是诗人面对如大海汹涌的江水，抒发内心感受的 叙怀之作。诗写于安史之乱时，诗人流落四川成都，寄居草堂，一次观锦江“水如海势”，波涛汹涌，则触景生情，感慨万端，但又 无从说起，只好“聊短述”，抒写了他激愤的、自我解脱的、一时的人生感悟。"},{"id":216,"stem":"与”知音”这个典故相关的两位人物是（）。","options":["伯牙和钟子期","管仲和鲍叔牙","李白和杜甫","苏轼和辛弃疾"],"answer":0,"explanation":"知音之交指的是俞伯牙和钟子期。知音也谓知己，指非常了解、能赏识自己的知心朋友。知音难得，“人生得一知己 足亦”。出自《列子•汤问》，讲述了俞伯牙认定钟子期是他的知音之后，在钟子期死后为钟子期弹了一曲《高山流水》，此后破琴绝 弦，再也不弹琴了。"},{"id":217,"stem":"“黑云压城城欲摧”的下一句是（）。","options":["半卷红旗临易水","霜重鼓寒声不起","角声满天秋色里","甲光向日金鳞开"],"answer":3,"explanation":"《雁门太守行》是唐代李贺的作品，全诗：“黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。 半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。”"},{"id":218,"stem":"和《木兰诗》一起被成为“乐府双壁”的是（）。","options":["《十五从军征》","《陌上桑》","《孔雀东南飞》","《秦妇吟》"],"answer":2,"explanation":"汉乐府诗《孔雀东南飞》和北朝民歌《木兰诗》合称为“乐府双璧”。 这两首诗歌都是叙事长诗，以其深刻的社会思想意义和极高的艺术成就，为历代文人所推崇。"},{"id":219,"stem":"下面为作者登乐游原后而作的诗句是（）。","options":["念天地之悠悠，独怆然而涕下。","白日依山尽，黄河入海流。","夕阳无限好，只是近黄昏。","日照香炉生紫烟，遥看瀑布挂前川。"],"answer":2,"explanation":"乐游原在长安（今西安）城南，地势较高，是唐代的游览胜地。李商隐《登乐游原》 向晚意不适，驱车登古原。 夕阳无限好，只是近黄昏。 李商隐身处的晚唐，总有一种极致奢华过后的颓废感，故而此诗理解为李商隐对唐帝国的感叹。"},{"id":220,"stem":"以下事物与其代称对应不正确的是（）。","options":["“尺素”代指书籍。","“双鲤”代指书信。","“丝竹”代指音乐。","“手谈”代指下围棋。"],"answer":0,"explanation":"“尺素”，书写用的一尺长左右的白色生绢，借指小的画幅，短的书信。"},{"id":221,"stem":"“桑梓”一词一般用来借指的是（）。","options":["田园","故乡","祖先","老伴"],"answer":1,"explanation":"桑梓指家乡、故乡。古代，人们喜欢在住宅周围栽植桑树和梓树，后来人们就用物代处所，用“桑梓”代称家乡。赞 扬某人为家乡造福，往往用“功在桑梓”。"},{"id":222,"stem":"江南佳丽地，（）帝王州。","options":["金陵","钱塘","长安","洛阳"],"answer":0,"explanation":"出自南北朝谢朓的《入朝曲》：“江南佳丽地，金陵帝王州。逶迤带绿水，迢递起朱楼。飞甍夹驰道，垂杨荫御沟。 19959276711（vx 同号） 凝笳翼高盖，叠鼓送华辀。献纳云台表，功名良可收。”"},{"id":223,"stem":"“行到水穷处，坐看云起时”出自（）的诗作。","options":["王昌龄","孟浩然","王维","刘禹锡"],"answer":2,"explanation":"诗句出自唐代王维的《终南别业》，意思是间或走到水的尽头去寻求源流，间或坐看上升的云雾千变万化。"},{"id":224,"stem":"与“郢人逝矣，谁与尽言”诗句意思接近的是（ ）。","options":["酒逢知己千杯少，话不投机半句多！","过眼滔滔云共雾，算人间知己吾和汝。","知彼知己者，百战不殆。","士为知己者用，女为说己者容。"],"answer":1,"explanation":"“郢人逝矣，谁与尽言”出自魏晋嵇康的《四言赠兄秀才入军诗十八首·其十四》，意思是自己的知音已经去世，还 有谁可以对他倾诉呢？"},{"id":225,"stem":"被认为是中国古代山水诗的开创者的诗人是（）。","options":["陶渊明","谢灵运","谢眺","王维"],"answer":1,"explanation":"山水诗，是指描写山水风景的诗。起源于先秦两汉，产生于魏晋时期，并在南朝至晚唐随着中国诗歌发展与文学环境 变迁而不断演变。山水诗鼻祖是东晋的谢灵运。谢灵运所开创的山水诗，把自然界的美景引进诗中，使山水诗成为独立的审美对象。"},{"id":226,"stem":"从题材上看，李白的《春夜洛城闻笛》是一首（ ）。","options":["送别诗","边塞诗","思乡诗","哲理诗"],"answer":2,"explanation":"全诗：“谁家玉笛暗飞声，散入春风满洛城。此夜曲中闻折柳，何人不起故园情。”这首诗是 735 年（开元二十三年） 李白游洛阳时所作。描写在夜深人静之时，听到笛声而引起思乡之情。"},{"id":227,"stem":"以下属于唐代的是（ ）。","options":["建安七子","四大边塞诗人","竹林七贤","苏门四学士"],"answer":1,"explanation":"建安七子，是汉建安年间七位文学家的合称，包括孔融、陈琳、王粲、徐干、阮瑀、应玚、刘桢。 王之涣与岑参、高适、王昌龄为我国唐代著名的四大边塞诗人。 竹林七贤指的是三国魏正始年间，嵇康、阮籍、山涛、向秀、刘伶、王戎及阮咸七人。 苏门四学士即黄庭坚、秦观、晁补之、张耒四人合称。"},{"id":228,"stem":"以下词句出自李清照的是（ ）。","options":["知否？知否？应是绿肥红瘦。","但愿人长久，千里共婵娟。","今宵酒醒何处？杨柳岸，晓风残月。","问君能有几多愁，恰似一江春水向东流。"],"answer":0,"explanation":"A 句出自李清照的《如梦令·昨夜雨疏风骤》； B 句出自北宋苏轼的《水调歌头》； C 句出自宋代柳永的《雨霖铃·寒蝉凄切》； D 句出自五代李煜的《虞美人·春花秋月何时了》。"},{"id":229,"stem":"下列和“笑”无关的是（）。","options":["莞尔","启齿","解颐","喷饭"],"answer":1,"explanation":"启齿，词性为动词，释义：指开口说话，多在有求于人时用。示例：犹豫半天，终未启齿。 解颐，开颜欢笑。（颐：面颊）"},{"id":230,"stem":"“挽弓当挽强，用箭当用长”出自哪位诗人？","options":["杜甫","李白","王之涣","辛弃疾"],"answer":0,"explanation":"本句出自《前出塞九首·其六》，是唐代大诗人杜甫的作品。 挽弓当挽强，用箭当用长。射人先射马，擒财先擒王。 杀人亦有限，列国自有疆。苟能制侵陵，岂在多杀伤！ 诗意：拉弓要拉最坚硬的，射箭要射最长的。射人先要射马，擒财先要擒住他们的首领。杀人要有限制，各个国家都有边界。只要能 够制止敌人的侵犯就可以了，难道打仗就是为了多杀人吗？本诗明确写出了诗人对待战争的态度，明确地表达了诗人的政治观点。\"侵 陵\"是侵犯的意思，\"制侵陵\"就是制止侵犯。 19959276711（vx 同号）"},{"id":231,"stem":"下列有关古代计时的说法，不正确的一项是（ ）。","options":["古代有多种方法表示一天的时间，其中以“十二地支”表示法最为常见。","每天从子时（23 时至 1 时）开始，而后依次是丑寅卵辰已午未申酉成亥。","每个计时单位叫“时辰”，相当于现在的两小时，循环一次二十四小时。","午时，即中午 11 时至下午 1 时；每天太阳升起是寅时，即 8 点钟左右。"],"answer":3,"explanation":"古代将一昼夜分为十二时辰，即：子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥。每一时辰相当于现代的两个小时。 子时 23～1 点，丑时 1～3 点，寅时 3～5 点，卯时 5～7 点，辰时 7～9 点，巳时 9～11 点，午时 11～13 点，未时 13～15 点，申时 15～ 17 点，酉时 17～19 点，戌时 19～21 点，亥时 21～23 点。"},{"id":232,"stem":"古代关于君子“修身、齐家、治国、平天下”的说法出自于（）。","options":["尚书","大学","中庸","论语"],"answer":1,"explanation":"“修身、齐家、治国、平天下”出自《礼记·大学》。 格物、致知、正心、诚意、修身、齐家、治国、平天下，是儒学经典思想——八项条目的主要内容，更是儒学“内圣外王”思想的体 现。"},{"id":233,"stem":"“座中泣下谁最多？江州司马青衫湿”中的江州司马是（ ）。","options":["贺知章","李白","白居易","黄庭坚"],"answer":2,"explanation":"出自唐代白居易的《琵琶行》，解释：要问在座之中谁流的眼泪最多？江州司马的青衫已被泪水浸湿。"},{"id":234,"stem":"“滕王高阁临江渚”的“江”指（）。","options":["赣江","长江","汉江","钱塘江"],"answer":0,"explanation":"出自唐代诗人王勃的《滕王阁诗》：“滕王高阁临江渚，佩玉鸣鸾罢歌舞。画栋朝飞南浦云，珠帘暮卷西山雨。闲云 潭影日悠悠，物换星移几度秋。阁中帝子？槛外长江空自流。”抒发了人生盛衰无常而宇宙永恒的感慨。"},{"id":235,"stem":"有“诗豪”之称的是唐代诗人（）。","options":["刘长卿","刘禹锡","王昌龄","王维"],"answer":1,"explanation":"作者称号： 李白——诗仙王维——诗佛白居易——诗魔苏轼——诗神 杜甫——诗圣李贺——诗鬼王勃——诗杰孟郊——诗囚 贺知章——诗狂刘禹锡——诗豪贾岛——诗奴陈子昂——诗骨"},{"id":236,"stem":"诗句“姑苏城外寒山寺，夜半钟声到客船”描写的是（）境内的景象。","options":["杭州","扬州","湖州","苏州"],"answer":3,"explanation":"出自唐朝张继的《枫桥夜泊》：“月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。”枫桥在 今苏州市阊门外。"},{"id":237,"stem":"“敲成玉磐穿林响，忽作玻璃碎地声”的作者还写了（ ）","options":["家家乞巧望秋月，穿尽红丝几万条","但使龙城飞将在，不教胡马度阴山","欲把西湖比西子，淡妆浓抹总相宜","小荷才露尖尖角，早有蜻蜓立上头"],"answer":3,"explanation":"出自宋朝杨万里的《稚子弄冰》：“稚子金盆脱晓冰，彩丝穿取当银铮（钲）。敲成玉磬穿林响，忽作玻璃（瓈）碎 地声。”他还写了《小池》：“泉眼无声惜细流，树阴照水爱晴柔。小荷才露尖尖角，早有蜻蜓立上头。”"},{"id":238,"stem":"关于《鹿柴》的作者，下列说法错误的是（）","options":["字摩诘，号摩诘居士","有“七绝圣手”之称","世称“王右丞”，与孟浩然合称“王孟”","代表作有《九月九日忆山东兄弟》《山居秋暝》"],"answer":1,"explanation":"《鹿柴》作者王维，字摩诘，号摩诘居士。唐朝诗人，有“诗佛”之称，是盛唐诗人的代表。苏轼评价其：“味摩诘 之诗，诗中有画；观摩诘之画，画中有诗。”唐肃宗乾元年间任尚书右丞，世称“王右丞”，与孟浩然合称“王孟”。“七绝圣手” 是王昌龄。"},{"id":239,"stem":"王翰的《凉州词》是一首（ ）题材的诗。","options":["送别","边塞","思乡","田园 26 19959276711（vx 同号）"],"answer":1,"explanation":"全诗是：“葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回？”是咏边寒情景之名曲。全诗写 艰苦荒凉的边塞的一次盛宴，描摹了征人们开怀痛饮、尽情酣醉的场面。"},{"id":240,"stem":"“儿童散学归来早，忙趁东风放纸鸢”描写的是（ ）的景象。","options":["春","夏","秋","冬"],"answer":0,"explanation":"出自清朝高鼎的《村居》：“草长莺飞二月天，拂堤杨柳醉春烟。儿童散学归来早，忙趁东风放纸鸢。”描绘了早春 时节儿童们趁着东风放纸鸢的场景，描绘出春天的生机勃勃以及儿童的天真与活泼。全诗描绘了春日里农村的明媚景色，抒发了诗人 对春天的喜爱之情。"},{"id":241,"stem":"“日出江花红胜火，春来江水绿如蓝”出自（）的作品。","options":["王维","孟浩然","韩愈","白居易"],"answer":3,"explanation":"出自唐朝白居易的《忆江南》：“江南好，风景旧曾谙。日出江花红胜火，春来江水绿如蓝。能不忆江南？”"},{"id":242,"stem":"“相看两不厌，只有敬亭山”运用了（）手法。","options":["比喻","对偶","拟人","反复"],"answer":2,"explanation":"出自唐代李白的《独坐敬亭山》：“众鸟高飞尽，孤云独去闲。相看两不厌，只有敬亭山。”该句大意是“敬亭山和 我对视着，谁都看不够，看不厌，看来理解我的只有这敬亭山了。” 这两句话运用了拟人的修辞手法，将敬亭山人格化、个性化，把诗人与敬亭山紧紧地联系在一起，表达了诗人与敬亭山之间的深厚感 情。"},{"id":243,"stem":"“梅妻鹤子”形容的是（ ）","options":["陆游","王安石","卢梅坡","林逋"],"answer":3,"explanation":"以梅为妻，以鹤为子。比喻清高或隐居。宋代林逋隐居西湖孤山，植梅养鹤，终生不娶，人谓“梅妻鹤子”。"},{"id":244,"stem":"“一年好景君须记，最是橙黄橘绿时”是（）写给刘景文的诗。","options":["半山居士","六一居士","诚斋居士","东坡居士"],"answer":3,"explanation":"出自宋代苏轼《赠刘景文》：“荷尽已无擎雨盖，菊残犹有傲霜枝。一年好景君须记，最是橙黄橘绿时。”苏轼，字 子瞻，又字和仲，号铁冠道人、东坡居士，世称苏东坡、苏仙、坡仙。"},{"id":245,"stem":"诗句“梅子金黄杏子肥，麦花雪白菜花稀”描写的是（ ）的场景。","options":["春季","夏季","秋季","冬季"],"answer":1,"explanation":"出自宋代范成大的《四时田园杂兴·其二十五》，“梅子金黄杏子肥，麦花雪白菜花稀”该句意思是：初夏时节，金 黄的梅子挂满枝头，杏子也变得鲜亮饱满，田里麦穗扬着白花，油菜花差不多落尽正在结籽。"},{"id":246,"stem":"诗句“谁言寸草心，报得三春晖”描写的是（）。","options":["父爱","母爱","师生情","友情"],"answer":1,"explanation":"出自唐代孟郊的《游子吟》：“慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。” 《游子吟》是孟郊在溧阳所写。作者早年漂泊无依，直到五十岁时才得到了一个溧阳县尉，结束了长年的漂泊流离生活，便将母亲接 来住。诗人饱尝了世态炎凉，更觉亲情可贵，于是写出这首感人至深的颂母之诗。"},{"id":247,"stem":"诗句“王师北定中原日，家祭无忘告乃翁”是诗人陆游写给（）的诗。","options":["父母","兄弟","孩子","朋友"],"answer":2,"explanation":"出自宋代陆游的《示儿》：“死去元知万事空，但悲不见九州同。王师北定中原日，家祭无忘告乃翁。”示儿：写给 儿子们看。"},{"id":248,"stem":"诗句“孤帆远影碧空尽，唯见长江天际流”描写的是在（）看到的景色","options":["鹳雀楼","黄鹤楼","岳阳楼","望江楼"],"answer":1,"explanation":"出自唐代李白的《黄鹤楼送孟浩然之广陵》：“故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际 流。”"},{"id":249,"stem":"“我劝天公重抖擞，不拘一格降人材”的作者是（ ）","options":["郑板桥","龚自珍","李白","林则徐"],"answer":1,"explanation":"27 19959276711（vx 同号） 【知识小链接】出自清代龚自珍的《己亥杂诗》：“九州生气恃风雷，万马齐喑究可哀。我劝天公重抖擞，不拘一格降人材。”"},{"id":250,"stem":"“问渠那得清如许？为有源头活水来”出自一首（ ）","options":["咏物诗","山水诗","思乡诗","哲理诗"],"answer":3,"explanation":"出自南宋朱熹的《观书有感》：“半亩方塘一鉴开，天光云影共徘徊。问渠哪得清如许？为有源头活水来。”这首诗 是抒发读书体会的哲理诗，描绘事物本身感性的形象时，又蕴涵了理性的东西。"},{"id":251,"stem":"诗句“梅子黄时日日晴，小溪泛尽却山行”的作者是","options":["曾巩","曾几","袁枚","岑参"],"answer":1,"explanation":"出自宋代曾几的《三衢道中》：“梅子黄时日日晴，小溪泛尽却山行。绿阴不减来时路，添得黄鹂四五声。”"},{"id":252,"stem":"“细雨鱼儿出，微风燕子斜”出自（）","options":["《水槛遣心二首》","《村居》","《过故人庄》","《杭州春望》"],"answer":0,"explanation":"出自唐代杜甫的《水槛遣心二首》：“去郭轩楹敞，无村眺望赊。澄江平少岸，幽树晚多花。细雨鱼儿出，微风燕子 斜。城中十万户，此地两三家。蜀天常夜雨，江槛已朝晴。叶润林塘密，衣干枕席清。不堪祗老病，何得尚浮名。浅把涓涓酒，深凭 送此生。”"},{"id":253,"stem":"“两情若是久长时，又岂在朝朝暮暮”出自一首（ ）","options":["渔家傲","鹊桥仙","鹧鸪天","苏幕遮"],"answer":1,"explanation":"出自北宋秦观的《鹊桥仙》：“纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。柔情似水， 佳期如梦，忍顾鹊桥归路。两情若是久长时，又岂在朝朝暮暮。"},{"id":254,"stem":"与宋濂、高启并称“明初诗文三大家”的是（）","options":["刘基","文天祥","王世贞","归有光"],"answer":0,"explanation":"宋濂、刘基、高启，在我国古代文学史上被并称为“明初诗文三大家”。宋濂著有《宋学士文集》。刘基的作品被后 人合编为《诚意伯文集》。高启为所著诗歌自编《缶鸣集》，后人据其遗篇编为《高太史大全集》。"},{"id":255,"stem":"“中岁颇好道”的王维被尊称为（）","options":["诗魔","诗鬼","诗佛","诗王"],"answer":2,"explanation":"诗王、诗魔——白居易；诗鬼——李贺；诗佛——王维。"},{"id":256,"stem":"周邦彦的《苏幕遮·燎沉香》写了（）的景色","options":["春季","夏季","秋季","冬季"],"answer":1,"explanation":"全诗是：“燎沉香，消溽暑。鸟雀呼晴，侵晓窥檐语。叶上初阳干宿雨，水面清圆，一一风荷举。故乡遥，何日去？ 家住吴门，久作长安旅。五月渔郎相忆否。小楫轻舟，梦入芙蓉浦。”这首词虽写久居汴京与消夏思归的情思，但却以描绘荷花的风 神而著称于世。"},{"id":257,"stem":"以下表达爱国情感的诗句作者不是陆游的是（）","options":["一闻战鼓意气生，犹能为国平燕赵","夜阑卧听风吹雨，铁马冰河入梦来","死去元知万事空，但悲不见九州同","人生自古谁无死，留取丹心照汗青"],"answer":3,"explanation":"“人生自古谁无死，留取丹心照汗青”出自宋代文天祥的《过零丁洋》：“辛苦遭逢起一经，干戈寥落四周星。山河 破碎风飘絮，身世浮沉雨打萍。惶恐滩头说惶恐，零丁洋里叹零丁。人生自古谁无死？留取丹心照汗青。”"},{"id":258,"stem":"“好峰随处改，幽径独行迷”出自（ ）","options":["王维《山居秋暝》","谢灵运《泰山吟》","杜牧《山行》","梅尧臣《鲁山山行》"],"answer":3,"explanation":"出自宋代梅尧臣的《鲁山山行》：“适与野情惬，千山高复低。好峰随处改，幽径独行迷。霜落熊升树，林空鹿饮溪。 人家在何许？云外一声鸡。”这首五言律诗写鲁山行的野景、野趣，突出表现山林的幽静和山行者的愉悦心情。"},{"id":259,"stem":"“枝上柳绵吹又少，天涯何处无芳草”出自（）的作品。","options":["苏轼","欧阳修","屈原","辛弃疾"],"answer":0,"explanation":"出自北宋苏轼的《蝶恋花·春景》：“花褪残红青杏小。燕子飞时，绿水人家绕。枝上柳绵吹又少，天涯何处无芳草！ 墙里秋千墙外道。墙外行人，墙里佳人笑。笑渐不闻声渐悄，多情却被无情恼。” 19959276711（vx 同号）"},{"id":260,"stem":"江南佳丽地，（）帝王州。","options":["金陵","钱塘","长安","洛阳"],"answer":0,"explanation":"出自南北朝谢朓的《入朝曲》：“江南佳丽地，金陵帝王州。逶迤带绿水，迢递起朱楼。飞甍夹驰道，垂杨荫御沟。 凝笳翼高盖，叠鼓送华辀。献纳云台表，功名良可收。”"},{"id":261,"stem":"以下哪个字，在古文中没有“我”的意思？（ ）","options":["余","吾","予","汝"],"answer":3,"explanation":"“汝”是你的意思。"},{"id":262,"stem":"农历五月为（ ）","options":["孟夏","仲夏","季夏","晚夏"],"answer":1,"explanation":"农历四月，进入夏季，气温回暖，四月有孟夏、阴月、梅月的别称。农历夏季的三个月即四、五、六月，分别对应称 为\"孟夏\"\"仲夏\"\"季夏\"。"},{"id":263,"stem":"以下对李白的《蜀道难》描述有误的是（ ）","options":["“蜀道难”是乐府古题","诗中用到了蜀地方言","“蜀道之难，难于上青天”是全诗的核心句","诗人用委婉含蓄的表现手法展现了古老蜀道的凶险"],"answer":3,"explanation":"诗人用极度的夸张、奇特的想象直言古老蜀道的凶险。"},{"id":264,"stem":"王湾的《次北固山下》从体裁上看是一首（）","options":["赠别诗","思乡诗","五言绝句","五言律诗"],"answer":3,"explanation":"全诗：“客路青山下，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江春入旧年。乡书何处达，归雁洛阳边。 ” 本诗一共八句，每句五个字，被称为五言律诗，也叫五律。"},{"id":265,"stem":"诗句“当窗理云鬓，对镜贴花黄”使用的修辞手法是","options":["互文","拟人","排比","夸张"],"answer":0,"explanation":"使用了互文、对偶、比喻这三种修辞手法。这句话的意思是对着窗户镜子梳理像云一样的鬓发并贴上了花黄。首先是 互文；由上可知“祥云一样的鬓发”用了比喻；最后是对偶，“当窗”对“对镜”、“理”对“帖”、“云鬓”对“花黄”。"},{"id":266,"stem":"“同是天涯沦落人”的下一句是（ ）","options":["相逢不必曾相识","相逢何曾不相识","相逢何必曾相识","相逢却不曾相识"],"answer":2,"explanation":"出自唐代白居易的《琵琶行》，上下句是“同是天涯沦落人，相逢何必曾相识！”"},{"id":267,"stem":"沾衣欲湿（）雨，吹面不寒杨柳风。","options":["桃花","荷花","杏花","菊花"],"answer":2,"explanation":"出自宋代志南的《绝句》：“古木阴中系短篷，杖藜扶我过桥东。沾衣欲湿杏花雨，吹面不寒杨柳风”。"},{"id":268,"stem":"在杜甫的《望岳》（其一）这首诗中，最能体现诗人希望攀登绝顶，俯视一切的雄心志的诗句是（ ）","options":["岱宗夫如何，齐鲁青未了","造化钟神秀，阴阳割昏晓","荡胸生曾云，决毗入归鸟","会当凌绝顶，一览众山小"],"answer":3,"explanation":"全诗：“岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生曾云，决眦入归鸟。会当凌绝顶，一览众山小。” 最后两句意思是：要登上那最高峰，俯瞰在泰山面前显得渺小的群山。"},{"id":269,"stem":"“雨雪三日而不霁”中“雨雪”的意思是（）","options":["下雨","下雪","雨夹雪","先雨后雪"],"answer":1,"explanation":"雨（yù）：名词作动词，下，落，降。“雨雪”意思是下雪。 19959276711（vx 同号）"},{"id":270,"stem":"被誉为宋诗“开山祖师”的是（ ）","options":["欧阳修","范仲淹","梅尧臣","王安石"],"answer":2,"explanation":"梅尧臣，字圣俞，少即能诗，与苏舜钦齐名，号“苏梅”，又与欧阳修并称“欧梅”。他写诗主张写实，反对西昆体， 所以，被誉为宋诗的“开山祖师”“宋诗第一人”。 西昆体的代表人物包括杨亿、刘筠和钱惟演。他们的诗歌大多以怀古咏史、咏物和流连光景的生活内容为主，但缺点是题材狭窄， 思想内容贫乏，缺乏真情实感。"},{"id":271,"stem":"李清照“何须浅碧轻红色，自是花中第一流”说的是（ ）","options":["桂花","梅花","菊花","百合"],"answer":0,"explanation":"出自宋代李清照的《鹧鸪天·桂花》：“暗淡轻黄体性柔，情疏迹远只香留。何须浅碧轻红色，自是花中第一流。”"},{"id":272,"stem":"“何以解忧，唯有杜康”中所说的“杜康”代指（ ）","options":["人名","美食","酒","茶"],"answer":2,"explanation":"出自两汉曹操的《短歌行》。该句意思是：用什么来排解忧闷？唯有豪饮美酒。因此，“杜康”代指酒。"},{"id":273,"stem":"“锦城虽云乐，不如早还家”中的“锦城”是（ ）","options":["白帝城","剑门关","长安","成都"],"answer":3,"explanation":"四川的古称叫做“蜀”、“蚕丛之国”，按照说文解字的说法，蜀是“桑中虫”的意思。 换言之，在古人眼中，“桑蚕丝”织成的蜀锦已经成了四川的一张名片。蜀锦是中国古代四大名锦之首，成都别称“锦城”这个名字 的由来，便源自秦灭巴蜀后，曾专门在成都设立负责管理织锦事宜的\"锦官\"。"},{"id":274,"stem":"以下诗句中，不是描写初春景象的是（ ）","options":["诗家清景在新春，绿柳才黄半未匀","天街小雨润如酥，草色遥看近却无","春城无处不飞花，寒食东风御柳斜","蒌蒿满地芦芽短，正是河豚欲上时"],"answer":2,"explanation":"C 出自唐代韩翃的《寒食》：“春城无处不飞花，寒食东风御柳斜。日暮汉宫传蜡烛，轻烟散入五侯家。”“春城无 处不飞花，寒食东风御柳斜”中“春城”指春天里的都城长安，“飞花”即花瓣纷纷飘落，点明暮春季节。"},{"id":275,"stem":"“万籁此都寂，但余钟磬音”出自（）的诗作","options":["王维","孟浩然","王建","常建"],"answer":3,"explanation":"出自唐代常建的《题破山寺后禅院》：“清晨入古寺，初日照高林。曲径通幽处，禅房花木深。山光悦鸟性，潭影空 人心。万籁此都寂，但余钟磬音。”"},{"id":276,"stem":"开启中国现实主义文学传统的是（）","options":["《诗经》","《楚辞》","《古诗十九首》","《左传》"],"answer":0,"explanation":"《诗经》是我国现实主义文学的源头，《楚辞》是我国浪漫主义文学的源头。"},{"id":277,"stem":"写下“榆柳萧疏楼阁闲，月明直见嵩山雪”的是唐代诗人（）","options":["孟浩然","孟郊","韩愈","刘禹锡"],"answer":1,"explanation":"出自唐代孟郊的《洛桥晚望》：“天津桥下冰初结，洛阳陌上人行绝。榆柳萧疏楼阁闲，月明直见嵩山雪。”"},{"id":278,"stem":"“海内存知己，天涯若比邻”出自一首（）","options":["哲理诗","送别诗","山水诗","咏怀诗"],"answer":1,"explanation":"出自唐代王勃的《送杜少府之任蜀州》：“城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天涯 若比邻。无为在歧路，儿女共沾巾。”此诗是送别诗的名作，诗意在慰勉友人勿在离别之时悲哀。"},{"id":279,"stem":"“无可奈何花落去，似曾相识燕归来”出自（）的《浣溪沙》","options":["苏轼","晏殊","李清照","秦观"],"answer":1,"explanation":"出自宋代晏殊的《浣溪沙·一曲新词酒一杯》：“一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？无可奈何花 落去，似曾相识燕归来。小园香径独徘徊。” 19959276711（vx 同号）"},{"id":280,"stem":"“劝君更尽一杯酒”中“更”的意思是（）","options":["更加","再，再次","更换","改变"],"answer":1,"explanation":"出自唐代王维的《送元二使安西》：“渭城朝雨浥轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。”该 句意思是：老朋友请你再饮一杯美酒，向西出了阳关就再难遇到故旧亲人。"},{"id":281,"stem":"被后世赞为“杜甫生平第一首快诗”的是（ ）","options":["《闻官军收河南河北》","《春夜喜雨》","《登高》","《春望》"],"answer":0,"explanation":"763 年，这一年出现了一件大好事，即长达八年之久的安史之乱进入尾声，官军向安禄山的老窝河北范阳一带进发，叛 军史朝义兵败自杀，其他叛军将领也多投降，唐朝官兵全部平息了这场祸乱。这时期的杜甫流离辗转在四川成都一带，官军大捷的消 息传到成都，杜甫听到后无比兴奋激动，随即写下了被称为“生平第一快诗”的《闻官军收河南河北》：“剑外忽传收蓟北，初闻涕 泪满衣裳。却看妻子愁何在，漫卷诗书喜欲狂。白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。”"},{"id":282,"stem":"下列诗句不是描写秋景的是（ ）","options":["竹喧归浣女，莲动下渔舟","萧萧梧叶送寒声，江上秋风动客情","一曲高歌一樽酒，一人独钓一江秋","行到中庭数花朵，蜻蜓飞上玉搔头"],"answer":3,"explanation":"出自唐朝刘禹锡的《和乐天春词》“新妆面面下朱楼，深锁春光一院愁。行到中庭数花朵，蜻蜓飞上玉搔头。”描写 的是春景."},{"id":283,"stem":"“渭城朝雨浥轻尘，客舍青青柳色新”出自王维的一首（）","options":["山水诗","田园诗","咏物诗","送别诗"],"answer":3,"explanation":"出自唐代王维的《送元二使安西》：“渭城朝雨浥轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。”此 诗是王维送朋友去西北边疆时作的诗，后有乐人谱曲，名为“阳关三叠”。元二奉命出使安西都护府，王维到渭城为之饯行，写下这 首诗。"},{"id":284,"stem":"诗句“黄鹤一去不复返，白云千载空悠悠。”中“悠悠”的意思是（）","options":["闲散","忧思","悬在空中摆动","控制"],"answer":2,"explanation":"出自唐代崔颢的《黄鹤楼》：“昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。晴川历历汉 阳树，芳草萋萋鹦鹉洲。日暮乡关何处是？烟波江上使人愁。”该句意思是：黄鹤一去再也没有回来，千百年来只看见白云悠闲自在。"},{"id":285,"stem":"“三顾频烦天下计，两朝开济老臣心”中“老臣”指的是（）。","options":["诸葛亮","王允","褚遂良","魏征"],"answer":0,"explanation":"出自唐代杜甫的《蜀相》：“丞相祠堂何处寻？锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音。三顾频烦天下 计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。”这首七律《蜀相》，抒发了诗人对诸葛亮才智品德的崇敬和功业未遂的 感慨。全诗熔情、景、议于一炉，既有对历史的评说，又有现实的寓托，在历代咏赞诸葛亮的诗篇中，堪称绝唱。"},{"id":286,"stem":"“羌笛何须怨杨柳，春风不度玉门关”中的“杨柳”指的是（ ）","options":["美好的春天","春天的柳树","送别的曲调","思念的家乡"],"answer":2,"explanation":"出自唐代王之涣的《凉州词》：“黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。” 文中的“杨柳”指的是送别的曲子《折杨柳》。 古人有临别折柳相赠的风俗。“柳”与“留”谐音，赠柳表示留念。北朝乐府《鼓角横吹曲》有《折杨柳枝》，歌词曰：“上马不捉 鞭，反拗杨柳枝。下马吹横笛，愁杀行客儿。”歌中提到了行人临去时折柳。这种折柳赠别之风在唐代极为流行。于是，杨柳和离别 就有了密切的联系。现在当戍边士卒听到羌笛吹奏着悲凉的《折杨柳》曲调时，就难免会触动离愁别恨。"},{"id":287,"stem":"以下（ ）没有运用夸张手法","options":["危楼高百尺，手可摘星辰","飞流直下三千尺，疑是银河落九天","生当作人杰，死亦为鬼雄。","天台一万八千丈，对此欲倒东南倾"],"answer":2,"explanation":"出自宋代李清照的《夏日绝句》：“生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。”公元 1127 年（靖康二年） ， 金兵入侵中原，掳走徽、钦二帝，赵宋王朝被迫南逃。李清照之夫赵明诚出任建康知府。后城中爆发叛乱，赵明诚不思平叛，反而临 阵脱逃。李清照为国为夫感到耻辱，在路过乌江时，有感于项羽的悲壮，创作此诗。"},{"id":288,"stem":"刘基的诗句“古来英雄士，各已归山河”中“归山河”指的是（ ）","options":["埋葬在山陵","回归山林隐居","游览山中景色","辞官回乡"],"answer":0,"explanation":"31 19959276711（vx 同号） 【知识小链接】出自明代刘基的《绝句·人生无百岁》，全诗：“人生无百岁，百岁复如何？古来英雄士，各已归山河。”该句意思 是：古往今来的英雄壮士，现在都化为尘土洒落在江河之中。“山河”指的是山曲，指坟墓所在。"},{"id":289,"stem":"下列诗句中描写的是早春之景的是（）","options":["梅子留酸软齿牙，芭蕉分绿与窗纱","乳鸭池塘水浅深，熟梅天气半晴阴","天街小雨润如酥，草色遥看近却无","枯藤老树昏鸦，小桥流水人家"],"answer":2,"explanation":"“梅子留酸软齿牙，芭蕉分绿与窗纱”出自宋代杨万里的《闲居初夏午睡起·其一》，写初夏；“乳鸭池塘水浅深， 熟梅天气半晴阴”出自宋代戴复古的《初夏游张园》，写初夏；“枯藤老树昏鸦，小桥流水人家”出自元代马致远的《天净沙·秋思》， 写秋天；“天街小雨润如酥，草色遥看近却无”出自唐代韩愈的《早春呈水部张十八员外》，写早春。"},{"id":290,"stem":"“杨花落尽子规啼，闻道龙标过五溪”中“龙标”指的是（ ）","options":["一种官职名称","一个地名","孟浩然","王昌龄"],"answer":3,"explanation":"出自唐代李白的《闻王昌龄左迁龙标遥有此寄》：“杨花落尽子规啼，闻道龙标过五溪。我寄愁心与明月，随君直到 夜郎西。”本诗大概作于公元 753 年（唐玄宗天宝十二载）。当时王昌龄从江宁丞被贬为龙标县（今湖南省黔阳县）尉，李白在扬州 听到好友被贬后写下了这首诗。"},{"id":291,"stem":"下列不属于“二十四节气”的一项是（ ）","options":["清明","白露","冬至","寒食"],"answer":3,"explanation":"二十四节气： 立春、雨水、惊蛰、春分、清明、谷雨、 立夏、小满、芒种、夏至、小暑、大暑、 立秋、处暑、白露、秋分、寒露、霜降、 立冬、小雪、大雪、冬至、小寒、大寒。"},{"id":292,"stem":"苏轼的《江城子·乙卯正月二十日夜记梦》是一首（）","options":["送别词","山水词","思乡词","悼亡词"],"answer":3,"explanation":"全诗：“十年生死两茫茫，不思量，自难忘。千里孤坟，无处话凄凉。纵使相逢应不识，尘满面，鬓如霜。夜来幽梦 忽还乡，小轩窗，正梳妆。相顾无言，惟有泪千行。料得年年肠断处，明月夜，短松冈。”是宋代大文学家苏轼为悼念原配妻子王弗 而写的一首悼亡词。表现了绵绵不尽的哀伤和思念。"},{"id":293,"stem":"从题材上看，李白的《春夜洛城闻笛》是一首（ ）","options":["送别诗","边塞诗","思乡诗","哲理诗"],"answer":2,"explanation":"全诗：“谁家玉笛暗飞声，散入春风满洛城。此夜曲中闻折柳，何人不起故园情。”这首诗是 735 年（开元二十三年） 李白游洛阳时所作。描写在夜深人静之时，听到笛声而引起思乡之情。"},{"id":294,"stem":"“望海楼明照曙霞，护江堤白踏晴沙”描绘的是（ ）的景象。","options":["苏州","湖州","杭州","潮州"],"answer":2,"explanation":"出自唐代白居易的《杭州春望》：“望海楼明照曙霞，护江堤白踏晴沙。涛声夜入伍员庙，柳色春藏苏小家。红袖织 绫夸柿蒂，青旗沽酒趁梨花。谁开湖寺西南路，草绿裙腰一道斜。”"},{"id":295,"stem":"以下没有运用典故的是（ ）","options":["《早发白帝城》","《赤壁》","《登金陵凤凰台》","《游烂柯山》"],"answer":0,"explanation":"《赤壁》运用典故火烧赤壁； 《登金陵凤凰台》运用典故凤凰台； 《游烂柯山》运用典故烂柯山传说。"},{"id":296,"stem":"“分野中峰变，阴晴众壑殊”的作者有（ ）之称","options":["诗仙","诗圣","诗魔","诗佛"],"answer":3,"explanation":"出自唐代王维的《终南山》：“太乙近天都，连山接海隅。白云回望合，青霭入看无。分野中峰变，阴晴众壑殊。欲 投人处宿，隔水问樵夫。”王维字摩诘（jié），号摩诘居士，有“诗佛”之称。诗仙——李白，诗圣——杜甫，诗魔——白居易。"},{"id":297,"stem":"“桑梓”一词一般用来借指的是（ ）","options":["田园","故乡","祖先","老伴"],"answer":1,"explanation":"32 19959276711（vx 同号） 【知识小链接】桑梓指家乡、故乡。古代，人们喜欢在住宅周围栽植桑树和梓树，后来人们就用物代处所，用“桑梓”代称家乡。赞 扬某人为家乡造福，往往用“功在桑梓”。"},{"id":298,"stem":"“四海无闲田，农夫犹饿死”中的“犹”字理解正确的一项是（）","options":["犹豫","仍然","犹如","尚且"],"answer":1,"explanation":"出自唐代李绅的《悯农二首》：“春种一粒粟，秋收万颗子。四海无闲田，农夫犹饿死。”该句意思是：普天之下， 没有荒废不种的田地，却仍然有劳苦农民被饿死。"},{"id":299,"stem":"李白诗“故人西辞黄鹤楼”句中的“故人”是（）","options":["杜甫","王维","白居易","孟浩然"],"answer":3,"explanation":"出自唐代李白的《黄鹤楼送孟浩然之广陵》：“故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际 流。”故人指的是孟浩然。"},{"id":300,"stem":"如果要举办一场父子类的亲子节目，以下不适合的是（ ）","options":["晏殊晏几道","苏洵苏轼","曹操曹植","杜审言杜甫"],"answer":3,"explanation":"杜审言，字必简，襄州襄阳（今湖北襄阳）人，晋征南将军杜预的远裔，\"诗圣\"杜甫的祖父。唐代诗人。 杜审言与李峤、崔融、苏味道被称为\"文章四友\"，是唐代\"近体诗\"的奠基人之一，作品多朴素自然。其五言律诗，格律谨严。后人辑有 《杜审言诗集》。"},{"id":301,"stem":"律诗的第三、四两句是（ ）","options":["首联","颈联","颔联","尾联"],"answer":2,"explanation":"律诗分为四联：首联，颔联，颈联和尾联。律诗共八行，一个逗号为一句，前两句即首联；第三，四句即颔联；第五， 六句即颈联；最后两句即尾联。"},{"id":302,"stem":"处暑之前的节气是（ ）","options":["立秋","秋分","霜降","白露"],"answer":0,"explanation":"二十四节气： 立春、雨水、惊蛰、春分、清明、谷雨、 立夏、小满、芒种、夏至、小暑、大暑、 立秋、处暑、白露、秋分、寒露、霜降、 立冬、小雪、大雪、冬至、小寒、大寒。 处暑之前的节气是立秋。"},{"id":303,"stem":"下列不属于词牌名的一项是（ ）","options":["江城子","苏幕遮","浣溪沙","塞下曲"],"answer":3,"explanation":"《塞下曲》唐代乐府名。出于汉乐府《出塞》、《入塞》，属横吹曲辞。为唐代新乐府题，歌词多写边塞军旅生活。"},{"id":304,"stem":"“一问三不知”出自《左传》，“三不知”指的是（）","options":["天文、地理、文学","事情的开始、经过、结果","孔子、孟子、老子","自己的姓名、籍贯、生辰八字"],"answer":1,"explanation":"“一问三不知”是汉语中一则来源于历史故事的成语，相关典故最早载于《左传·鲁哀公二十七年》。\"一问三不知\" 原义是对某一事情的开始、发展、结果都不知道（三不知：指对事情的起因、经过、结果都不知道），后用来表示对实际情况一点也 不知道。"},{"id":305,"stem":"以下（）不属于中国古代“四大书院”","options":["岳麓书院","龙门书院","应天书院","白鹿洞书院"],"answer":1,"explanation":"中国古代四大书院分别是应天书院、岳麓书院、嵩阳书院、白鹿洞书院。"},{"id":306,"stem":"下列不是古人对妻子称呼的一项是（）","options":["糟糠","拙荆","外子","细君"],"answer":2,"explanation":"外子是古时候妻子对丈夫的称呼，内子是古代妻子的称呼，也称内助，略带有谦虚称，反映了旧社会中习惯上男人出 外谋生，女人在家搞家务。 19959276711（vx 同号）"},{"id":307,"stem":"下列诗词名句、题目、作者对应完全正确的一项是","options":["渭城朝雨邑轻尘，客舍青青柳色新。《送元二使安西》王维","葡萄美酒夜光杯，欲饮琵琶马上催。《凉州词》岑参","最是一年春好处，绝胜烟柳满皇都。《早春呈水部张十八员外》韩愈","日出江花红胜火，春来江水绿如蓝。《忆江南》孟浩然"],"answer":2,"explanation":"A 的诗句应为\"渭城朝雨浥轻尘，客舍青青柳色新。\" B 的作者是王翰， D 出自唐代白居易的《忆江南》。"},{"id":308,"stem":"下列不是出自边塞诗的是（ ）","options":["但使龙城飞将在，不教胡马度阴山","忽如一夜春风来，千树万树梨花开","秦时明月汉时关，万里长征人未还","寒雨连江夜入吴，平明送客楚山孤"],"answer":3,"explanation":"“寒雨连江夜入吴，平明送客楚山孤”出自唐代王昌龄的《芙蓉楼送辛渐》，此诗当作于天宝元年（公元 742 年）， 王昌龄当时为江宁丞。辛渐是王昌龄的朋友，这首诗为在江边离别时所写。"},{"id":309,"stem":"有“诗鬼”之称的唐代诗人是（）","options":["李商隐","杜牧","贺知章","李贺"],"answer":3,"explanation":"贺知章——诗狂；杜牧人称“小杜”，因晚年居长安南樊川别墅，故后世称“杜樊川”； 李商隐，晚唐著名诗人，字义山，号玉溪（谿）生，又号樊南生。 诗鬼指的是唐朝诗人李贺。李贺喜欢在神话故事、鬼魅世界里驰骋，他的诗以大胆、诡异的想象力，构造出波谲云诡、迷离惝恍的艺 术境界，抒发好景不长、时光易逝的感伤情绪，他因此被后人称为\"诗鬼\"。"},{"id":310,"stem":"下列成语典故与韩信有关的选项是（）","options":["隔岸观火","风声鹤唳","背水一战","破釜沉舟"],"answer":2,"explanation":"隔岸观火的主人公是范雎、白起；风声鹤唳的主人公是苻坚；破釜沉舟最早出自《史记·项羽本纪》， 与项羽有关。关于韩信的成语故事有：胯下之辱；一饭千金；推陈出新；明修栈道、暗度陈仓；背水一战；十面埋伏；功高震主；多 多益善；鸟尽弓藏；成也萧何、败也萧何等。"},{"id":311,"stem":"“太宗朝，有王著者学右军书，深得其法”中“右军”指的是书法家（）","options":["王羲之","欧阳询","颜真卿","柳公权"],"answer":0,"explanation":"右军：即晋朝王羲之。因他曾任右将军，故称“王右军”。该句意思是：宋太宗当政的时候有一个叫王著的人学王羲 之的书法，理解透了窍门。"},{"id":312,"stem":"成语“柳暗花明”出自古诗（ ）","options":["《江南春》","《忆江南》","《游山西村》","《商山早行》"],"answer":2,"explanation":"宋代陆游《游山西村》中写道：“山重水复疑无路，柳暗花明又一村。”陆游的这两句诗读来朗朗上口，却又意味深 长，因此广为流传。后来，\"柳暗花明\"就成了一个成语。"},{"id":313,"stem":"下列不属于元曲四大家的是（ ）","options":["关汉卿","王实甫","马致远","白朴"],"answer":1,"explanation":"元曲四大家指关汉卿、白朴、郑光祖、马致远四位元代杂剧作家。四者代表了元代不同时期不同流派杂剧创作的成就， 因此被称为“元曲四大家”。"},{"id":314,"stem":"被誉为中国“百戏之祖”的是（）","options":["京剧","越剧","昆曲","豫剧"],"answer":2,"explanation":"“百戏之祖”指的是昆曲。昆曲源于元末江苏的昆山，是汉族传统戏曲中最古老的剧种之一。昆曲原名“昆山腔”或 简称“昆腔”，是中国古老的戏曲声腔、剧种，现又被称为“昆剧”。"},{"id":315,"stem":"“三杯两盏淡酒，怎敌他、晚来风急”出自以下哪个词牌？（）","options":["卜算子","声声慢","采桑子","钗头凤"],"answer":1,"explanation":"出自宋代诗人李清照的《声声慢·寻寻觅觅》：“寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。 19959276711（vx 同号） 三杯两盏淡酒，怎敌他、晚来风急？雁过也，正伤心，却是旧时相识。满地黄花堆积。憔悴损，如今有谁堪摘？守着窗儿，独自怎生 得黑？梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！”"},{"id":316,"stem":"下列不是月亮别称的是（ ）","options":["冰轮","蝉娟","金乌","望舒"],"answer":2,"explanation":"金乌指的是太阳。 月球，俗称月亮，月亮的别称有很多，如：玉兔、夜光、太阴、素娥、冰轮、金轮、玉轮、银盘、玉盘、金镜、玉镜、玉蟾、桂魄、 蟾蜍、顾兔、婵娟、玉弓、玉桂、银钩、弓月、玉钩、冰镜、广寒宫、嫦娥、玉羊、清虚、望舒、冰兔、冰魄、冰团、蟾户、大明、 冻轮等。"},{"id":317,"stem":"下列在古诗中不是表达思念之情的是（）","options":["月亮","香草","鸿雁","红豆"],"answer":1,"explanation":"古人比较喜欢用香草来比喻自我的品质，这在屈原的《离骚》中极为常见，他以鲜花、香草来比喻品行高洁的君子。"},{"id":318,"stem":"以下表时间的副词，用来表示时间不长或“一会儿”的是（ ）","options":["尝","替","旋","方"],"answer":2,"explanation":"旋：不久；很快地；旋即。 尝：曾经。 替：废弃；停止；代替。 方：才；刚刚。"},{"id":319,"stem":"“天生丽质难自弃，一朝选在君王侧”的是（）","options":["西施","王昭君","武则天","杨玉环"],"answer":3,"explanation":"出自唐代白居易的《长恨歌》，此句描写了杨玉环的美貌，同时揭示了李杨二人故事的悲剧因素，又唤起和统领着全 诗。"},{"id":320,"stem":"苏轼的《饮湖上初晴雨后》中的“湖”指的是（ ）","options":["洞庭湖","白马湖","西湖","太湖"],"answer":2,"explanation":"全诗：“水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。”这是一首赞美西湖美景的诗。此 诗不是描写西湖的一处之景、一时之景，而是对西湖美景的全面描写概括品评，尤其是后二句，被认为是对西湖的恰当评语。"},{"id":321,"stem":"古代关于君子“修身、齐家、治国、平天下”的说法出自于（）","options":["《尚书》","《大学》","《中庸》","《论语》"],"answer":1,"explanation":"“修身、齐家、治国、平天下”出自《礼记·大学》。格物、致知、正心、诚意、修身、齐家、治国、平天下，是儒 学经典思想——八项条目的主要内容，更是儒学“内圣外王”思想的体现。"},{"id":322,"stem":"下列诗句描写的对象，与李白无关的选项是（ ）。","options":["笔落惊风雨，诗成泣鬼神","世人皆欲杀，吾意独怜才","为人性僻耽佳句，语不惊人死不休","痛饮狂歌空度日，飞扬跋扈为谁雄"],"answer":2,"explanation":"C 出自唐代杜甫的《江上值水如海势聊短述》：“为人性僻耽佳句，语不惊人死不休。老去诗篇浑漫与，春来花鸟莫 深愁。新添水槛供垂钓，故着浮槎替入舟。焉得思如陶谢手，令渠述作与同游。”此诗是诗人面对如大海汹涌的江水，抒发内心感受 的叙怀之作。诗写于安史之乱时，诗人流落四川成都，寄居草堂，一次观锦江“水如海势”，波涛汹涌，则触景生情，感慨万端，但 又无从说起，只好“聊短述”，抒写了他激愤的、自我解脱的、一时的人生感悟。"},{"id":323,"stem":"“儿童散学归来早，忙趁东风放纸鸢”描写的是（ ）的景象。","options":["春","夏","秋","冬"],"answer":0,"explanation":"出自清代高鼎的《村居》：“草长莺飞二月天，拂堤杨柳醉春烟。儿童散学归来早，忙趁东风放纸鸢。”这首描绘春 天风光的小诗，是诗人闲居农村时的即景之作。"},{"id":324,"stem":"“湖光秋月两相和，潭面无风镜未磨”形容的湖是（）","options":["洞庭湖","杭州西湖","颖州西湖","白马湖"],"answer":0,"explanation":"出自唐代刘禹锡的《望洞庭》：“湖光秋月两相和，潭面无风镜未磨。遥望洞庭山水翠，白银盘里一青螺。”诗中描 写了秋夜月光下洞庭湖的优美景色。微波不兴，平静秀美，分外怡人。诗人飞驰想像，以清新的笔调，生动地描绘出洞庭湖水宁静、 19959276711（vx 同号） 祥和的朦胧美，勾画出一幅美丽的洞庭山水图。"},{"id":325,"stem":"诗句“谁言寸草心，报得三春晖”描写的是（）。","options":["父爱","母爱","师生情","友情"],"answer":1,"explanation":"出自唐代孟郊的《游子吟》：“慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。” 《游子吟》是孟郊在溧阳所写。作者早年漂泊无依，直到五十岁时才得到了一个溧阳县尉，结束了长年的漂泊流离生活，便将母亲接 来住。诗人饱尝了世态炎凉，更觉亲情可贵，于是写出这首感人至深的颂母之诗。"},{"id":326,"stem":"“两岸青山相对出，孤帆一片日边来”中的“青山”是（ ）","options":["峨眉山","敬亭山","天门山","祁连山"],"answer":2,"explanation":"出自唐代李白的《望天门山》：“天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。”《望天 门山》是公元 725 年（开元十三年）李白初出巴蜀乘船赴江东经当涂（今属安徽）途中行至天门山，初次见到天门山时有感而作的。"},{"id":327,"stem":"下列古诗中，（ ）是杨万里的作品。","options":["《池上》","《惠崇春江晚景》","《四时田园杂兴》","《宿新市徐公店》"],"answer":3,"explanation":"A 的作者是白居易，B 的作者是苏轼，C 的作者是范成大。"},{"id":328,"stem":"诗句“接天莲叶无穷碧，映日荷花别样红”描写了（）附近的夏日美景。","options":["大林寺","西林寺","竹林寺","净慈寺"],"answer":3,"explanation":"出自南宋诗人杨万里的七言绝句《晓出净慈寺送林子方》：“毕竟西湖六月中，风光不与四时同。接天莲叶无穷碧， 映日荷花别样红。”描写了净慈寺附近的夏日美景。"},{"id":329,"stem":"“居高声自远，非是藉秋风”咏的是（）","options":["杜鹃","画眉","蜜蜂","蝉"],"answer":3,"explanation":"出自唐代虞世南的《蝉》：“垂緌饮清露，流响出疏桐。居高声自远，非是藉秋风。”这是一首咏物诗，咏物中尤多 寄托，具有浓郁的象征性。句句写的是蝉的形体、习性和声音，而句句又暗示着诗人高洁清远的品行志趣，物我互释，咏物的深层意 义是咏人。"},{"id":330,"stem":"诗句“粉骨碎身浑不怕，要留清白在人间”描写的是","options":["黄金","宝剑","石灰","美玉"],"answer":2,"explanation":"出自明代于谦的《石灰吟》：“千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。”这是一首 托物言志诗。作者以石灰作比喻，表达自己为国尽忠，不怕牺牲的意愿和坚守高洁情操的决心。"},{"id":331,"stem":"关于《鹿柴》的作者，下列说法错误的是（ ）","options":["字摩诘，号摩诘居士","有“七绝圣手”之称","世称“王右丞”，与孟浩然合称“王孟”","代表作有《九月九日忆山东兄弟》《山居秋瞑》"],"answer":1,"explanation":"《鹿柴》的作者是王维，字摩诘，号摩诘居士，王维参禅悟理，精通诗书音画，以诗名盛于开元、天宝间，尤长五言， 多咏山水田园，与孟浩然合称\"王孟\"，因笃诚奉佛，有\"诗佛\"之称。代表作有《九月九日忆山东兄弟》《山居秋瞑》《鸟鸣涧》等。\" 七绝圣手\"是唐代诗人王昌龄。"},{"id":332,"stem":"“乱入池中看不见，闻歌始觉有人来”出自（）","options":["《采莲诗》","《采莲词》","《采莲歌》","《采莲曲》"],"answer":3,"explanation":"出自唐代王昌龄的《采莲曲》：“荷叶罗裙一色裁，芙蓉向脸两边开。乱入池中看不见，闻歌始觉有人来。”采莲曲： 古曲名。内容多描写江南一带水国风光，采莲女劳动生活情态。"},{"id":333,"stem":"“水光潋滟晴方好”中“潋滟”的意思是（ ）","options":["色彩缤纷","波光闪动","清澈见底","水面平静"],"answer":1,"explanation":"出自宋代苏轼的《饮湖上初晴后雨二首·其二》：“水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹 总相宜。”潋滟（liànyàn）：水面波光闪动的样子。"},{"id":334,"stem":"诗句“王师北定中原日，家祭无忘告乃翁”是诗人陆游写给（ ）的诗。","options":["父母","兄弟","孩子","朋友 36 19959276711（vx 同号）"],"answer":2,"explanation":"出自宋代陆游的《示儿》：“死去元知万事空，但悲不见九州同。王师北定中原日，家祭无忘告乃翁。”示儿：写给 儿子们看。"},{"id":335,"stem":"“一年好景君须记，最是橙黄橘绿时”是（）写给刘景文的诗。","options":["半山居士","六一居士","诚斋居士","东坡居士"],"answer":3,"explanation":"出自宋代苏轼《赠刘景文》：“荷尽已无擎雨盖，菊残犹有傲霜枝。一年好景君须记，最是橙黄橘绿时。”苏轼，字 子瞻，又字和仲，号铁冠道人、东坡居士，世称苏东坡、苏仙、坡仙。"},{"id":336,"stem":"诗句“千山鸟飞绝，万径人踪灭”的作者是（）。","options":["杜甫","苏轼","柳宗元","贺知章"],"answer":2,"
