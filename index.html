声湿桂花\"描写的是（ ）的场景。","options":["元宵节","端午节","七夕节","中秋节"],"answer":3,"explanation":"出自唐代王建的《十五夜望月》 全诗： 中庭地白树栖鸦，冷露无声湿桂花。 今夜月明人尽望，不知秋思落谁家。 这是一首中秋之夜望月思远的七言绝句。全诗四句二十八字，以每两句为一层意思，分别写中秋月色和望月怀人的心情，展现了一幅 寂寥、冷清、沉静的中秋之夜的图画。此诗以写景起，以抒情结，想象丰美，韵味无穷。"},{"id":699,"stem":"诗歌《采薇》出自（ ）","options":["《诗经》","《楚辞》","《汉乐府》","《全唐诗》"],"answer":0,"explanation":"《小雅·采薇》是中国古代第一部诗歌总集《诗经》中的一首诗。此诗以一个返乡戍卒的口吻，唱出从军将士艰辛的 生活和思归的情怀。全诗六章，每章八句。前五章着重写戍边征战生活的艰苦、强烈的思乡情绪以及久久未能回家的原因，从中透露 出士兵既有御敌胜利的喜悦，也深感征战之苦，流露出期望和平的心绪；末章以痛定思痛的抒情结束全诗，感人至深。这首诗运用了 重叠的句式与比兴的手法，集中体现了《诗经》的艺术特色。末章头四句，抒写当年出征和此日生还这两种特定时刻的景物和情怀， 言浅意深，情景交融，是《诗经》中广为传诵的名句。"},{"id":700,"stem":"诗句“千里莺啼绿映红，水村山郭酒旗风\"的题目是（ ）。","options":["《江南》","《江南好》","《江南春》","《忆江南》"],"answer":2,"explanation":"出自唐代杜牧的《江南春》 全诗： 千里莺啼绿映红，水村山郭酒旗风。 南朝四百八十寺，多少楼台烟雨中。"},{"id":701,"stem":"\"前不见古人，后不见来者，念天地之悠悠，独怆然而涕下\"，这首作品的题材是（）。","options":["古体诗","词","乐府","赋"],"answer":0,"explanation":"《登幽州台歌》这首诗属于古体诗。古体诗格律自由，不要求对仗、平仄，押韵较自由，篇幅长短不限，句子有四言、 五言、六言、七言体和杂言体，也说古风、古诗。"},{"id":702,"stem":"张怀瓘《书断》有云\"画如铁石，字若飞动\"，这是对（）的评价。","options":["甲骨文","石鼓文","小篆","草书"],"answer":2,"explanation":"秦始皇泰山封禅时留下了《泰山刻石》，相传其稿本为秦丞相李斯所书，唐人称颂其“画如铁石，字若飞动”，“骨 气丰匀，方圆绝妙”。秦始皇统一后用小篆，所以秦始皇泰山封禅时留下了《泰山刻石》，该刻石使用的是篆书。 19959276711（vx 同号）"},{"id":703,"stem":"\"日暮征帆何处泊，天涯一望断人肠。\"孟浩然的这首诗中，送别的人是（）","options":["学生","老师","友人","长辈"],"answer":2,"explanation":"出自唐代孟浩然的《送杜十四之江南》。此句诗人通过写渺茫春江与孤舟一叶的强烈对照，发出深情一问，对朋友的 关切和依恋在这一问中表达得淋漓尽致，展现出无限的离愁别恨，悠然不尽。"},{"id":704,"stem":"\"始知锁向金笼听，不及林间自在啼\"写的是（）","options":["杜鹃鸟","画眉鸟","黄莺","黄鹂"],"answer":1,"explanation":"出自宋代欧阳修的《画眉鸟》。诗人通过对画眉鸟自由生活的赞美，抒发了诗人贬官外任后的忧郁情怀，表现了诗人 向往和追求自由生活的热切愿望。"},{"id":705,"stem":"\"入春才七日，离家已二年。人归落雁后，思发在花前。\"这首《人日思归》是（）作品。","options":["李白","薛道衡","左思","谢灵运"],"answer":1,"explanation":"出自隋代薛道衡的《人日思归》。此句以工整的对仗交代了时令及离家的时日，平淡的语气之中深藏着诗人离乡的忧 愁。"},{"id":706,"stem":"苏轼，字（）","options":["子瞻","子寿","子舆","子厚"],"answer":0,"explanation":"苏轼，字子瞻，又字和仲，号铁冠道人、东坡居士，世称苏东坡、苏仙、坡仙。"},{"id":707,"stem":"下面关于文学常识的表述，有误的一项是（ ）","options":["词是我国古代的诗体，它可配乐演唱。句式长短不一，又名长短句、曲子词等。","\"沁园春\"是一个词牌名，它规定了一首词的字数、平仄、押韵等。\"长沙\"是词的标题，它揭示词的内容。","毛泽东常用旧体诗的形式来反映现代生活和思想感情，这类诗歌仍属于古典诗词。","按字数的多少，词可分为小令、中调和长调。按是否分段来划分，词又有单调、双调、三调、四调的区别。"],"answer":2,"explanation":"毛泽东 1957 年 1 月 12 日致臧克家等的信中所说：“诗当然应以新诗为主体，旧诗可以写一些，但是不宜在青年中提 倡，因为这种体裁束缚思想、又不易学。”"},{"id":708,"stem":"\"仲夏\"是指农历几月？（ ）","options":["四月","五月","六月","七月"],"answer":1,"explanation":"农历的四季每个季节都有“孟、仲、季”的排列。“孟”为最长，“季”为最幼。孟夏、仲夏、季夏分别对应农历的 4、 5、6 月份。仲夏指的是五月。"},{"id":709,"stem":"唐代诗人中\"高岑\"的组合主要致力于（）的创作。","options":["边塞诗","山水田园诗","乐府诗","应制诗"],"answer":0,"explanation":"边塞诗人，主要以描绘边塞风光、反映戍边将士生活为主题进行创作。从汉代开始，到南北朝时已有一些边塞诗人， 至隋朝时期，数量不断增多，初唐四杰以及陈子昂等诗人进一步推动了边塞诗的发展，到盛唐则全面成熟。高适、王昌龄、岑参、王 之涣四位善于边塞诗创作，作品较为出名，因此被合称为“四大边塞诗人”。"},{"id":710,"stem":"下列诗句不是出自送别诗的是（ ）","options":["烽火连三月，家书抵万金。","孤帆远影碧空尽，唯见长江天际流。","劝君更尽一杯酒，西出阳关无故人。","莫愁前路无知己，天下谁人不识君。"],"answer":0,"explanation":"A 出自唐代杜甫的《春望》 全诗： 国破山河在，城春草木深。 感时花溅泪，恨别鸟惊心。 烽火连三月，家书抵万金。 白头搔更短，浑欲不胜簪。 此句写战争的持久不休，“家书抵万金”，包含着多少辛酸、多少期盼，刻画出诗人在消息隔绝、久盼音讯不至时的迫切心情，也反 映出广大人民反对战争，期望和平安乐的美好愿望。"},{"id":711,"stem":"和\"长江南岸的子弟人才济济，若能重整旗鼓卷土杀回来，楚汉相争，谁输谁赢还很难说。\"这个意思相匹配的诗句是（ ）","options":["至今思项羽，不肯过江东。","但使龙城飞将在，不教胡马度阴山。","粉骨碎身全不怕，要留清白在人间。","江东子弟多才俊，卷土重来未可知。"],"answer":3,"explanation":"76 19959276711（vx 同号） 【知识小链接】D 出自唐代杜牧的《题乌江亭》。 全诗： 胜败兵家事不期，包羞忍耻是男儿。 江东子弟多才俊，卷土重来未可知。 诗人设想项羽假如回江东重整旗鼓，说不定就可以卷土重来，杜牧以兵家的眼光论成败由人之理，强调兵家须有远见卓识和不屈不挠 的意志。"},{"id":712,"stem":"以下古代作品中文体不属于骈文体的是（）","options":["《滕王阁序》","《为徐敬业讨武瞾檄》","《岳阳楼记》","《与朱元思书》"],"answer":2,"explanation":"《岳阳楼记》是北宋文学家范仲淹于庆历六年九月十五日（1046 年 10 月 17 日）应好友巴陵郡太守滕子京之请为重修 岳阳楼而创作的一篇散文。这篇文章通过写岳阳楼的景色，以及阴雨和晴朗时带给人的不同感受，揭示了“不以物喜，不以己悲”的 古仁人之心，也表达了自己“先天下之忧而忧，后天下之乐而乐”的爱国爱民情怀。"},{"id":713,"stem":"刘勰在《文心雕龙》中称赞为\"五言之冠冕\"的是（ ）","options":["阮籍《咏怀》八十二首","左思《咏史》八首","鲍照《拟行路难》十八首","《古诗十九首》"],"answer":3,"explanation":"《古诗十九首》是中国古代文人五言诗选辑。全诗语言朴素自然，描写生动真切，具有天然浑成的艺术风格，处处表 现了道家与儒家的哲学意境，被刘勰称为“五言之冠冕”。"},{"id":714,"stem":"写出悼念亡妻的动人诗句\"曾经沧海难为水，除却巫山不是云\"的唐代诗人是（）","options":["杜甫","白居易","元稹","李商隐"],"answer":2,"explanation":"出自唐代元稹的《离思五首·其四》。 全诗： 曾经沧海难为水，除却巫山不是云。 取次花丛懒回顾，半缘修道半缘君。"},{"id":715,"stem":"\"千磨万击还坚劲，任尔东西南北风\"出自（）的诗作。","options":["于谦","李白","郑板桥","林则徐"],"answer":2,"explanation":"出自清代诗人郑燮（郑板桥）的《竹石》。 全诗： 咬定青山不放松，立根原在破岩中。 千磨万击还坚劲，任尔东西南北风。"},{"id":716,"stem":"\"凤凰台上凤凰游，凤去台空江自流\"句中的\"凤凰台\"在现在的（）","options":["扬州","苏州","南京","镇江"],"answer":2,"explanation":"凤凰台指的是南京的凤凰台，是南京的一个历史文化名胜，位于南京市鼓楼区湖南路 18 号。凤凰台据说是唐朝时期天 文学家僧一行所建，台址位于现在南京北极阁公园的西侧，是一个高约 10 米的土台，上面建有亭子，名为“凤凰亭”。 据传，凤凰台是僧一行为了观测天象所建，当时他认为南京的地理形势如同“万派朝宗”，是一个非常吉祥的地方，因此在凤凰台上 建亭，并在亭内放置了浑天仪等仪器，用来观测天象。"},{"id":717,"stem":"\"出入相友，守望相助。\"这句话出自（）","options":["论语·雍也","论语·乡党","孟子·滕文公上","孟子·梁惠王上"],"answer":2,"explanation":"“出入相友，守望相助”这句话出自《孟子·滕文公上》。它的意思是，出入相互作伴，遇到外来的侵害或灾祸时， 协同看守瞭望，彼此提供帮助，指人与人之间要互帮互助、和睦共处。"},{"id":718,"stem":"有古今隐逸诗人之宗之称的是（）。","options":["谢灵运","陶潜","王昌龄","王维"],"answer":1,"explanation":"陶渊明，名潜，字元亮，别号五柳先生，卒后私谥靖节，世称靖节先生。陶渊明是东晋末到刘宋初杰出的诗人、辞赋 家、散文家。他是中国第一位田园诗人，被誉为“隐逸诗人之宗”、“田园诗派之鼻祖”。"},{"id":719,"stem":"下列有关辛弃疾的介绍，正确的一项是（ ）。","options":["字廷秀，号诚斋。","字义山，号玉粱生。","字务观，号放翁。","字幼安，号稼轩。"],"answer":3,"explanation":"辛弃疾（1140 年 5 月 28 日－1207 年 10 月 3 日），原字坦夫，后改字幼安，中年后号稼轩，山东东路济南府历城县（今 19959276711（vx 同号） 山东省济南市历城区）人。南宋官员、将领、文学家，豪放派词人，有“词中之龙”之称；与苏轼合称“苏辛”，与李清照并称“济 南二安”。"},{"id":720,"stem":"著名的宋代文人苏洵与苏轼的关系是（）","options":["父子","兄弟","叔侄","师徒"],"answer":0,"explanation":"苏轼、苏洵和苏辙三人是父子关系，苏洵是苏轼和苏辙的父亲，苏轼则是苏辙的哥哥。苏洵，北宋文学家，与其子苏 轼、苏辙并以文学著称于世，世称“三苏”，均被列入“唐宋八大家”之列。"},{"id":721,"stem":"\"出师一表真名世，千载谁塔伯仲间\"出自（）的诗作。","options":["杜甫","李白","刘禹锡","陆游"],"answer":3,"explanation":"出自宋代陆游的《书愤五首》（其一） 早岁那知世事艰，中原北望气如山。 楼船夜雪瓜洲渡，铁马秋风大散关。 塞上长城空自许，镜中衰鬓已先斑。 出师一表真名世，千载谁堪伯仲间。"},{"id":722,"stem":"曾子是诸子百家中什么学派的著名人物？（）","options":["法家","道家","墨家","儒家"],"answer":3,"explanation":"曾子是孔子的弟子。曾子：姒姓，曾氏，名参，字子舆；鲁国南武城人；春秋末年思想家，儒家大家，孔子晚年弟子 之一，儒家学派的重要代表人物，夏禹后代。"},{"id":723,"stem":"曹操、（）和曹植并称\"三曹\"。","options":["曹冲","曹毷","曹丕","曹彰"],"answer":2,"explanation":"“三曹”指汉魏时期曹操与其子曹丕、曹植的合称。因他们父子兄弟在政治上的地位和文学上的成就，都对当时的文 坛很有影响，是建安文学的代表，所以后人合称之为“三曹”。三曹与也是父子兄弟以文学见称的三苏（苏洵、苏轼、苏辙）齐名。"},{"id":724,"stem":"诗句“不知细叶谁裁出，二月春风似剪刀”描写的植物是（）","options":["杨","柳","竹","海棠"],"answer":1,"explanation":"出自《咏柳》，是唐代诗人贺知章创作的一首七言绝句。这是一首咏物诗。诗中描写了二月的新柳在春风吹拂下，柔 嫩的细叶葱翠袅娜，充分表现出早春的勃勃生机和诗人对春天到来的喜悦之情。诗人别出心裁地将“二月春风”比喻为“剪刀”，再 用拟人化的“裁出”动作，使视之无形的春风变成了具体可感的生动形象，不仅立意新奇，而且饱含韵味，一问一答，跳脱有致。"},{"id":725,"stem":"在《水调歌头·重上井冈山》中，下列说法不正确的一项是（ ）","options":["这首词描绘了井冈山上郁郁葱葱、莺飞燕舞的春日景象。","这首词是青年时的词人登高望远后，有感而发创作的。","这首词抒发了词人胸怀壮志，敢于斗争的决心和态度。","词人相信人定胜天，只要肯下定决心努力，就一定能成功。"],"answer":1,"explanation":"《水调歌头·重上井冈山》是毛泽东于 1965 年 5 月 25 日时隔 38 年重回井冈山而写的一首词，全词最早发表于《诗刊》 1976 年 1 月号，是毛泽东生前最后发表的两首词之一。词中描绘了作者毛泽东重上井冈山后所看到的旧貌变新颜的生机勃勃的美好景 色，回顾了井冈山的革命斗争历史，抒发了作者的无限感慨和欢欣之情，赞美了共产党人和革命人民所具有的藐视困难、敢于战胜困 难的英雄气概和凌云壮志。词作叙事、写景、抒情、议论熔于一炉；善于用典、化用前人诗句和运用俗语、谚语入诗。豪迈是这首词 的基调。"},{"id":726,"stem":"《七律·人民解放军占领南京》是一首记录南京解放，庆祝革命胜利的诗篇。下列诗词与南京相关的一项是（）","options":["张继《枫桥夜泊》","苏轼《饮湖上初晴后雨》","杜牧《江南春》","白居易《钱塘湖春行》"],"answer":2,"explanation":"《江南春》是唐代诗人杜牧创作的一首七言绝句。此诗描绘了明媚的江南春光，再现了江南烟雨蒙蒙的楼台景色，把 江南风光写得神奇迷离，别有一番情趣，同时渗透出诗人对历史兴亡盛衰的感慨和对晚唐国运的隐忧。四句均为景语，有众多意象和 景物，有植物有动物，有声有色，景物有远近之分，动静结合，各具特色。全诗以轻快的文字，极具概括性的语言描绘了一幅生动形 象、丰富多彩而又有气魄的江南春画卷，意境深邃幽美，情思含蓄深蕴，千百年来素负盛誉。"},{"id":727,"stem":"根据《蒹葭》上下文，“白露\"的意思是（）","options":["白天的露水","白色的露水","秋天的露水","二十四节气之一"],"answer":2,"explanation":"“蒹葭苍苍，白露为霜白露”意思是：芦苇密密又苍苍，清晨的露水变成霜。“白露”指的是秋天清晨的露水。 19959276711（vx 同号）"},{"id":728,"stem":"《诗经》中主要是宗庙乐歌的是哪一部分（）","options":["风","小雅","颂","大雅"],"answer":2,"explanation":"中国古代第一部诗歌总集是《诗经》，诗经中描写地方风民间风俗的是风。风、雅、颂是指我国第一部诗歌总集《诗 经》的三个部分。 风是不同地区的地方音乐。《风》诗是从郑、齐、魏、唐、秦、陈、桧、曹、豳等 15 个地区采集上来的土风歌谣。共 160 篇。大部分 是民歌。雅是周王朝直辖地区的音乐，即所谓正声雅乐。《雅》诗是宫廷宴享或朝会时的乐歌。除《小雅》中有少量民歌外，大部分 是贵族文人的作品。颂是宗庙祭祀的舞曲歌辞，内容多是歌颂祖先的功业的。全部是贵族文人的作品。"},{"id":729,"stem":"《诗经》的主要采集者并尊称为“中华诗祖”的是（ ）","options":["王子夫","姜子牙","庄子","尹吉甫"],"answer":3,"explanation":"《诗经》的作者成分很复杂，产生的地域也很广。除了周王朝乐官制五杰侮作的乐歌，公卿列、烈士进献的乐歌，还 有许多原来流传于民间的歌谣。其中，认为尹吉甫是《诗经》的主要采集者，被尊称为海鉴中华诗祖。"},{"id":730,"stem":"以下诗句中表达情感不同的一项是：（ ）","options":["自古逢秋悲寂寥，我言秋日胜春朝。（刘禹锡《秋词》）","枯藤老树昏鸦，小桥流水人家，古道西风瘦马。（马致远《天净沙·秋思》）","南浦凄凄别，西风袅袅秋。（白居易《南浦别》）","落叶西风时候，人共青山都瘦。（辛弃疾《昭君怨》）"],"answer":0,"explanation":"刘禹锡《秋词》 全诗： 自古逢秋悲寂寥，我言秋日胜春朝。 晴空一鹤排云上，便引诗情到碧霄。 刘禹锡的《秋词》，一反常调，另辟蹊径，它以其最大的热情讴歌了秋天的美好。更为难得可贵的是，《秋词》还是诗人被贬朗州后 的作品，让人佩服刘禹锡的待人处世。"},{"id":731,"stem":"选出对《木兰诗》中“将军百战死，壮士十年归”翻译正确的一项（）","options":["将军和壮士从军十年，经历了千百次战斗，有的死了，有的胜利归来。","将军在数百次战斗中死去了，壮士从军十年胜利归来。","将军在千百次战斗中死去了，木兰却在十年后回来了。","从军十年，经历了千百次战斗，将军死去了，壮士归来了。"],"answer":0,"explanation":"意思是说：将军和壮士们经历了很长时间很多次大大小的战斗，有的牺牲了，幸存者胜利归来。"},{"id":732,"stem":"对《木兰诗》下列句子的修辞手法依次判断正确的一项是（ ）①不闻机杼声，惟闻女叹息。②阿爷无大儿，木兰无长兄。③东市买骏马，西市买鞍鞯，南市买辔头，北市买长鞭。④旦辞爷娘去，暮宿黄河边。","options":["比喻对偶反复夸张","对偶对偶排比对偶","借代反复排比对偶","对偶反复对偶比喻"],"answer":1,"explanation":"①不闻机杼声，惟闻女叹息。——对偶 ②阿爷无大儿，木兰无长兄。——对偶 ③东市买骏马，西市买鞍鞯，南市买辔头，北市买长鞭。——排比 ④旦辞爷娘去，暮宿黄河边。——对偶 中国古代第一部诗歌总集是《诗经》，诗经中描写地方风民间风俗的是风。风、雅、颂是指我国第一部诗歌总集《诗经》的三个部分。"},{"id":733,"stem":"《赠从弟》三首诗歌主要运用了哪种表现手法？（）","options":["比喻","拟人","象征","排比"],"answer":2,"explanation":"《赠从弟三首》是汉末三国时期诗人刘桢的组诗作品。这三首诗运用比兴之法，分咏蘋藻、松柏、凤凰三物，诗人以 蘋藻、松柏、凤凰高洁、坚贞的品性、远大的怀抱，勉励其堂弟坚贞自守，不因外力压迫而改变本性，亦以自勉。全诗长于比兴，文 字平实，言简意明，风格古朴。赠从弟运用了象征手法，全诗借松柏挺立风中而不倒、历经严寒而不凋，自喻高洁、坚贞的情怀，在 自勉中也勉励从弟做一个坚强不屈的人。"},{"id":734,"stem":"韩愈的《晚春》中所作诗句“草树知春不久归，百般红紫斗芳菲”，其中的“斗”字用到的修辞手法是（ ）","options":["比喻","拟人","夸张","象征"],"answer":1,"explanation":"79 19959276711（vx 同号） 【知识小链接】白居运用了拟人的修辞手法，把花草树木当作人来写。"},{"id":735,"stem":"韩愈的《晚春》中所作诗句“杨花榆荚无才思，惟解漫天作雪飞”，其中的“解”字意为（）","options":["解释","解放","知道","分开"],"answer":2,"explanation":"“杨花榆荚无才思，惟解漫天作雪飞”的意思是：没有美丽颜色的杨花和榆钱也不甘寂寞，随风起舞，化作漫天飞雪。 解是知道的意思。"},{"id":736,"stem":"以下不是白居易别称的是（ ）","options":["青莲隐士","香山居士","江州司马","醉吟先生"],"answer":0,"explanation":"白居易，字乐天，号香山居士，又号醉吟先生。是唐代伟大的现实主义诗人，唐代三大诗人之一。白居易与元稹共同 倡导新乐府运动，世称“元白”，与刘禹锡并称“刘白”。 白居易的诗歌题材广泛，形式多样，语言平易通俗，有“诗魔”和“诗王”之称。官至翰林学士、左赞善大夫。公元 846 年，白居易 在洛阳逝世，葬于香山。有《白氏长庆集》传世，代表诗作有《长恨歌》、《卖炭翁》、《琵琶行》等。"},{"id":737,"stem":"以下哪句诗与“人间四月芳菲尽，山寺桃花始盛开”的物候现象原因相同？（ ）","options":["五月天山雪，无花只有寒。","五月五日天晴明，杨花绕江啼晓鹰。","世上十年人不识，山中五月夜犹寒。","迎梅已过三旬雨，秧稻初齐五月凉。"],"answer":0,"explanation":"“人间四月芳菲尽，山寺桃花始盛开”与 A 句都说明了海拔高度对气候的影响。"},{"id":738,"stem":"以下诗句中，描写的不是菊花的是（）","options":["宁可枝头抱香死，何曾吹落北风中。","东篱把酒黄昏后，有暗香盈袖。","他年我若为青帝，报与桃花一处开。","晚晴庭院微风发，忽送清香度竹来。"],"answer":3,"explanation":"二出自明代文嘉的《兰花》，全诗：奕奕幽兰傍砌栽，紫茎绿叶向春开。晚晴庭院微风发，忽送清香度竹来。"},{"id":739,"stem":"杜牧《过华清宫绝句》中的“一骑红尘妃子笑，无人知是荔枝来”，讽刺了（）","options":["没有人知道荔枝是给杨贵妃的","统治者的贪图享乐","骑手悄无声息","平民百姓不配吃到荔枝"],"answer":1,"explanation":"这首诗表达了诗人对当时朝廷奢靡生活的深恶痛绝和不满，深刻地揭露了唐玄宗与杨贵妃奢侈淫逸的生活。这首诗含 蓄而精深，诗人不说玄宗荒淫好色，杨贵妃恃宠而骄，而是以“一骑红尘”与“妃子笑”作对比，含意深远。"},{"id":740,"stem":"“锦城虽云乐，不如早还家”，锦城就是如今的（ ）","options":["长沙","成都","西安","洛阳"],"answer":1,"explanation":"四川的古称叫做“蜀”、“蚕丛之国”，按照说文解字的说法，蜀是“桑中虫”的意思。 换言之，在古人眼中，“桑蚕丝”织成的蜀锦已经成了四川的一张名片。蜀锦是中国古代四大名锦之首，成都别称“锦城”这个名字 的由来，便源自秦灭巴蜀后，曾专门在成都设立负责管理织锦事宜的\"锦官\"。"},{"id":741,"stem":"“地崩山摧壮士死，然后天梯石栈相钩连”一句中提到的典故是（）","options":["五丁开山","卧薪尝胆","开天辟地","愚公移山"],"answer":0,"explanation":"“五丁”是指蜀国的五个兄弟，他们个个力大无比，而且善良正直，只可惜他们跟错了君主，以致埋没了一世英明。"},{"id":742,"stem":"下列哪一句诗描写的场景最适合采用水墨画来表现？（ ）","options":["落霞与孤鹜齐飞，秋水共长天一色","返景入深林，复照青苔上","孤舟蓑笠翁，独钓寒江雪","接天莲叶无穷碧，映日荷花别样红"],"answer":2,"explanation":"C 句出自唐代诗人柳宗元的《江雪》。大意是千山万岭不见飞鸟的踪影；千路万径不见行人的足迹。一叶孤舟上，一 位身披蓑衣头戴斗笠的渔翁；独自在漫天风雪中垂钓。最适合采用水墨画来表现"},{"id":743,"stem":"下面哪个字常用作表示顺序的第五位？（）","options":["戊","戍","戌","戉"],"answer":0,"explanation":"戊字表示顺序的第五位。天干地支简称干支，是夏历以来用来编排年分和日期用的。天干共十个字：甲、乙、丙、丁、 戊、己、庚、辛、壬、癸；地支共十二个字，排列顺序为：子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥。"},{"id":744,"stem":"下面哪句话出自《孟子》（ ）","options":["水能载舟，亦能覆舟","先天下之忧而忧，后天下之乐而乐","民惟邦本，本固邦宁","独乐乐，与人乐乐，熟乐？ 80 19959276711（vx 同号）"],"answer":3,"explanation":"“独乐乐，与人乐乐，熟乐？”出自于《孟子》。《孟子》是儒家的经典著作，被南宋朱熹列为“四书”。是战国中 期孟子及其弟子万章、公孙丑等著。"},{"id":745,"stem":"下列哪个不是北京的别称？（）","options":["大都","中都","上都","南京"],"answer":2,"explanation":"上都不是北京的别称。上都位于今内蒙古自治区锡林郭勒盟正蓝旗境内，多伦县西北闪电河畔。"},{"id":746,"stem":"下列选项中与“亡羊补牢”意思最接近的是：（ ）","options":["人无远虑，必有近忧","祸兮，福之所倚，福兮，祝之所伏","往者不可谏，来者犹可追","失之东隅，收之桑榆"],"answer":2,"explanation":"“往者不可谏，来者犹可追”这句话的意思是“已经过去的已无法挽回，正在到来的还可以补救”，出自春秋·接舆 《凤歌》，是有“楚国狂人”之称的接舆讽劝孔子的一支歌。"},{"id":747,"stem":"“勿以恶小而为之，勿以善小而不为”语出《三国志》，这是谁说的？（）","options":["诸葛亮","曹操","刘备","周瑜"],"answer":2,"explanation":"＂勿以恶小而为之，勿以善小而不为。＂这是刘备去世前给其子刘禅的遗诏中的话。原句为：“勿以恶小而为之，勿 以善小而不为。惟贤惟德，能服于人。”译文：对任何一件事，不要因为它是很小的、不显眼的坏事就去做；相反，对于一些微小的。 却有益于别人的好事，不要因为它意义不大就不去做它。"},{"id":748,"stem":"以下选项中对名句“露从今夜白，月是故乡明”分析错误的是（）。","options":["诗人用倒置的语序使浅白的意象风韵起来。","通过诗句可以了解到当时处在白露时节。","通过诗句可以证明故乡的月确实比其他地方明亮。","通过诗句可以感受到诗人对故乡的感怀。"],"answer":2,"explanation":"诗句出自唐代诗人杜甫的《月夜忆舍弟》。这首诗是乾元二年（759）秋杜甫在秦州所作。这年九月，史思明从范阳引 兵南下，攻陷汴州，西进洛阳，山东、河南都处于战乱之中。当时，杜甫的几个弟弟正分散在这一带，由于战事阻隔，音信不通，引 起他强烈的忧虑和思念。"},{"id":749,"stem":"“高楼当此夜，叹息未应闲”中“高楼”是指（ ）。","options":["姑娘的闺阁","姓高的士兵","高大的房屋","戍边士兵的妻子"],"answer":3,"explanation":"出自唐代诗人李白作品《关山月》。此诗写远离家乡的戍边将士与家中妻室的相互思念之情，深刻地反映了战争带给 广大民众的痛苦。全诗分为三层，开头四句，主要写关、山、月三种因素在内的辽阔的边塞图景，从而表现出征人怀乡的情绪；中间 四句，具体写到战争的景象，战场悲惨残酷；后四句写征人望边地而思念家乡，进而推想妻子月夜高楼叹息不止。此诗如同一幅由关 山明月、沙场哀怨、戍客思归三部分组成的边塞图长卷，以怨情贯穿全诗，色调统一，浑然一体，气象雄浑，风格自然。"},{"id":750,"stem":"以下选项中对《闻王昌龄左迁龙标遥有此寄》描述不正确的是（ ）。","options":["这是一首赠别诗。","表明作者对王昌龄的担忧。","诗中“我寄愁心与明月，随风直到夜郎西”一句中的“夜郎”就是指王昌龄。","在作者写这首诗之前，王昌龄也曾经写诗赠与作者。"],"answer":2,"explanation":"“夜郎”是国名。汉时位于我国西南边境的夷族部落。在今贵州西部桐梓县东二十里地区。"},{"id":751,"stem":"唐代诗人刘禹锡的《乌衣巷》中的“乌衣巷”位于现在的哪个城市？（）","options":["西安","北京","南京","开封"],"answer":2,"explanation":"乌衣巷位于南京市秦淮区秦淮河上文德桥旁的南岸，地处夫子庙秦淮风光带核心地带，是中国历史最悠久最著名的古 巷。"},{"id":752,"stem":"如果在华佗去世后不及，曹操还想寻找一位名医为自己治病，他可以找下列的哪一位？（ ）","options":["扁鹊","孙思邈","李时珍","张仲景"],"answer":3,"explanation":"扁鹊是战国时期医学家，约生于周威烈王十九年（（公元前 407），卒于赧王五年（前 310）。张仲景，名机，东汉末 年著名医学家，经后人考证，约生于东汉和平元年（150 年），卒于建安二十四年（219 年）。孙思邈（581 年～682 年）为唐代著名 道士，医药学家。被人称为“药王”。从他们的生活年代即可判断，只有张仲景和曹操同时代。 19959276711（vx 同号）"},{"id":753,"stem":"《二十四史》是我国古代二十四史的总称，其中只有一部是完全意义上的通史，它是：（）","options":["《汉书》","《史记》","《三国志》","《左传》"],"answer":1,"explanation":"二十四史中完整的通史是《史记》。《史记》是西汉历史学家司马迁撰写的传记史书。它是中国历史上第一部传记通 史，记录了从古代传说中的黄帝时代到汉武帝初年的 3000 多年历史。"},{"id":754,"stem":"从题材来看，唐代诗人刘禹锡的《乌衣巷》是一首什么诗？（）","options":["怀古诗","送别诗","咏物诗","田园诗"],"answer":0,"explanation":"《乌衣巷》，是刘禹锡怀古组诗《金陵五题》中的一首。所谓怀古，就是到一处古迹，看着目前的样子，追想那里古 往今来的废兴成毁，以及其间出现的和发生的，与那里有关的人物和事迹，并感慨今昔变迁，世事无常。"},{"id":755,"stem":"以下对《赠花卿》中的“花卿”描述不正确的是（）","options":["与《戏作花卿歌》中提到的是同一人。","此人为唐代武将。","此人姓花名卿。","此人名叫花敬定。"],"answer":2,"explanation":"《赠花卿》的“花卿”指成都尹崔光远的部将花敬定，曾平定段子璋之乱。卿，当时对地位、年辈较低的人一种客气 的称呼。"},{"id":756,"stem":"王勃的《送杜少府之任蜀州》是一首送别诗。下面哪首诗不属于送别诗？（ ）","options":["《过故人庄》","《赠汪伦》","《送元二使安西》","《别董大》"],"answer":0,"explanation":"A 这首诗是唐代诗人孟浩然创作的一首五言律诗，写的是诗人应邀到一位农村老朋友家做客的经过，在淳朴自然的田 园风光之中，主客举杯饮酒，闲谈家常，充满了乐趣，抒发了诗人和朋友之间真挚的友情，同时通过描写田园生活的风光，写出作者 对这种生活的向往。"},{"id":757,"stem":"从诗句“呼童烹鸡酌白酒，儿女嬉笑牵人衣”看出诗人欢愉之情溢于言表以下选项中，当时最有可能让诗人感到欢愉的是（ ）。","options":["找到了实现抱负的机会。","娶到了心仪的女子。","交到了志趣相投的朋友出.","得到了大人的召见。"],"answer":0,"explanation":"出自唐代李白的《南陵别儿童入京》。公元 742 年（天宝元年），已经四十二岁的李白得到唐玄宗召他入京的诏书。 他异常兴奋，满以为实现政治理想的时机到了，立刻回到南陵家中，与儿女告别，并写下了这首激情洋溢的七言古诗，诗中毫不掩饰 其喜悦之情。"},{"id":758,"stem":"下列哪部著作的成书时间最长？（ ）","options":["《徐霞客游记》","《说文解字》","《天工开物》","《梦溪笔谈》"],"answer":0,"explanation":"《徐霞客游记》大约用了 30 年；《说文解字》约用了 21 年时间成书；《天工开物》大约 3 年完成；《梦溪笔谈》大 约用时 7 年。"},{"id":759,"stem":"文人对各种植物有自己的偏爱，陶渊明喜爱菊花，北宋文豪苏东坡则说过：“宁可食无肉，不可（）”。","options":["居无松","居无竹","居无梅","居无菊"],"answer":1,"explanation":"北宋文豪苏东坡说过“宁可食无肉，不可居无竹”意思是：宁可不吃肉，但住的地方也要有竹子作伴。"},{"id":760,"stem":"《沙丘城下寄杜甫》表达的是以下哪位诗人对杜甫的思念之情？（）","options":["高适","王昌龄","李白","孟浩然"],"answer":2,"explanation":"《沙丘城下寄杜甫》是唐代大诗人李白的诗作。此诗为李白寓居沙丘时怀念诗友杜甫而作，深刻地表现了两位大诗人 的真挚友谊。"},{"id":761,"stem":"“但愿人长久，千里共婵娟”，苏东坡借这首词表达了对谁的思念之情？（ ）","options":["妻子","兄弟","朋友","父亲"],"answer":1,"explanation":"出自宋代苏轼的《水调歌头·明月几时有》。这首词是中秋望月怀人之作，表达了对胞弟苏辙的无限思念。"},{"id":762,"stem":"以下诗句中，哪句诗中笛声所表达的感情基调与其他三句明显不同？（ ）","options":["陇头明月迥临关，陇上行人夜吹笛。","纵有邻人解吹笛，山阳旧侣更谁过？","离情被横笛，吹过乱山东。","牧童归去横牛背，短笛无腔信口吹。"],"answer":3,"explanation":"D 出自宋代雷震的《村晚》。诗人描绘了一幅饶有生活情趣的农村晚景图，刻画了一个悠闲俏皮的牧童形象，写出牧 童无忧无虑、悠闲自在的情趣。 19959276711（vx 同号）"},{"id":763,"stem":"以下哪个选项不是“烂柯”的含义？","options":["围棋","岁月流逝，人事变迁","一直等待友人，等到斧头柄都烂了","烂柯山"],"answer":2,"explanation":"烂柯是汉语词语，意思是指岁月流逝，人事变迁。出自围棋著名典故，语出南朝梁任昉《述异记》。从那时起，很多 与围棋有关的故事都以烂柯指代，如《烂柯谱》等。"},{"id":764,"stem":"“三年羁旅客，今日又南冠”中的“羁”的意思是（ ）","options":["放荡不羁","停留","四处漂泊","束缚"],"answer":1,"explanation":"出自夏完淳的《别云间》。羁：停留。"},{"id":765,"stem":"“各领风骚数百年”中的“风骚”一词源自（ ）","options":["《国风》和《楚辞》","《郑风》和《离骚》","《国风》和《离骚》","《郑风》和《楚辞》"],"answer":2,"explanation":"“风骚”是《诗经•国风》和《楚辞•离骚》的并称．它们同被视为汉族诗歌发展的源流．对后世汉族文学影响深远．后 代用来泛称文学，在文坛居于领袖地位或在某方面领先叫领风骚．现在常指举止轻佻，行为放荡．"},{"id":766,"stem":"《山坡羊·潼关怀古》中“波涛如怒”写的是哪条河流？（）","options":["黄河","长江","大渡河","鸭绿江"],"answer":0,"explanation":"原句“峰峦如聚，波涛如怒，山河表里潼关路。”此句从潼关形胜写起，一个“聚”字，写出“峰峦”的众多，表现 出它们向潼关聚集的动势，又一个“怒”字，刻画出黄河波翻浪涌、奔腾咆哮的气势，“山河表里潼关路”，总括山、河，归到“潼 关”，表明诗人此时正行走在“潼关路”。"},{"id":767,"stem":"下列句子都出自《醉翁亭记》，选出朗读停顿不正确的一项。（ ）","options":["环滁/皆山也","而乐/亦无穷也","负者/歌于途","太守归而/宾客从也"],"answer":3,"explanation":"D 句太守归/而宾客从也。意思是宾客们跟随太守一起回去了。"},{"id":768,"stem":"下列选项表述错误的一项是（ ）。","options":["“醉翁”“六一居士”都是欧阳修的号。","《生查子·元夕》、《卖油翁》都是欧阳修的作品。","“记”是古代的一种文体，用来警戒自己或称述功德。","宋朝的欧阳修、苏洵、曾巩都位于“唐宋八大家”之列。"],"answer":2,"explanation":"\"记\"，是古代的一种文体。主要是记载事物，并通过记事、记物，写景、记人来抒发作者的感情或见解，寄景抒情，托 物言志。"},{"id":769,"stem":"下列句子中划线词的解释有误的一项是（ ）","options":["卿今当涂掌事（古代君对臣或朋友之间的爱称）","孤岂欲卿治经为博士邪（古时王侯的自称）","非复吴下阿蒙（吕蒙的小名）","大兄何见事之晚乎（古代对自家兄长的尊称）"],"answer":3,"explanation":"D 句出自《孙权劝学》，吕蒙对孙权说“大兄何见事之晚乎？”，大兄指的是孙权。"},{"id":770,"stem":"下列句子中划线词语的解释，不正确的一项是（ ）。","options":["俭以修身以：表示后者是前者的目的","意与日去去：消失","见往事耳往事：过去的事","卿今者才略卿：古代君对臣的爱称。朋友、夫妇间也以“卿”为爱称"],"answer":2,"explanation":"“见往事耳”出自《孙权劝学》，意思是孙权希望吕蒙能了解历史罢了。"},{"id":771,"stem":"下列文学常识中有误的一项是（ ）","options":["司马光，字君实，北宋政治家、史学家，代表作品有《稽古录》《谏水记闻》等。","由司马光主持編纂的《资治通鉴》是一部断代体史书，记载了 16 朝 1362 年的历史。","孙权，字仲谋三国时代东吴的建立者。建安十三年与刘备联合，大败曹操于赤壁。","西汉司马迁的《史记》、东汉班固的《汉书》南朝范晔的《后汉书》、西晋陈寿的《三国志》被称为“前四史”。 83 19959276711（vx 同号）"],"answer":1,"explanation":"《资治通鉴》是司马光奉宋英宗和宋神宗之命编撰的一部编年体通史。由司马光本人担任主编，在刘攽、刘恕和范祖 禹的协助下，历时 19 年而编撰完成。"},{"id":772,"stem":"下列表述不正确的一项是（ ）","options":["《孙权劝学》选自北宋司马光主持编纂的编年体通史《资治通鉴》。","鲁肃与吕蒙“结友而去”，从正面表现了孙权劝学的结果以及吕蒙才略的惊人增长。","本文“治经”中的“经”是指《易》《书》《诗》《礼》《春秋》等书。","“刮目相待”指用新的眼光来看待；“吴下阿蒙”泛指学识浅陋的人。这两个成语均出自《孙权劝学》。"],"answer":1,"explanation":"鲁肃与吕蒙“结友而去”，从侧面表现了孙权劝学的结果以及吕蒙才略的惊人增长。"},{"id":773,"stem":"对《孙权劝学》有关内容理解有误的一项是（ ）","options":["孙权对吕蒙说的“不可不学”中“学”指的是读书。","孙权对吕蒙的期望并不高，只希望他知道一点历史故事。","从文章内容看，吕蒙在“就学”之前是一个“才略”不高的人。","从文章内容看，吕蒙“就学”后，进步非常快，远远超过了孙权当初对他的要求。"],"answer":1,"explanation":"孙权是希望吕蒙能够翻阅一些古书，从中得到一些启发罢了。"},{"id":774,"stem":"下列对句子中字词的解释，不正确的一项是（ ）","options":["不与秦塞通人烟 塞：山川险要之地","上有六龙回日之高标 高标：可作为一方标志的最高峰","青泥何盘盘 盘盘：山路曲折、盘旋","嗟尔远道之人胡为乎来哉 尔：语助词，无意义"],"answer":3,"explanation":"D 的意思是：唉呀，你这个远方而来的客人，为了什么而来到这险要的地方？ 尔：你。"},{"id":775,"stem":"《蜀道难》这首诗，想象丰富，大胆夸张，下列各句中，不含夸张修辞的一项是（ ）","options":["黄鹤之飞尚不得过，猿猱欲度愁攀援","扪参历井仰胁息，以手抚膺坐长叹","连峰去天不盈尺，枯松倒挂倚绝壁","所守或匪亲，化为狼与豺"],"answer":3,"explanation":"D 句的意思：驻守的官员若不是自己的近亲；难免要变为豺狼踞此为非造反。没有用夸张的修辞手法。"},{"id":776,"stem":"下列对《马说》的理解不正确的一项是（ ）","options":["“千里马”指有才华的人，“食马者”指不识人才、埋没人才的统治者。","导致千里马“不以千里称也”的根本原因是“食不饱，力不足，才美不外见”。","“执策而临之，曰：‘天下无马！’”表现了统治者的平庸浅薄、愚妄无知。","本文既有对统治者埋没、摧残人才的抨击，也有作者怀才不遇的愤懑。"],"answer":1,"explanation":"《马说》用托物寓意的写法和层层深入的结构方式。先提出论点：“世有伯乐，然后有千里马。”说明伯乐对千里马 命运的决定性作用，从千里马和伯乐的依赖关系出发，说明千里马被埋没是不可避免的。表达了作者对统治者不能识别人才、摧残人 才、埋没人才的强烈愤慨的发泄。根本原因：食马者不知其能千里而食也。"},{"id":777,"stem":"下列对韩愈的《晚春》赏析有误的一项是（ ）。","options":["诗人用草树、杨花、榆荚这些意象来表现初春景色。","诗人用拟人手法来描写景物，艺术效果形象生动活泼，意趣盎然。","“草树”本属无情物，竟然能“知”能“解”还能“斗”，尤其是彼此竟有“才思”高下之分，想象之奇是诗中罕见的。","此诗表达了诗人惜春的思想感情，同时也提示人们应抓住时机，乘时而进，创造美好的未来。"],"answer":0,"explanation":"《晚春》是唐代文学家韩愈的诗作。此诗写郊游即目所见之暮春景物。诗人运用拟人的修辞手法，描写花草树木得知 春天不久就要归去，想要留住它，于是使出浑身解数，吐艳争芳，形成万紫千红、繁花似锦的景象，就连那乏色少香的杨花、榆荚也 不甘寂寞，来凑热闹，因风起舞，化作雪飞，加入了留春的行列，表达了诗人惜春的思想感情，同时也蕴含应抓住时机，乘时而进， 创造美好未来之意。全诗语言生动，亦庄亦谐，富含哲理。"},{"id":778,"stem":"“月落乌啼霜满天，江枫渔火对愁眠。”这两句词描写的是（）","options":["春夜景色","夏夜景色","秋夜景色","冬夜景色"],"answer":2,"explanation":"出自唐代诗人张继的，《枫桥夜泊》。天宝十四载一月爆发了安史之乱。因为当时江南政局比较安定，所以不少文士 纷纷逃到今江苏、浙江一带避乱，其中也包括张继。一个秋天的夜晚，诗人泊舟苏州城外的枫桥。江南水乡秋夜幽美的景色，吸引着 这位怀着旅愁的客子，使写下了这首意境清远的小诗。 19959276711（vx 同号）"},{"id":779,"stem":"“故人西辞黄鹤楼，烟花三月下扬州”，此诗句中“黄鹤楼”在今（ ）境内。","options":["湖北省","湖南省","江苏省","山东省"],"answer":0,"explanation":"黄鹤楼，位于湖北省武汉市武昌区，地处蛇山之巅，濒临万里长江，为武汉市地标建筑；始建于三国吴黄武二年（223 年），历代屡加重修，现存建筑以清代“同治楼”为原型设计，重建于 1985 年；因唐代诗人崔颢登楼所题《黄鹤楼》一诗而名扬四海。 自古有“天下绝景”之美誉，与晴川阁、古琴台并称为“武汉三大名胜”，与湖南岳阳岳阳楼、江西南昌滕王阁并称为“江南三大名 楼”，是“武汉十大景”之首、“中国古代四大名楼”之一、“中国十大历史文化名楼”之一，世称\"天下江山第一楼\"。"},{"id":780,"stem":"“海内存知己，天涯若比邻”是王勃送别（）时的诗句。","options":["李白","高适","孟浩然","杜少府"],"answer":3,"explanation":"出自唐代王勃的《送杜少府之任蜀州》。 全诗： 城阙辅三秦，风烟望五津。 与君离别意，同是宦游人。 海内存知己，天涯若比邻。 无为在歧路，儿女共沾巾。"},{"id":781,"stem":"“洛阳亲友如相问，一片冰心在玉壶”，“冰心”即（ ）。","options":["冰冷的心","受伤悲伤的心","冷漠的心","冰清玉洁坚持操守之心"],"answer":3,"explanation":"出自唐代王昌龄的《芙蓉楼送辛渐》。 全诗： 寒雨连江夜入吴，平明送客楚山孤。 洛阳亲友如相问，一片冰心在玉壶。 冰心：比喻纯洁的心。"},{"id":782,"stem":"下列对于《山居秋暝》理解不恰当的一项是（）","options":["“晚来秋”紧扣标题，点明时间。","“春芳歇”指春色怡人，适于观赏。","诗歌所绘景色如画，清新自然。","诗歌寄托了诗人高洁的情怀。"],"answer":1,"explanation":"《山居秋暝》是唐代诗人王维的诗作。 全诗： 空山新雨后，天气晚来秋。 明月松间照，清泉石上流。 竹喧归浣女，莲动下渔舟。 随意春芳歇，王孙自可留。 春芳：春天的花草。歇：消散，消失。"},{"id":783,"stem":"下列说法最恰当的一项是（ ）","options":["“空山新雨后，天气晚来秋”，描绘了山居秋日新雨之时的薄暮之景，清新宜人。","“竹喧归浣女，莲动下渔舟”，一句以静写动，以无声衬有声，突出了山间生活的幽静。","诗歌是以“空山”，为背景，写出了清幽静美的意境，具有鲜明的画面感。","诗歌寄托了诗人安贫乐道、洁身自好的高洁的情怀。"],"answer":2,"explanation":"《山居秋暝》是唐代诗人王维的诗作。此诗描绘了秋雨初晴后傍晚时分山村的旖旎风光和山居村民的淳朴风尚，表现 了诗人寄情山水田园并对隐居生活怡然自得的满足心情，以自然美来表现人格美和社会美。全诗将空山雨后的秋凉、松间明月的光照、 石上清泉的声音以及浣女归来竹林中的喧笑声，渔船穿过荷花的动态，和谐完美地融合在一起，给人一种丰富新鲜的感受。它像一幅 清新秀丽的山水画，又像一支恬静优美的抒情乐曲，体现了王维诗中有画的创作特点。"},{"id":784,"stem":"“水光潋滟晴方好”中“潋滟\"的意思是（）。","options":["色彩缤纷","波光闪动","清澈见底","水面平静"],"answer":1,"explanation":"该句出自宋代文学家苏轼的《饮湖上初晴后雨其二》。 全诗： 水光澍滟晴方好，山色空濠雨亦奇。 欲把西湖比西子，淡妆浓抹总相宜。 诗句对西湖美景的全面描写概括品评，尤其是后二句被认为是对西湖的恰当评语。潋滟是水波荡 漾、波光闪动的样子。 19959276711（vx 同号）"},{"id":785,"stem":"假如你的一首五绝诗被杂志社采用，按照正文部分每字 5 元来计算，你应得多少稿费（ ）","options":["50 元","100 元","200 元","400 元"],"answer":1,"explanation":"一首五言绝句共有四句诗，每句 5 个字，一共 20 个字。按照每字 5 元来计算，可以得到 100 元稿费。"},{"id":786,"stem":"下面诗句中的哪一句，选自曾被称为唐绝句“压卷之作”的诗中：（ ）","options":["欲穷千里目，更上一层楼。","羌笛何须怨杨柳，春风不度玉门关。","海内存知己，天涯若比邻。","停车坐爱枫林晚，霜叶红于二月花。"],"answer":1,"explanation":"被称为“唐绝句压卷之作”的诗是王之涣所作的两首凉州词中的一首，它的原文是：黄河远上白云间，一片孤城万仞 山。羌笛何须怨杨柳，春风不度玉门关。 绝句又称为截句、断句、短句、绝诗，它是近体诗的一种形式，各家对其解释并不一致。绝句由四句组成，分为律绝和古绝，其中律 绝有严格的格律要求，常见的绝句有五言绝句和七言绝句，六言绝句较为少见。"},{"id":787,"stem":"孟子说：“不以规矩，不成方圆”，这里“规矩”的意思是：（）","options":["法律条文","美德善行","圆规曲尺","道德准则"],"answer":2,"explanation":"出自《孟子·离娄上》。规：圆规。矩：曲尺。意思是：不使用圆规和曲尺，就不能准确地画出方形和圆形。用来比 喻行事如果没有准则，就什么事情也办不好。"},{"id":788,"stem":"“葡萄美酒夜光杯”的出处是（）","options":["王昌龄的《出塞》二首之一","王昌林的《从军行》其一","王翰的《凉州词二首》其一","李颀的《古从军行》"],"answer":2,"explanation":"该句出自唐代王翰的《凉州词》。 全诗： 葡萄美酒夜光杯，欲饮琵琶马上催。 醉卧沙场君莫笑，古来征战几人回？"},{"id":789,"stem":"“商女不知亡国恨，隔江犹唱后庭花”出自于杜牧的（ ）","options":["咏史诗","伤别诗","纪行诗","写景诗"],"answer":0,"explanation":"该句出自唐代诗人杜牧的《泊秦淮》。此诗是诗人夜泊秦淮时触景感怀之作，前半段写秦淮夜景，后半段抒发感慨， 借陈后主陈叔宝因追求荒淫享乐终至亡国的历史，讽刺那些不从中汲取教训而醉生梦死的晚唐统治者，表现了作者对国家命运的无比 关怀和深切忧虑的情怀。全诗寓情于景，意境悲凉，感情深沉含蓄，语言精当锤炼，艺术构思颇具匠心，写景、抒情、叙事有机结合， 具有强烈的艺术感染力。"},{"id":790,"stem":"《阳关三叠》古琴曲是根据下面哪位诗人的作品谱写的（）。","options":["王维","李白","李贺","李商隐"],"answer":0,"explanation":"《阳关三叠》，是一首古琴曲，又名《阳关曲》、《渭城曲》，是根据唐代诗人王维的七言绝句《送元二使安西》谱 写的一首著名的艺术歌曲。"},{"id":791,"stem":"和《木兰诗》一起被称为“乐府双璧”的是（）。","options":["《十五从军征》","《陌上桑》","《孔雀东南飞》","《秦妇吟》"],"answer":2,"explanation":"南北朝的《木兰诗》与汉朝的《孔雀东南飞》并称“乐府双璧”或“叙事诗双璧”。这两首诗歌都是叙事长诗，以其 深刻的社会思想意义和极高的艺术成就，为历代文人所推崇。"},{"id":792,"stem":"以下（）是对自己父亲的敬称。","options":["令尊","家慈","令堂","家严"],"answer":3,"explanation":"令尊是敬辞，指说话者对方的父亲。也叫“令严”。令堂是对别人母亲的尊称。家慈又称“家母”。是在别人面前对 自己母亲的谦称。与“家严”相对。家严、家父，对人称自己的父亲。"},{"id":793,"stem":"“蛾儿雪柳黄金缕。”中的“蛾儿\"和“雪柳\"是（）。","options":["是两种植物的名称","是两种宋朝服装的名称","是两种头饰的名称","是两种美食的名称"],"answer":2,"explanation":"该句出自宋代词人辛弃疾的《青玉案·元夕》。蛾儿、雪柳、黄金缕，皆古代妇女元宵节时头上佩戴的各种装饰品。 这里指盛装的妇女。 19959276711（vx 同号）"},{"id":794,"stem":"以下属于建安七子的是（ ）。","options":["刘桢","山涛","刘伶","阮籍"],"answer":0,"explanation":"建安七子，是汉建安年间七位文学家的合称，包括孔融、陈琳、王粲、徐干、阮瑀、应玚、刘桢。"},{"id":795,"stem":"在十二生肖中，“申”代表的是（）","options":["马","羊","猴","鸡"],"answer":2,"explanation":"十二生肖是十二地支的形象化代表，即子（鼠）、丑（牛）、寅（虎）、卯（兔）、辰（龙）、巳（蛇）、午（马）、 未（羊）、申（猴）、酉（鸡）、戌（狗）、亥（猪）。"},{"id":796,"stem":"“槐月”是指农历几月？（ ）。","options":["四月","五月","六月","七月"],"answer":0,"explanation":"四月万物枝长叶茂青翠欲滴，槐树也绽开了黄白色的花瓣儿，故称四月为\"槐月\"。"},{"id":797,"stem":"以下诗句中描写的景色所在地与其他三项不一样的是（ ）","options":["天街小雨润如酥，草色遥看近却无。","长安回望绣成堆，山顶千门次第开。","唯有牡丹真国色，花开时节动京城。","春风得意马蹄疾，一日看尽长安花。"],"answer":1,"explanation":"B 选项出自《过华清宫其三》，是杜牧经过骊山华清宫时有感而作。"},{"id":798,"stem":"《山坡羊·潼关怀古》中写“望西都，意踌躇”，“西都\"指的是（）。","options":["南京","洛阳","北京","长安"],"answer":3,"explanation":"西都：指长安（今陕西西安）。这是泛指秦汉以来在长安附近所建的都城。秦、西汉建都长安，东汉建都洛阳，因此 称洛阳为东都，长安为西都。"},{"id":799,"stem":"下列不是古人对妻子称呼的一项是（）。","options":["糟糠","拙荆","外子","细君"],"answer":2,"explanation":"外子是古时候妻子对丈夫的称呼，内子是古代妻子的称呼，也称内助，略带有谦虚称，反映了旧社会中习惯上男人出 外谋生，女人在家搞家务。"},{"id":800,"stem":"久有凌云志，重上（ ）","options":["太行山","大雪山","井岗山","井冈山"],"answer":3,"explanation":"出自近现代毛泽东的《水调歌头·重上井冈山》。 全诗： 久有凌云志，重上井冈山。千里来寻故地，旧貌变新颜。到处莺歌燕舞，更有潺潺流水，高路入云端。过了黄洋界，险处不须看。 风雷动，旌旗奋，是人寰。三十八年过去，弹指一挥间。可上九天揽月，可下五洋捉鳖，谈笑凯歌还。世上无难事，只要肯登攀。"},{"id":801,"stem":"以下不是朱熹作品的是（ ）","options":["《春日》","《回乡偶书》","《偶成》","《观书有感》"],"answer":1,"explanation":"《回乡偶书二首》是唐代诗人贺知章的组诗作品，创作于诗人晚年辞官还乡之时。第一首诗在抒发诗人久客他乡的伤 感的同时，也写出了久别回乡的亲切感；第二首诗抓住了家乡的变与不变的对比，流露出诗人对生活变迁、岁月沧桑、物是人非的感 慨与无奈之情。这两首诗语言朴实无华，感情自然逼真，充满生活情趣。"},{"id":802,"stem":"“无可奈何花落去，似曾相识燕归来”出自（ ）的《浣溪沙》。","options":["苏轼","晏殊","李清照","秦观"],"answer":1,"explanation":"诗句出自宋代晏殊的《浣溪沙·一曲新词酒一杯》。 全诗： 一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？ 无可奈何花落去，似曾相识燕归来。小园香径独徘徊。"},{"id":803,"stem":"“天街小雨润如酥，草色遥看近却无”描绘的（ ）景象。","options":["早春","仲春","季春","暮春"],"answer":0,"explanation":"“天街小雨润如酥，草色遥看近却无”出自唐代韩愈的《早春呈水部张十八员外》，写早春。 19959276711（vx 同号）"},{"id":804,"stem":"在十二生肖中，“酉”代表的是（）","options":["马","羊","猴","鸡"],"answer":3,"explanation":"十二生肖是十二地支的形象化代表，即子（鼠）、丑（牛）、寅（虎）、卯（兔）、辰（龙）、巳（蛇）、午（马）、 未（羊）、申（猴）、酉（鸡）、戌（狗）、亥（猪）。"},{"id":805,"stem":"在中国的传统文化中，岳父可尊称为（）","options":["泰山","华山","嵩山","衡山"],"answer":0,"explanation":"在古代，对岳父的称呼一般都称为丈人、岳父，尊称为泰山。"},{"id":806,"stem":"下列不属于咏物诗的是（ ）","options":["红豆生南国，春来发几枝。","今朝试卷孤蓬看，依旧青山绿树多。","墙角数枝梅，凌寒独自开。","碧玉妆成一树高，万条水下绿丝绦。"],"answer":1,"explanation":"B 诗句出自宋代朱熹的《水口行舟二首》。 此句描写了诗人清晨醒来，赶快卷起篷窗往外看，见到两岸景色原来和昨天一样，依然满目是青山绿树，使读者体会到诗人再次看见 青山无恙，绿树常青后的欣喜。"},{"id":807,"stem":"韩愈是（）的倡导者","options":["新乐府运动","古文运动","新文化运动","诗文革新运动"],"answer":1,"explanation":"韩愈是唐宋古文运动的领袖，唐宋古文运动是指唐代中叶及北宋时期以提倡古文，反对骈文为特点的文体改革运动， 因同时涉及文学的思想内容，所以兼有思想运动和社会运动的性质。"},{"id":808,"stem":"《山坡羊·潼关怀古》是一首（）","options":["唐诗","宋词","元曲","汉乐府"],"answer":2,"explanation":"《山坡羊·潼关怀古》是元曲作家张养浩的散曲作品。此曲抚今追昔，由历代王朝的兴衰引到人民百姓的苦难，一针 见血地点出了封建统治与人民的对立，表现了作者对历史的思索和对人民的同情。"},{"id":809,"stem":"“他年我若为青帝，报与（ ）一处开。”","options":["梨花","桃花","荷花","海棠"],"answer":1,"explanation":"诗句出自唐代黄巢的《题菊花》，诗人想象自己有朝一日做了司春之神，就要让菊花和桃花一起在春天里开放，此句 充满强烈浪漫主义激情的想象，表达了诗人宏伟的抱负。"},{"id":810,"stem":"“三年羁旅客，今日又南冠”出自（）","options":["《钓台》","《江村》","《别云间》","《破阵子》"],"answer":2,"explanation":"出自明代夏完淳的《别云间》。 全诗： 三年羁旅客，今日又南冠。 无限山河泪，谁言天地宽。 已知泉路近，欲别故乡难。 毅魄归来日，灵旗空际看。"},{"id":811,"stem":"下列诗句有错别字的一项是（ ）","options":["沧海月明珠有泪","蓝田日暖玉生烟","旧时王谢堂前燕","飞入平常百姓家"],"answer":3,"explanation":"D 出自唐代刘禹锡的《乌衣巷》。 全诗： 朱雀桥边野草花，乌衣巷口夕阳斜。 旧时王谢堂前燕，飞入寻常百姓家。"},{"id":812,"stem":"以下没有运用典故的是（ ）","options":["《早发白帝城》","《赤壁》","《登金陵凤凰台》","《游烂柯山》"],"answer":0,"explanation":"《赤壁》运用典故火烧赤壁；《登金陵凤凰台》运用典故凤凰台；《游烂柯山》运用典故烂柯山传说。"},{"id":813,"stem":"“一日不见兮，如三月兮”出自（ ）","options":["《诗经》","《楚辞》","《庄子》","《世说新语》 88 19959276711（vx 同号）"],"answer":0,"explanation":"出自先秦诗经·国风·郑风的《子衿》。 赏析：此句直露地表白主人公思念的情绪，后人并将这一情感浓缩为“一日三秋”的成语，体现出恋人之间如胶似漆、难分难舍的恋 情。"},{"id":814,"stem":"农历八月为（）","options":["孟秋","仲秋","季秋","晚秋"],"answer":1,"explanation":"八月在古代被称为桂月、壮月、仲秋、中秋、仲商、桂秋、正秋、商吕、竹春等。其中，桂月是因为农历八月桂花飘 香，故名桂月；壮月是因为八月正当秋季之中，所以又称“仲秋”。"},{"id":815,"stem":"苔花如米小，也学（ ）开。","options":["海棠","牡丹","杏花","百花"],"answer":1,"explanation":"出自清代袁枚的《苔》。 全诗： 白日不到处，青春恰自来。 苔花如米小，也学牡丹开。"},{"id":816,"stem":"杜甫的《赠花卿》从体裁上看是一首（）","options":["赠别诗","讽喻诗","七言绝句","七言律诗"],"answer":2,"explanation":"《赠花卿》是唐代伟大诗人杜甫的作品。全诗四句，每句七个字，属于七言绝句。前两句对乐曲作具体形象的描绘， 是实写；后两句以天上的仙乐相夸，是遐想。因实而虚，虚实相生，将乐曲的美妙赞誉到了极度。此诗有动有静，婉转含蓄，耐人寻 味。"},{"id":817,"stem":"与成语“阳春白雪”“下里巴人”有关的人物是（）","options":["孔子","孟子","屈原","宋玉"],"answer":3,"explanation":"阳春白雪和下里巴人的典故均出自《对楚王问》。宋玉是战国后期楚国的一位文官。楚王听说了宋玉一些坏话，于是 找来宋玉询问他是否有做的不对的地方。宋玉用了一个故事来解释。说有位客人在都城里唱歌，起初唱《下里巴人》，都城里跟着他 唱的有几千人；后来唱《阳阿》、《薤露》，能跟着他唱的只有几百人；等到唱《阳春白雪》的时候，都城里能跟着他唱的不过几十 人。"},{"id":818,"stem":"从《芙蓉楼送辛渐》诗中可知，辛渐要去的地方是（ ）","options":["长安","楚山","岳阳","洛阳"],"answer":3,"explanation":"唐代诗人王昌龄的作品《芙蓉楼送辛渐》。 全诗： 寒雨连江夜入吴，平明送客楚山孤。 洛阳亲友如相问，一片冰心在玉壶。 诗意：冷雨连夜洒遍吴地江天，清晨送走你后，独自面对着楚山离愁无限！到了洛阳，如果洛阳亲友问起我来，就请转告他们，我的 心依然像玉壶里的冰那样晶莹纯洁！"},{"id":819,"stem":"范仲淹的《苏幕遮怀旧》写了（）的景色。","options":["春季","夏季","秋季","冬季"],"answer":2,"explanation":"《苏幕遮·怀旧》是一首描写羁旅乡愁的词。此词借景抒情，情景交融，以绚丽多彩的笔墨描绘了碧云、黄叶、寒波、 翠烟、芳草、斜阳、水天相接的江野辽阔苍茫的景色，勾勒出一幅清旷辽远的秋景图，抒写了夜不能寐、高楼独倚、借酒消愁、怀念 家园的深情。"},{"id":820,"stem":"“五柳先生”是（ ）","options":["柳宗元","陶渊明","王羲之","刘禹锡"],"answer":1,"explanation":"陶渊明（约 365—427 年），名潜，字元亮，别号五柳先生，私谥靖节，世称靖节先生，一说寻阳郡柴桑县（今江西九 江）人，另一说江西宜丰人，东晋末到刘宋初杰出的诗人、辞赋家、散文家。被誉为“隐逸诗人之宗”“田园诗派之鼻祖”。是江西 首位文学巨匠。曾任江州祭酒、建威参军、镇军参军、彭泽县令等职，最末一次出仕为彭泽县令，八十多天便弃职而去，从此归隐田 园。他是中国第一位田园诗人，被称为“古今隐逸诗人之宗”，有《陶渊明集》。"},{"id":821,"stem":"欧阳修《醉翁亭记》中所记的醉翁亭位于今天的（）","options":["江苏扬州","浙江杭州","湖南永州","安徽滁州"],"answer":3,"explanation":"醉翁亭，位于安徽省滁州市西南琅琊山麓，始建于北宋庆历七年（1047 年），由唐宋八大家之一欧阳修命名。醉翁亭 19959276711（vx 同号） 总面积约 1000 平方米，亭园内有九院七亭：醉翁亭、宝宋斋、冯公祠、古梅亭、影香亭、意在亭、怡亭、览余台，风格各异，互不雷 同，人称“醉翁九景”。醉翁亭前有“让泉”。醉翁亭整个布局严谨小巧，曲折幽深，富有诗情画意。亭中新塑欧阳修立像。亭旁有 一巨石，上刻圆底篆体“醉翁亭”三字。醉翁亭一带的建筑，布局紧凑别致，具有江南园林特色。"},{"id":822,"stem":"下列属于“唐宋八大家”之一的是（）","options":["司马光","范仲淹","朱嘉","王安石"],"answer":3,"explanation":"唐宋八大家，又称为“唐宋散文八大家”，是唐代和宋代八位散文家的合称，分别为唐代韩愈、柳宗元和宋代欧阳修、 苏洵、苏轼、苏辙、王安石、曾巩八位。"},{"id":823,"stem":"“风急雨冥冥”中“冥冥”的意思是（）","options":["昏暗看不清","悄无声息","形容雨势很大","形容雨突如其来"],"answer":0,"explanation":"冥冥：烟雨弥漫，看不清楚的样子。"},{"id":824,"stem":"对孟浩然《宿建德江》理解有误的一项是（ ）","options":["首句介绍了诗人观赏景物的落脚点，是在江中的一个雾气弥漫的小洲边","第二句交代诗人欣赏景物时喜悦的心情。","第三句写的是江边的远景","第四句写的是江边的近景"],"answer":1,"explanation":"《宿建德江》是唐代诗人孟浩然的诗作。这是一首刻画秋江暮色的诗，是唐人五绝中的写景名篇。作者把小船停靠在 烟雾迷蒙的江边想起了以往的事情，因而以舟泊暮宿作为自己的抒发感情的归宿，写出了作者羁旅之思。"},{"id":825,"stem":"“明月松间照，清泉石上流”使用了（）的修辞手法","options":["拟人","夸张","对偶","比喻"],"answer":2,"explanation":"出自唐代王维的《山居秋暝》。意思是：明月映照着幽静的松林间，清澈泉水在山石上淙淙淌流。 此句写景如画，随意洒脱，月下青松和石上清泉，彰显出幽清明净的自然美，是诗人所追求的理想境界，亦是诗人高尚情操的象征。"},{"id":826,"stem":"“问客何为来，采山因买斧”中“客”指的是（ ）","options":["孟浩然","柳宗元","高适","冯著"],"answer":3,"explanation":"出自唐代韦应物的《长安遇冯著》。 全诗： 客从东方来，衣上灞陵雨。 问客何为来，采山因买斧。 冥冥花正开，飏飏燕新乳。 昨别今已春，鬓丝生几缕。"},{"id":827,"stem":"以下表达爱国情感的诗句作者不是陆游的是（ ）","options":["一闻战鼓意气生，犹能为国平燕赵","夜阑卧听风吹雨，铁马冰河入梦来","死去元知万事空，但悲不见九州同","寄意寒星荃不察，我以我血荐轩辕"],"answer":3,"explanation":"D 出自近现代鲁迅的《自题小像》。 全诗： 灵台无计逃神矢，风雨如磐暗故园。 寄意寒星荃不察，我以我血荐轩辕。"},{"id":828,"stem":"“刑天舞干戚”的下一句是（ ）","options":["将以填沧海","化去不复悔","猛志固常在","为恶不可履"],"answer":2,"explanation":"出自魏晋陶渊明的《读山海经十三首·其十》。 全诗： 精卫衔微木，将以填沧海。 刑天舞干戚，猛志固常在。 同物既无虑，化去不复悔。 徒设在昔心，良辰讵可待。（辰一作：晨）"},{"id":829,"stem":"以下（ ）没有运用夸张手法","options":["危楼高百尺，手可摘星辰","飞流直下三千尺，疑是银河落九天","白日依山尽，黄河入海流","举头红日尽，回首白云低"],"answer":2,"explanation":"90 19959276711（vx 同号） 【知识小链接】C 出自唐代诗人王之涣的《登鹳雀楼》。 全诗： 白日依山尽，黄河入海流。 欲穷千里目，更上一层楼。"},{"id":830,"stem":"以下诗句不是描写秋景的是（ ）","options":["竹喧归浣女，莲动下渔舟","萧萧梧叶送寒声，江上秋风动客情","江水漾西风，江花脱晚红","海榴花发应相笑，无酒渊明亦独醒"],"answer":3,"explanation":"D 出自元代贝琼的《己酉端午》。 全诗： 风雨端阳生晦冥，汨罗无处吊英灵。 海榴花发应相笑，无酒渊明亦独醒。"},{"id":831,"stem":"下列关于岳阳楼的诗文，作者、朝代完全正确的一项是（ ）","options":["《岳阳楼》杨基【唐代】","《登岳阳楼》范仲淹【宋代】","《岳阳楼记》杜甫【唐代】","《雨中登岳阳楼望君山》黄庭坚【宋代】"],"answer":3,"explanation":"黄庭坚的《雨中登岳阳楼望君山》。 全诗： 投荒万死鬓毛斑，生入瞿塘滟滪关。 未到江南先一笑，岳阳楼上对君山。"},{"id":832,"stem":"请为古诗排序（）①百般红紫斗芳菲②惟解漫天作雪飞③杨花榆荚无才思④草树知春不久归","options":["②④③①","①②④③","③④①②","④①③②"],"answer":3,"explanation":"诗句出自韩愈《晚春二首·其一》。 全诗： 草树知春不久归，百般红紫斗芳菲。 杨花榆荚无才思，惟解漫天作雪飞。"},{"id":833,"stem":"“白日不到处，青春恰自来”中的“青春”指的是（ ）","options":["指一年中的春天","指阳光下的青青草地","指富有生机的绿意","指青年人"],"answer":2,"explanation":"该句出自清代诗人袁枚的《苔》。意思是春天和煦的阳光照不到的背阴处，生命照常在萌动，苔藓仍旧长出绿意来。"},{"id":834,"stem":"“羲和敲日玻璃声”中的“羲和”是指古代传说中的（）","options":["月神","风神","日神","雨神"],"answer":2,"explanation":"该句出自唐代诗人李贺的《秦王饮酒》。羲和：传说中为太阳驾车的神。《淮南子·天文训》：“爰止羲和，爰息六 螭。”注释说：“日乘车，驾以六龙，羲和御之。”敲日：说他敲打着太阳，命令太阳快走。因太阳明亮，所以诗人想象中的敲日之 声就如敲玻璃的声音。"},{"id":835,"stem":"下列不是出自边塞诗的是（ ）","options":["但使龙城飞将在，不教胡马度阴山","忽如一夜春风来，千树万树梨花开","秦时明月汉时关，万里长征人未还","寒夜连江夜入吴，平明送客楚山孤"],"answer":3,"explanation":"D 出自《芙蓉楼送辛渐》，是唐代诗人王昌龄创作的一首送别诗，是作者被贬为江宁县丞时所写。此诗构思新颖，淡 写朋友的离情别绪，重写自己的高风亮节。"},{"id":836,"stem":"“鳏寡孤独”中“孤”指的是（）","options":["无妻","无夫","无父母","无子女"],"answer":2,"explanation":"“鳏寡孤独”泛指没有劳动力而独居无依靠的人。鳏：年老无妻或丧妻的男子。寡：年老无夫或丧夫的女子。孤：年 幼丧父的孩子。独：年老无子女的人。"},{"id":837,"stem":"“孤帆一片日边来”的上联是（ ）","options":["天街小雨润如酥","最是一年春好处","两岸青山相对出",".春城无处不飞花"],"answer":2,"explanation":"出自唐代李白的《望天门山》。 全诗： 19959276711（vx 同号） 天门中断楚江开，碧水东流至此回。 两岸青山相对出，孤帆一片日边来。"},{"id":838,"stem":"下列诗句不是描写夏景的是（）","options":["水晶帘动微风起，满架蔷薇一院香","接天莲叶无穷碧，映日荷花别样红","晴空一鹤排云上，便引诗情到碧霄","黄梅时节家家雨，青草池塘处处蛙"],"answer":2,"explanation":"出自唐代刘禹锡的《秋词二首·其一》。诗人抓住秋天“一鹤凌云”这一别致的景观，展现出秋高气爽，万里晴空， 白云漂浮的开阔景象，给读者一种励志冶情的美的感受。"},{"id":839,"stem":"从《黄鹤楼送孟浩然之广陵》的题目中可知，孟浩然要去的地方是（ ）","options":["杭州","扬州","苏州","常州"],"answer":1,"explanation":"扬州古称广陵、江都、维扬，建城史可上溯至公元前 486 年，中国大运河扬州段入选世界遗产名录；扬州列入中国海 上丝绸之路申报世界遗产城市之一。"},{"id":840,"stem":"下列不是围棋别称的是（ ）","options":["观阵","手谈","坐隐","烂柯"],"answer":0,"explanation":"观阵，意思是不参与而从旁观看战斗的场面。"},{"id":841,"stem":"“疏影横斜水清浅，暗香浮动月黄昏”描写的是（ ）","options":["水仙","梅花","桂花","芍药"],"answer":1,"explanation":"出自宋代林逋的《山园小梅》：“众芳摇落独暄妍，占尽风情向小园。疏影横斜水清浅，暗香浮动月黄昏。”"},{"id":842,"stem":"竹外（）三两枝，春江水暖鸭先知.","options":["杏花","梨花","桃花","红花"],"answer":2,"explanation":"诗句出自宋代苏轼的《惠崇春江晚景》，意思是竹林外两三枝桃花初放，鸭子在水中游戏，它们最先察觉了初春江水 的回暖。"},{"id":843,"stem":"古代关于君子“修身、齐家、治国、平天下”的说法出自于（）","options":["《尚书》","《大学》","《中庸》","《论语》"],"answer":1,"explanation":"“修身、齐家、治国、平天下”出自《礼记·大学》。格物、致知、正心、诚意、修身、齐家、治国、平天下，是儒 学经典思想——八项条目的主要内容，更是儒学“内圣外王”思想的体现。"},{"id":844,"stem":"“座中泣下谁最多？江州司马青衫湿”中的江州司马是（ ）","options":["贺知章","李白","白居易","黄庭坚"],"answer":2,"explanation":"司马，古代官名，唐代诗人白居易曾贬官为江州司马。司马的衣衫为泪水所湿。形容极度悲伤。白居易《琵琶行》诗： “座中泣下谁最多，江州司马青衫湿。”因此“江州司马”指的是白居易。"},{"id":845,"stem":"《归园田居》中写诗人早出晚归，欣慰自足的隐居生活的句子是（ ）","options":["种豆南山下，草盛豆苗稀。","晨兴理荒秽，带月荷锄归。","道狭草木长，夕露沾我衣。","衣沾不足惜，但使愿无违。"],"answer":1,"explanation":"B 句意思是：清晨早起去田地里铲除杂草，夜幕降临披着月光才回家。 此句描写了诗人者躬耕劳动的生活，表现了诗人田园隐居的辛苦与乐趣，透露出诗人劳作后心满意足的感受，恬静中自有丰富的情味。"},{"id":846,"stem":"寒露之前的节气是（ ）","options":["立秋","秋分","霜降","白露"],"answer":1,"explanation":"二十四节气：立春、雨水、惊蛰、春分、清明、谷雨、立夏、小满、芒种、夏至、小暑、大暑、立秋、处暑、白露、 秋分、寒露、霜降、立冬、小雪、大雪、冬至、小寒、大寒。处暑之前的节气是立秋。"},{"id":847,"stem":"下列不属于元曲四大家的是（ ）","options":["关汉卿","王实甫","马致远","白朴"],"answer":1,"explanation":"元曲四大家指关汉卿、白朴、郑光祖、马致远四位元代杂剧作家。四者代表了元代不同时期不同流派杂剧创作的成就， 因此被称为“元曲四大家”。 19959276711（vx 同号）"},{"id":848,"stem":"成语“名落孙山”中“孙山”指的是（）","options":["一个地名","一座山","一种官职","一个人名"],"answer":3,"explanation":"宋·范公偁《过庭录》：“吴人孙山，滑稽才子也。赴举他郡，乡人托以子偕往。乡人子失意，山缀榜末，先归。乡 人问其子得失，山曰：‘解名尽处是孙山，贤郎更在孙山外。’” 解释：吴地（今苏州一带）有一人叫孙山，是个能言善辩的才子。孙山去别的城参加科举，同乡人托孙山带他儿子一同前往。同乡人 的儿子未被录取，孙山的名字虽然被列在榜文的倒数第一名，但仍然是榜上有名，孙山先回到故乡。同乡便来问他儿子有没有考取， 孙山说：“中举人的名单上最后一名是孙山，您的儿子排在我后面呢。”"},{"id":849,"stem":"下列对李清照《如梦令》理解正确的一项是（ ）","options":["“浓睡不消残酒”表明作者一夜未眠，但仍然酒意未消。","“知否？知否？\"是“卷帘人”在追问。","这首词押韵的字是“人”和“旧”。","“绿肥红瘦”中，“绿”“红”分别代替叶和花，“肥”“瘦”分别形容叶的茂盛和花的凋零。"],"answer":3,"explanation":"本篇是李清照早期的词作之一。词中充分体现出作者对大自然、对春天的热爱。这是一首小令，内容也很简单。它写 的是春夜里大自然经历了一场风吹雨打，词人预感到庭园中的花木必然是绿叶繁茂，花事凋零了。因此，翌日清晨她急切地向“卷帘 人”询问室外的变化，粗心的“卷帘人”却答之以“海棠依旧”。对此，词人禁不住连用两个“知否”与一个“应是”来纠正其观察 的粗疏与回答的错误。“绿肥红瘦”一句，形象地反映出作者对春天将逝的惋惜之情。 全诗： 昨夜雨疏风骤，浓睡不消残酒。 试问卷帘人，却道“海棠依旧”。 “知否？知否？应是绿肥红瘦。”"},{"id":850,"stem":"下列不是出自杜牧作品的诗句是（ ）","options":["南朝四百八十寺，多少楼台烟雨中。","商女不知亡国恨，隔江犹唱后庭花。","落红不是无情物，化作春泥更护花。","一骑红尘妃子笑，无人知是荔枝来。"],"answer":2,"explanation":"C 是《已亥杂诗》-龚自珍；A《江南春-千里莺啼绿映红》-杜牧；B《泊秦淮》-杜牧；D《过华清宫其三》-杜牧。"},{"id":851,"stem":"对“孤舟蓑笠翁”中的“蓑笠翁”理解正确的一项是（ ）","options":["披蓑衣的渔翁","戴斗笠的渔翁","渔翁","披蓑衣，戴斗笠的渔翁"],"answer":3,"explanation":"诗句出自唐代诗人柳宗元的《江雪》。蓑笠（suōlì）指的是蓑衣和斗笠；这句话的意思是披蓑衣、戴斗笠的渔翁。"},{"id":852,"stem":"“萧萧梧叶送寒声，江上秋风动客情\"出自（）的诗作。","options":["李贺","李商隐","叶绍翁","辛弃疾"],"answer":2,"explanation":"诗句出自宋代叶绍翁的《夜书所见》。 全诗： 萧萧梧叶送寒声，江上秋风动客情。 知有儿童挑促织，夜深篱落一灯明。"},{"id":853,"stem":"诗句“乱入池中看不见”的下一句是（ ）","options":["芙蓉向脸两边开","芙蓉像脸两边开","荷叶罗裙一色裁","闻歌始觉有人来"],"answer":3,"explanation":"诗句出自唐代王昌龄的《采莲曲二首》。 全诗： 吴姬越艳楚王妃，争弄莲舟水湿衣。 来时浦口花迎入，采罢江头月送归。 荷叶罗裙一色裁，芙蓉向脸两边开。 乱入池中看不见，闻歌始觉有人来。"},{"id":854,"stem":"“我寄愁心与明月，随风直到夜郎西”中“我”是（ ）","options":["王昌龄","孟浩然","李白","骆宾王"],"answer":2,"explanation":"诗句出自唐代李白的《闻王昌龄左迁龙标遥有此寄》。 全诗： 杨花落尽子规啼，闻道龙标过五溪。 我寄愁心与明月，随君直到夜郎西。 19959276711（vx 同号）"},{"id":855,"stem":"下列诗句的作者不是杜牧的一项是（ ）","options":["商女不知亡国恨，隔江犹唱后庭花。","长安回望绣成堆山顶千门次第开。","南朝四百八十寺，多少楼台烟雨中。","今朝试卷孤蓬看，依旧青山绿树多。"],"answer":3,"explanation":"D 是宋代朱熹《水口行舟二首》。 全诗： 昨夜扁舟雨一蓑，满江风浪夜如何？ 今朝试卷孤篷看，依旧青山绿树多。 郁郁层峦夹岸青，春山绿水去无声。 烟波一棹知何许？鶗鴃两山相对鸣。"},{"id":856,"stem":"“好读书，不求甚解；每有会意，便欣然忘食”是（）","options":["青莲居士","五柳先生","随园老人","六一居士"],"answer":1,"explanation":"诗句出自魏晋陶渊明的《五柳先生传》。此句写了诗人的禀性志趣，读书的目的，是一种求知的满足，精神的享受， 体现出诗人安贫乐道的精神。"},{"id":857,"stem":"下列不是词牌名的是（ ）","options":["破阵子","从军行","浣溪沙","长相思"],"answer":1,"explanation":"从军行是乐府曲名。《从军行》，内容多选并来自边塞战士们的生活情况和战士们的生活，以此为题古代涌现出了许 多边塞诗人。全诗意境苍凉，慷慨激昂，充分显示出盛唐气象。"},{"id":858,"stem":"轻微以下一首诗排序：（ ）①霓裳一曲千峰上②舞破中原始下来③新丰绿树起黄埃④数骑渔阳探使回","options":["②④③①","①②④③","③④①②","④①③②"],"answer":2,"explanation":"诗句出自唐代杜牧的《过华清宫绝句三首》（其二）。 全诗： 新丰绿树起黄埃，数骑渔阳探使回。 霓裳一曲千峰上，舞破中原始下来。"},{"id":859,"stem":"在我国古代诗歌史上，并称“小李杜”的是（）","options":["李白、杜甫","李峤、杜审言","李商隐、杜牧","李贺、杜牧"],"answer":2,"explanation":"李商隐和杜牧的合称，世称“小李杜”，“大李杜”是李白和杜甫的合称。"},{"id":860,"stem":"“种豆南山下，草盛豆苗稀”出自的（）诗作。","options":["宋玉","陶渊明","王维","杨万里"],"answer":1,"explanation":"诗句出自魏晋陶渊明的《归园田居·其三》。 全诗： 种豆南山下，草盛豆苗稀。 晨兴理荒秽，带月荷锄归。 道狭草木长，夕露沾我衣。 衣沾不足惜，但使愿无违。"},{"id":861,"stem":"“绿阴不减来时路”的下一句是（ ）","options":["上有黄鹂深树鸣","深巷明朝卖杏花","添得黄鹂四五声","不及林间自在啼"],"answer":2,"explanation":"诗句出自南宋诗人曾几创作的一首七言绝句《三衢道中》。 全诗： 梅子黄时日日晴，小溪泛尽却山行。 绿阴不减来时路，添得黄鹂四五声。"},{"id":862,"stem":"“旦辞爷娘去”中“旦”的意思是（）","options":["一旦","元旦","早晨","同“但”"],"answer":2,"explanation":"诗句出自南北朝《木兰诗》。意思是早晨离开父母。"},{"id":863,"stem":"“此情可待成追忆，只是当时已惘然”的作者是（ ）","options":["杜牧","李商隐","李贺","杜甫"],"answer":1,"explanation":"94 19959276711（vx 同号） 【知识小链接】诗句出自晚唐李商隐的《锦瑟》。 全诗： 锦瑟无端五十弦，一弦一柱思华年。 庄生晓梦迷蝴蝶，望帝春心托杜鹃。 沧海月明珠有泪，蓝田日暖玉生烟。 此情可待成追忆？只是当时已惘然。"},{"id":864,"stem":"以下四首作品，朝代、作者全部对应正确的是（）","options":["《苏幕遮·怀旧》【宋】辛弃疾","《南乡子·登京口北固亭有怀》【宋】苏轼","《卜算子·咏梅》【宋】陆游","《山坡羊·潼关怀古》【清】张养浩"],"answer":2,"explanation":"《卜算子·咏梅》是南宋词人陆游创作的一首词。这是一首咏梅词，上片集中写了梅花的困难处境，下片写梅花的灵 魂及生死观。词人以物喻人，托物言志，以清新的情调写出了傲然不屈的梅花，暗喻了自己虽终生坎坷却坚贞不屈，达到了物我融一 的境界，笔致细腻，意味深隽，是咏梅词中的绝唱。"},{"id":865,"stem":"中国传统文化中“杏林”指（ ）","options":["教育界","医学界","文化界","书画界"],"answer":1,"explanation":"杏林是中医学界的代称。其中由来大概是这样的。三国时期，吴国有一位医生，叫董奉，家住庐山。他常年给人看病， 但是从来不接受别人给的报酬。凡是得了重病被他医好的人，董奉就让他们种植五棵杏树；病情不重的人，被他治好后，就让病人种 一棵杏树。这样十几年后，杏树就有十多万棵了。"},{"id":866,"stem":"“苍茫云海间”的前一句是（ ）","options":["由来征战地","长风几万里","明月出天山","高楼当此夜"],"answer":2,"explanation":"诗句出自唐代李白的《关山月》。 全诗： 明月出天山，苍茫云海间。 长风几万里，吹度玉门关。 汉下白登道，胡窥青海湾。 由来征战地，不见有人还。 戍客望边邑，思归多苦颜。 高楼当此夜，叹息未应闲。"},{"id":867,"stem":"下列写景诗句，描写夏天的一项是（ ）","options":["童孙未解供耕织，也傍桑阴学种瓜。","晴空一鹤排云上，便引诗情到碧霄。","忽如一夜春风来，千树万树梨花开。","乱花渐欲迷人眼，浅草才能没马蹄。"],"answer":0,"explanation":"A 诗句出自宋代范成大的《四时田园杂兴·其三十一》。此句用清新的笔调，描写了农村夏日生活中的一个场景，展 现出农家勤劳朴实的生活，恬淡中自有一番乐趣。"},{"id":868,"stem":"农历三月三有“曲水流觞”习俗的传统节日是（ ）","options":["端午节","重阳节","清明节","上巳节"],"answer":3,"explanation":"上巳（sì）节，俗称三月三，是汉民族传统节日，该节日在汉代以前定为三月上旬的巳日，后来固定在夏历三月初三。 上巳节是古代举行“祓除畔浴”活动中最重要的节日，人们结伴去水边沐浴，称为“祓禊”，此后又增加了祭祀宴饮、曲水流觞、郊 外游春等内容。"},{"id":869,"stem":"从孙仲谋这个名字可知，他在兄弟排行在第（）个。","options":["一","二","三","四"],"answer":1,"explanation":"中国古代兄弟之间有伯、仲、叔、季之分，伯是老大，仲是第二，叔是第三，季是最小的。他排在第二个。"},{"id":870,"stem":"古诗中常常提到的塞外，指的是（）","options":["长城以北的地方","长城以南的地方","玉门关以西的地方","山海关以东的地方"],"answer":0,"explanation":"塞外指长城以外的地方，也称塞北。这个词指我国长城以北国界以内的地区，包括内蒙古、甘肃、宁夏、河北等省、 自治区的北部。南方的暖湿季风吹不到，西伯利亚的干冷空气首当其冲，气候都比较干燥寒冷。 19959276711（vx 同号）"},{"id":871,"stem":"“他年我若为青帝，报与桃花一处开”中“我”指的是（）","options":["朱元璋","刘邦","黄巢","宋江"],"answer":2,"explanation":"诗句出自唐代黄巢的《题菊花》，诗人想象自己有朝一日做了司春之神，就要让菊花和桃花一起在春天里开放，此句 充满强烈浪漫主义激情的想象，表达了诗人宏伟的抱负。"},{"id":872,"stem":"“梅须逊雪三分白，雪却输梅一段香”运用了（ ）的修辞手法。","options":["比喻","对偶","夸张","排比"],"answer":1,"explanation":"诗句宋代卢钺的《雪梅》，意思是梅花也许比不上雪花的晶莹洁白，雪花却输给梅花的清香芬芳。对比是把具有明显 差异、矛盾和对立的双方安排在一起，进行对照比较的表现手法。句中“梅”与“雪”对比，突出了梅香、雪白。"},{"id":873,"stem":"“春色醉巴陵，阑干落洞庭”中的“巴陵”是现在的（ ）","options":["扬州","安阳","衡阳","岳阳"],"answer":3,"explanation":"巴陵本指古岳州，即今湖南岳阳市，"},{"id":874,"stem":"在《芙蓉楼送辛渐》一诗中，传达出诗人冰清玉洁、坚持操守的诗句是（）","options":["寒雨连江夜入吴","平明送客楚山孤","洛阳亲友如相问","一片冰心在玉壶"],"answer":3,"explanation":"《芙蓉楼送辛渐》是唐代诗人王昌龄创作的一首送别诗，是作者被贬为江宁县丞时所写。此诗构思新颖，淡写朋友的 离情别绪，重写自己的高风亮节。首两句写景，用苍茫的江雨和孤峙的楚山，烘托送别时的凄寒孤寂之情，也展现了诗人开朗的胸怀 和坚强的性格；后两句诗人以晶莹透明的冰心玉壶自喻，与前面屹立在江天之中的孤山之间形成一种有意无意的照应，令人自然联想 到诗人孤介傲岸的形象和光明磊落、表里澄澈的品格。全诗即景生情，寓情于景，含蓄蕴藉，韵味无穷。"},{"id":875,"stem":"下列复姓，不是中国古代官职名称的是（）","options":["夏侯","司马","司徒","司空"],"answer":0,"explanation":"司马是掌管军事之职。司徒是主管征发徒役，兼管田地耕作与其他劳役。司空是中国古代官名。少皞部落以鸣鸠氏为 司空，《尚书·舜典》记舜在部落联盟议事会中设九官，其一为司空，由禹担任，“平水木”，也就是主管水利。"},{"id":876,"stem":"“移舟泊烟渚，日暮客愁新”中的“客”是（）","options":["一位没留下名字的客人","王维","孟浩然","刘禹锡"],"answer":2,"explanation":"出自唐代孟浩然的《宿建德江》，这是一首刻画秋江暮色的诗。先写羁旅夜泊，再叙日暮添愁；然后写到宇宙广袤宁 静，明月伴人更亲。一隐一现，虚实相间，两相映衬，互为补充，构成一个特殊的意境。诗中虽不见“愁”字，然野旷江清，“秋色” 历历在目。全诗淡而有味，含而不露；自然流出，风韵天成，颇有特色。"},{"id":877,"stem":"“白也诗无敌，飘然思不群”是（）写的赞誉和怀念李白的诗句。","options":["杜甫","孟浩然","李贺","王昌龄"],"answer":0,"explanation":"出自唐代杜甫的《春日忆李白》：“白也诗无敌，飘然思不群。清新庾开府，俊逸鲍参军。渭北春天树，江东日暮云。 何时一樽酒，重与细论文。”这一句是说：李白的诗作无人能敌，他那高超的才思也远远的超出一般人。"},{"id":878,"stem":"下列诗句中，与“萎蒿满地芦芽短，正是河豚欲上时”描述的季节相同的是（ ）","options":["接天莲叶无穷碧，映日荷花别样红。","天街小雨润如酥，草色遥看近却无。","梅子黄时日日晴，小溪泛尽却山行。","遥知兄弟登高处，遍插茱萸少一人。"],"answer":1,"explanation":"“萎蒿满地芦芽短，正是河豚欲上时”“天街小雨润如酥，草色遥看近却无”描述的都是春天的景象。"},{"id":879,"stem":"“风雨端阳生晦冥，汨罗无处吊英灵”中“英灵”指（ ）","options":["诸葛亮","伍子胥","屈原","介子推"],"answer":2,"explanation":"出自元代贝琼的《已酉端午》。全诗：风雨端阳生晦冥，汨罗无处吊英灵。 海榴花发应相笑，无酒渊明亦独醒。此诗作于公元 1369 年（明太祖洪武二年）夏历五月初。诗人在端午节遇到风雨，天气昏暗，看到 汨罗江上没有人祭奠屈原，心中感慨作下此诗。"},{"id":880,"stem":"下列关于《山居秋暝》的说法，正确的一项是（ ）","options":["作者是唐代诗人韦应物","描绘了春雨过后傍晚时分的场景","表现了诗人寄情山水田园并对隐居生活怡然自得的满足心情 96 19959276711（vx 同号）","从题材看这首诗是咏怀诗"],"answer":2,"explanation":"唐代诗人王维的《山居秋暝》，全诗：空山新雨后，天气晚来秋。明月松间照，清泉石上流。竹喧归浣女，莲动下渔 舟。随意春芳歇，王孙自可留。 这首诗写出了清新、幽静、恬淡、优美的山中秋季的黄昏美景。王维所居辋川别墅在终南山下，故称山居。"},{"id":881,"stem":"下列与其他三项不同类的一项是（）","options":["陆游","文天祥","龚自珍","辛弃疾"],"answer":2,"explanation":"陆游、文天祥、辛弃疾都是南宋诗人。"},{"id":882,"stem":"“嫦娥应悔偷灵药，碧海青天夜夜心”出自（）诗作。","options":["李白","李煜","李商隐","李贺"],"answer":2,"explanation":"该句出自唐代诗人李商隐所著诗词《嫦娥》。"},{"id":883,"stem":"下列不属于古代计量单位的是（）","options":["仞","石","寻","串"],"answer":3,"explanation":"孟子、串在古代不属于正式的计量单位。"},{"id":884,"stem":"白居易诗句“最爱湖东行不足，绿杨阴里白沙堤”中的“湖”指的是（）","options":["太湖","洞庭湖","东湖","西湖"],"answer":3,"explanation":"唐代诗人白居易任杭州刺史时有诗云：“最爱湖东行不足，绿杨荫里白沙堤。”湖指的是西湖。"},{"id":885,"stem":"以下没有用典故的是（ ）","options":["《舟过安仁》","《赤壁》","《登金陵凤凰台》","《游烂柯山》"],"answer":0,"explanation":"《舟过安仁》是南宋诗人杨万里创作的一首七言绝句。这首诗浅白如话，充满情趣，展示了无忧无虑的两个小渔童的 充满童稚的行为，其行为中透出了只有儿童才有的奇思妙想与聪明。体现了两小童的可爱与思维的敏捷。没有用到典故。"},{"id":886,"stem":"下列是道家代表人物的是（ ）","options":["孟子","列子","荀子","墨子"],"answer":1,"explanation":"孟子、荀子是儒家代表人物，墨子是墨家代表人物。"},{"id":887,"stem":"“日啖荔枝三百颗，不辞长作岭南人”是苏轼被贬（ ）的作品。","options":["杭州","黄州","惠州","儋州"],"answer":2,"explanation":"出自宋代苏轼的《惠州一绝/食荔枝》，全诗：罗浮山下四时春，卢橘杨梅次第新。日啖荔枝三百颗，不辞长作岭南人。 绍圣三年（1096）作于惠州，此题下有两首，这里选第二首。岭南两广一带在宋时为蛮荒之地，罪臣多被流放至此。迁客逐臣到这里， 往往颇多哀怨嗟叹之辞，而东坡则不然，他在这首七绝中表现出他素有的乐观旷达、随遇而安的精神风貌，同时还表达了他对岭南风 物的热爱之情。"},{"id":888,"stem":"自去自来梁上（），相亲相近水中鸥。","options":["鹊","燕","雀","雁"],"answer":1,"explanation":"出自唐代杜甫的《江村》，该句为“自去自来梁上燕，相亲相近水中鸥。”"},{"id":889,"stem":"朱德诗句“北华首付来群雄，猛士如云唱大风”中“大风”指（ ）的《大风歌》。","options":["曹操","刘邦","项羽","李白"],"answer":1,"explanation":"《大风歌》的作者是刘邦，全诗：“大风起兮云飞扬，威加海内兮归故乡，安得猛士兮守四方。”刘邦当上皇帝以后， 在前 195 年，他出兵东征，平定淮南王黥布（也叫英布）的叛乱。回归途中，经过沛县，他邀集家乡旧友和父老兄弟，一起饮酒，在 宴席上他唱起这首大风歌，抒发了他的政治抱负，也表达了他对国事忧虑的心情。"},{"id":890,"stem":"“杨花榆荚无才思，惟解漫天作雪飞”描绘的是（）景象","options":["早春","初夏","晚春","晚冬"],"answer":2,"explanation":"“杨花榆荚无才思，惟解漫天作雪飞”出自唐代韩愈的《晚春二首·其一》。原文：草树知春不久归，百般红紫斗芳 菲。杨花榆荚无才思，惟解漫天作雪飞。 19959276711（vx 同号）"},{"id":891,"stem":"毛泽东“天若有情天亦老，人间正道是沧桑”借用了唐代诗人（）的诗句。","options":["李贺","李商隐","杜牧","韩愈"],"answer":0,"explanation":"天若有情天亦老，是一个诗词名句，出自唐朝李贺的诗《金铜仙人辞汉歌》。"},{"id":892,"stem":"下列典故和函谷关有关的是（ ）","options":["一夫当关，万夫莫开","紫气东来","过五关，斩六将","昭君出塞"],"answer":1,"explanation":"公元前 491 年，函谷关令尹喜，清早从家里出门，站在一个土台上看见东方紫气腾腾，霞光万道，观天象奇景，欣喜 若狂，大呼：“紫气东来，必有异人通过。”忙令关吏清扫街道，恭候异人，果然，见一老翁银发飘逸，气宇轩昂，并且倒骑青牛向 关门走来。尹喜忙上前迎接，通报姓名后，诚邀老子在此小住。老子欣然从命，在此著写了彪炳千秋的洋洋五千言《道德经》。以后， 函谷关一带的门楣或春联都刻写“紫气东来”，流传至今，表示吉祥。"},{"id":893,"stem":"被苏轼评价“诗中有画，画中有诗”的是（）","options":["诗仙","诗圣","诗佛","诗鬼"],"answer":2,"explanation":"该句出自宋·苏轼《东坡题跋·书摩诘〈蓝田烟雨图〉》：“味摩诘之诗，诗中有画；观摩诘之画，画中有诗。”摩 诘指的是诗佛王维。"},{"id":894,"stem":"下列没有错误的一句是（ ）","options":["莫愁前路无知己，天下何人不识君","尔来四万八千岁，不与秦塞通人烟","劝君更尽一杯酒，夕出阳关无故人","此曲只应天上有，尘世能得几回闻"],"answer":1,"explanation":"A 莫愁前路无知己，天下谁人不识君。C 劝君更尽一杯酒，西出阳关无故人。D 此曲只应天上有，人间能几回闻。"},{"id":895,"stem":"“常记溪亭日暮，沉醉不知归路”出自李清照的（ ）","options":["声声慢","如梦令","水调歌头","清平乐"],"answer":1,"explanation":"该句出自《如梦令·常记溪亭日暮》。这是一首忆昔词。开头两句，写沉醉兴奋之情；接着写“兴尽”归家，又“误 入”荷塘深处，别有天地，更令人流连；最后一句，纯洁天真，言尽而意不尽。全词寥寥数语，似乎是随意而出，却又惜墨如金，句 句含有深意，语言不事雕琢，富有一种自然之美。它以女词人特有的方式表达了她早期生活的情趣和心境，洋溢着生活的气息和欢快 的旋律，境界优美怡人，以尺幅之短给人以足够的美的享受。"},{"id":896,"stem":"下列关于辛弃疾的说法，不正确的一项是（ ）","options":["辛弃疾号稼轩，宋代豪放派词人。","辛弃疾字幼安，与李清照并称济南二安。","辛弃疾的创作风格被称为稼轩体。","《念奴娇·赤壁怀古》是辛弃疾的代表作之一。"],"answer":3,"explanation":"《念奴娇·赤壁怀古》作者是苏轼。"},{"id":897,"stem":"下列（ ）的作者是“初唐四杰”之一。","options":["秦时明汉时关，万里长征人未还","窗含西岭千秋雪，门泊东吴万里船","飞流直下三千尺，疑是银河落九天","海内存知己，天涯若比邻"],"answer":3,"explanation":"D 出自唐代王勃的《送杜少府之任蜀州》：“城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天 涯若比邻。无为在歧路，儿女共沾巾。”此诗是送别诗的名作，诗意在慰勉友人勿在离别之时悲哀。"},{"id":898,"stem":"一道残阳铺水中的下句是（ ）","options":["半入江风半入云","露似珍珠月似弓","半江瑟瑟半江红","无边光景一时新"],"answer":2,"explanation":"本句出自唐代诗人白居易作品《暮江吟》 一道残阳铺水中，半江瑟瑟半江红。 可怜九月初三夜，露似真珠月似弓。 诗意：残阳倒映在江面上，霞光洒下，波光粼粼；江水一半呈现出深深的碧色，一半呈现出红色。最可爱的是那九月初三之夜，露珠 似颗颗珍珠，朗朗新月形如弯弓。"},{"id":899,"stem":"谁家玉笛暗飞声，散入春风满（）","options":["京城","锦城","长城","洛城"],"answer":3,"explanation":"全诗：“谁家玉笛暗飞声，散入春风满洛城。此夜曲中闻折柳，何人不起故园情。”这首诗是 735 年（开元二十三年） 李白游洛阳时所作。描写在夜深人静之时，听到笛声而引起思乡之情。 19959276711（vx 同号）"},{"id":900,"stem":"“烂柯”是下列（）的别称。","options":["象棋","围棋","木匠","古筝"],"answer":1,"explanation":"烂柯是汉语词语，意思是指岁月流逝，人事变迁。出自围棋著名典故，语出南朝梁任昉《述异记》。从那时起，很多 与围棋有关的故事都以烂柯指代，如《烂柯谱》等。"},{"id":901,"stem":"下列出自《孟子》的是（）","options":["水能载舟，亦能覆舟","先天下之忧而忧，后天下之乐而乐","生于忧患而死于安乐","苟全性命于乱世，不求闻达于诸侯"],"answer":2,"explanation":"《生于忧患，死于安乐》是战国时期思想家孟子所作议论文。这篇文章通过舜、傅说等古代圣贤在困境中振作精神、 奋发努力而终于大有所为的事实，说明一个人想要完成自己的天赋使命，必须经历种种挫折和考验，进而分析一个国家的生死存亡亦 是如此，最后推出论点“生于忧患而死于安乐”。"},{"id":902,"stem":"刘长卿诗句“已似长沙傅，从今又几年”中的“长沙傅”是指（）","options":["杨修","孔融","贾谊","嵇康"],"answer":2,"explanation":"该句出自唐代刘长卿的《新年作》。长沙傅指西汉贾谊。文帝时贾谊被谪为长沙王太傅，故称。"},{"id":903,"stem":"以下关于“田园诗”的介绍不正确的是（）","options":["与山水诗合称山水田园诗","源于南北朝的谢灵运和晋代陶渊明","以唐代王维、孟浩然为代表","以描写农村及边塞风光以及隐居生活见长"],"answer":3,"explanation":"“田园诗”是歌咏田园生活的诗歌，多以农村景物和农民、牧人、渔夫等的劳动为题材。边塞风光是边塞诗的写作内 容。"},{"id":904,"stem":"以下不属于书法“宋四家”的是（）","options":["黄庭坚","米芾","颜真卿","苏轼"],"answer":2,"explanation":"宋四家是中国北宋时期四位书法家苏轼、黄庭坚、米芾和蔡襄的合称。这四个人大致可以代表宋代的书法风格，而且 成就最高，故称“宋四家”。"},{"id":905,"stem":"在古代，下列（）可用来尊称对方的妻子。","options":["令爱","令尊","令正","令堂"],"answer":2,"explanation":"称为令正，意思是旧时以嫡妻为正室，因此用作称对方嫡妻的敬词。令尊是对对方父亲的尊称；令爱是对对方女儿的 尊称。令堂是对对方母亲的尊称。"},{"id":906,"stem":"以下诗句与作者对应错误的一项是（ ）","options":["沉舟侧畔千帆过，病树前头万木春。——陆游","劝君更尽一杯酒，西出阳关无故人。——王维","人生自古谁无死，留取丹心照汗青。——文天祥","我劝天公重抖擞，不拘一格降人才。——龚自珍"],"answer":0,"explanation":"A 出自刘禹锡的《酬乐天杨州初逢席上见赠》。“沉舟侧畔千帆过，病树前头万木春”是此诗的颈联，诗句充满了对 人生的乐观感悟和哲思睿理。"},{"id":907,"stem":"“青海长云暗雪山，孤城遥望玉门关”出自（）","options":["王翰的《凉州词》","王之涣的《凉州词》","王翰的《出塞》","王昌龄的《从军行》"],"answer":3,"explanation":"出自唐代王昌龄的《从军行七首·其四》，此句描绘了一幅壮阔苍凉的边塞风景，概括了西北边陲的状貌，将领戍边 生活艰苦的孤寂心情都融进了这苍凉的景象中。"},{"id":908,"stem":"山外青山楼外楼，（ ）歌舞几时休。","options":["南朝","临安","西湖","金陵"],"answer":2,"explanation":"出自宋代林升的《题临安邸》：“山外青山楼外楼，西湖歌舞几时休？暖风熏得游人醉，直把杭州作汴州。” 19959276711（vx 同号）"},{"id":909,"stem":"“死去元知万事空，但悲不见九州同”中“但”的意思是（）","options":["但是","只是","一旦","指作者"],"answer":1,"explanation":"出自南宋爱国诗人陆游的《示儿》，意思是：我本来知道，当我死后，人间的一切就都和我无关了；只是哀伤没能亲 眼看到祖国的统一。"},{"id":910,"stem":"格律诗中被称为“颔联”的是（ ）","options":["第一联","第二联","第三联","第四联"],"answer":1,"explanation":"首联，是律诗中的第一联，诗的前两句就是首联；颔联，第三，四句就是颔联；颈联，第五，六句就是颈联；尾联， 最后两句就是尾联。\"首联、颔联、颈联、尾联\"通常是出现在七言或者五言律诗当中。"},{"id":911,"stem":"“只在此山中，云深不知处”出自（）的诗作。","options":["李商隐","杜牧","贾岛","韩愈"],"answer":2,"explanation":"出自唐代贾岛的《寻隐者不遇》。\"松下问童子，言师采药去。只在此山中，云深不知处。\"在苍松下，我询问了年少的 学童；他说，师傅已经采药去了山中。他还对我说：就在这座大山里，可是山中云雾缭绕，不知他的行踪。"},{"id":912,"stem":"“居高声自远，非是藉秋风”出自一首（）","options":["田园诗","送别诗","咏物诗","题壁诗"],"answer":2,"explanation":"出自唐代虞世南的《蝉》：“垂緌饮清露，流响出疏桐。居高声自远，非是藉秋风。”这是一首咏物诗，咏物中尤多 寄托，具有浓郁的象征性。句句写的是蝉的形体、习性和声音，而句句又暗示着诗人高洁清远的品行志趣，物我互释，咏物的深层意 义是咏人。"},{"id":913,"stem":"西北望（），可怜无数山。","options":["阳关","长安","潼关","边关"],"answer":1,"explanation":"出自宋代辛弃疾的《菩萨蛮·书江西造口壁》，全诗：郁孤台下清江水，中间多少行人泪。西北望长安，可怜无数山。 青山遮不住，毕竟东流去。江晚正愁余，山深闻鹧鸪。"},{"id":914,"stem":"下列称谓与“韩昌黎”同类的一项是（）","options":["陆放翁","孟襄阳","范文正","杜工部"],"answer":1,"explanation":"韩愈之所以叫韩昌黎是因为韩愈的宗族原本是出于昌黎（今河北省昌黎县），因昌黎韩氏是望族，因此韩愈自称“郡 望昌黎”，故世称“韩昌黎”。孟浩然（襄州襄阳（今湖北襄阳）人，世称“孟襄阳”。"},{"id":915,"stem":"以下（ ）不是朱熹的作品。","options":["《游烂柯山》","《水口行舟（其一）》","《江畔独步寻花》","《观书有感》"],"answer":2,"explanation":"第二首写行至江滨见繁花之多；第三首写某些人家的花，红白耀眼，应接不暇；第四首写遥望少城之花，想象其花之盛与人之乐；第 五首写黄师塔前之桃花；第六首写黄四娘家尽是花；第七首总结赏花、爱花、惜花。组诗前四首分别描写恼花、怕春、报春、怜花而 流露出悲愁的情怀；后三首显示出赏【知识小链接】《江畔独步寻花》是唐代大诗人杜甫的组诗作品，共七首。第一首从恼花写起， 写独步寻花的原因；花时的喜悦之情，蕴含春光难留之意。全诗脉络清楚，层次井然，表现了杜甫对花的惜爱、在美好生活中的留连 和对美好事物常在的希望。"},{"id":916,"stem":"下列选项中可以指代月亮的是（ ）","options":["羲和","白驹","蟾宫","金乌"],"answer":2,"explanation":"古诗文中月亮的别称有.嫦娥，素娥，婵娟，玉兔，玉盘，团扇，金波，冰轮，广寒、圆盘，蟾蜍，望舒、蟾宫等。"},{"id":917,"stem":"毛泽东词中说“俏也不争春，只把春来报”的是（）","options":["迎春","水仙","梅花","杜鹃"],"answer":2,"explanation":"出自毛泽东的《卜算子·咏梅》。全诗为：风雨送春归，飞雪迎春到。已是悬崖百丈冰，犹有花枝俏。俏也不争春， 只把春来报。待到山花烂漫时，她在丛中笑。"},{"id":918,"stem":"孔子说：“《诗》三百，一言以蔽之，曰‘思无邪’。”这里的《诗》指的是（ ）","options":["诗品","诗经","诗序","诗宗"],"answer":1,"explanation":"《诗》指《诗经》。《诗经》是中国最早的诗歌总集。收入自西周初年至春秋中叶大约五百多年的诗歌（前 11 世纪至 19959276711（vx 同号） 前 6 世纪）。（另外还有 6 篇有题目无内容，即有目无辞，称为笙诗），又称《诗三百》。先秦称为《诗》，或取其整数称《诗三百》 。"},{"id":919,"stem":"“桃花潭水深千尺，不及汪伦送我情”中的“我”是（ ）","options":["杜甫","孟浩然","李白","王昌龄"],"answer":2,"explanation":"出自唐代李白的《赠汪伦》，“桃花潭”点明送别的地点，“深千尺”说明桃花潭的特点，诗人运用比物的手法，变 无形的情谊为生动的形象，表达出诗人与友人之间真挚纯洁的友谊。"},{"id":920,"stem":"诗句“平生不敢轻言语，一叫千门万户开”描写的动物是（）","options":["鹅","鹤","鸡","鸽"],"answer":2,"explanation":"出自明代唐寅的《画鸡》，诗人运用拟人的手法，写出了雄鸡在清晨报晓的情景，上下两句产生了强烈的对比效果， 树立了雄鸡高伟的形象，表现了公鸡具备的美德和权威。"},{"id":921,"stem":"以田园景色和田园生活为题材创造大量诗歌，开创田园诗派的是（）","options":["孔子","陶渊明","徐霞客","谢灵运"],"answer":1,"explanation":"陶渊明，东晋末期南朝宋初期诗人、文学家、辞赋家、散文家。他的诗以田园生活为主要题材，开创了田园诗派。谢 灵运，东晋名将谢玄之孙，中国文学史上山水诗派的开创者。白居易有诗云：“谢公才廓落，与世不相遇。壮士郁不用，须有所泄处， 泄为山水诗，逸韵谐奇趣。”"},{"id":922,"stem":"曾写过《墨梅》的诗人是（ ）","options":["杜牧","苏轼","王冕","朱熹"],"answer":2,"explanation":"《墨梅》是元代诗人王冕创作的一首七言绝句。此诗开头两句直接描写墨梅，最后两句盛赞墨梅的高风亮节，赞美墨 梅不求人夸，只愿给人间留下清香的美德，实际上是借梅自喻，表达自己对人生的态度以及不向世俗献媚的高尚情操。全诗构思精巧、 淡中有味，直中有曲，极富清新高雅之气。"},{"id":923,"stem":"曾写过《行路难》的诗人是（）","options":["屈原","李白","李商隐","杜牧"],"answer":1,"explanation":"《行路难三首》是唐代大诗人李白的组诗作品。这三首诗抒写了诗人在政治道路上遭遇艰难后的感慨，反映了诗人在 思想上既不愿与权贵同流合污又不愿独善一身的矛盾。正是这种无法解决的矛盾所激起的感情波涛使这组诗气象非凡。诗中跌宕起伏 的感情，跳跃式的思维，以及高昂的气势，又使作品具有独特的艺术魅力，而成为后人广为传诵的千古名篇。"},{"id":924,"stem":"以下（ ）是出自唐代诗人贺知章的诗作。","options":["春风又绿江南岸","春风不改旧时波","春江水暖鸭先知","春潮带雨晚来急"],"answer":1,"explanation":"B 本句出自唐代贺知章的《回乡偶书》，全诗：离别家乡岁月多，近来人事半消磨。惟有门前镜湖水，春风不改旧时 波。"},{"id":925,"stem":"下列古诗中，不是李白写的是（ ）","options":["《秋浦歌》","《古朗月行》","《秋夕》","《独坐敬亭山》"],"answer":2,"explanation":"《秋夕》的作者是唐代杜牧，全诗：银烛秋光冷画屏，轻罗小扇扑流萤。 天阶夜色凉如水，卧看牵牛织女星。"},{"id":926,"stem":"“清初三大思想家”是指（）","options":["袁枚、蒋士铨、赵翼","魏禧、汪琬、侯方域","顾炎武、黄宗羲、王夫之","纳兰性德、朱彝尊、陈维崧"],"answer":2,"explanation":"【解析】袁枚、蒋士铨、赵翼并称“乾隆三大家”，其中袁枚知名度最高。“清初散文三大家”是指魏禧、汪琬、侯方域。顾炎武与 黄宗羲、王夫之并称为“明末清初三大儒”“清初三大思想家”。纳兰性德与朱彝尊、陈维崧并称“清词三大家”，或被称为“康熙 词坛三鼎足”。"},{"id":927,"stem":"由革命民主主义者转变为倾向马克思主义的革命家，成为中国文化革命的巨人的作家是（ ）","options":["鲁迅","陈独秀","胡适","茅盾"],"answer":0,"explanation":"【解析】1927 年到 1936 年期间，鲁迅的思想由进化论发展到阶级论，他也由革命民主主义者转变为倾向马克思主义的革命家，成为中 国文化革命的巨人。"},{"id":928,"stem":"《论语》不仅是一部儒家经典，也是一部优秀的（ ）","options":["纪传体散文集","语录体散文集","纪传体小说集","语录体小说集 101 19959276711（vx 同号）"],"answer":1,"explanation":"【解析】《论语》语句简洁，文辞娴雅，意蕴丰厚，是一部优秀的语录体散文集。"},{"id":929,"stem":"作品充满地域文化色彩，被称为“京味”十足的“市井文学”作家是（）","options":["鲁迅","老舍","巴金","吴组缃"],"answer":1,"explanation":"【解析】“京味”浓郁的小说以老舍最有代表性。他善于用俗白、风趣的北京话书写北京城的人物、故事，表现具有浓郁京华色彩的 风俗文化、人情世态。"},{"id":930,"stem":"下列作品中具有深刻的哲理性与系统的思辨性，对中国传统文化有着深远的影响的是（）","options":["《老子》","《孟子》","《论语》","《庄子》"],"answer":0,"explanation":"【解析】《老子》语言朴素流畅，多用排比韵语，音调谐婉，便于记诵，具有深刻的哲理性与系统的思辨性，对中国传统文化有着深 远的影响。而《论语》语句简洁，文辞娴雅，意蕴丰富，是一部优秀的语录体散文集。《孟子》的特点是善于辩论、善于运用比喻、 寓言等方式，大量使用排比、叠句等修辞手法。《庄子》是想象奇幻，构思巧妙，多彩的思想世界和文学意境，文笔汪洋恣肆，具有 浪漫主义的艺术风格，瑰丽诡谲，意出尘外。"},{"id":931,"stem":"“惊回千里梦，已三更。起来独自绕阶行。”这一句通过叙述被梦惊醒，表现词人日夜牵挂的都是（ ）","options":["心意相通的知己好友。","远方的故乡和亲人。","国家的战事和兴衰。","来之不易的高官厚禄。"],"answer":2,"explanation":"绍兴六年（1136）至绍兴七年（1137）岳飞准备大举收复中原，北上灭金。但宋高宗赵构及朝内主和派对其大加干涉 和阻挠，迫害主战派。多人被罢免和杀害，大好的抗金复国形势，有付诸东流的危险。这首词就是在这种背景下写出的。岳飞内心的 极度郁闷，对投降派猖獗的极度愤慨，均写于词中。词人日夜牵挂的都是国家的战事和兴衰。"},{"id":932,"stem":"（）尽已无擎雨盖，（ ）残犹有傲霜枝。括号内应填入（ ）","options":["兰；梅","兰；菊","荷；梅","荷；菊"],"answer":3,"explanation":"这联诗出自宋代苏轼的《赠刘景文》，全文如下：荷尽已无擎雨盖，菊残犹有傲霜枝。一年好景君须记，正是橙黄橘 绿时。它是诗人写赠给好友刘景文的。诗的前两句写景，意思是荷花已经落尽，连擎雨的荷叶也凋谢枯萎了；秋菊也已开败，却还有 那挺拔的枝干在那里傲霜独立。"},{"id":933,"stem":"苏轼“东坡居士”这个号的由来，与下列哪个地方有关？（）","options":["汴州","凉州","黄州","荆州"],"answer":2,"explanation":"“东坡居士”是苏轼的号，其来源是苏轼贬官黄州所居住的地方。"},{"id":934,"stem":"诗句“梅子金黄杏子肥，麦花雪白菜花稀”描写的是（ ）的场景。","options":["春季","夏季","秋季","冬季"],"answer":1,"explanation":"出自宋代范成大的《四时田园杂兴·其二十五》，“梅子金黄杏子肥，麦花雪白菜花稀”该句意思是：初夏时节，金 黄的梅子挂满枝头，杏子也变得鲜亮饱满，田里麦穗扬着白花，油菜花差不多落尽正在结籽。"},{"id":935,"stem":"诗句“人闲桂花落，夜静春山空”运用了（ ）修辞手法。","options":["比喻","对偶","拟人","反复"],"answer":1,"explanation":"本句出自唐代王维的《鸟鸣涧》，人闲桂花落，夜静春山空。月出惊山鸟，时鸣春洞中。 诗意：寂静的山谷中，只有春桂花在无声的飘落，宁静的夜色中春山一片空寂。月亮升起月光照耀大地时惊动了山中栖鸟，在春天的 溪涧里不时地吗鸟叫。 此诗描绘山间春夜中幽静而美丽的景色，侧重于表现夜间春山的宁静幽美。全诗旨在写静，却运用了以动衬静的手法处理，这种反衬 的手法极见诗人的禅心与禅趣。\"时\"是时而，偶尔的意思。"},{"id":936,"stem":"诗句“欲穷千里目，更上一层楼”选自（）。","options":["《登鹳雀楼》","《登黄鹤楼》","《登岳阳楼》","《登望江楼》"],"answer":0,"explanation":"出自唐代王之涣的《登鹳雀楼》：“白日依山尽，黄河入海流。欲穷千里目，更上一层楼。”"},{"id":937,"stem":"“已是黄昏独自愁，更著风和雨。”出自一首描写（ ）的词。","options":["菊花","兰花","梅花","杏花"],"answer":2,"explanation":"出自宋代陆游的《卜算子·咏梅》意思是：黄昏时分，梅花无依无靠，已经够愁苦了，却又遭到了风雨的摧残。 赏析：日落黄昏，暮色朦胧，此句描写了梅花的困难处境，渲染出冷落凄凉的氛围，诗人借梅花的遭遇，暗喻自己被排挤的政治遭遇。 19959276711（vx 同号）"},{"id":938,"stem":"小时不识月，呼作白（ ）盘。","options":["圆","镜","玉","璧"],"answer":2,"explanation":"出自唐代李白的《古朗月行》，意思是小时候不认识月亮，把它称为白玉盘。 赏析：此句用儿童天真的口吻，以“白玉盘”作比喻，生动地表现出月亮的形状和月光的皎洁可爱，展现出诗人童年时的天真烂漫。"},{"id":939,"stem":"“可怜白发生”中的“可怜”，意为（）","options":["可爱","可怕","可恨","可惜"],"answer":3,"explanation":"“可怜白发生”的“可怜”意思是可惜。出自宋代辛弃疾的《破阵子·为陈同甫赋壮词以寄之》。"},{"id":940,"stem":"“捐躯赴国难，视死忽如归”出自（）的作品。","options":["岳飞","于谦","曹操","曹植"],"answer":3,"explanation":"出自两汉曹植的《白马篇》。 解释：为国家解危难奋勇献身，把死亡看得像回家一样平常。 赏析：此句气势慷慨激昂，歌颂了武艺高强的青年英雄，表现出英雄们精忠报国的志向，体现出捐躯为国、视死如归的崇高精神境界。"},{"id":941,"stem":"关于《墨竹图题诗》中的诗句，以下完全正确的一项是（ ）","options":["衙斋卧听萧萧竹","疑似民间疾苦声","些小吾曹洲县吏","一枝一叶终关情"],"answer":0,"explanation":"（清）郑燮的《墨竹图题诗》：衙斋卧听萧萧竹，疑是民间疾苦声。些小吾曹州县吏，一枝一叶总关情。"},{"id":942,"stem":"“西出阳关无故人”中的“阳关”位于现在的（ ）省。","options":["甘肃","陕西","青海","山西"],"answer":0,"explanation":"本句出自唐代诗人王维作品《送元二使安西》。是诗人送朋友去西北边疆时作的诗。阳关在今甘肃省敦煌县西南。"},{"id":943,"stem":"关于《台城》（江雨霏霏江草齐）这首诗，以下说法不正确的是（ ）","options":["这首诗是诗人路过六朝古都台城时所作。","作者是中唐诗人。","诗中描写了很多景物。","整首诗以自然景物的“依旧”暗示人世的沧桑。"],"answer":1,"explanation":"韦庄，晚唐诗人、词人、五代时前蜀宰相。"},{"id":944,"stem":"“昆山玉碎凤凰叫，芙蓉泣露香兰笑。十二门前融冷光，二十三丝动紫皇”这几句诗是作者欣赏什么乐器时所产生的联想？（）。","options":["琵琶","箜篌","古琴","古筝"],"answer":1,"explanation":"出自唐代李贺的《李凭箜篌引》。 赏析：“昆山”句是以声写声，着重表现乐声的起伏多变；“芙蓉”句则是以形写声，刻意渲染乐声的优美动听，用比喻的手法描绘 了李凭弹奏箜篌的音乐特色。"},{"id":945,"stem":"下列诗句中的大雁意象不表示思乡怀人之情的一项是（ ）。","options":["朱敦儒《西江月》：“云间鸿雁草间虫。共我一般做梦。”","李清照《一剪梅》：“云中谁寄锦书来，雁字回时，月满西楼。”","王维《伊州歌》：“征人去日殷勤嘱，归雁来时数附书。”","王湾《次北固山下》：“乡书何处达，归雁洛阳边。”"],"answer":0,"explanation":"A 出自宋代朱敦儒的《西江月》，全诗：元是西都散汉，江南今日衰翁。从来颠怪更心风。做尽百般无用。屈指八旬 将到，回头万事皆空。云间鸿雁草间虫。共我一般做梦。"},{"id":946,"stem":"以下四句诗排序正确的是（ ）①林表明霁色②积雪浮云端③终南阴岭秀④城中增暮寒","options":["②③①④","③②①④","①④②③","①④③②"],"answer":1,"explanation":"出自唐代祖咏的《终南望余雪》，全诗：终南阴岭秀，积雪浮云端。林表明霁色，城中增暮寒。"},{"id":947,"stem":"以下不属于五岳的是（ ）","options":["泰山","武当山","华山","衡山"],"answer":1,"explanation":"五岳指泰山、华山、衡山、恒山、嵩山，对应东岳、西岳、南岳、北岳、中岳，三山五岳在中国虽不是最高的山，但 19959276711（vx 同号） 都高耸于平原或盆地之上，这样也就显得格外险峻。"},{"id":948,"stem":"唐代诗人杜牧写有不少抒情写景的小诗，下面的（ ）即出自杜牧之手。","options":["《望天门山》","《清明》","《题临安邸》","《岁暮归南山》"],"answer":1,"explanation":"杜牧的《清明》，全诗：清明时节雨纷纷，路上行人欲断魂。借问酒家何处有？牧童遥指杏花村。"},{"id":949,"stem":"诗句“古人学问无遗力，少壮工夫老始成。”的意思是（ ）","options":["古时候的人们学习是不遗余力的，往往年轻时就开始努力，到了老年才取得成功。","古时候的人们学习，往往年轻时不努力，到了老年才开始拼尽全力。","古人的学问从来不保留，他们传授给年轻人，到了老年正好都传授完。","古人使出全力来学习，不过年轻时积累很少，到了老年才刚开始有所收获。"],"answer":0,"explanation":"出自宋代陆游的《冬夜读书示子聿》。意思是：古人学习知识不遗余力，年轻时下功夫，到老年才有所成就。 赏析：“无遗力”三个字，形容古人做学问勤奋用功、孜孜不倦的程度，既生动又形象，赞扬了古人刻苦学习的精神以及做学问的艰 难。"},{"id":950,"stem":"关于虞世南的《蝉》，以下说法错误的是（）","options":["诗人笔下的蝉是拟人化的","这是一首七言绝句","作者虞世南也是一位书法家","这是一首咏物诗"],"answer":1,"explanation":"这是唐代诗人虞世南的作品，是一首托物寓意的小诗，也是唐人咏蝉诗中时代最早的一首，很为后世人称道。它是一 首五言绝句。"},{"id":951,"stem":"成语“七月流火”出自诗经，它用来形容（）。","options":["炎炎夏日","春去夏来","酷暑转凉","夏日流萤"],"answer":2,"explanation":"七月流火，出自《诗经·豳风·七月》，“七月流火，九月授衣”（火：星名，即大火星、心宿二，现代天文学中的 天蝎座α。每年农历六月出现时于正南方，位置最高，七月后逐渐偏西下沉，故称“流火”）。指夏去秋来，天气转凉。现也因讹用 来形容天气炎热（因人们误把“七月”理解为公历七月、把“火”理解为火热）。"},{"id":952,"stem":"《过零丁洋》描写的地点位于现如今（）","options":["湖北","湖南","广东","广西"],"answer":2,"explanation":"零丁洋在现在的广东珠江口，大致是在虎门镇。零丁洋上建有著名的虎门大桥和串联起香港，澳门，珠三角的港珠澳 大桥。"},{"id":953,"stem":"以下（ ）没有错别字。","options":["长风破浪会有时，值挂云帆济沧海。","千里不辞行路远，时光早完到天涯。","寄语洛城风日到，明年春色倍还人。","千淘万漉虽辛苦，吹尽狂沙始到金。"],"answer":3,"explanation":"A 长风破浪会有时，直挂云帆济沧海。 B 千里不辞行路远，时光早晚到天涯。 C 寄语洛城风日道，明年春色倍还人。"},{"id":954,"stem":"写“寄语洛城风日道，明年春色倍还人”的杜审言，是（ ）","options":["杜牧的祖父","唐代“浪漫诗”的奠基人","被称为“诗圣”","唐代“近体诗”的奠基人"],"answer":3,"explanation":"出自唐代杜审言的《春日京中有怀》。杜审言，字必简，襄州襄阳（今湖北襄阳）人，晋征南将军杜预的远裔，\"诗圣 \"杜甫的祖父。唐代诗人。杜审言与李峤、崔融、苏味道被称为\"文章四友\"，是唐代\"近体诗\"的奠基人之一，作品多朴素自然。其五言律 诗，格律谨严。后人辑有《杜审言诗集》。"},{"id":955,"stem":"诗句“接天莲叶无穷碧，映日荷花别样红”描写了（ ）的夏日美景。","options":["广州","扬州","苏州","杭州"],"answer":3,"explanation":"描写的是西湖的秀丽风光，出自南宋诗人杨万里的七言绝句《晓出净慈寺送林子方》，表达了作者对西湖六月美景的 赞美之情。"},{"id":956,"stem":"“江雨霏霏江草齐”的下句是（ ）","options":["依旧烟笼十里堤","无情最是台城柳","六朝如梦鸟空啼","台城六代竞豪华"],"answer":2,"explanation":"104 19959276711（vx 同号） 【知识小链接】出自唐代韦庄的《台城》，全诗：江雨霏霏江草齐，六朝如梦鸟空啼。 无情最是台城柳，依旧烟笼十里堤。"},{"id":957,"stem":"名句“润物细无声”出自（ ）的诗作《春夜喜雨》。","options":["白居易","李白","杜甫","王勃"],"answer":2,"explanation":"《春夜喜雨》作者是唐朝文学家杜甫。其全文古诗如下： 好雨知时节，当春乃发生。 随风潜入夜，润物细无声。 野径云俱黑，江船火独明。 晓看红湿处，花重锦官城。"},{"id":958,"stem":"陆游《诉衷情》中“当年万里觅封侯”一句用了（ ）投笔从戎、建功异域的典故。","options":["班固","班超","霍光","霍去病"],"answer":1,"explanation":"用班超投笔从戎、立功异域“以取封候”的典故，表达自己报效祖国，收拾旧河山的壮志。"},{"id":959,"stem":"下列不属于唐代新乐府运动倡导者的是（）","options":["辛弃疾","白居易","元稹","李绅"],"answer":0,"explanation":"新乐府运动，是诗歌革新运动，由唐代诗人白居易、元稹、张籍、李绅等所倡导，主张恢复古代的采诗制度，发扬《诗 经》和汉魏乐府讽喻时事的传统。"},{"id":960,"stem":"王于兴师，修我（）。与子偕（ ）！括号里应填（ ）","options":["戈矛，作","矛戟，作","甲兵，作","戈矛，行"],"answer":1,"explanation":"出自先秦诗经·国风·秦风的《无衣》。 岂曰无衣？与子同袍。王于兴师，修我戈矛。与子同仇！ 岂曰无衣？与子同泽。王于兴师，修我矛戟。与子偕作！ 岂曰无衣？与子同裳。王于兴师，修我甲兵。与子偕行！"},{"id":961,"stem":"以下是咏物诗的是（ ）","options":["《金陵怀古》","《山居秋暝》","《江雪》","《石灰吟》"],"answer":3,"explanation":"明代于谦的《石灰吟》：“千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。”这是一首托物 言志诗。作者以石灰作比喻，表达自己为国尽忠，不怕牺牲的意愿和坚守高洁情操的决心。"},{"id":962,"stem":"下列不属于咏物诗的是（ ）","options":["红豆生南国，春来发几枝。","沉舟侧畔千帆过，病树前头万木春。","墙角数枝梅，凌寒独自开。","千锤万凿出深山，烈火焚烧若等闲。"],"answer":1,"explanation":"B 选自唐代刘禹锡的《酬乐天扬州初逢席上见赠》，这首诗是唐代诗人刘禹锡于敬宗宝历二年（826）冬，罢和州刺史 后，回归洛阳，途经扬州，与罢苏州刺史后也回归洛阳的白居易相会时所作。"},{"id":963,"stem":"下列有关陆游的介绍，正确的一项是（）。","options":["字廷秀，号诚斋。","字义山，号玉豁生。","字务观，号放翁。","字幼安，号稼轩居士。"],"answer":2,"explanation":"陆游，字务观，号放翁，汉族，越州山阴（今绍兴）人，南宋文学家、史学家、爱国诗人。"},{"id":964,"stem":"“字字看来皆是血，十年辛苦不寻常”说的是（ ）的成书过程。","options":["《红楼梦》","《水浒传》","《三国演义》","《西游记》"],"answer":0,"explanation":"出自清诗人曹雪芹的《回前诗》。这是对曹雪芹一生的总结，也是对红楼一书倾注了大量心血的吐露与见证。"},{"id":965,"stem":"为《破阵乐·秋风四面足风沙》排序。（）①塞外征人暂别家②秋风四面足风沙③时光早晚到天涯④千里不辞行路远","options":["①③②④","①④②③","③①④②","②①④③"],"answer":3,"explanation":"出自唐代诗人张祜的《破阵乐·秋风四面足风沙》，全诗：秋风四面足风沙，塞外征人暂别家。千里不辞行路远，时 光早晚到天涯。 19959276711（vx 同号）"},{"id":966,"stem":"诗句“借问酒家何处有，牧童遥指杏花村”描写的是（ ）节气场景。","options":["立春","谷雨","清明","惊蛰"],"answer":2,"explanation":"出自唐代杜牧的《清明》。 清明时节雨纷纷，路上行人欲断魂。 借问酒家何处有？牧童遥指杏花村。"},{"id":967,"stem":"以善于描写边塞风光著称的诗人是（）","options":["李商隐","柳宗元","白居易","王昌龄"],"answer":3,"explanation":"边塞诗人有高适、王昌龄、岑参、李贺、李益、杨炯、陈子昂、杜审言、陆游等等。边塞诗又被称为出塞诗，以边疆 地区军民的生活和自然风光为题材所创作，一些身在边塞或者体验过的诗人，会以自身的经历见闻来写作。"},{"id":968,"stem":"“前不见古人，后不见来者，念天地之悠悠，独怆然而涕下”，这首作品的体裁是（）。","options":["古体诗","词","乐府","赋"],"answer":0,"explanation":"《登幽州台歌》的体裁是古体诗，五言和七言兼用，诗歌的格律自由，且长短不限。《登幽州台歌》的作者是唐代诗 人陈子昂，诗人在仕途中接连受挫，眼看报国宏愿无法达成，在登上幽州蓟北楼远望时，内心悲中来，因而写下这首诗。"},{"id":969,"stem":"张怀璀《书断》有云“画如铁石，字若飞动”，这是对（）的评价。","options":["甲骨文","石鼓文","小篆","草书"],"answer":2,"explanation":"秦始皇泰山封禅时留下了《泰山刻石》，相传其稿本为秦丞相李斯所书，唐人称颂其“画如铁石，字若飞动”，“骨 气丰匀，方圆绝妙”。秦始皇统一后用小篆，所以秦始皇泰山封禅时留下了《泰山刻石》，该刻石使用的是篆书。"},{"id":970,"stem":"《送友人》一诗在体裁上属于（ ）","options":["抒情诗","七言律诗","送别诗","五言律诗"],"answer":3,"explanation":"《送友人》是唐代诗人李白创作的一首充满诗情画意的送别诗，为李白名篇之一，全诗八句四十字，表达了作者送别 友人时的依依不舍之情与离情别绪之意。此诗写得情深意切，境界开朗，对仗工整，自然流畅。从体裁上看，属于五言律诗。"},{"id":971,"stem":"下列诗句中，（ ）作者不是杜甫。","options":["国破山河在，城春草木深。","星垂平野阔，月涌大江流。","岱宗夫如何，齐鲁青未了。","明月松间照，清泉石上流。"],"answer":3,"explanation":"D 出自唐代诗人王维的《山居秋暝》，全诗：空山新雨后，天气晚来秋。明月松间照，清泉石上流。竹喧归浣女，莲 动下渔舟。随意春芳歇，王孙自可留。 这首诗写出了清新、幽静、恬淡、优美的山中秋季的黄昏美景。王维所居辋川别墅在终南山下，故称山居。"},{"id":972,"stem":"“危楼高百尺，手可摘星辰”运用的修辞手法是（ ）","options":["夸张","拟人","对比","比喻"],"answer":0,"explanation":"本句出自唐代诗人李白作品《夜宿山寺》， 危楼高百尺，手可摘星辰。不敢高声语，恐惊天上人。 诗意：山上寺院好似有百丈之高，站在上边仿佛都能摘下星辰。不敢高声说话，唯恐惊 动了天上的仙人。 注释：宿：住，过夜。危楼：高楼，这里指山顶的寺庙。危：高。百尺：虚指，不是实数，这里形容楼很高。星辰：天上的星星统称。 语：说话。恐：唯恐，害怕。惊：惊动。此诗运用了极其夸张的手法，描写了寺中楼宇的高耸，表达了诗人对古代庙宇工程艺术的惊 叹以及名对神仙般生活的向往和追求之情。"},{"id":973,"stem":"“龙宫变闾里，水府生禾麦。”“闾”和以下（ ）同音.","options":["驴","网","绿","鹿"],"answer":0,"explanation":"闾读音[lǘ]，与驴同音。该诗句出自唐代白居易的《自蜀江至洞庭湖口有感而作》。"},{"id":974,"stem":"“挽弓当挽强，用箭当用长”出自（）的诗作。","options":["杜甫","李白","王之涣","辛弃疾"],"answer":0,"explanation":"意思是比喻做事要做出众的事。出自唐代杜甫的《前出塞》。全诗： 挽弓当挽强，用箭当用长。 射人先射马，擒贼先擒王。 杀人亦有限，列国自有疆。 19959276711（vx 同号） 苟能制侵陵，岂在多杀伤。"},{"id":975,"stem":"“君子敬而无失，与人恭而有礼，四海之内，皆兄弟也。”出自（）","options":["《论语》","《老子》","《春秋》","《离骚》"],"answer":0,"explanation":"出自《论语·颜渊》：“君子敬而无失，与人恭而有礼，四海之内，皆兄弟也。”"},{"id":976,"stem":"“花径不曾缘客扫，蓬门今始为君开”出自唐代诗人（ ）的《客至》。","options":["李白","王维","杜甫","杜牧"],"answer":2,"explanation":"“花径不曾缘客扫，蓬门今始为君开”的大致意思是：老夫不曾为客扫过花径，今天才为您扫，这柴门不曾为客开过， 今天为您打开。出自唐朝诗人杜甫的《客至》。《客至》是唐代伟大诗人杜甫创作的一首七律，作于成都草堂落成之后。"},{"id":977,"stem":"王于兴师，修我甲兵，与子偕（）！括号里应填（ ）","options":["做","作","行","仇"],"answer":2,"explanation":"这是秦代《诗经·秦风·无衣》中的一首诗词；描述了秦军战士出征前的高昂士气，同仇敌忾。 全文是： 岂曰无衣？与子同袍。王于兴师，修我戈矛。与子同仇！ 岂曰无衣？与子同泽。王于兴师，修我矛戟。与子偕作！ 岂曰无衣？与子同裳。王于兴师，修我甲兵。与子偕行！"},{"id":978,"stem":"“一问三不知”出自《左传》,“三不知”指的是（）。","options":["天文、地理、文学","事情的开始、经过、结果","孔子、孟子、老子","自己的姓名、籍贯、生辰八字"],"answer":1,"explanation":"“一问三不知”是汉语中一则来源于历史故事的成语，相关典故最早载于《左传·鲁哀公二十七年》。\"一问三不知\" 原义是对某一事情的开始、发展、结果都不知道（三不知：指对事情的起因、经过、结果都不知道），后用来表示对实际情况一点也 不知道。"},{"id":979,"stem":"“故园（）路漫漫”括号里应填（ ）","options":["东望","西望","南望","北望"],"answer":0,"explanation":"出自唐代岑参的《逢入京使》。意思是：向东遥望长安家园路途遥远，思乡之泪沾湿双袖难擦干。 赏析：此句塑造了一位西行途中的旅人形象，朴素、真切地再现了诗人想家想到极点的情态，流露出对故园深切的思念之情。"},{"id":980,"stem":"“少壮不努力，老大徒伤悲”出自（ ）","options":["《短歌行》","《长歌行》","《论语》","《孟子》"],"answer":1,"explanation":"出自乐府诗集的《长歌行》。 青青园中葵，朝露待日晞． 阳春布德泽，万物生光辉。 常恐秋节至，焜黄华叶衰。 百川东到海，何时复西归。 少壮不努力，老大徒伤悲。"},{"id":981,"stem":"“停杯投箸不能食”中的“箸”指的是（）","options":["勺子","碗","筷子","铲子"],"answer":2,"explanation":"这是李白《行路难》中的句子：停杯投箸不能食，拔剑四顾心茫然.。字面的意思是：我放下酒杯扔掉筷子不想喝酒了， 拔出宝剑环顾四周，心里一片茫然.。"},{"id":982,"stem":"诗句“飞流直下三千尺，疑是银河落九天”描写的是（）的景象。","options":["泰山","黄山","华山","庐山"],"answer":3,"explanation":"出自唐代李白的《望庐山瀑布》。此句将瀑布喷涌而出的景象描绘得极为生动，既写出山之高峻陡峭，又可以见出水 流之急，那高空直落，势不可挡之状如在眼前。"},{"id":983,"stem":"“舟首尾长约八分有奇”中的“奇”指的是（）","options":["质数","偶数","奇数","零数"],"answer":3,"explanation":"奇是零头的意思，全句意思是：小舟从头到尾大约有八分多长。 19959276711（vx 同号）"},{"id":984,"stem":"《小石潭记》是（）的山水游记代表作之一。","options":["归有光","柳宗元","徐霞客","苏东坡"],"answer":1,"explanation":"《小石潭记》作者是唐朝诗人柳宗元。全文对小石潭的整体感觉是：幽深冷寂，孤凄悲凉文章含蓄地抒发了作者被贬 后无法排遣的忧伤凄苦的感情。"},{"id":985,"stem":"“东边日出西边雨，道是无晴却有晴”出自（）的诗。","options":["苏轼","辛弃疾","刘禹锡","李商隐"],"answer":2,"explanation":"出自中唐诗人刘禹锡的《竹枝词》，原文：“杨柳青青江水平，闻郎江上唱歌声。东边日出西边雨，道是无晴还有晴。” 这是一首描写青年男女爱情的歌。它描写了一个初恋的少女在杨柳青青、江平如镜的清丽的春日里，听到情郎的歌声所产生的内心活 动。"},{"id":986,"stem":"以下没有错字的一句是（ ）","options":["绿蚁新醅酒","来日倚窗前","非是籍秋风","萧关逢侯骑"],"answer":0,"explanation":"B 来日绮窗前。C 非是藉秋风。D 萧关逢候骑。"},{"id":987,"stem":"“挽弓当挽强，用箭当用长”出自哪位诗人？（ ）","options":["杜甫","李白","王之涣","辛弃疾"],"answer":0,"explanation":"意思是比喻做事要做出众的事。出自唐代杜甫的《前出塞》。全诗： 挽弓当挽强，用箭当用长。 射人先射马，擒贼先擒王。 杀人亦有限，列国自有疆。 苟能制侵陵，岂在多杀伤。"},{"id":988,"stem":"泥融飞（），沙暖睡（ ）。填入括号内恰当的一项是（ ）","options":["蝴蝶；野鸭","蝴蝶；鸳鸯","燕子；鸳鸯","燕子；野鸭"],"answer":2,"explanation":"“泥融飞燕子，沙暖睡鸳鸯。”出自杜甫的《绝句》，全诗：“迟日江山丽，春风花草香。泥融飞燕子，沙暖睡鸳鸯。” 这是一首写于成都草堂的五言绝句，极富诗情画意的佳作。"},{"id":989,"stem":"1932 年，清华大学招生试题中有一道对对子题，上联“孙行者”，下面下联中最合适的是（）。","options":["胡适之","周作人","郁达夫","唐三藏"],"answer":0,"explanation":"“孙”对“胡”，姓对姓；“适”在古文中是“到、行”的意思，所以“行”对“适”，动词对动词；“之”和“者” 是文言文里的常用虚词，和此所以“之”对“者”，所以“孙行者”对“胡适之”是绝对。"},{"id":990,"stem":"苏轼诗《饮湖上初晴雨后》中的“湖”指的是（）。","options":["洞庭湖","白马湖","西湖","太湖"],"answer":2,"explanation":"《饮湖上初晴后雨》全诗：水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。“湖”指的是西 湖。"},{"id":991,"stem":"“蒹葭苍苍，白露为霜”中“蒹葭”指（）","options":["芦苇","荷花","兰草","水稻"],"answer":0,"explanation":"兼葭苍苍，白露为霜。所谓伊人，在水一方。出自作品《诗经》中的《国风·秦风·兼葭》。兼葭指初生的芦苇。白 露指清晨的露水，比喻存在时间极短促的事物。"},{"id":992,"stem":"以下运用了同一典故的两首诗是（ ）","options":["《游烂柯山》和《酬乐天扬州初逢席上见赠》","《登金陵凤凰台》和《游烂柯山》","《锦瑟》和《游烂柯山》","《登金陵凤凰台》和《赤壁》"],"answer":0,"explanation":"据说西晋时期有一位叫王质的樵夫，有一天上到烂柯山砍柴，正好看到了两位童子在下棋，由于好奇站在旁边观看， 等到棋局结束之后，他手中的镰刀已经生锈了，回到家中才发现世上早已过去了一百年，可谓是物是人非，这也就是烂柯山和烂柯人 的由来。 古人以凤凰为祥瑞，所以凤凰来止往往要造楼筑台，为的是留住那份有关凤凰的辉煌记忆。先秦时秦穆公为闻箫而来的凤凰筑台。南 京的凤凰台也得名于凤凰的亲临，李白所写的凤凰台在今南京城西南，相传南朝刘宋时，有凤凰在山上出现，因而于山上起台，山称 19959276711（vx 同号） 凤凰山，台便称凤凰台。如果说凤凰是人的想象，那么凤凰台就是人对想象的不舍，有了台的守候，凤凰似乎也有了依，这是人想留 住凤凰的痴念。然而纵有台的守望，凤凰依旧一去不返了，只留下这座空台伴着江水仍径自东流不息。"},{"id":993,"stem":"以下为李清照词集的是（ ）","options":["《乐章集》","《淮海词》","《稼轩长短句》","《漱玉词》"],"answer":3,"explanation":"《乐章集》——柳永；《淮海词》——秦观；《稼轩长短句》——辛弃疾。"},{"id":994,"stem":"在十二生肖中，“未”代表的是（）","options":["马","羊","猴","鸡"],"answer":1,"explanation":"十二生肖是十二地支的形象化代表，即子（鼠）、丑（牛）、寅（虎）、卯（兔）、辰（龙）、巳（蛇）、午（马）、 未（羊）、申（猴）、酉（鸡）、戌（狗）、亥（猪）。"},{"id":995,"stem":"下列诗句与“西北望长安，可怜无数山”反映同一时期社会现实的一项是（ ）","options":["商女不知亡国恨，隔江犹唱后庭花。","夜阑卧听风吹雨，铁马冰河入梦来。","少陵野老吞声哭，春日潜行曲江曲。","浩荡离愁白日斜，吟鞭东指即天涯。"],"answer":1,"explanation":"作者辛弃疾生活在南宋时期。杜牧、杜甫生活在唐朝，龚自珍生活在清朝。只有陆游与辛弃疾同一时代。"},{"id":996,"stem":"“造化钟神秀，阴阳割昏晓”中“造化”指的是（ ）","options":["缘分","运气","制造","大自然"],"answer":3,"explanation":"\"造化钟神秀，阴阳割昏晓\"本句出自唐代诗人杜甫作品《望岳》。 望岳杜甫（唐代） 岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。 荡胸生层云，决眦入归鸟。会当凌绝顶，一览众山小。 诗意：五岳之首的泰山的怎么样？在齐鲁大地上，那苍翠的美好山色没有尽头。大自然把神奇秀丽的景象全都汇聚其中，山南山北阴 阳分界，晨昏迥然不同。望着那升腾的层层云气，心胸摇荡；睁大眼睛远望归鸟回旋入山，眼角好像要裂开一样。定要登上那最高峰， 俯瞰在泰山面前显得渺小的群山。 注：岱宗：泰山亦名岱山或岱岳，五岳之首，在今山东省泰安市城北。古代以泰山为五岳之首，诸山所宗，故又称\"岱宗\"。这里指对泰 山的尊称。青：指苍翠、翠绿的美好山色。未了：不尽，不断。造化：大自然。钟：聚集。阴阳：阴指山的北面，阳指山的南面；这 里指泰山的南北。割：分，夸张的说法。昏晓：黄昏和早晨。荡胸：心胸摇荡。曾：同\"层\"，重叠。会：终当，定要。凌：登上。凌绝 顶，即登上最高峰。小：形容词的意动用法，意思为\"以……为小，认为……小\"。 这首诗通过描绘泰山雄伟磅礴的景象，热情赞美了泰山高大巍峨的气势和神奇秀丽的景色，流露出了对祖国山河的热爱之情，表达了 诗人不怕困难、敢攀顶峰、俯视一切的雄心和气概，以及卓然独立、兼济天下的豪情壮志。一二句写泰山山脉绵延辽阔；三四句写泰 山雄峻磅礴；五六句是仔细远望，见群峰云生，仿佛有归鸟入谷。七八句想象将来登山所见景象，同时抒发自己的抱负。"},{"id":997,"stem":"“岱宗夫如何，齐鲁青未了”中的“岱宗”是（ ）","options":["泰山","衡山","华山","黄山"],"answer":0,"explanation":"岱宗：泰山亦名岱山或岱岳，五岳之首，在今山东省泰安市城北。古代以泰山为五岳之首，诸山所宗，故又称\"岱宗\"。 这里指对泰山的尊称。"},{"id":998,"stem":"杜甫在这首《望岳》中的哪句诗化用了与孔子有关的名言？（ ）","options":["岱宗夫如何？齐鲁青未了。","造化钟神秀，阴阳割昏晓。","荡胸生曾云，决眦入归鸟。","会当凌绝顶，一览众山小。"],"answer":3,"explanation":"尾联\"会当凌绝顶，一览众山小。\"是化用孔子的名言\"登泰山而小天下\"。"},{"id":999,"stem":"杜甫在《望岳》中（ ）化用了与孔子有关的名言。","options":["首联","颈联","颔联","尾联"],"answer":3,"explanation":"尾联\"会当凌绝顶，一览众山小。\"是化用孔子的名言\"登泰山而小天下\"。"},{"id":1000,"stem":"“会当凌绝顶，一览众山小”，诗中作者要“凌绝顶”的是（）","options":["泰山","嵩山","华山","庐山"],"answer":0,"explanation":"本句出自唐代诗人杜甫作品《望岳》，意思是定要登上那最高峰，俯瞰在泰山面前显得渺小的群山。"},{"id":1001,"stem":"写下“三十功名尘与土，八千里路云和月”表达自己壮志未酬的词人是（ ）","options":["陆游","辛弃疾","岳飞","文天祥"],"answer":2,"explanation":"109 19959276711（vx 同号） 【知识小链接】本句出自南宋抗金民族英雄岳飞创作的一首词《满江红·写怀》 怒发冲冠，凭栏处、潇潇雨歇。抬望眼，仰天长啸，壮怀激烈。 三十功名尘与土，八千里路云和月。莫等闲，白了少年头，空悲切！ 靖康耻，犹未雪。臣子恨，何时灭！驾长车，踏破贺兰山缺。 壮志饥餐胡虏肉，笑谈渴饮匈奴血。待从头，收拾旧山河，朝天阙。 诗意：我愤怒得头发竖了起来，帽子被顶飞了。独自登高凭栏远眺，骤急的风雨刚刚停歇。抬头远望天空，禁不住仰天长啸，一片报 国之心充满心怀。三十多年来虽已建立一些功名，但如同尘土微不足道，南北转战八千里，经过多少风云人生。好男儿，要抓紧时间 为国建功立业，不要空空将青春消磨，等年老时徒自悲切。靖康之变的耻辱，至今仍然没有被雪洗。作为国家臣子的愤恨，何时才能 泯灭！我要驾着战车向贺兰山进攻，连贺兰山也要踏为平地。我满怀壮志，打仗饿了就吃敌人的肉，谈笑渴了就喝敌人的鲜血。待我 重新收复旧日山河，再带着捷报向国家报告胜利的消息！"},{"id":1002,"stem":"“怒发冲冠，凭栏处”是《满江红》里的名句，作者是（）","options":["文天祥","岳飞","陆游","屈原"],"answer":1,"explanation":"本句出自南宋抗金民族英雄岳飞创作的一首词《满江红·写怀》，意思是我愤怒得头发竖了起来，帽子被顶飞了。独 自登高凭栏远眺。"},{"id":1003,"stem":"“莫等闲，白了少年头，空悲切”出自（）","options":["岳飞《满江红》","辛弃疾《正气歌》","文天祥《过零丁洋》","陆游《冬夜读书示子聿》"],"answer":0,"explanation":"本句出自南宋抗金民族英雄岳飞创作的一首词《满江红·写怀》，意思是要抓紧时间为国建功立业，不要空空将青春 消磨，等年老时徒自悲切。"},{"id":1004,"stem":"“待从头，收拾旧山河，朝天阙”是（）留下的词句。","options":["辛弃疾","李清照","文天祥","岳飞"],"answer":3,"explanation":"本句出自南宋抗金民族英雄岳飞创作的一首词《满江红·写怀》，意思是待我重新收复旧日山河，再带着捷报向国家 报告胜利的消息！"},{"id":1005,"stem":"“居高声自远，非是藉秋风”描写的是（ ）","options":["蝉","蟋蟀","杜鹃鸟","画眉鸟"],"answer":0,"explanation":"本句出自唐代诗人虞世南的《蝉》 垂矮饮清露，流响出疏桐。 居高声自远，非是藉秋风。 译文：蝉垂下像帽缨一样的触角吸吮着清澈甘甜的露水，连续不断地鸣叫声从稀疏的梧桐树枝间传出。蝉正是因为在高处它的声音才 能传得远，并非是凭借秋风的力量。 《蝉》是唐代诗人虞世南创作的一首五言绝句；是一首咏物诗。作者托物寓意，一、二句以蝉的栖高饮露、蝉声远传暗喻人的清朗俊 秀、高标逸韵；三、四句分别用一\"自\"字、\"非\"字，正反相生，充满张力，表达出对人的内在品格的热情赞美和高度自信。全诗简练传 神，比兴巧妙，以秋蝉高洁傲世的品格自况，耐人寻味。 咏物中尤多寄托，具有浓郁的象征性。如本诗中句句写的是蝉的形体、习性和声音，而句句又暗示着诗人高洁清远的品行志趣，物我 互释，咏物的深层意义是咏人。 虞世南善书法，与欧阳询、褚遂良、薛稷合称\"初唐四大家\"。"},{"id":1006,"stem":"\"居高声自远，非是藉秋风\"的作者是（）","options":["杨万里","范成大","叶绍翁","虞世南"],"answer":3,"explanation":"本句出自唐代诗人虞世南的《蝉》，意思是蝉正是因为在高处它的声音才能传得远，并非是凭借秋风的力量。"},{"id":1007,"stem":"关于虞世南的《蝉》，以下说法错误的是（ ）","options":["诗人笔下的蝉是拟入化的","这是一首七言绝句","作者虞世南也是一位书法家","这是一首咏物诗"],"answer":1,"explanation":"《蝉》是唐代诗人虞世南创作的一首五言绝句；是一首咏物诗。"},{"id":1008,"stem":"\"可怜九月初三夜，露似真珠月似弓\"运用了（）修辞手法","options":["夸张","比喻","拟人","排比"],"answer":1,"explanation":"本句出自唐代诗人白居易作品《暮江吟》 一道残阳铺水中，半江瑟瑟半江红。 可怜九月初三夜，露似真珠月似弓。 19959276711（vx 同号） 诗意：残阳倒映在江面上，霞光洒下，波光粼粼；江水一半呈现出深深的碧色，一半呈现出红色。最可爱的是那九月初三之夜，露珠 似颗颗珍珠，朗朗新月形如弯弓。 注释：暮江吟：黄昏时分在江边所作的诗。吟：古代诗歌的一种形式。残阳：快落山的太阳的光。也指晚霞。瑟瑟：原意为碧色珍宝， 此处指碧绿色。可怜：可爱。九月初三：农历九月初三的时候。似：像。真珠：即珍珠。月似弓：农历九月初三，上弦月，其弯如弓。 这是一首写景佳作。诗人选取了红日西沉到新月东升这一段时间里的两组景物进行描写，运用了新颖巧妙的比喻，创造出和谐、宁静 的意境，通过吟咏表现出内心深处的情思和对大自然的热爱之情。"},{"id":1009,"stem":"\"可怜九月初三夜，露似真珠月似弓\"中的\"可怜\"的解释是（）","options":["可悲","可爱","可惜","可恶"],"answer":1,"explanation":"本句出自唐代诗人白居易作品《暮江吟》，意思是最可爱的是那九月初三之夜，露珠似颗颗珍珠，朗朗新月形如弯弓。 可怜：可爱。"},{"id":1010,"stem":"可怜九月初三夜，（ ）似真珠（ ）似弓。填入括号内恰当的一项是（ ）","options":["泪；也","泪；月","露；也","露；月"],"answer":3,"explanation":"本句出自唐代诗人白居易作品《暮江吟》 一道残阳铺水中，半江瑟瑟半江红。 可怜九月初三夜，露似真珠月似弓。"},{"id":1011,"stem":"词句\"明月别枝惊鹊，清风半夜鸣蝉\"的词牌名是（ ）。","options":["蝶恋花","西江月","沁园春","丑奴儿"],"answer":1,"explanation":"本句出自宋代词人辛弃疾贬官闲居江西时创作的一首吟咏田园风光的词《西江月·夜行黄沙道中》。 明月别枝惊鹊，清风半夜鸣蝉。稻花香里说丰年，听取蛙声一片。 七八个星天外，两三点雨山前。旧时茅店社林边，路转溪桥忽见。 诗意：皎洁的月光从树枝间掠过，惊飞了枝头喜鹊，清凉的晚风吹来仿佛听见了远处的蝉叫声。田里稻花飘香，蛙声阵阵，似乎在告 诉人们今年是一个丰收年。天边几颗星星忽明忽暗，山前下起了淅淅沥沥的小雨。往日的小茅草屋还在土地庙的树林旁，道路转过溪 水的源头，它便忽然出现在眼前。 此词着意描写黄沙岭的夜景，明月清风，疏星稀雨，鹊惊蝉鸣乌，稻花飘香，蛙声一片。全词从视觉、听觉和嗅觉三方面抒写夏夜的 山村风光，情景交融，优美如画，恬静自然，生动逼真，是宋词中以农村生活为题材的佳作。 西江月是词牌名。茅店是茅草盖的乡村客店。社林是土地庙附近的树林。见同\"现\"，显现的意思。"},{"id":1012,"stem":"\"稻花香里说丰年，听取蛙声一片\"所出自作品的词牌名是（）","options":["清平乐","西江月","江城子","卜算子"],"answer":1,"explanation":"本句出自宋代词人辛弃疾贬官闲居江西时创作的一首吟咏田园风光的词《西江月·夜行黄沙道中》。 明月别枝惊鹊，清风半夜鸣蝉。稻花香里说丰年，听取蛙声一片。 七八个星天外，两三点雨山前。旧时茅店社林边，路转溪桥忽见。"},{"id":1013,"stem":"以下哪一位不属于\"唐宋八大家\"?（）","options":["柳宗元","欧阳修","贺知章","苏洵"],"answer":2,"explanation":"唐宋八大家，又称为\"唐宋散文八大家\"，是唐代和宋代八位散文家的合称，分别为唐代柳宗元、韩愈和宋代欧阳修、苏 洵、苏轼、苏辙、王安石、曾巩八位。其中韩愈、柳宗元是唐代古文运动的领袖，欧阳修、三苏（苏轼、苏辙、苏洵）等四人是宋代 古文运动的核心人物，王安石、曾巩是临川文学的代表人物。"},{"id":1014,"stem":"以下不属于“唐宋八大家”的是（）","options":["韩愈","贺知章","王安石","欧阳修"],"answer":1,"explanation":"唐宋八大家，又称为\"唐宋散文八大家\"，是唐代和宋代八位散文家的合称，分别为唐代柳宗元、韩愈和宋代欧阳修、苏 洵、苏轼、苏辙、王安石、曾巩八位。其中韩愈、柳宗元是唐代古文运动的领袖，欧阳修、三苏（苏轼、苏辙、苏洵）等四人是宋代 古文运动的核心人物，王安石、曾巩是临川文学的代表人物。"},{"id":1015,"stem":"下列中，均为\"唐宋八大家\"的一项是（）","options":["苏洵、曾巩、韩愈、柳宗元","欧阳修、苏辙、辛弃疾、韩愈","苏轼、范仲淹、欧阳修、白居易","王安石、苏辙、韩愈、范仲淹"],"answer":0,"explanation":"唐宋八大家，又称为\"唐宋散文八大家\"，是唐代和宋代八位散文家的合称，分别为唐代柳宗元、韩愈和宋代欧阳修、苏 洵、苏轼、苏辙、王安石、曾巩八位。其中韩愈、柳宗元是唐代古文运动的领袖，欧阳修、三苏（苏轼、苏辙、苏洵）等四人是宋代 古文运动的核心人物，王安石、曾巩是临川文学的代表人物。 19959276711（vx 同号）"},{"id":1016,"stem":"\"百代文宗\"是唐宋八大家中的（）","options":["韩愈","柳宗元","苏轼","王安石"],"answer":0,"explanation":"韩愈是八大家之首，有\"文章巨公\"和\"百代文宗\"之名。"},{"id":1017,"stem":"关于\"唐宋八大家\"以下说法错误的是（ ）","options":["\"唐宋八大家\"是唐代和宋代八位散文家的合称。","\"唐宋八大家\"是\"唐宋古文运动\"的倡导者。","\"唐宋八大家\"之一的苏轼是北宋中期文坛大家。","\"唐宋八大家\"中，苏轼和曾巩是临川文学的代表人物。"],"answer":3,"explanation":"临川文学的代表人物是王安石、曾巩。"},{"id":1018,"stem":"关于\"唐宋八大家\"以下说法正确的是（ ）","options":["\"唐宋八大家\"是唐代和宋代八位经学家的合称。","\"唐宋八大家\"是\"唐宋古文运动\"的倡导者。","\"唐宋八大家\"之一的柳宗元是北宋中期文坛大家。","\"唐宋八大家\"中，苏轼和曾巩是临川文学的代表人物。"],"answer":1,"explanation":"A 是散文家，C 柳宗元是唐朝，D 是王安石、曾巩。"},{"id":1019,"stem":"\"河东先生\"是唐宋八大家中的（ ）","options":["韩愈","柳宗元","苏轼","王安石"],"answer":1,"explanation":"世称\"柳河东\"、\"河东先生\"的是柳宗元。"},{"id":1020,"stem":"\"半山居士\"是唐宋八大家中的（）","options":["韩愈","柳宗元","苏轼","王安石"],"answer":3,"explanation":"王安石，字介甫，晚年号半山，人称\"半山居士\"。"},{"id":1021,"stem":"下列与苏轼身份不符的一项是（ ）","options":["诗人","状元","美食家","书法家"],"answer":1,"explanation":"苏轼，字子瞻，又字和仲，号\"东坡居士\"，南宋高宗朝，赠太师，追谥号\"文忠\"，四川眉山人，是北宋著名的文学家、 书法家、画家、散文家、词人、诗人，豪放派代表人物。苏轼在诗、词、散文、书、画等方面取得了很高的成就，是中国数千年历史 上被公认文学艺术造诣最杰出的大家之一。其散文与韩愈并称\"韩潮苏海\"，与欧阳修并称\"欧苏\"，与黄庭坚并称\"苏黄\"，词与辛弃疾并 称\"苏辛\"，被称为\"中国古代第一全才\"。此外，苏轼也是中国历史上最具盛名的美食家。他发明过一味至今广受欢迎的佳肴东坡肉。"},{"id":1022,"stem":"\"茶圣\"是（ ）","options":["陆羽","徐雷客","郦道元","严羽"],"answer":0,"explanation":""},{"id":1023,"stem":"\"诗圣\"是杜甫，\"书圣\"是王羲之，被称为\"画圣\"的是（ ）","options":["陆羽","张旭","王维","吴道子"],"answer":3,"explanation":"一些常用的称号对应名字： 茶圣一陆羽 茶祖一-神农氏 医圣一张仲景 文圣一孔子 武圣一关羽 书圣一王羲之 史圣司马迁 诗圣一杜甫 画圣一吴道子 药圣一李时珍。"},{"id":1024,"stem":"“同是天涯沦落人”的下一句是（ ）","options":["相逢不必曾相识","相逢何曾不相识","相逢何必曾相识","相逢却不曾相识"],"answer":2,"explanation":"出自唐代的《琵琶行》，上下句是“同是天涯沦落人，相逢何必曾相识！”"},{"id":1025,"stem":"下列关于陶渊明的描述，不正确的是（ ）。","options":["他是魏晋时期诗人","田园诗派代表人物","虽然没有农耕经历，但他很擅长写田园诗","《饮酒》反映了陶渊明追求高洁品行的志趣"],"answer":2,"explanation":"112 19959276711（vx 同号） 【知识小链接】陶渊明是田园诗的开创者。他的田园诗以纯朴自然的语言、高远拔俗的意境，为中国诗坛开辟了新天地，并直接影响 到唐代田园诗派。在他的田园诗中，随处可见的是他对污浊现实的厌烦和对恬静的田园生活的热爱。因为有实际劳动经验，所以他的 诗中洋溢着劳动者的喜悦，表现出只有劳动者才能感受到的思想感情。"},{"id":1026,"stem":"开创中国浪漫主义文学先河的是（）。","options":["《诗经》","《楚辞》","《古诗十九首》","《左传》"],"answer":1,"explanation":"《诗经》开创了中国现实主义文学先河。《楚辞》开创了中国浪漫主义文学先河。"},{"id":1027,"stem":"“万里赴戎机，关山度若飞”出自（）。","options":["《木兰诗》","《从军行》","《出塞》","《燕歌行》"],"answer":0,"explanation":"出自南北朝乐府诗集的《木兰诗》。 解释：不远万里奔赴战场，飞一样跨过一道道的关隘，越过一座座的山峰。"},{"id":1028,"stem":"\"大珠小珠落玉盘\"所形容的是下面哪种乐器的演奏声？（）","options":["琵琶","古琴","古筝","箜篌"],"answer":0,"explanation":"\"嘈嘈切切错杂弹，大珠小珠落玉盘。\"本句出自唐代诗人白居易作品《琵琶行》，是白居易的长篇乐府诗之一。名句\" 同是天涯沦落人，相逢何必曾相识！\"也是出自此诗。此诗通过对琵琶女高超弹奏技艺和她不幸经历的描述，揭露了封建社会官僚腐败、 民生凋敝、人才埋没等不合理现象，表达了诗人对她的深切同情，也抒发了诗人对自己无辜被贬的愤懑之情。"},{"id":1029,"stem":"诗句\"爆竹声中一岁除，春风送暖入屠苏\"中\"屠苏\"指的是（）","options":["春天","房子","一种酒","一种花"],"answer":2,"explanation":"出自北宋政治家王安石创作的一首七言绝句《元日》。 爆竹声中一岁除，春风送暖入屠苏。 千门万户曈曈日，总把新桃换旧符。 这首诗描写新年元日热闹、欢乐和万象更新的动人景象，抒发了作者革新政治的思想感情，充满欢快及积极向上的奋发精神。元日即 春节。屠苏指屠苏酒，饮屠苏酒也是古代过年时的一种习俗，曈曈指太阳升起时光亮而温暖的样子。桃是桃符，也作春联。"},{"id":1030,"stem":"\"千门万户曈曈日，总把新桃换旧符\"中\"新桃\"是指（ ）","options":["早开的桃花","新的桃符","新年的寿桃馒头","新鲜的桃子"],"answer":1,"explanation":"\"新桃\"是指新的桃符。"},{"id":1031,"stem":"\"千门万户曈曈日，总把新桃换旧符\"中，\"曈曈\"的意思是（ ）","options":["太阳升起时","太阳落山时","月亮升起时","月亮落下时"],"answer":0,"explanation":"\"曈曈\"的意思是太阳升起时。"},{"id":1032,"stem":"\"千门万户曈曈日，总把新桃换旧符。\"描绘的传统节日是（ ）","options":["元旦","春节","元宵","腊八"],"answer":1,"explanation":"元日：农历正月初一，即春节。"},{"id":1033,"stem":"如果你穿越到了唐朝，你一定读不到下列哪句诗？（ ）","options":["千门万户曈曈日，总把新桃换旧符。","劝君更尽一杯酒，西出阳关无故人。","一骑红尘妃子笑，无人知是荔枝来。","路人借问遥招手，怕得鱼惊不应人。"],"answer":0,"explanation":"A 出自北宋王安石的《元日》。B 出自唐代诗人王维作品《送元二使安西》。C 出自唐代诗人杜牧作品《过华清宫绝句 三首》。D 出自唐代诗人胡令能作品《小儿垂钓》。"},{"id":1034,"stem":"\"黑发不知勤学早，白首方悔读书迟\"出自（）的《劝学》。","options":["荀子","孟郊","颜真卿","孙权"],"answer":2,"explanation":"本句出自唐代颜真卿的《劝学》 三更灯火五更鸡，正是男儿读书时。黑发不知勤学早，白首方悔读书迟。 诗意.晚上在灯火下学到三更，五更鸡叫又早起学习，这一早一晚正是男儿读书的好时候。少年不知道早起勤奋学习，到老了后悔读书 少就太迟了。 注释：更：古时夜间计算时间的单位，一夜分五更，每更为两小时。午夜 11 点到 1 点为三更。五更：天快亮时，鸡啼叫。黑发：年少 时期，指少年。白首：头发白了，这里指老年。方：才。 19959276711（vx 同号） 《劝学》是唐朝诗人颜真卿所写的一首七言古诗。前两句通过对学习环境描写来表达年少读书时应该勤奋，后两句通过头发颜色变化 来表达年长时时读书已晚。劝勉青少年要珍惜少壮年华，勤奋学习，有所作为，否则，到老一事无成，后悔已晚。"},{"id":1035,"stem":"\"半夜三更\"中\"三更\"指的是（ ）","options":["22：00—24：00","23：00—24：00","23：00—1：00","1：00—3：00"],"answer":2,"explanation":"三更又名子时，指的是晚上十一点到第二天凌晨一点这段时间。古人将夜里的时间分为更和点。一夜等分为五更，一 更也等于现在的二个小时，从晚上七时开始起更，一更指七时至九时，二更指九时至十一时，三更指十一时至次日凌晨一时，四更指 一时至三时，五更指三时至五时。"},{"id":1036,"stem":"\"残灯无焰影幢幢，此夕闻君谪九江\"中\"君\"指的是（）","options":["刘禹锡","白居易","韦应物","柳宗元"],"answer":1,"explanation":"本句出自唐代元稹的《闻乐天授江州司马》 残灯无焰影幢幢，此夕闻君谪九江。垂死病中惊坐起，暗风吹雨入寒窗。 诗意：灯火将熄一片昏暗物影在摇漾，今夜忽然听说你被贬谪到九江。大病中我京得基然从床上坐起，暗夜的风雨吹进窗户，感觉分 外寒冷。 注释：授：授职，任命。江州：即九江郡，在今江西省九江市。司马：官名。残灯：快要熄灭的灯。焰：火苗。幢（chuáng）幢：灯 影昏暗摇曳之状。夕：夜。谪：古代官吏因罪被降职或流放。垂死：病危。 这首诗是元稹得知白居易遭贬之后所写。此诗以景衬情，以景写情，叙事抒情，表现作者对白居易的一片殷殷之情，表达了知道好友 被贬后极度震惊和心中的悲凉。"},{"id":1037,"stem":"\"草铺横野（）里，笛弄晚风（ ）声\"填入诗句中括号里恰当的是（ ）","options":["六七三四","三四六七","五六三四","三四五六"],"answer":0,"explanation":"本句出自唐代诗人吕岩的《牧童》 草铺横野六七里，笛弄晚风三四声。归来饱饭黄昏后，不脱蓑衣卧月明。 这首诗展示了一幅鲜活的牧童晚归休憩图，反映了牧童生活的恬静与闲适。表达了诗人内心世界对远离喧嚣、安然自乐的生活状态的 向往。"},{"id":1038,"stem":"\"大漠沙如雪\"的下一句是（）","options":["燕山月似钩","天涯共此时","何时复西归","江清月近人"],"answer":0,"explanation":"本句出自唐代诗人李贺作品《马诗》，共 23 首，这是第 5 首。 马诗二十三首·其五 李贺（唐代） 大漠沙如雪，燕山月似钩。 何当金络脑，快走踏清秋。 诗意：平沙万里，在月光下像铺上一层白皑皑的霜雪。连绵的燕山山岭上，一弯明月当空，如弯钩一般。什么时候才能给它戴上金络 头，在秋高气爽的疆场上驰骋，建立功勋呢？ 《马诗》是通过咏马、赞马或慨叹马的命运，来表现志士的奇才异质、远大抱负及不遇于时的感慨与愤懑，其表现方法属比体。而这 首诗在比兴手法的运用上却特有意味。四句诗，前两句写景，后两句抒情。景非实地，情是真情；情景相衬，鲜明地表达了诗人意图 立功疆场的强烈感情。这首诗看起来是写马，其实是借马来抒情，抒发诗人怀才不遇，不被统治者赏识，但又热切期望自己的抱负得 以施展，可以为国建立功业。诗句中的金络脑即金络头，用黄金装饰的马笼头。踏是指走，跑，有\"\"奔驰\"之意。清秋是指清朗的秋天。"},{"id":1039,"stem":"\"大漠沙如雪，燕山月似钩。何当金络脑，快走踏清秋\"中“金络脑”是指（ ）","options":["金色的马匹","金色的沙丘","聪明的头脑","黄金装饰的马笼头"],"answer":3,"explanation":""},{"id":1040,"stem":"诗句\"何当金络脑，快走踏清秋\"描写的是（ ）","options":["马","羊","牛","鸡"],"answer":0,"explanation":""},{"id":1041,"stem":"“峨眉山月半轮秋，影入平羌江水流”出自（ ）的诗作。","options":["白居易","贺知章","杜甫","李白"],"answer":3,"explanation":"本句出自唐代诗人李白作品《峨眉山月歌》。这是李白初次出四川时创作的一首依恋家乡山水的诗。 峨眉山月半轮秋，影入平羌江水流。 夜发清溪向三峡，思君不见下渝州。 诗意：高峻的峨眉山前，悬挂着半轮秋月。流动的平羌江上，倒映着清亮月影。夜间乘船出发，离开清溪直奔三峡。想你却难相见， 恋恋不舍去向渝州。 19959276711（vx 同号） 这首诗出自《李太白全集》卷八，是李白年轻时的作品。峨眉山是蜀中大山，也是蜀地的代称。李白是蜀人，因此峨眉山月也就是故 园之月。诗句\"夜发清溪向三峡，思君不见下渝州。\"连用了五个地名，构思精巧，不着痕迹；诗人依次经过的地点是：峨眉山—平羌江 —清溪—三峡—渝州。通过山月和江水展现了一幅千里蜀江行旅图。 注解：半轮秋.半圆的秋月，即上弦月或下弦月。影：月光的影子。平羌：即青衣江，在峨眉山 东北。夜：今夜。发：出发。清溪：指清溪驿。三峡：指长江瞿塘峡、巫峡、西陵峡。君：指峨 眉山月。下：顺流而下。渝州：治所在巴县，今重庆一带"},{"id":1042,"stem":"\"夜发清溪向三峡\"中\"发\"的意思（ ）","options":["头发","散开","出发","兴旺发财"],"answer":2,"explanation":"发：出发。"},{"id":1043,"stem":"以下不是古代中国别称的是（）","options":["九州","赤县","神舟","荆国"],"answer":3,"explanation":"古代中国的别称有神州（也叫赤县神州）、九州、华夏、中夏、中原、函夏、九牧、九域、中华、海内等。\"中国\"一词 最早出现在《诗经》。"},{"id":1044,"stem":"古人所说的\"三不朽\"，语出《左传》，下面不属于\"三不朽\"的是（）","options":["立德","立行","立言","立功"],"answer":1,"explanation":"三不朽指立德、立功、立言。出自《左传》据说，历史上能做到这\"三不朽\"的只有两个半人，一个是孔子，另一个是王 阳明，曾国藩只做到了半个\"三不朽\"。"},{"id":1045,"stem":"以下不属于纪传体断代史的一项是（）","options":["《史记》","《汉书》","《后汉书》","《三国志》"],"answer":0,"explanation":"纪传体断代史是以朝代为断限的史书。始创于中国汉朝东汉时期班固所著的《汉书》。从《史记》到《明史》的二十 四史，除了《史记》以外，均为断代史。\"二十四史\"是中国代 24 部纪传体史书的统称，分别为：《史记》《汉书》《后汉书》《三国 志》《晋书》《宋书》《南齐书》《梁书》《陈书》《魏书》《北齐书》《周书》《隋书》《南史》《北史》《旧唐书》《新唐书》 《旧五代史》《新五代史》《宋史》《辽史》《金史》《元史》《明史》。"},{"id":1046,"stem":"汉语称谓中有\"谦辞\"和\"敬辞\"之分，如谦称自己的母亲为\"家母\"，尊称别人的母亲为（）","options":["令堂","令尊","家严","家慈"],"answer":0,"explanation":"古人对别人称自己长辈时，一般先冠以\"家\"字，称父亲为家父或家严，母亲为家母或家慈。称呼别人的家人则冠以\"令\" 字，如：称别人的父亲为令尊，别人的母亲为令堂，别人的儿子为令郎，别人的女儿为令媛或令爱。这是对别人一种尊称，相当于\"你 的\"或\"您的\"。"},{"id":1047,"stem":"下列称呼不当的是（）","options":["家兄是对自己兄长的称呼。","令堂是对对方母亲的尊称。","令爱是对对方子女的称呼。","先考、先父称已亡故父亲。"],"answer":2,"explanation":"别人的儿子为令郎，别人的女儿为令媛或令爱。"},{"id":1048,"stem":"清明之前的节气是（ ）","options":["立春","春分","谷雨","小满"],"answer":1,"explanation":"24 节气分别为：立春、雨水、惊蛰、春分、清明、谷雨、立夏、小满、芒种、夏至、小署、大署、立秋、处署、白露、 秋分、寒露、霜降、立冬、小雪、大雪、冬至、小寒、大寒。"},{"id":1049,"stem":"下列不属于\"二十四节气\"的一项是（ ）","options":["清明","白露","惊蜇","处暑"],"answer":2,"explanation":"正确应是惊蛰。"},{"id":1050,"stem":"对下面成语所及人物的判断不正确的是（）","options":["纸上谈兵——孙膑","一字千金——吕不韦","洛阳纸贵——左思","望梅止渴——曹操"],"answer":0,"explanation":"纸上谈兵：在纸面上谈论打仗。比喻空谈理论，不能解决实际问题。出自《史记廉颇蔺相如列传》，主人公是赵括。 赵括是战国时期赵国的将军，赵国名将赵奢的儿子。自幼熟读兵书，对于战法理论知识连父亲赵奢都颇有不如，但赵奢认为儿子只会 纸上谈兵，根本不会在实战中取胜。后来秦赵长平之战，赵括果然惨败，自己战死，四十万赵军被秦军活埋。 19959276711（vx 同号）"},{"id":1051,"stem":"曾使\"洛阳纸贵\"的作品是（ ）","options":["曹植的《洛神赋》","左思的《三都赋》","司马相如的《长门赋》","张衡的《二京赋》"],"answer":1,"explanation":"\"洛阳纸贵\"原义是晋代左思《三都赋》写成之后，抄写的人非常多，洛阳的纸因此都涨价了；后比喻著作广泛流传，风 行一时；\"洛阳纸贵\"强调的是文章写得好。"},{"id":1052,"stem":"被英国科学史家李约瑟评价为\"中国科学史上的里程碑\"的著作是（）","options":["《梦溪笔谈》","《天工开物》","《齐民要术》","《农政全书》"],"answer":0,"explanation":"《梦溪笔谈》是我国北宋大科学家沈括的传世著作，其中所记述的许多科学成就均达到了当时世界的最高水平。该书 是中国古代八大科学名著之首，被誉为\"中国科学史上的里程碑\"\"中国科学史上的坐标\"。"},{"id":1053,"stem":"下面为作者登乐游原后而作的诗句是（）","options":["念天地之悠悠，独怆然而涕下。","白日依山尽，黄河入海流。","夕阳无限好，只是近黄昏。","日照香炉生紫烟，遥看瀑布挂前川。"],"answer":2,"explanation":"乐游原在长安（今西安）城南，地势较高，是唐代的游览胜地。李商隐《登乐游原》： 向晚意不适，驱车登古原。 夕阳无限好，只是近黄昏。 李商隐身处的晚唐，总有一种极致奢华过后的颓废感，故而此诗理解为李商隐对唐帝国的感叹。"},{"id":1054,"stem":"\"三月不知肉味\"原为孔子用来形容（）的独特魅力。","options":["书籍","绘画","音乐","美食"],"answer":2,"explanation":"三月不知肉味原为孔子用来形容音乐的独特魅力。孔子在齐国的时候听到了《韶》乐，被深深吸引，以至于三月不知 肉味。该句出自春秋时期孔子的《论语·述而》。现亦用以形容清贫，三个月没有吃过肉。"},{"id":1055,"stem":"有\"孤篇横绝全唐\"之誉的一首初唐诗是（）","options":["《春江花月夜》","《送杜少府之任蜀州》","《登幽州台歌》","《滕王阁诗》"],"answer":0,"explanation":"张若虚的《春江花月夜》，诗融蜻情于景，凭借对自然之景的描绘，探索宇宙和人生哲理，在中国古代诗歌史上具有 里程碑式的意义。"},{"id":1056,"stem":"千古名句\"海上生明月，天涯共此时。\"出自（）","options":["《琵琶行》","《望月怀远》","《水调歌头》","《春江花月夜》"],"answer":1,"explanation":"本句出自唐代诗人张九龄作品《望月怀远》。此诗是望月怀思的名篇，是作者在离乡时，望月而思念远方亲人而写的。 起句\"海上生明月\"意境雄浑阔大，是千古佳句。"},{"id":1057,"stem":"愿将腰下剑，直为斩（ ）","options":["敌顽","单于","于阗","楼兰"],"answer":3,"explanation":"本句出自《塞下曲六首》，是唐代大诗人李白的组诗作品。 塞下曲六首·其一 五月天山雪，无花只有寒。笛中闻折柳，春色未曾看。 晓战随金鼓，宵眠抱玉鞍。愿将腰下剑，直为斩楼兰。 诗意：五月的天山仍是满山飘雪，只有凛的寒气，根本看不见花草。只有在笛声《折杨柳》曲中 才能想象到春光，而现实中从来就没有见过春天。战士们白天在金鼓声中与敌人进行殊死的战斗，晚上却是抱着马鞍睡觉。但愿腰间 悬挂的宝剑，能够早日平定边疆，为国立功。 注释：天山：指祁连山。折柳：即《折杨柳》，古乐曲名。金鼓：指锣，进军时击鼓，退军时鸣金。斩楼兰出自《汉书·傅介子传》。 《塞下曲六首》是唐代诗人李白的组诗作品。六首诗借用唐代流行的乐府题目而写时事与心声，其主题是要求平定边患。全组诗以乐 观高亢的基调和雄浑壮美的意境反映了盛唐的精神风貌，描绘了守边将士在沙场上征战的艰苦生活，歌颂了他们忠心报国的英勇精神。 诗中有对战斗场景的描述，也有对闺中柔情的抒写，内容丰富，意境浑成，格调昂扬，豪气充溢，表现了诗人高尚的爱国情操。"},{"id":1058,"stem":"李白《塞下曲·其一》中的\"愿将腰下剑，直为斩楼兰\"提到的典故与以下哪位历史人物有关（ ）","options":["蔺相如","傅介子","项羽","班超"],"answer":1,"explanation":"斩楼兰出自《汉书·傅介子传》。 19959276711（vx 同号）"},{"id":1059,"stem":"\"功成画麟阁，独有霍嫖姚\"中的\"霍嫖姚\"指的是（）","options":["霍光","李广","霍去病","卫青"],"answer":2,"explanation":"本句出自《塞下曲六首》，是唐代大诗人李白的组诗作品。 塞下曲六首·其三 骏马似风飙，鸣鞭出渭桥。弯弓辞汉月，插羽破天骄。 阵解星芒尽，营空海雾消。功成画麟阁，独有霍嫖姚。 诗意：骏马像一阵旋风驰骋，战士们鸣鞭纵马出了渭桥。背着弓箭辞别了汉地的明月，在战场上弯弓射箭打败了胡人。战争结束后天 上的客星也为之暗淡，军营渐空，海雾已消。功成之后，在麒麟阁的功臣像上，却只有霍嫖姚的画像。 注解：鸣鞭：马鞭挥动时发出声响。渭桥：在长安西北渭水上。天骄：指匈奴。海雾：沙漠上的雾气，指战争的气氛。麟阁：即麒麟 阁。霍嫖挑：即霍去病。"},{"id":1060,"stem":"从题材上看，崔颢的《黄鹤楼》是一首（）","options":["送别诗","七言律诗","游仙诗","思乡诗"],"answer":3,"explanation":"《黄鹤楼》崔颢（唐代） 昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。 晴川历历汉阳树，芳草萋萋鹦鹉洲。日暮乡关何处
