explanation":"出自唐代柳宗元的《江雪》：“千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。”柳宗元笔下的山水诗有个显 著的特点，那就是把客观境界写得比较幽僻，而诗人的主观的心情则显得比较寂寞，甚至有时不免过于孤独，过于冷清，不带一点人 间烟火气。"},{"id":337,"stem":"写下“榆柳萧疏楼阁闲，月明直见嵩山雪”的是唐代诗人（）","options":["孟浩然","孟郊","韩愈","刘禹锡"],"answer":1,"explanation":"出自唐代孟郊的《洛桥晚望》：“天津桥下冰初结，洛阳陌上人行绝。榆柳萧疏楼阁闲，月明直见嵩山雪。”"},{"id":338,"stem":"以下诗句中，不是描写初春景象的是（）","options":["诗家清景在新春，绿柳才黄半未匀。","天街小雨润如酥，草色遥看近却无。","春城无处不飞花，寒食东风御柳斜。","萎蒿满地芦芽短，正是河豚欲上时。"],"answer":2,"explanation":"出自唐代韩翃的《寒食》：“春城无处不飞花，寒食东风御柳斜。日暮汉宫传蜡烛，轻烟散入五侯家。”“春城无处 不飞花，寒食东风御柳斜”中“春城”指春天里的都城长安，“飞花”即花瓣纷纷飘落，点明暮春季节。"},{"id":339,"stem":"“好峰随处改，幽径独行迷”出自（ ）","options":["王维《山居秋暝》","谢灵运《泰山吟》","杜牧《山行》","梅尧臣《鲁山山行》"],"answer":3,"explanation":"出自宋代梅尧臣的《鲁山山行》：“适与野情惬，千山高复低。好峰随处改，幽径独行迷。霜落熊升树，林空鹿饮溪。 人家在何许？云外一声鸡。”这首五言律诗写鲁山行的野景、野趣，突出表现山林的幽静和山行者的愉悦心情。"},{"id":340,"stem":"“蝉噪林逾静，鸟鸣山更幽”的表现手法是（）","options":["以静衬动","以动衬静","动静结合","情景交融"],"answer":1,"explanation":"出自南朝王籍的《入若耶溪》：“艅艎何泛泛，空水共悠悠。阴霞生远岫，阳景逐回流。蝉噪林逾静，鸟鸣山更幽。 此地动归念，长年悲倦游。” 该句用了衬托的手法，以动衬静，渲染山林的幽静。 该句意思是：蝉声高唱，树林却显得格外宁静；鸟鸣声声，深山里倒比往常更清幽。"},{"id":341,"stem":"“劝君更尽一杯酒”中“更”的意思是（）","options":["更加","再，再次","更换","改变"],"answer":1,"explanation":"出自唐代王维的《送元二使安西》：“渭城朝雨浥轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。”该 句意思是：老朋友请你再饮一杯美酒，向西出了阳关就再难遇到故旧亲人。"},{"id":342,"stem":"以下描述错误的是（ ）。","options":["白居易是浪漫主义诗人的代表","白居易是唐朝人","白居易主张“文章合为时而著，诗歌合为事而作”","白居易的《自蜀江至洞庭湖口有感而作》记录了洞庭湖水患"],"answer":0,"explanation":"白居易，字乐天，号香山居士，又号醉吟先生。是唐代伟大的现实主义诗人，唐代三大诗人之一。白居易与元稹共同 倡导新乐府运动，世称“元白”，与刘禹锡并称“刘白”。 白居易的诗歌题材广泛，形式多样，语言平易通俗，有“诗魔”和“诗王”之称。官至翰林学士、左赞善大夫。公元 846 年，白居易 在洛阳逝世，葬于香山。有《白氏长庆集》传世，代表诗作有《长恨歌》、《卖炭翁》、《琵琶行》等。"},{"id":343,"stem":"下列诗文中没有关于思念父母典故的一项是（ ）。","options":["知不足赞扬明明，贵以展臣蓼莪之思。（曹植《上卞太后谏表》）","缅邈寄书黄犬后，凄凉陟帖白云前。（李纲《次退之蓝关韵》） 37 19959276711（vx 同号）","中园日涉非无趣，保此千钟慰北堂。（王安石《和微之林亭》）","关河愁欲遍，缟纻竟谁亲。（顾炎武《过李子德》之四）"],"answer":3,"explanation":"顾炎武是明末清初的著名思想家、史学家、语言学家，他主张经世致用，注重实践和经验，强调以史为鉴，对明朝的 灭亡进行了深入的思考和总结。同时，他也提倡尊重自然、崇尚实践，反对空谈和虚浮，对后世产生了深远的影响。"},{"id":344,"stem":"“少壮不努力，老大徒伤悲”出自（）","options":["《短歌行》","《长歌行》","《论语》","《孟子》"],"answer":1,"explanation":"出自乐府诗集的《长歌行》：“青青园中葵，朝露待日晞。阳春布德泽，万物生光辉。常恐秋节至，焜黄华叶衰。百 川东到海，何时复西归。少壮不努力，老大徒伤悲。”"},{"id":345,"stem":"诗句“家家乞巧望秋月，穿尽红丝几万条”描写的是（ ）。","options":["上元节","七夕节","中元节","中秋节"],"answer":1,"explanation":"出自唐代林杰的《乞巧》。此句简明扼要，形象生动地再现了七夕节的民俗活动，体现出人民过节时的喜悦之情。"},{"id":346,"stem":"“重重叠叠上（），几度呼童扫不开。”括号里应填（ ）","options":["瑶台","亭台","平台","露台"],"answer":0,"explanation":"出自宋代苏轼的《花影》。全诗：重重叠叠上瑶台，几度呼童扫不开。 刚被太阳收拾去，却教明月送将来。（却教一作：又教）"},{"id":347,"stem":"《孟子》与以下哪三部著作合在一起被称作“四书”？（ ）","options":["《论语》《中庸》《大学》","《史记》《论语》《大学》","《史记》《论语》《中庸》","《大学》《中庸》《史记》"],"answer":0,"explanation":"四书，指《大学》《中庸》《论语》《孟子》四种儒家经典。 四书五经，是重要的儒家经典著作。西汉之后学五经，南宋之后学四书。 南宋时，作为宋明理学的集大成者的朱熹将《大学》《中庸》《论语》《孟子》合在一起进行注解，作《四书章句集注》，并将此四 者称其为四书。"},{"id":348,"stem":"“风、雅、颂”与（ ）相关。","options":["《诗经》","《橘颂》","《孟子》","《春秋》"],"answer":0,"explanation":"《诗经》是中国文学史上第一部诗歌总集，收入西周初期至春秋中叶间的诗歌三百零五篇。所谓《诗经》中的\"六义\"， 是指\"风、雅、颂\"三种诗歌形式与\"赋、比、兴\"三种表现手法。"},{"id":349,"stem":"世界上最早使用簧片的乐器是（ ）","options":["瑟","笙","箫","簧"],"answer":1,"explanation":"世界上最早使用自由簧的乐器是笙。笙是我国古老的簧管乐器，历史悠久，能奏和声。它以簧、管配合振动发音，簧 片能在簧框中自由振动。远在 3000 多年前的商代，我国就已有了笙的雏型。"},{"id":350,"stem":"“遥知兄弟登高处，遍插茱萸少一人”中，“一人”是指（）。","options":["王之涣","杜甫","王维","李白"],"answer":2,"explanation":"诗句出自王维诗《九月九日忆山东兄弟》，意思是远远想到兄弟们身佩茱萸登上高处，也会因为少我一人而生遗憾之 情。王维写作此诗时，独自一人漂泊在洛阳与长安之间，“一人”是指王维自己。"},{"id":351,"stem":"以下哪句诗不是岑参所写（ ）","options":["天山雪云常不开，千峰万岭雪崔嵬。","热海亘铁门，火山赫金方。","黄沙西际海，白草北连天。","大漠孤烟直，长河落日圆。"],"answer":3,"explanation":"诗句 D 出自唐代王维的《使至塞上》。此句描写边陲大漠中壮阔雄奇的景象，境界阔大，气象雄浑，一个“孤”字写 出了景物的单调，紧接一个“直”字，却又表现了它的劲拔、坚毅之美。"},{"id":352,"stem":"唐代诗人李白写的《黄鹤楼送孟浩然之广陵》一诗中，黄鹤楼位于中国的哪座城市（）","options":["长沙","南昌","烟台","武汉"],"answer":3,"explanation":"江南三大名楼指的是：江西南昌的滕王阁、湖北武汉的黄鹤楼，湖南岳阳的岳阳楼。 19959276711（vx 同号）"},{"id":353,"stem":"“（）怨遥夜，竟夕起相思。”括号里应填（ ）","options":["情人","何人","友人","亲人"],"answer":0,"explanation":"出自唐代张九龄的《望月怀远》，全文：海上生明月，天涯共此时。情人怨遥夜，竟夕起相思。灭烛怜光满，披衣觉 露滋。不堪盈手赠，还寝梦佳期。"},{"id":354,"stem":"如果你穿越到了唐朝，你一定读不到下列哪句诗？（）","options":["千门万户曈曈日，总把新桃换旧符。","劝君更尽一杯酒，西出阳关无故人。","一骑红尘妃子笑，无人知是荔枝来。","路人借问遥招手，怕得鱼惊不应人。"],"answer":0,"explanation":"“千门万户曈曈日，总把新桃换旧符”出自北宋政治家王安石的《元日》。《元日》是北宋政治家王安石创作的一首 七言绝句。这首诗描写新年元日热闹、欢乐和万象更新的动人景象，抒发了作者革新政治的思想感情，充满欢快及积极向上的奋发精 神。"},{"id":355,"stem":"《黄鹤楼记》的作者是（ ）","options":["崔颢","阎伯理","李白","范仲淹"],"answer":1,"explanation":"《黄鹤楼记》的作者是阎伯理，此文不到三百字，却包含了丰富的内容，而且极具文采。"},{"id":356,"stem":"“河东先生”是唐宋八大家中的（）","options":["韩愈","柳宗元","苏轼","王安石"],"answer":1,"explanation":"柳宗元，字子厚，汉族，出身河东柳氏，世称柳河东、河东先生。因官终柳州刺史，又称柳柳州、柳愚溪。唐代文学 家、哲学家、散文家和思想家。 柳宗元与韩愈共同倡导唐代古文运动，并称为“韩柳”，与刘禹锡并称“刘柳”，与王维、孟浩然、韦应物并称“王孟韦柳”。"},{"id":357,"stem":"下列关于黄鹂的诗句和作者，完全准确的一项是（）","options":["“漠漠水田飞白鹭，阴阴夏木啭黄鹂。”——王维","“映阶碧草自春色，隔叶黄鹂空好音。”——晏殊","“池上碧苔三四点，叶底黄鹂一两声。”——杜甫","“池上碧苔三四点，叶底黄鹂一两声。”——韦应物"],"answer":0,"explanation":"“池上碧苔三四点，叶底黄鹂一两声”作者晏殊。“映阶碧草自春色，隔叶黄鹂空好音”作者杜甫。"},{"id":358,"stem":"以下是咏物诗的是（ ）","options":["《金陵怀古》","《山居秋暝》","《江雪》","《石灰吟》"],"answer":3,"explanation":"明代于谦的《石灰吟》：“千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。”这是一首托物 言志诗。作者以石灰作比喻，表达自己为国尽忠，不怕牺牲的意愿和坚守高洁情操的决心。"},{"id":359,"stem":"被誉为“古今七律第一”的是（ ）","options":["杜甫的《登高》","崔颢的《黄鹤楼》","李白的《登金陵凤凰台》","杜牧的《九日齐山登高》"],"answer":0,"explanation":"“古今七律第一”当属杜甫的《登高》。 《登高》 风急天高猿啸哀，渚清沙白鸟飞回。 无边落木萧萧下，不尽长江滚滚来。 万里悲秋常作客，百年多病独登台。 艰难苦恨繁霜鬓，潦倒新停浊酒杯。"},{"id":360,"stem":"《永遇乐·京口北固亭怀古》中提到的人物是以下哪一个？（）","options":["萧何","韩信","刘备","孙权"],"answer":3,"explanation":"诗中开场提到：“古江山，英雄无觅，孙仲谋处。”孙仲谋指的是孙权。"},{"id":361,"stem":"王勃《滕王阁序》中“怀帝阍而不见，奉宣室以何年。”下列诗句中用典与之相同的是（）。","options":["可怜夜半虚前席，不问苍生问鬼神。","虚沾周举为寒食，实藉君平卖卜钱。","长门谁买千金赋，祖道虚传五鬼文。","谢脁每篇堪讽诵，冯唐已老听吹嘘。"],"answer":0,"explanation":"帝阍：天帝的守门人。出自屈原《离骚》里边那句“吾令帝阍开关兮，倚阊阖而望予。”这里指君主或者朝廷之意。 宣室：长安未央宫的正殿，是皇帝通常召见大臣议事之地。当年西汉时期的贾谊被贬长沙（嗯和后文那句“屈贾谊于长沙”暗扣）四 19959276711（vx 同号） 年后又被汉文帝召回，就在宣室里问贾谊以鬼神之事（那句“不问苍生问鬼神”由来）。 这两句表达王勃报国无门的心情。 “屈贾谊于长沙，非无圣主”：贾谊年少成名，然朝中达官权贵容他不下，屡次诽谤，汉文帝无奈只能把他贬去长沙当了四年太傅。 后来虽有被重新召回却“不问苍生问鬼神，最后郁郁而终。"},{"id":362,"stem":"以下写“月”的诗句中，对应作者正确的是（ ）","options":["海上生明月，天涯共此时。——张子瞻","但愿人长久，千里共婵娟。——苏辙","隔千里兮共明月。——屈原","江天一色无纤尘，皎皎空中孤月轮。——张若虚"],"answer":3,"explanation":"A 这首诗是张九龄在开元二十五年（737）由京师贬荆州长史后所作。全诗围绕望月，抒写怀念远人的幽情。起句“海 上生明月，天涯共此时”为千古传诵的佳句。"},{"id":363,"stem":"杜牧的《赤壁》是一首（ ）","options":["五言绝句","七言绝句","五言律诗","七言律诗"],"answer":1,"explanation":"《赤壁》是一首咏史的七言绝句。作者是唐代杜牧，原文：折戟沉沙铁未销，自将磨洗认前朝。东风不与周郎便，铜 雀春深锁二乔。"},{"id":364,"stem":"诗句“月落乌啼霜满天，江枫渔火对愁眠”描写的是（）境内的景色。","options":["广州","扬州","苏州","杭州"],"answer":2,"explanation":"出自唐朝张继的《枫桥夜泊》：“月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。”枫桥在 今苏州市阊门外。"},{"id":365,"stem":"先秦时代，教育内容以“六艺”为主，下列不属于“六艺”的是（）。","options":["射","御","礼","武"],"answer":3,"explanation":"六艺，是指古代教育的六种科目，即：礼、乐、射、御、书、数，出自《周礼·地官司徒·保氏》。"},{"id":366,"stem":"经魏晋多名士，有著名的竹林七贤，《与山巨源绝交书》是竹林七贤中的谁写给山涛的（）。","options":["阮籍","嵇康","刘伶","向秀"],"answer":1,"explanation":"《与山巨源绝交书》是魏晋时期文学家嵇康写给朋友山涛（字巨源）的一封信，也是一篇名传千古的散文。这封信是 嵇康听到山涛在由选曹郎调任大将军从事中郎时，想荐举他代其原职的消息后写的。信中拒绝了山涛的荐引，指出人的秉性各有所好， 申明他自己赋性疏懒，不堪礼法约束，不可加以勉强。他强调放任自然，既是对世俗礼法的蔑视，也是他崇尚老庄无为思想的一种反 映。文章风格清峻，立意超俗，行文精练。"},{"id":367,"stem":"科举制在中国影响深远，乡试录取者称为“举人”，会试录取者称为“贡生”，那么殿试录取者称为（ ）。","options":["“大元”","“解元”","“进士”","“榜眼”"],"answer":2,"explanation":"中国古代科举制度中，通过最后一级考试殿试者，称为进士。是古代科举殿试及第者之称。"},{"id":368,"stem":"“生当做人杰，死亦为鬼雄，至今思项羽，不肯过江东。”为哪位诗人的作品？（ ）","options":["李白","杜甫","李商隐","李清照"],"answer":3,"explanation":"出自李清照的《夏日绝句》：“生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。”公元 1127 年（靖康二年）， 金兵入侵中原，掳走徽、钦二帝，赵宋王朝被迫南逃。李清照之夫赵明诚出任建康知府。后城中爆发叛乱，赵明诚不思平叛，反而临 阵脱逃。李清照为国为夫感到耻辱，在路过乌江时，有感于项羽的悲壮，创作此诗。"},{"id":369,"stem":"“豆蔻”是指（）岁。","options":["十三","十五","十八","二十"],"answer":0,"explanation":"豆蔻年华，意思是指少女十三四岁。代指少女的青春年华。出自唐·杜牧《赠别》诗。"},{"id":370,"stem":"中国的书院制度自唐代始，有官方和私人设置的两类，下列各书院属于官方创办的是（ ）","options":["岳麓书院","嵩阳书院","集贤书院","白鹿洞书院"],"answer":2,"explanation":"A 项，北宋开宝九年（976 年），潭州太守朱洞在僧人办学的基础上，由官府捐资兴建，正式创立岳麓书院。 B 项，嵩阳书院在历史上曾是佛教、道教场所，但时间最长最有名气的是作为儒教圣地。嵩阳书院初建于北魏太和八年（公元 484 年） ， 名为嵩阳寺，为佛教活动场所，僧待多达数百人。宋景祐二年（公元 1035 年），改名为嵩阳书院，此后一直是历代名人讲授经典的教 19959276711（vx 同号） 育场所。非官方创办。 D 项，唐贞元年间，洛阳人李渤与其兄涉在此隐居读书，渤养一头白鹿“自娱”，鹿通人性，跟随出人，人称“神鹿”。这里本没有 洞，因地势低凹，俯视似洞，称之为“白鹿洞”。北宋初年，宋太宗重视书院教育，御赐《九经》等书于书院，因有朝廷重视，地方 官史予以重视，书院得以发展。故选 C。"},{"id":371,"stem":"友谊的深浅，由下列那一个成语可以看出情义最为深重？（ ）","options":["莫逆之交","金兰之交","刎颈之交","点头之交"],"answer":2,"explanation":"刎颈之交出自《史记·廉颇蔺相如列传》的汉语词语，作者是西汉时期的司马迁。指可以同生死、共患难的朋友。"},{"id":372,"stem":"一提到书法中的草书，人们便会想到“颠张醉素”，请问下列属于颠张的作品的是（ ）","options":["自叙帖","自言帖","中秋帖","黄州寒食帖"],"answer":1,"explanation":"张旭是一位极有个性的草书大家，因他常喝得大醉，就呼叫狂走，然后落笔成书，甚至以头发蘸墨书写，故又有“张 颠”的雅称。后怀素继承和发展了其笔法，也以草书得名，并称“颠张醉素”。 《自言帖》是张旭的作品，《自叙帖》是怀素的作品，《中秋贴》是王羲之的作品，《黄州寒食帖》是苏轼的作品。"},{"id":373,"stem":"鲁迅先生称（）为“史家之绝唱，无韵之离骚”。","options":["史记","汉书","三国志","资治通鉴"],"answer":0,"explanation":"这话是鲁迅对司马迁所著《史记》的评价，它是是中国传记文学的开端。"},{"id":374,"stem":"郑谷有诗曰：“何事文星与酒星，一时钟在李先生。高吟大醉三千百，留着人间伴月明。”诗中的李先生指的是（ ）","options":["李商隐","李贺","李白","李煜"],"answer":2,"explanation":"出自郑谷的《读李白集》。李先生指的是李白。"},{"id":375,"stem":"“四羊方尊”是哪个朝代的文物：（）","options":["周","元","商","夏"],"answer":2,"explanation":"四羊方尊一般指商四羊青铜方尊。商四羊青铜方尊是商代晚期青铜礼器，祭祀用品。1938 年出土于湖南省宁乡县黄材 镇月山铺转耳仑的山腰上（炭河里遗址），现收藏于中国国家博物馆。商四羊青铜方尊是中国现存商代青铜方尊中最大的一件。"},{"id":376,"stem":"“天道有常，不为尧存，不为桀亡。”是百家中那位思想家的观点（）","options":["孟子","韩非子","荀子","老子"],"answer":2,"explanation":"出自荀子《天论》。意思为大自然的运行有其自身规律，这个规律不会因为三皇五帝尧的圣明或者夏朝桀的暴虐而改 变。“天行有常”是指大自然的运行是有一定规律的意思。“制天命而用之”人们只要掌握了自然规律就可以利用它为自身服务，而 不是把人的意志强加给天，去改变规律。反映了荀子朴素的唯物主义自然观。"},{"id":377,"stem":"爵是一种典礼时用的酒器，那么爵有几只脚？（）","options":["三只脚","两只脚","四只脚","五只脚"],"answer":0,"explanation":"爵有三只脚。爵是一种青铜器，尤其是在商代和的西周时期较为常见，主要是用于结盟、会盟、出师、凯旋、庆功、 宴会时使用。"},{"id":378,"stem":"魏晋时期，建安七子是当时文学的代表人物，下列属于建安七子的是（）。","options":["嵇康","曹植","山涛","阮瑀"],"answer":3,"explanation":"建安七子，是汉建安年间七位文学家的合称，包括孔融、陈琳、王粲、徐干、阮瑀、应玚、刘桢。"},{"id":379,"stem":"南宋时期出现了中兴四大诗人，其中陆游声名最著，下列各诗句不是陆游所作的是（ ）。","options":["塞上长城空自许，镜中衰鬓已先斑。","山重水复疑无路，柳暗花明又一村。","折腰曾愧五斗米，负郭元无三顷田。","京华结交尽奇士，意气相期共生死。"],"answer":2,"explanation":"C 是辛弃疾的诗词，它是南宋豪放派词人、将领，有“词中之龙”之称。与苏轼合称“苏辛”，与李清照并称“济南 二安”。"},{"id":380,"stem":"下列哪一个名称的由来与伍子胥有关？（ ）","options":["月老","千金小姐","新郎","岳父"],"answer":1,"explanation":"公元前 522 年，伍子肯父兄被楚平王杀害。伍子胥逃离楚国，投奔吴国。途中他饥困交加，见一位浣纱姑娘竹筐里有 饭，于是上前求乞。姑娘顿生恻隐之心，慨然相赠。伍子肯饱餐之后，出于安全原因，要求对方为他的行为保密。姑娘觉得人格受辱， 19959276711（vx 同号） 遂抱起一石，投水而亡，以死明志。伍子胥见状，羞愤不己。他咬破手指，在石上血书：“尔浣纱，我行乞；我腹饱，尔身溺。十年 之后，千金报德！”后来，伍子胥在吴国当了国相，吴王调遣劲旅攻入楚国。公元前 506 年，伍子胥“掘楚平王墓，其尸鞭之三百”。 伍子胥报了大仇之后，又想到要报恩，但苦于不知姑娘家地址，于是就把千金投入她当时跳水的地方。这就是千金小姐的由来。"},{"id":381,"stem":"下列不属于中医别称的的是（）","options":["杏林","悬壶","黄芪","歧黄"],"answer":2,"explanation":"黄芪是一种补气药，为豆科植物蒙古黄芪或膜荚黄芪的干燥根。黄芪具有补气升阳、固表止汗、利水消肿、生津养血、 行滞通痹、托毒排脓、敛疮生肌的功效。"},{"id":382,"stem":"“茕茕孑立，形影相吊”出自（ ）","options":["《出师表》","《答司马谏议书》","《陈情表》","《报刘一丈书》"],"answer":2,"explanation":"“茕茕孑立，形影相吊”出自李密的《陈情表》。茕茕孑立，形影相吊的意思是孤身一人，只有和自己的身影相互慰 问。形容无依无靠，非常孤单。"},{"id":383,"stem":"下列不属于“十三经”的是（）","options":["周易","尚书","史记","尔雅"],"answer":2,"explanation":"汉代设立《诗》、《书》、《易》、《仪礼》、《春秋》于学官，为五经；唐代加《周礼》、《礼记》，并将《春秋》 分为《春秋左氏传》、《春秋公羊传》、《春秋谷梁传》，为九经；至开成年间刻石国子学，又加《孝经》、《论语》、《尔雅》为 十二经；南宋复增《孟子》，因此有十三经之称。"},{"id":384,"stem":"“形存则神存，形谢则神灭”是由谁提出的（）","options":["范缜","柳宗元","周敦颐","刘禹锡"],"answer":0,"explanation":"“形存则神存，形谢则神灭”的意思是“人的肉身存在则灵魂存在，肉身消亡了灵魂也就消亡了”，这是南北朝范缜 的《神灭论》的核心思想，坚持了物质第一性的原则。"},{"id":385,"stem":"（）时期，国家设立五经博士。","options":["秦始皇","汉武帝","汉高祖","光武帝"],"answer":1,"explanation":"五经博士，学官名。博士源于战国。秦及汉初，博士的职务主要是掌管图书，通古今以备顾问。汉武帝设五经博士， 教授弟子，从此博士成为专门传授儒家经学的学官。"},{"id":386,"stem":"菩提本无树，明镜亦非台，本来无一物，何处惹尘埃，出自（）","options":["慧思","慧能","神秀","玄奘"],"answer":1,"explanation":"这是佛家禅宗六祖慧能大师，针对“身是菩提树，心似明境台。时时勤拂拭，勿使惹尘埃”说的。"},{"id":387,"stem":"宋朝著名的女词人除了大家所熟悉的李清照外，还有一位朱淑真。前者的词集叫做《漱玉词》，请问后者词集是（ ）","options":["《饮水词》","《花外集》","《梦窗词》","《断肠词》"],"answer":3,"explanation":"朱淑真（约 1135~约 1180），号幽栖居士，南宋著名女词人，是唐宋以来留存作品最丰盛的女作家之一。浙江海宁路 仲人（海宁简志），祖籍歙州（治今安徽歙县）。与李清照齐名。 生于仕宦之家。幼聪慧、善读书，但一生爱情郁郁不得志。丈夫是文法小吏，因志趣不合，夫妻不和睦，最终因抑郁早逝。又传淑真 过世后，父母将其生前文稿付之一炬。其余生平不可考，素无定论。现存《断肠诗集》、《断肠词》传世，是劫后余篇。"},{"id":388,"stem":"韩非子的法治思想主要强调什么相结合（）","options":["道、术、势","法、术、势","道、法、势","道、法、师"],"answer":1,"explanation":"韩非子的法治思想强调“法、术、势”三者相结合。韩非（约前 275—前 233）战国晚期韩国（今河南省新郑）人，是 中国古代著名的哲学家、思想家，政论家和散文家，法家思想的集大成者，世称“韩非子”。"},{"id":389,"stem":"鲜卑族俗称其主为（ ）","options":["天子","陛下","可汗","大王"],"answer":2,"explanation":"我国古代鲜卑族对于统治者的尊称是可汗，也称汗、大汗。最早出现于 3 世纪鲜卑部落，记载于《宋书》，类似于汉 字的天子。"},{"id":390,"stem":"西汉哪位皇帝在位是昭君出塞嫁给了呼韩邪单于（ ）","options":["汉元帝","汉武帝","汉高祖","汉明帝"],"answer":0,"explanation":"42 19959276711（vx 同号） 【知识小链接】是西汉的汉元帝在位。昭君出塞是中国历史上的一个故事。王昭君，名倪，字昭君，原为汉宫宫女。南朝（今湖北宜 昌兴山县）秭归人，汉元帝时的宫女，民间把她与西施、貂蝉、杨玉环并称中国古代四大美女，说她们有“沉鱼、落雁、闭月、羞花” 之貌，王昭君就是其中的“落雁”。"},{"id":391,"stem":"“西出阳关无故人”中的“阳关”位于现在哪个省（ ）","options":["新疆","甘肃","宁夏","陕西"],"answer":1,"explanation":"是指现在的甘肃省，具体位置是在敦煌市西南方向的古董滩一带。西汉的时候，在我国的西北部设置关塞，而这个地 方因为在玉门关的南边，所以取名为阳关。"},{"id":392,"stem":"“文章合为时而著，歌诗合为事而作”是由谁提出的（ ）","options":["白居易","柳宗元","周敦颐","刘禹锡"],"answer":0,"explanation":"此句出自新乐府运动倡导者白居易。他在《与元九书》中说：\"自登朝来，年齿渐长，阅事渐多，每与人言，多询时务， 每读书史，多求理道，始知文章合为时而著，歌诗合为事而作。\"这句话的意思是：文章应该为时事而著作，诗歌应该为现实而创作。"},{"id":393,"stem":"“甲骨学”在近代语言文字研究中占有重要地位。在甲骨学史上，有四位学者做出过重大贡献，被钱玄同誉为“甲骨四堂”。四位之中，号“雪堂”的是下列哪位学者（ ）","options":["罗振玉","王国维","董作宾","郭沫若"],"answer":0,"explanation":"民国时期四位著名甲骨文研究者，他们因为字或号中带有“堂”字而被称为“ 甲骨四堂”。文字学家唐兰后来曾评价： “ 自雪堂导夫先路，观堂继以考史，彦堂区其时代，鼎堂发其辞例，固已极一时之盛。” 罗振玉——号雪堂 王国维——号观堂 董作宾——字彦堂 郭沫若——字鼎堂"},{"id":394,"stem":"十三经是历史上十三部儒家经典的总称，分别是《诗经》、《尚书》、《周礼》、《仪礼》、《礼记》.《周易》、《左传》、《公羊传》、《谷梁传》、《论语》、《尔雅》、《孝经》、《孟子》。十三经由汉代的五经逐渐发展而来，最终形成于什么时期？（ ）","options":["唐朝","五代","南宋","明朝"],"answer":2,"explanation":"止其形成过程是：汉代设立《诗》、《书》、《易》、《仪礼》、《春秋》于学官，为五经；唐代加《周礼》、《礼 记》，并将《春秋》分为《春秋左氏传》、《春秋公羊传》、《春秋谷梁传》，为九经；至开成年间刻石国子学，又加《孝经》、《论 语》、《尔雅》为十二经；南宋复增《孟子》，因此有十三经之称。"},{"id":395,"stem":"“金声玉振”这个成语是说哪位才德兼备的名人（ ）","options":["孟子","孔子","庄子","老子"],"answer":1,"explanation":"孟子对孔子有过这样的评价：“孔子之谓集大成。集大成者，金声而玉振之也。金声也者，始条理也；玉振之也者， 终条理也”。 “金声玉振”是以钟发声，以磬收韵，奏乐从始至终。比喻音韵响亮、和谐。也比喻人的知识渊博，才学精到。"},{"id":396,"stem":"民间有个习俗：过年时，把“福”字倒贴在门上；在春节联欢晚会上，也时有倒写“福”字的舞台背景。虽然我们都知道这是借“福倒了”的谐音“福到了”以图吉利，但从何时起倒贴“福”字？（ ）","options":["宋","明","清","民国"],"answer":1,"explanation":"从明朝起人们便将福字倒贴起来，一求吉利，二为纪念马皇后。"},{"id":397,"stem":"下面哪个不是《易传》的内容：（ ）","options":["彖传","穀梁传","象传","文言传"],"answer":1,"explanation":"《易传》是一部战国时期解说和发挥《易经》的论文集，其学说本于孔子，具体成于孔子后学之手。《易传》共 7 种 10 篇，它们是《彖传》上下篇、《象传》上下篇、《文言传》、《系辞传》上下篇、《说卦传》、《序卦传》和《杂卦传》。自汉代 起，它们又被称为“十翼”。"},{"id":398,"stem":"下面哪个不是卦的构成要素：（）","options":["卦形","卦名","卦辞","卦爻"],"answer":1,"explanation":"卦是《周易》中一套有象征意义的符号。以阳爻、阴爻相配合，每卦三爻，组成八卦（即经卦），象征天地间八种基 本事物及其阴阳刚柔诸性。八卦相互组合重叠，组成六十四卦（即别卦），象征事物间的矛盾联系。古代视占卜所得之卦判断吉凶。 19959276711（vx 同号）"},{"id":399,"stem":"下面哪个选项是“四书”的构成（ ）","options":["大学、中庸、论语、尔雅","大学、中庸、论语、孟子","大学、孝经、论语、尔雅","大学、孝经、论语、孟子"],"answer":1,"explanation":"四书，指《大学》《中庸》《论语》《孟子》四种儒家经典。四书五经，是重要的儒家经典著作。西汉之后学五经， 南宋之后学四书。南宋时，作为宋明理学的集大成者的朱熹将《大学》《中庸》《论语》《孟子》合在一起进行注解，作《四书章句 集注》，并将此四者称其为四书。"},{"id":400,"stem":"将《孟子》由子部入经部的人物是谁？（）","options":["孙复","韩愈","王安石","朱熹"],"answer":3,"explanation":"将《孟子》由子部入经部的人物是：朱熹。朱熹（1130 年 10 月 18 日-1200 年 4 月 23 日），字元晦，又字仲晦，号晦 庵，晚称晦翁。祖籍徽州府婺源县，生于南剑州尤溪。中国南宋时期理学家、思想家、哲学家、教育家、诗人。"},{"id":401,"stem":"《春秋繁露》里，提倡的“张三世”不指下列哪个选项（）","options":["传闻","所闻","所见","所识"],"answer":0,"explanation":"《春秋繁露》里，提倡的“张三世”指的是所闻、所见、所识。"},{"id":402,"stem":"濠梁之辩的主人公是（ ）","options":["庄子与慧施","庄子与公孙龙","公孙龙与慧施","孔子与颜"],"answer":0,"explanation":"“濠梁之辩”的主人公是庄子和惠子，记载于《庄子﹒秋水》篇中。庄子（约公元前 369 年—约公元前 286 年），名 周，战国时期宋国蒙人。战国中期思想家、哲学家、文学家，道家学派代表人物，与老子并称“老庄”。"},{"id":403,"stem":"“桑之未落，其叶若沃。”出自（ ）","options":["《王风•黍离》","《小雅•鹿鸣》","《小雅•采薇》","《卫风•氓》"],"answer":3,"explanation":"自先秦诗经·国风·卫风的《氓》。此句以桑叶的润泽有光，比喻女子的容颜亮丽。"},{"id":404,"stem":"《登高》是唐代哪位诗人所写（）","options":["李白","王维","岑参","杜甫"],"answer":3,"explanation":"《登高》为唐代诗人杜甫所写。全诗：“风急天高猿啸哀，渚清沙白鸟飞回。无边落木萧萧下，不尽长江滚滚来。万 里悲秋常作客，百年多病独登台。艰难苦恨繁霜鬓，潦倒新停浊酒杯。”"},{"id":405,"stem":"中国文学史上有“魏晋人物晚唐诗”的说法，魏晋人物的风度一直为后世人企慕。魏晋是士大夫的时代，士大夫们崇尚清谈，清谈便成为一种社会风气，而清谈又立足于三部著作，它们被称为“三玄”，请问“三玄”是指：（ ）","options":["《老子》《庄子》《周易》","《论语》《周易》《老子》","《太玄》《离骚》《庄子》","《太玄》《庄子》《老子》"],"answer":0,"explanation":"魏晋玄学的根本依据就是三玄，三玄指的是《庄子》《老子》《周易》。《隋书·隐逸传·徐则》：\"﹝则﹞善三玄， 精於议论。\""},{"id":406,"stem":"出色的文人总是得到盛誉，我们称杜甫为“诗圣”，李白为“诗仙”，欧阳修为“文圣”，那么请问，下面哪位人物被称为“诗家夫子”：（ ）","options":["苏轼","王昌龄","陆游","李商隐"],"answer":1,"explanation":"王昌龄，字少伯，汉族，山西太原。盛唐著名边塞诗人，后人誉为“七绝圣手”。"},{"id":407,"stem":"关于《诗经》有“四始”之说，《关雎》为《风》始，《文王》为《大雅》始，《清庙》为《颂》始，那么请问，《小雅》之始为下列哪一项：（ ）","options":["《采薇》","《节南山》","《鹿鸣》","《雨无正》"],"answer":2,"explanation":"中国古代诗歌开端、最早的一部诗歌总集《诗经》有“四始”之说，其中，《关雎》为《风》始，《文王》为《大雅》 始，《清庙》为《颂》始，《小雅》之始为《鹿鸣》。"},{"id":408,"stem":"三纲五常即：君为臣纲，父为子纲，夫为妻纲，那么它是由谁提出的（）","options":["孔子","孟子","朱熹","董仲舒"],"answer":3,"explanation":"三纲五常，封建礼教的道德准则。是中国儒家伦理文化中的架构。三纲、五常来源于西汉董仲舒的《春秋繁露》一书， 但最早渊源于孔子。三纲即“君臣义”、“父子亲”、“夫妇顺”，五常指“仁、义、礼、智、信”。 19959276711（vx 同号）"},{"id":409,"stem":"下面哪个文学家被称为“太康之英”：（）","options":["左思","潘岳","阮籍","陆机"],"answer":3,"explanation":"中国文学史上，被称作“太康之英”的是陆机。陆机生在吴郡横山（今江苏昆山），户籍所在地为吴郡吴县市。他出 生名门士族，为孙吴宰相陆逊之孙，父亲陆抗亦为孙吴中后期大将，官至大司马。文章盖世，倾情儒家思想学术研究，非礼不动。"},{"id":410,"stem":"“白日依山尽，黄河入海流。欲穷千里目，更上一层楼。”是王之涣《登鹳雀楼》中的诗句，请问，鹳雀楼在下面哪个省？（ ）","options":["山西","陕西","山东","江西"],"answer":0,"explanation":"鹳雀楼在我国山西省。鹳雀楼，又名鹳鹊楼，位于山西省运城市永济市蒲州镇，总建筑面积 33206 平方米，总重量 58000 吨。鹳雀楼始建于北周时期，在金元光元年遭大火焚毁，1997 年 12 月，鹳雀楼重修，2002 年 10 月 1 日，鹳雀楼正式对游客开放。"},{"id":411,"stem":"中国古代诗歌史上流派纷呈，其中有个影响特别大的诗派叫做“江西诗派”，江西诗派有“一祖三宗”之说，请问是哪一祖？（ ）","options":["杜甫","黄庭坚","苏轼","贾岛"],"answer":0,"explanation":"元代的方回在《瀛奎律髓》中提出“一祖三宗”之说，江西诗派之祖杜甫，诗派之“宗”：黄庭坚、陈师道、陈与义。"},{"id":412,"stem":"柳永的词作虽然一直很受欢迎，但是却不为士大夫所看重，甚至为他们所不耻，因为在他们看来，柳永的词很是俚俗。苏轼也对柳永持贬斥态度，但是柳永有一首词却受到苏轼的推崇，以为“高处不减唐人”，这首词是（ ）","options":["《望海潮》","《八声甘州》","《雨霖铃》","《满江红》"],"answer":1,"explanation":"柳永的《八声甘州》被苏东坡称为“不减唐人高处”。“渐霜风凄惨，关何冷落，残照妆楼。”一句描写高处景象， 连用三个排句，进一步烘托凄凉、萧索的气氛，连一向鄙视柳词的苏轼也赞叹“此语于诗句不减唐人高处”。"},{"id":413,"stem":"古龙小说《圆月弯刀》中的青青的那柄魔刀上刻着一句诗“小楼一夜听春雨”，请问这是哪个诗人的哪首诗？（）","options":["陆游《游山西村》","苏轼《新城道中》","陆游《临安春雨初霁》","陆游《书愤》"],"answer":2,"explanation":"出自宋代陆游的《临安春雨初霁》，全诗：“世味年来薄似纱，谁令骑马客京华。小楼一夜听春雨，深巷明朝卖杏花。 矮纸斜行闲作草，晴窗细乳戏分茶。素衣莫起风尘叹，犹及清明可到家。”"},{"id":414,"stem":"被世人称为“梅妻鹤子”的诗人是哪一位？（）","options":["林逋","梅尧臣","苏舜钦","王安石"],"answer":0,"explanation":"以梅为妻，以鹤为子。比喻清高或隐居。宋代林逋隐居西湖孤山，植梅养鹤，终生不娶，人谓“梅妻鹤子”。"},{"id":415,"stem":"“和谐”一词最早出现在（ ）","options":["《庄子》","《论语》","《孟子》","《管子》"],"answer":3,"explanation":"“和谐”一词最早出自《管子·兵法》。和谐，意思是配合得适当；和睦协调。"},{"id":416,"stem":"我们通常所说的“韩孟诗派”中的孟是指：（）","options":["孟郊","孟浩然","孟光","孟云卿"],"answer":0,"explanation":"“韩孟诗派”中的“韩孟”指的是韩愈和孟郊。“韩孟诗派”是中唐的一个诗歌创作流派，以韩愈为领袖，代表人物 还有孟郊、李贺、卢仝、马异、刘叉等人。"},{"id":417,"stem":"电视剧《三国演义》的片头曲出自明代文学家杨慎的一首词，请问这首词的词牌名是：（）","options":["《满江红》","《浣溪沙》","《蝶恋花》","《临江仙》"],"answer":3,"explanation":"《临江仙·滚滚长江东逝水》是明代文学家杨慎所作《廿一史弹词》第三段《说秦汉》的开场词，后毛宗岗父子评刻 《三国演义》时将其放在卷首。"},{"id":418,"stem":"近代国学大师王国维的一本词话著作名叫：（）","options":["《蕙风词话》","《人间词话》","《白雨斋词话》","《观堂林集》"],"answer":1,"explanation":"《人间词话》是著名国学大师王国维所著的一部文学批评著作。接受了西洋美学思想之洗礼后，以崭新的眼光对中国 旧文学所作的评论。"},{"id":419,"stem":"被闻一多称为“诗中的诗，顶峰上的顶峰”的诗歌作品是：（ ）","options":["刘希夷《代悲白头翁》","张若虚《春江花月夜》 45 19959276711（vx 同号）","杨广《春江花月夜》","李白《蜀道难》"],"answer":1,"explanation":"《春江花月夜》，是唐代诗人张若虚的诗作。全诗共三十六句，每四句一换韵，通篇融诗情、画意、哲理为一体，意 境空明，想象奇特，语言自然隽永，韵律宛转悠扬，洗净了六朝宫体的浓脂腻粉，具有极高的审美价值，被闻一多誉为“诗中的诗， 顶峰上的顶峰”。"},{"id":420,"stem":"我们通常将男女新婚之夜说成“春宵一刻值千金”，其实这句诗是劝人们及时学习的。请问，这句诗出自何人之手？（）","options":["苏轼","秦观","陆游","杨万里"],"answer":0,"explanation":"出自宋代苏轼的《春宵》。全诗：“春宵一刻值千金，花有清香月有阴。歌管楼台声细细，秋千院落夜沉沉。”“春 宵一刻值千金”一句常常用来形容良辰美景的短暂和宝贵，劝勉人们珍惜光阴。"},{"id":421,"stem":"朱熹的学派被称为考亭学派，其学被称为（）","options":["洛学","关学","象数学","闽学"],"answer":3,"explanation":"考亭学派是一以朱熹为代表的的一个学派，因为朱熹是在福建讲学，学生也多为福建人，所以又称为“闽学”。建阳 考亭为朱熹父朱松生前选定的居住地。熹承父志，自绍熙三年（ 1192 年）至庆元六年（1200 年）定居于此并建考亭书院讲学，故名。"},{"id":422,"stem":"北宋五子是指（ ）","options":["朱熹、周敦颐、邵雍、张载、程颐","周敦颐、邵雍、张载、程颢、程颐","朱熹、周敦颐、邵雍、张载、程颢","朱熹、周敦颐、张载、程颢、程颐"],"answer":1,"explanation":"宋明理学的奠基人是周敦颐、邵雍、张载、程颢、程颐，号称“北宋五子”。在这五人中首开风气者当推周敦颐。周 敦颐（1017～1073）字茂叔，道州营道（今湖南道县）人。因其在庐山莲花峰下濂溪畔筑“濂溪书屋”，学者称他“濂溪先生”，称 他创立的理学学派为“濂学”。"},{"id":423,"stem":"佛、法、僧被称为佛教三宝，那么道教三宝是（）","options":["道、经、师","道、法、师","佛、经、师","道、经、僧"],"answer":0,"explanation":"道教三宝是指道、经、师。三宝对应着道教信奉的最高神明三清天尊：以玉清元始天尊为道宝尊；上清灵宝天尊为经 宝尊；太清道德天尊为师宝尊。"},{"id":424,"stem":"《天论》是荀子阐述其宇宙观的重要论文，在这篇文章中，荀子提出了什么杰出命题（ ）","options":["天人合一","天人之分","天行有常","存天理，灭人欲"],"answer":2,"explanation":"荀子在《天论》中提出了“天行有常”的唯物自然主义观，荀子认为大自然的运行有其自身规律，这个规律不会因为 三皇五帝尧的圣明或者夏朝桀的暴虐而改变。"},{"id":425,"stem":"“仓廪实则知礼节，衣食足则知荣辱”出自（ ）","options":["《管子》","《孟子》","《论语》","《大学》"],"answer":0,"explanation":"在春秋时期政治家、军事家管仲创作的一篇散文《管子·牧民》的原文中有\"仓廪实则知礼节，衣食足则知荣辱\"。西汉 史学家司马迁在《史记·管晏列传》的引文中把\"则\"改成了\"而\"，就有了\"仓廪实而知礼节，衣食足而知荣辱\"这一名句。"},{"id":426,"stem":"黄老学派集大成著作：《淮南子》是以谁为首的一批黄老学派作者集体撰著的（ ）","options":["刘安","董仲舒","扬雄","老子"],"answer":0,"explanation":"《淮南子》又名《淮南鸿烈》《刘安子》，是我国西汉时期创作的一部论文集，由西汉皇族淮南王刘安主持撰写，故 而得名。"},{"id":427,"stem":"“四书”中不包括（ ）。","options":["《大学》","《尚书》","《孟子》","《中庸》"],"answer":1,"explanation":"四书，指《大学》《中庸》《论语》《孟子》四种儒家经典。四书五经，是重要的儒家经典著作。西汉之后学五经， 南宋之后学四书。南宋时，作为宋明理学的集大成者的朱熹将《大学》《中庸》《论语》《孟子》合在一起进行注解，作《四书章句 集注》，并将此四者称其为四书。"},{"id":428,"stem":"《南华经》是（）的别称。","options":["《老子》","《周易》","《庄子》","《抱朴子》"],"answer":2,"explanation":"《南华经》本名《庄子》，是道家经文，是战国早期庄子及其门徒所著，唐玄宗天宝元年（724），便尊之为《南华经》， 且封庄子为南华真人。庄子的文章，想象奇幻，构思巧妙，多彩的思想世界和文学意境，善用寓言和比喻，文笔汪洋恣肆，具有浪漫 主义的艺术风格，瑰丽诡谲，意出尘外，乃先秦诸子文章的典范之作。鲁迅先生说：\"其文则汪洋辟阖，仪态万方，晚周诸子之作，莫 19959276711（vx 同号） 能先也。\""},{"id":429,"stem":"“为天地立心，为生民立命，为往圣继绝学，为万世开太平。”是（）的名言。","options":["张载","朱熹","程颐","王守仁"],"answer":0,"explanation":"该句是北宋朝理学大师张载的名言。张载是凤翔郿县（今陕西眉县）横渠镇人，世称横渠先生，因此，这四句话又被 当代哲学家冯友兰先生称为“横渠四句”。"},{"id":430,"stem":"中国书法史上，有诸多不朽的佳作足以彪炳千秋，其中被称为“天下第一行书”的书法作品是（ ）。","options":["王羲之《兰亭序》","米芾《蜀素帖》","颜真卿《祭侄文稿》","苏轼《寒食诗帖》"],"answer":0,"explanation":"《兰亭集序》是中国晋代书圣王羲之在浙江绍兴兰渚山下以文会友时写出，被称为“天下第一行书”，也称《兰亭序》 、 《临河序》、《禊帖》、《三月三日兰亭诗序》等。"},{"id":431,"stem":"下列四个朝代中，时间最靠前的是（ ）。","options":["北魏","南唐","西晋","北宋"],"answer":2,"explanation":"中国朝代顺序如下：夏朝、商朝、周【西周、东周（春秋、战国）】、秦朝、西楚、西汉、新朝、玄汉、东汉、三国 时期（魏、蜀、吴）、晋（西晋、东晋）、十六国【五凉（前凉、后凉、南凉、西凉、北凉），四燕（前燕、后燕、南燕、北燕）， 三秦（前秦、后秦、西秦），二赵（前赵、后赵），一成（成汉），一夏（胡夏）】南北朝[南朝（宋、齐、梁、陈）、北朝（北魏、 东魏、西魏、北齐、北周）]、隋朝、唐朝、五代（后梁、后唐、后晋、后汉、后周）、十国[前蜀、后蜀、吴、南唐、吴越、闽、楚、 南汉、南平（荆南）、北汉]、宋朝（北宋、南宋）、辽、西夏、金、元朝、明朝、清朝。"},{"id":432,"stem":"我国古代最早提出“废黜百家，独尊儒术”的是（ ）。","options":["李斯","荀子","朱熹","董仲舒"],"answer":3,"explanation":"“罢黜百家，独尊儒术”是董仲舒于元光元年（公元前 134 年）提出，在汉武帝时开始推行，《董仲舒传》中记载了 董仲舒提议的原话为“推明孔氏，抑黜百家。”在《武帝纪赞》中，记载了汉武帝的做法是“罢黜百家，表章六经”。"},{"id":433,"stem":"《论语•为政》中，孔子所说的“而立”之年指的是（ ）岁。","options":["20","30","40","50"],"answer":1,"explanation":"年龄的称谓如下：不满周岁-襁褓，23 岁-孩提，女孩 7 岁-年，男孩 8 岁-韶年，幼年总称尝总角，10 岁以下一黄口。 13-15 岁叫舞勺之年，15-20 岁叫舞像之年，12 岁（女）叫金钗之年，13 岁（女）叫豆蔻年华，15 岁（女）叫及笄之年，16 岁（女） 叫碧玉年华，20 岁（女）叫桃李年华，24 岁（女）叫花信年华，30 岁（女）叫老徐娘。20 岁（男）叫弱冠，30 岁（男）叫而立之年， 40 岁（男）叫不惑之年。50 岁叫年逾半百、知命之年、艾服之年、大衍之年；60 岁叫花甲、耳顺之年、杖乡之年；70 岁叫古稀、杖 国之年、致事之年、致政之年；80 岁叫杖朝之年；;90 岁鲐背之年；100 岁叫期颐。八九十岁叫耄耋之年。“而立”之年指的是 30 岁。"},{"id":434,"stem":"中国古代哲学中，有“阴阳八卦”的理论，这一理论出自（）一书。","options":["《尚书》","《论语》","《周易》","《孟子》"],"answer":2,"explanation":"出自《周易》，八卦源于中国古代对基本的宇宙生成、相应日月的地球自转（阴阳）关系、农业社会和人生哲学互相 结合的观念。最原始资料来源为《周易》，内容有六十四卦，但没有图像。《易传》记录“易有太极，始生两仪。两仪生四象，四象 生八卦。”"},{"id":435,"stem":"下列传统节日中，（ ）来源于二十四节气。","options":["元宵节","中秋节","端午节","清明节"],"answer":3,"explanation":"二十四节气：立春、雨水、惊蛰、春分、清明、谷雨、立夏、小满、芒种、夏至、小暑、大暑、立秋、处暑、白露、 秋分、寒露、霜降、立冬、小雪、大雪、冬至、小寒、大寒。处暑之前的节气是立秋。"},{"id":436,"stem":"平常体育报道中经常用到“收官之战”一词，其中“收官”二字最初是（）术语。","options":["书法","围棋","绘画","音律"],"answer":1,"explanation":"“收官”是围棋用语，表示到了最后阶段，已接近结束。官子：也叫“收官”。就是一局棋的最后阶段，经过中盘战 斗，双方领地大体确定，尚有部分空位可以下子，这时称为“收官”。古代的棋也是收官子的，否则无法判断胜负（除了中盘胜）， 只不过一般收官的部分都不计入谱中，这和古人对棋的概念有关。"},{"id":437,"stem":"战国思想家荀子是（ ）学派的集大成者。","options":["儒家","法家","墨家","名家"],"answer":0,"explanation":"荀子名况，时人尊而号为“卿”，故又称荀卿，汉代避宣帝讳而改称孙卿，战国末期赵国（今山西南部）人，先秦著 名思想家。荀子学识渊博，继承了儒学并有所发展，还能吸收一些别家之长，故在儒学中自成一派。在人性问题，荀子主张性恶论， 19959276711（vx 同号） 人性善是教化的结果。在天道观方面，提出“制天命而用之”的人定胜天的思想。荀子对礼很重视，宣扬儒家的王道思想，认为“水 能载舟亦能覆舟”。"},{"id":438,"stem":"“穷则独善其身，达则兼济天下”历来是中国文人的理想，这句话出自（）。","options":["《论语》","《庄子》","《孟子》","《大学》"],"answer":2,"explanation":"该句出自《孟子》，其原句为“穷则独善其身，达则兼善天下。”意思是，不得志的时候就要管好自己的道德修养， 得志的时候就要努力让天下人都能得到好处。"},{"id":439,"stem":"《诗经》中的诗歌，共分为“风”、“雅”、“颂”三类，其中属于民间歌谣的是（）。","options":["大雅","国风","小雅","颂"],"answer":1,"explanation":"“风”，是指国风，即西周时期各国的民间歌谣。“雅”，是周王京畿的乐歌，周王京畿被周人称为夏，古代雅、夏 通用，故有此称。“雅”分大雅、小雅，意与后世的大曲、小曲相近。“颂”，是形容、赞颂的意思，是当时统治者进行祭祀时的乐 歌。"},{"id":440,"stem":"苏轼的名作《水调歌头•明月几时有》与下列哪个节日有关？（ ）","options":["中秋","重阳","清明","上巳"],"answer":0,"explanation":"《水调歌头·明月几时有》是宋代大文学家苏轼于公元 1076 年（宋神宗熙宁九年）中秋在密州时所作。这首词以月起 兴，与弟苏辙七年未见之情为基础，围绕中秋明月展开想象和思考，把人世间的悲欢离合之情纳入对宇宙人生的哲理性追寻之中，反 映了作者复杂而又矛盾的思想感情，又表现出作者热爱生活与积极向上的乐观精神。"},{"id":441,"stem":"成都某著名古迹门口有这样一副名联，“三顾频烦天下计，一番晤对古今情”，它说的是（）。","options":["杜甫","薛涛","诸葛亮","李冰"],"answer":2,"explanation":"这句话的意思是三顾茅庐探讨天下的大事，一番行为感动世人。是题诸葛亮的一副对联。以表达对诸葛亮的钦佩之情。"},{"id":442,"stem":"“静以修身，俭以养德”对我们提出修身养德的基本要求，这句话出自（）。","options":["诸葛亮","孔子","欧阳修","孟子"],"answer":0,"explanation":"出于诸葛亮《诫子书》，意思是静以修善自身，俭朴以淳养品德。《诫子书》是诸葛亮临终前写给他儿子诸葛瞻的一 封家书。从文中可以看作出诸葛亮是一位品格高洁、才学渊博的父亲，对儿子的殷殷教诲与无限期望尽在此书中。全文通过智慧理性、 简练谨严的文字，将普天下为人父者的爱子之情表达得非常深切，成为后世历代学子修身立志的名篇。"},{"id":443,"stem":"中国绘画历史悠久，源远流长，下列画家时代最早的是（ ）。","options":["阎立本","唐寅","郑板桥","文征明"],"answer":0,"explanation":"阎立本（601 年-673 年 11 月 14 日），唐代政治家、画家。唐寅（1470—1523），明代著名画家、文学家。郑板桥（原 名郑燮，1693 年 11 月 22 日-1766 年 1 月 22 日），清朝学者、书画家、“扬州八怪”代表人物。文征明（1428-1528），明代画家、书 法家、文学家。"},{"id":444,"stem":"唐朝是一个诗人辈出，群星璀璨的时代，下列诗人中，生活在晚唐的是（ ）。","options":["王维","陈子昂","李白","李商隐"],"answer":3,"explanation":"李商隐（约 813 年-约 858 年），晚唐著名诗人，字义山，号玉溪生，又号樊南生，原籍怀州河内（今河南沁阳），祖 辈迁荥阳（今河南荥阳市）。"},{"id":445,"stem":"天府之国，历来不乏文人墨客，下列文学家中，谁不是四川人。（ ）","options":["苏轼","司马相如","杜甫","陈子昂"],"answer":2,"explanation":"杜甫（公元 712 年－公元 770 年），字子美，河南巩县（今河南巩义）人，出身京兆杜氏分支之一的襄阳杜氏。自号 少陵野老，唐代伟大的现实主义诗人，与李白合称“李杜”。为了与另两位诗人李商隐与杜牧即“小李杜”区别，杜甫与李白又合称 “大李杜”，杜甫也常被称为“老杜”。"},{"id":446,"stem":"下列文学家中，不属于“唐宋八大家”的是（）。","options":["欧阳修","王勃","柳宗元","王安石"],"answer":1,"explanation":"唐宋八大家，又称为“唐宋散文八大家”，是唐代和宋代八位散文家的合称，分别为唐代韩愈、柳宗元和宋代欧阳修、 苏洵、苏轼、苏辙、王安石、曾巩八位。"},{"id":447,"stem":"佛经有云“救人一命胜造七级浮屠”，浮屠指的是（ ）","options":["酒的代称","佛塔","屠夫","屠苏 48 19959276711（vx 同号）"],"answer":1,"explanation":"“浮屠”的意思就是佛塔，“浮屠”这种说法起源于印度，首次是出现在《佛说骂意经》这本书当中。“浮屠”还有 另外一层意思是释迦牟尼，也就是佛陀。"},{"id":448,"stem":"在中国现代文坛上，以诗歌为主的作家是：（）","options":["郭沫若","艾青","郁达夫","朱自清"],"answer":1,"explanation":"中国现代文坛上以诗歌为主的作家是：艾青。艾青原名蒋海澄，笔名莪加、克阿、林壁等。浙江金华人。1932 年初艾 青自法国留学回国，在上海加入中国左翼美术家联盟，从事革命文艺活动，不久被捕，在狱中写了不少诗，其中的《大堰河——我的 保姆》发表后引起轰动，一举成名。因为郭沫若擅长写散文，郁达夫也是，朱自清擅长于各种文体，所以选 B。"},{"id":449,"stem":"下面诗句中的哪一句，选自曾被称为唐绝句“压卷之作”的诗中：（ ）","options":["欲穷千里目，更上一层楼。","羌笛何须怨杨柳，春风不度玉门关。","海内存知己，天涯若比邻。","停车坐爱枫林晚，霜叶红于二月花。"],"answer":1,"explanation":"被称为“唐绝句压卷之作”的诗是王之涣所作的两首凉州词中的一首，它的原文是：黄河远上白云间，一片孤城万仞 山。羌笛何须怨杨柳，春风不度玉门关。 绝句又称为截句、断句、短句、绝诗，它是近体诗的一种形式，各家对其解释并不一致。绝句由四句组成，分为律绝和古绝，其中律 绝有严格的格律要求，常见的绝句有五言绝句和七言绝句，六言绝句较为少见。"},{"id":450,"stem":"李白的诗风是（）","options":["沉郁、雄浑","豪迈、奔放","通俗、易懂","狂傲、不训"],"answer":1,"explanation":"豪迈雄放是李白诗歌最显著的风格特征。诗中充沛的激情，奔腾的气势，高昂的格调，突出体现了其诗的艺术个性。 李白的绝句自然明快，飘逸潇洒，能以简洁明快的语言表达出无尽的情思。在盛唐诗人中，王维、孟浩然长于五绝，王昌龄等七绝写 得很好，兼长五绝与七绝而且同臻极境的，只有李白一人。"},{"id":451,"stem":"下列诗句不是李白所作（ ）","options":["欲穷千里目，更上一层楼。","君不见高堂明镜悲白发，朝如青丝暮成雪。","弃我去者，昨日之日不可留，乱我心者，今日之日多烦忧。","吾爱孟夫子，风流天下闻。"],"answer":0,"explanation":"A 出自唐代王之涣的《登鹳雀楼》：“白日依山尽，黄河入海流。欲穷千里目，更上一层楼。”"},{"id":452,"stem":"标志着北宋诗文革新运动最高成就的作家是（）","options":["苏轼","王安石","范中淹","欧阳修"],"answer":3,"explanation":"标志着北宋诗文革新运动最高成就的作家是欧阳修。欧阳修是北宋诗文革新运动的领袖，北宋诗文革新运动是以反对 浮靡文风，主张诗文革新为主，进一步推进了古代文学、散文、文论的发展，对后世有着很大的影响。"},{"id":453,"stem":"田园诗派的开创者是（ ）。","options":["谢灵运","陶渊明","王维","李白"],"answer":1,"explanation":"田园诗派的开创者是陶渊明。在中国文学史上，陶渊明第一个以田园景色和田园生活为题材进行了大量的诗歌创作， 他的田园诗创立了中国古典诗歌的一个新流派——田园诗。"},{"id":454,"stem":"先秦两汉时期成就最高、影响最大、通过人物描写来反映历史面貌的是（）。","options":["《左传》","《史记》","《国语》","《汉书》"],"answer":1,"explanation":"《史记》是中国第一部以描写人物为中心的大规模作品，为中国文学建立了一批重要的人物原型，其描写的人物形象 对后代的小说、戏剧有着深远的影响。故正确答案为 B。"},{"id":455,"stem":"《史记》属于什么体史书（ ）","options":["断代体","编年体","纪传体","以上答案都不对"],"answer":2,"explanation":"《史记》是一部纪传体史书，由西汉史学家司马迁所著。《史记》共有一百三十篇，其中本纪十二篇、表十篇、书八 篇、世家三十篇、列传七十篇，记载了从黄帝到汉武帝长达 3000 年左右的历史。"},{"id":456,"stem":"《资治通鉴》是我国北宋年间何人主编的一部编年体的历史巨著？（ ）","options":["王安石","司马光","欧阳修","苏轼"],"answer":1,"explanation":"是由北宋司马光主编的一部多卷本编年体史书，共 294 卷，历时 19 年完成。主要以时间为纲，事件为目，从周威烈王 19959276711（vx 同号） 二十三年（公元前 403 年）写起，到五代后周世宗显德六年（公元 959 年）征淮南停笔，涵盖 16 朝 1362 年的历史。 在这部书里，编者总结出许多经验教训，供统治者借鉴，宋神宗认为此书“鉴于往事，有资于治道”，即以历史的得失作为鉴诫来加 强统治，所以定名为《资治通鉴》。"},{"id":457,"stem":"“但愿人长久，千里共婵娟”，其中婵娟指的是什么？（）","options":["月亮","姻缘","寿命","太阳"],"answer":0,"explanation":"“婵娟”指的是月亮“婵娟”这个词语在刚刚开始的时候指的是一些美丽的人物，后来很多的人就用婵娟来代指嫦娥。 “但愿人长久，千里共婵娟。”这句诗句所传达出来的语境我们可以知道，这里的作者主要写的是希望能够在中秋佳节的时候和千里 之外的人共同赏一轮圆月。所以这里的“婵娟”指的是月亮。"},{"id":458,"stem":"王先生的 QQ 签名档最近改成了“庆祝弄璋之喜”，王先生近来的喜事是：（）","options":["新婚","搬家","妻子生了个男孩","考试通过"],"answer":2,"explanation":"“弄璋之喜”是生了男孩的意思，来源于《诗经·小雅·斯干》，“乃生男子，载寝之牀，载衣之裳，载弄之璋。“璋” 一般代指美玉，而“弄璋”则为玩玉的意思，古人把璋给男孩玩，希望他以后能够拥有像玉一般高尚的品格。"},{"id":459,"stem":"“拱手而立”表示对长者的尊敬，一般来说，男子行拱手礼时应该：（）","options":["左手在外","右手在外","双手交叉","左手在上"],"answer":0,"explanation":"男子行拱手礼时应该左手在外。拱手礼是最具中国特色的见面问候礼仪。拱手礼的正确做法是，行礼时，双腿站直， 上身直立或微俯，左手在前、右手握拳在后，两手合抱于胸前，有节奏地晃动两三下，并微笑着说出您的问候。"},{"id":460,"stem":"我国的京剧脸谱色彩含义丰富，红色一般表示忠勇侠义，白色一般表示阴险奸诈，那么黑色一般表示：（）","options":["忠耿正直","刚愎自用","奸诈阴险","卑鄙无耻"],"answer":0,"explanation":"红色表示赤胆忠心；紫色表示智勇刚义；黄色表示武将骁勇善战、残暴，表示文士内有心计；绿色表示侠骨义肠、性 格暴躁；蓝色表示刚直勇猛、桀骜不驯；黑色表示忠耿正直；白色表示阴险奸诈；粉红色表示年迈气衰的忠勇老者；互灰色表示老年 枭雄；金、银色多用于神、佛、鬼怪，象征虚幻之感。"},{"id":461,"stem":"《三十六计》是体现我国古代卓越军事思想的一部兵书，下列不属于《三十六计》的是：（）","options":["浑水摸鱼","反戈一击","笑里藏刀","反客为主"],"answer":1,"explanation":"“反戈一击”不属于三十六计，反戈一击出自明代罗贯中的《三国演义》第十七回，反戈一击指的是调转枪头向原来 所属的阵营进攻，比喻一旦觉悟，回过头来对自己一方的坏人坏事进行揭露和斗争。"},{"id":462,"stem":"“床前明月光”是李白的千古名句，其中“床”指的是什么？（）","options":["窗户","卧具","井上的围栏","门"],"answer":2,"explanation":"该句中的“床”的具体意思有一定的争议，普遍认同的结论是床乃井床，即井台上的围栏。"},{"id":463,"stem":"“月上柳梢头，人约黄昏后”描写的是哪个传统节日？（ ）","options":["中秋节","元宵节","端午节","七夕节"],"answer":1,"explanation":"该句描写的是正月十五元宵节。出自宋代欧阳修的《生查子·元夕》。全文：去年元夜时，花市灯如昼。月上柳梢头， 人约黄昏后。今年元夜时，月与灯依旧。不见去年人，泪湿春衫袖。"},{"id":464,"stem":"我国古代有很多计量单位，比如诗句“黄河远上白云间，一片孤城万仞山”中的“仞”，一仞约相当于：（ ）","options":["一个成年人的高度","成年人一臂的长度","10 米","30 米"],"answer":0,"explanation":"“一仞”相当于 8 米左右。一仞为八尺，大约一个成年人高度。"},{"id":465,"stem":"下列哪一句诗描写的场景最适合采用水墨画来表现？（ ）","options":["落霞与孤鹜齐飞，秋水共长天一色","返景入深林，复照青苔上","孤舟蓑笠翁，独钓寒江雪","接天莲叶无穷碧，映日荷花别样红"],"answer":2,"explanation":"C 句出自唐代诗人柳宗元的《江雪》。大意是千山万岭不见飞鸟的踪影；千路万径不见行人的足迹。一叶孤舟上，一 位身披蓑衣头戴斗笠的渔翁；独自在漫天风雪中垂钓。最适合采用水墨画来表现"},{"id":466,"stem":"下列哪个成语典故与项羽有关？（）","options":["隔岸观火","暗度陈仓","背水一战","破釜沉舟"],"answer":3,"explanation":"隔岸观火的主人公是范雎、白起。背水一战、暗度陈仓的主人公是韩信。破釜沉舟指的是巨鹿之战，是秦末大起义中 19959276711（vx 同号） 的一场战争，也是我国历史上著名的以少胜多的战役之一。秦二世三年十二月，项羽率领数万楚军，以及联合各诸侯义军救援巨鹿， 在敌多我寡，各诸侯义军畏缩不前的情况下，项羽命令全军破釜沉舟，烧掉房屋帐篷，只带三日口粮，以示不胜则死的决心。"},{"id":467,"stem":"《百家姓》中没有下面哪个姓？（）","options":["乌","巫","肖","萧"],"answer":2,"explanation":"《百家姓》在北宋初年的吴越地区便已流传开来，虽然没有“肖”这个姓，但是有“萧”姓。据记载，起始于春秋时 期宋国的附属国萧国，后来萧国被楚国所灭，其后代便以萧为姓。"},{"id":468,"stem":"“生旦净末丑”是京剧的行当，其中“净”是：（）","options":["男角","女角","儿童","男女均可"],"answer":0,"explanation":"主要是扮演性格、品质或相貌不同于一般、有突出特征的男性角色。分为文净和武净，借以特定的脸谱来表示，一般 有黑脸、老脸、奸白脸、架子花脸等。"},{"id":469,"stem":"我们常说的“十八般武艺”最初指的是什么？（）","options":["使用十八种兵器的技能","十八种武术动作","十八种武器","十八个人"],"answer":0,"explanation":"“十八般武艺”最初指的是十八种兵器，分别是：“刀、枪、剑、戟、鎲、棍、叉、耙、鞭、锏、锤、斧、钩、镰、 扒、拐、弓箭、藤牌”。在很大程度上反映了那个时代武艺发展的面貌。现代人对“十八般武艺”的理解是泛指多种武器，或多种技 能。"},{"id":470,"stem":"下面哪个字常用作表示顺序的第五位？（）","options":["戊","戍","戌","术"],"answer":0,"explanation":"戊字表示顺序的第五位。天干地支简称干支，是夏历以来用来编排年分和日期用的。 天干共十个字：甲、乙、丙、丁、戊、己、庚、辛、壬、癸； 地支共十二个字，排列顺序为：子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥。"},{"id":471,"stem":"诸子百家中名家的特点是注重逻辑辩证，以下哪个典故能体现名家的这一特点？（ ）","options":["“白马非马”","“指鹿为马”","“任人唯亲”","“知人善用”"],"answer":0,"explanation":"“白马非马”是战国时期哲学家公孙龙提出的一个非常有趣、流芳千古的哲学命题。他对这个哲学命题诠释：具体的 马不是抽象的马！具体的事物不是抽象的事物！由此可以看出，“白马非马”这个哲学命题的提出，标志着人类认识能力的提高，已 经注意到了具体与抽象、个别与一般、特殊与普遍、个性与共性的关系问题。公孙龙首次提出这样的问题，为哲学增添了新的范畴。"},{"id":472,"stem":"古人的婚礼在什么时间举行？（）","options":["早上","中午","傍晚","下午"],"answer":2,"explanation":"古人的婚礼一般是在傍晚时分举行，因为婚礼的“婚”跟黄昏的“昏”是同音字，所以古人举行婚礼都是选择在黄昏 时分，而且在古代人们对婚礼的处理步骤是非常的繁琐的，不可能白天能够完成。"},{"id":473,"stem":"“近朱者赤，近墨者黑”所蕴含的道理和下列哪句话最相似？（ ）","options":["青出于蓝，而胜于蓝","公生明，偏生暗","蓬生麻中，不扶而直","氓之蚩蚩，抱布贸丝"],"answer":2,"explanation":"“近朱者赤，近墨者黑”的意思是靠着朱砂的变红，靠着墨的变黑。比喻接近好人可以使人变好，接近坏人可以使人 变坏。指客观环境对人有很大影响。“蓬生麻中，不扶而直”的意思是比喻生活在好的环境里，也能成为好人。这两句意思最为相似。"},{"id":474,"stem":"在古代人们尊称对方的妻子：（）","options":["令爱","令正","令尊","令弟"],"answer":1,"explanation":"称为令正，意思是旧时以嫡妻为正室，因此用作称对方嫡妻的敬词。令尊是对对方父亲的尊称；令爱是对对方女儿的 尊称。令弟是对对方弟弟的尊称。"},{"id":475,"stem":"苏轼在《念奴娇•赤壁怀古》中提到了“羽扇纶巾，谈笑间，樯橹灰飞烟灭”，“羽扇纶巾”形容的是下面哪位历史人物？（）","options":["诸葛亮","周瑜","曹操","关羽"],"answer":1,"explanation":"“羽扇纶巾”指的是周瑜。词出自宋·苏轼《念奴娇·赤壁怀古》词：“遥想公瑾当年，小乔初嫁了，雄姿英发。羽 扇纶巾，谈笑间，樯橹灰飞烟灭。”公瑾是周瑜的字，掌管东吴重兵，吴中皆呼为“周郎”，与诗词的其它内容呼应。 19959276711（vx 同号）"},{"id":476,"stem":"我国古代的很多事物都有自己的雅称，请问我们常说的“润笔”指的是什么？（ ）","options":["文章书画稿费","替人研磨墨汁","为人作序","清洗毛笔"],"answer":0,"explanation":"\"润笔\"源于《隋书郑译传》。有一则故事.郑译为皇上拟诏书，有人戏称他\"笔干了\"，郑答.\"不得一钱，何以润笔？\"从那 以后，大家开始把稿费、书画酬金称为\"润笔\"。"},{"id":477,"stem":"梨园用来指代戏曲界，那么“杏林”指代的是：（ ）","options":["教育界","医学界","文艺界","桃园"],"answer":1,"explanation":"杏林是中医学界的代称。其中由来大概是这样的。三国时期，吴国有一位医生，叫董奉，家住庐山。他常年给人看病， 但是从来不接受别人给的报酬。凡是得了重病被他医好的人，董奉就让他们种植五棵杏树；病情不重的人，被他治好后，就让病人种 一棵杏树。这样十几年后，杏树就有十多万棵了。"},{"id":478,"stem":"太极拳讲究“以柔克刚.以静制动.以弱胜强”，这和哪位思想家的观点不谋而合？（）","options":["老子","孟子","荀子","孔子"],"answer":0,"explanation":"老子《道德经》原文：天下莫柔弱于水，而攻坚强者若之能胜。其无以易之。柔之胜刚，弱之胜强，天下莫不知，莫 能行。是以圣人云：“受国之垢，是谓社稷主。受国之不详，是谓天下王。”正言若反。这段话是说：天下万物没有比水更柔弱的了， 然而攻击坚强壮之物没有能胜过它的，因而水是没有事物可以代替得了的。柔胜刚，弱胜强，天下没有不知道的，但没有哪个能做到。 因而圣人说：“能承担国家屈辱，才能称得上国家的君主；能承担国家的灾难，才能做天下的君王。”正面的言语好像是在反说一样。 这段话可说是老子“以柔克刚、以弱胜强、以静制动”思想的代表。"},{"id":479,"stem":"下列哪个成语和“道听途说”一词意思更接近？（ ）","options":["空穴来风","三人成虎","马马虎虎","谈笑风生"],"answer":1,"explanation":"“道听途说”指路上听到的传闻，随后就在路上传播出去，指没有根据的传闻。“三人成虎”意思是说有三个人谎报 市上有虎，听者就信以为真。比喻讹传一再重复，就可能以假充真。这两个成语意思最为接近。"},{"id":480,"stem":"元太祖铁木真是蒙古草原上的英雄，他被人们尊称为“成吉思汗”，“汗”的意思是大王，那么“成吉思”的意思是：（）","options":["天空","大海","草原","高山"],"answer":1,"explanation":"元太祖铁木真是蒙古草原上的英雄，他被人们尊称为“成吉思汗”，成吉 思汗原名孛儿只斤•铁木真，立国后称成吉思汗。“成吉思”的真正意思是指大海。在大草原上是不可能见到真正意义上的海的，所以 草原上的人们特别向往那神秘莫测、汹涌澎湃、无边无际的大海。"},{"id":481,"stem":"在宫殿大门外一般都有一对石狮或铜狮，请问按建筑方位，古代宫殿大门前成对的石狮一般都是：（）","options":["左雄右雌","左雌右雄","雌雄同体","都是雌的"],"answer":0,"explanation":"左雄右雌（石狮子在大门两侧的摆放都是以人从大门里出来的方向为参照的），符合中国传统男左女右的阴阳哲学。 放在门口左侧的雄狮一般都雕成右前爪玩弄绣球或者两前爪之间放一个绣球（也有雕成张着嘴的）；门口右侧雌狮则雕成左前爪抚摸 幼狮或者两前爪之间卧一幼狮（也有雕成闭着嘴的）。大家也可以从狮子爪下的东西来辨别：如果爪下为球，象征着统一寰宇和无上 权力，必为雄狮。爪下踩着幼狮，象征着子孙绵延，是雌狮。"},{"id":482,"stem":"我们常把结了婚的夫妇称为“结发夫妻”，“结发”在古时是指结婚时：（ ）","options":["丈夫把头发束起来","妻子把头发束起来","把夫妻头发束在一起","把头发都剪掉"],"answer":2,"explanation":"结发是一种婚姻习俗，一种象征夫妻结合的仪式。当夫妻成婚时，各取头上一根头发，合而作一结，男女双方结为夫 妻。"},{"id":483,"stem":"古人创作讲究精益求精，唐代诗人贾岛就曾有过辛苦的创作经历，他“二句三年得，一吟双泪流”的两句诗是：（ ）","options":["“独行潭底影，数息树边身”","“鸟宿池边树，僧敲月下门”","“不见复关，泣涕涟涟”","“昔我往矣，杨柳依依”"],"answer":0,"explanation":"出自贾岛的《题诗后》，这首,是贾岛吟成“独行潭底影，数息树边身”二句后加的注诗。意思是，这两句诗苦思了三 年才得以吟出，吟成不禁双泪长流。"},{"id":484,"stem":"现在我们常用“阳春白雪”和“下里巴人”指代高雅和通俗的文艺作品。请问这两个成语最初指的是什么？（）","options":["文章","画作","乐曲","军人"],"answer":2,"explanation":"元曲是中国古代文化的瑰宝，它与汉斌、唐诗、宋词、明清小说一道，成为中国古代文人聪明才智的见证。元曲盛于 元代，它不同与唐诗宋词的典雅瑰丽，而是大量使用口语方言，将阳春白雪与下里巴人很好的融合在一起，以其广阔的题材、独特的 风格，以及直白押韵的语言，深得历代文人的青睐。 19959276711（vx 同号）"},{"id":485,"stem":"道家思想在我国影响深远，请问历史中的哪一时期最接近道家所主张的无为而治？（ ）","options":["文景之治","光武中兴","贞观之治","开元盛世"],"answer":0,"explanation":"“文景之治（西汉初年的治世）”最接近道家所主张的无为而治。文景之治是指西汉汉文帝、汉景帝统治时期出现的 治世。汉初，因多年战乱导致社会经济凋敝，汉廷推崇黄老治术，采取“轻徭薄赋”、“与民休息”的政策。汉帝国建立之初，利用 民众对秦王朝残厉法制的不满，顺从民意，进行了政治改革。为与民休养生息，采取了无为而治的统治思想，这也是道家思想第一次 登堂入室。"},{"id":486,"stem":"北京有着三千余年的悠久历史和八百多年的建都史，它在不同朝代也有着不同的称谓，下面哪个不是北京的别称？（ ）","options":["大都","中都","上都","南京"],"answer":2,"explanation":"上都不是北京的别称。上都位于今内蒙古自治区锡林郭勒盟正蓝旗境内，多伦县西北闪电河畔。"},{"id":487,"stem":"孔子提倡的中庸之道的理论基础是：（）","options":["阴阳五行","天人合一","道法自然","顺其自然"],"answer":1,"explanation":"孔子提倡的中庸之道的理论基础是天人合一。中庸之道的主题思想是教育人们自觉地进行自我修养、自我监督、自我 教育、自我完善，把自己培养成具有理想人格，达到至善、至仁、至诚、至道、至德、至圣、合外内之道的理想人物，共创“致中和 天地位焉万物育焉”的“太平和合”境界；理论基础是天人合一。"},{"id":488,"stem":"墨子的主要思想是“兼爱”，他所反对的“爱有差等”这一观点是哪家学派的？（）","options":["儒家","法家","道家","名家"],"answer":0,"explanation":"儒家主张“仁爱”，至孟子时，形成了一个更加明确的爱人观——“爱有差等”，具体表现为“亲亲——仁民——爱 物”的实践过程。爱有差等为儒家主张，是人性的一部分，是每个人与生俱来，生而固有的普遍本性。"},{"id":489,"stem":"俗话说“化干戈为玉帛”，干、戈都是武器，其中哪个指的是防御武器？（ ）","options":["干","戈","都不指","都是"],"answer":0,"explanation":"盾在古代起先叫做“干”，后来才叫做盾，也叫做盾牌。古代战场上使用的盾牌大多做成长方形、梯形或圆形，在盾 的背面都有把手，用来抓握。戈是一种装有长柄的冷兵器，它主要用于啄击、钩杀和投掷，比较适用于战车作战。"},{"id":490,"stem":"在我国风俗中，常常避讳 73 和 84 这两个岁数，因为这是两位历史人物去世的虚龄。他们是：（ ）","options":["孔子和孟子","老子和庄子","汉高祖和汉武帝","周武王和周文王"],"answer":0,"explanation":"孔子生于公元前 551 年，死于公元前 479 年，虚岁 73 岁；孟子生于公元前 372 年，死于公元前 289 年，虚岁 84 岁。 连圣人和亚圣都无法过去的年龄坎，对普通人来说更是一个巨大的挑战。"},{"id":491,"stem":"古代战争中指挥军队撤退时要敲击：（）","options":["鼓","锣","钟","木棒"],"answer":1,"explanation":"两军交战的时候，当一方处于败势要撤退之时，指挥将军会跟身边的人说：”鸣金收兵“。所谓鸣金收兵的金就是指 铜锣的意思，不要以为金是金子，金就是指金属的意思，铜锣本身就属于金属，这里就用金代替了铜锣。所以鸣金收兵就是用敲铜锣 的方式，告诉自己的战士马上撤退，不要恋战了。"},{"id":492,"stem":"李清照词中的\"绿肥红瘦\"描写的是什么季节的景色？（）","options":["晚春","仲夏","初秋","初冬"],"answer":0,"explanation":"绿叶茂盛，花渐凋谢，指暮春时节，也形容春残的景象。绿肥红瘦”一句，形象地反映出作者对春天将逝的惋惜之情。"},{"id":493,"stem":"向别人介绍自己的哥哥姐姐时称为“家兄”、“家姐”，那么介绍自己的弟弟妹妹应该用下面哪种称谓？（）","options":["家弟、家妹","舍弟、舍妹","息弟、息妹","堂弟、弟妹"],"answer":1,"explanation":"“家”字一族。用于对别人称自己的辈分高或年纪大的亲戚。如家父、家尊、家严、家君：称父亲；家母、家慈：称 母亲；家兄：称兄长；家姐：称姐姐；家叔：称叔叔。 “舍”字一族。用于对别人称自己的辈分低或年纪小的亲戚。如舍弟：称弟弟；舍妹：称妹妹；舍侄：称侄子；舍亲：称亲戚。"},{"id":494,"stem":"下列哪个成语与秦始皇有关？（ ）","options":["指鹿为马","奇货可居","图穷匕见","三顾茅庐"],"answer":2,"explanation":"A 的主人公是赵高。指鹿为马，本意是指着鹿说是马。后比喻故意颠倒黑白，混淆是非。B 的主人公是吕不韦。奇货可 居意思是，把市面上稀少的货物囤积起来，等待高价出卖。C 出自《战国策》中荆轲刺秦王的故事，其主人公是荆轲与秦王。 19959276711（vx 同号）"},{"id":495,"stem":"下列哪项不是端午节的习俗？（）","options":["挂香包","插艾蒿","登高采菊","喝雄黄酒"],"answer":2,"explanation":"登高采菊不是端午节的习俗，而是重阳节的习俗。重阳节，农历九月初九，二九相重，称为“重九”，民间在该日有 登高的风俗，所以重阳节又称“登高节”。还有重九节、茱萸、菊花节等说法。由于九月初九“九九”谐音是“久久”，有长久之意， 所以常在此日祭祖与推行敬老活动。"},{"id":496,"stem":"唱念做打是中国戏曲表演的四种艺术手段，也是戏曲表演的四项基本功。其中“做”指的是：（）","options":["面部表情","舞蹈动作","器械表演","杂技"],"answer":1,"explanation":"“唱”指的是唱功。“做”指的是做功，也就是表演。“念”指的是念白。而“打”则指的是武功。唱指歌唱，念指 具有音乐性的念白，二者构成歌舞化戏曲表演艺术两大要素之一的“歌”；做指舞蹈化的形体动作，打指武术和翻跌的技艺，二者结 合，构成另一大要素的“舞”。"},{"id":497,"stem":"“态生两靥之愁，娇袭一身之病”是宝玉对黛玉的第一印象，其中“靥”是指：（）","options":["酒窝","眼睛","嘴角","腮帮"],"answer":0,"explanation":"该句意思是：嘴角两边的酒窝显着淡淡的忧愁，身子柔弱如同承袭了一身的病。“靥”指的是酒窝。"},{"id":498,"stem":"孟子说：“君子有三乐”，下列哪项不在其“三乐”之列？（ ）","options":["父母俱存，兄弟无故","仰不愧于天，俯不怍于人","乡里无不称其善也","得天下英才而教育之"],"answer":2,"explanation":"出自《孟子》的《尽心章句上》。一乐家庭平安，二乐心地坦然，三乐教书育人。原文是孟子曰：“君子有三乐，而 王天下不与存焉。父母俱存，兄弟无故，一乐也；仰不愧于天，俯不怍于人，二乐也；得天下英才而教育之，三乐也。”"},{"id":499,"stem":"“不以物喜，不以己悲”出自哪篇目哪篇古文？（ ）","options":["《醉翁亭记》","《岳阳楼记》","《黄鹤楼送孟浩然之广陵》","《望洞庭》"],"answer":1,"explanation":"出自北宋范仲淹的《岳阳楼记》。大致意思是：不因外物好坏、自己得失而或喜或悲。"},{"id":500,"stem":"“水则载舟，水则覆舟”是谁的名言？（）","options":["老子","荀子","庄子","孟子"],"answer":1,"explanation":"“水则载舟，水则覆舟”比喻民可拥护君主，也能推翻君主。君王好比是船，百姓好比是水，水可以使船行驶，也可 以使船淹没。出自《荀子·王制》与《荀子·哀公》：\"君者舟也，庶人者水也，水则载舟，水则覆舟。\""},{"id":501,"stem":"“揭竿为旗，斩木为兵”形容的是哪一场起义？（ ）","options":["赤眉起义","陈胜吴广起义","绿林起义","四黄巾起义"],"answer":1,"explanation":"这个成语出自西汉贾谊的《过秦论》，讲的是秦末陈胜、吴广领导的农民起义的事情。"},{"id":502,"stem":"下面哪位诗人是“初唐四杰”之一？（）","options":["王维","王勃","李白","孟浩然"],"answer":1,"explanation":"“初唐四杰”是中国唐代初年，文学家王勃、杨炯、卢照邻、骆宾王的合称，简称为“王杨卢骆”。四杰齐名，原并 非指其诗文，而主要指骈文和赋而言。后遂主要用以评其诗。"},{"id":503,"stem":"“词苑千载，群芳竞秀，盛开一枝女儿花”说的是哪位历史上的哪位才女？（ ）","options":["朱淑真","秦良玉","李清照","蔡琰"],"answer":2,"explanation":"“词苑千载，群芳竞秀，盛开一枝女儿花”是诗人臧克家在李清照纪念堂题写的对联。李清照（1084 年 3 月 13 日—1155 年 5 月 12 日），号易安居士，汉族，齐州章丘（今山东章丘）人。宋代女词人，婉约词派代表，有“千古第一才女”之称。"},{"id":504,"stem":"古人用“父母教，须敬听；父母责，须顺承”来劝谕人们要尊敬父母，这句话出自：（）","options":["《弟子规》","《三字经》","《千字文》","《论语》"],"answer":0,"explanation":"出自清朝·李毓秀的《弟子规》。大致意思是：父母教导你的时候，你要以尊敬的心态去听，责备你的时候，你要顺 着父母意思去承受。 19959276711（vx 同号）"},{"id":505,"stem":"“弱冠”指的是男子多少岁？（）","options":["十五岁","二十岁","三十岁","四十岁"],"answer":1,"explanation":"古代男子二十岁行冠礼，表示已经成人，因还没到壮年，叫作弱冠，后泛指男子二十左右的年纪。"},{"id":506,"stem":"“入木三分”这个成语原本是用来形容什么的？（）","options":["文章","书法","绘画","音乐"],"answer":1,"explanation":"传说王羲之笔法有力，在板上写字，木工刻字时发现字迹透入木板有三分深。见于唐张怀瓘《书断·王羲之》。后用 来形容书法笔力强劲。也用来比喻分析问题深刻。"},{"id":507,"stem":"《诗经》是我国第一部诗歌总集，《诗经》里面包括多少首诗？（）","options":["三百首","三百零五首","二百首","三百一十五首"],"answer":1,"explanation":"《诗经》是中国文学史上第一部诗歌总集，收入西周初期至春秋中叶间的诗歌三百零五篇。所谓《诗经》中的\"六义\"， 是指\"风、雅、颂\"三种诗歌形式与\"赋、比、兴\"三种表现手法。"},{"id":508,"stem":"《孙子兵法》的作者是：（ ）","options":["孙武","孙膑","孙权","白起"],"answer":0,"explanation":"《孙子兵法》的作者是有着“兵圣”之称的孙武。孙武是春秋时期有名的军事家，他的著作《孙子兵法》在后来的军 事领域被广泛的推广应用，而目前这本兵书更是被翻译成各种各样的文字在世界范围内传播。"},{"id":509,"stem":"汉代“四家诗”属古文经学的是（）","options":["齐","鲁","韩","毛"],"answer":3,"explanation":"汉代“四家诗”属古文经学的是毛诗，四家诗分别是鲁诗、齐诗、韩诗、毛诗，前三家也称三家诗，属“今文诗”。 四家诗在诗义说明、文字解说方面，都有不同。"},{"id":510,"stem":"“海上生明月，天涯共此时”是谁的名句？（）","options":["王勃","张九龄","张若虚","卢照邻"],"answer":1,"explanation":"出自唐代张九龄的《望月怀远》，全诗：“海上生明月，天涯共此时。情人怨遥夜，竟夕起相思。灭烛怜光满，披衣 觉露滋。不堪盈手赠，还寝梦佳期。”"},{"id":511,"stem":"成语“机不可失”出自张九龄之笔，它的下句是：（ ）","options":["时不再来","失不再来","时不在来","失不在来"],"answer":0,"explanation":"《旧五代史晋书安重荣传》有句名言：“机不可失，时不再来。”为唐代张九龄所作，用途广泛，主要寓意时间和机 会难得，要把握有利条件，不容错过，很有哲理性。善于抓住机会。机会往往留给有准备的人，而且只有一次。"},{"id":512,"stem":"“烽火连三月，家书抵万金”古代书信通过邮驿传递。唐代管理这类工作的中央管理机构是：（）","options":["尚书省","中书省","门下省","吏部"],"answer":0,"explanation":"唐代管理这类工作的中央管理机构是：尚书省，属于官僚机构。南朝宋得名，前身为“尚书台”。由汉代皇帝的秘书 机关尚书发展而来。是魏晋至宋的中央最高政令机构，为中央政府最高权力机构之一。"},{"id":513,"stem":"陕西省一块著名的“无字碑”，它与哪位皇帝有关？（ ）","options":["秦始皇","武则天","李世民","李隆基"],"answer":1,"explanation":"乾陵无字碑，为武则天所立。位于陕西省咸阳市区西北方五十公里处的乾陵。在乾陵司马道东侧，北靠土阙，南依翁 仲，西与述圣纪碑相对，奇崛瑰丽，巍峨壮观。"},{"id":514,"stem":"西湖的白堤的得名与哪位诗人有关？（）","options":["白居易","李白","王维","孟浩然"],"answer":0,"explanation":"西湖白堤是因为白居易而得名的。西湖白堤，原名“白沙堤”，在唐即称白沙堤、沙堤，其后在宋、明又称孤山路、 十锦塘。唐代诗人白居易任杭州刺史时有诗云：“最爱湖东行不足，绿杨荫里白沙堤。”即指此堤。后人为纪念这位诗人，称为白堤。"},{"id":515,"stem":"孟子说：“不以规矩，不成方圆”，这里“规矩”的意思是：（ ）","options":["法律条文","美德善行","圆规曲尺","道德准则 55 19959276711（vx 同号）"],"answer":2,"explanation":"出自《孟子·离娄上》。规：圆规。矩：曲尺。意思是：不使用圆规和曲尺，就不能准确地画出方形和圆形。用来比 喻行事如果没有准则，就什么事情也办不好。"},{"id":516,"stem":"“一琴一鹤”所形容的是：（ ）","options":["为政清简","平安长春","淡泊名利","与世长辞"],"answer":0,"explanation":"原指宋朝赵抃去四川做官，随身携带的东西仅有一张琴和一只鹤；形容行装简少，也比喻为官清廉。出自宋·沈括《梦 溪笔谈》卷九。"},{"id":517,"stem":"“夕阳无限好，只是近黄昏”是谁的诗句？（）","options":["李商隐","骆宾王","李白","杨炯"],"answer":0,"explanation":"出自唐代李商隐的《登乐游原》，全诗：“向晚意不适，驱车登古原。夕阳无限好，只是近黄昏。”"},{"id":518,"stem":"《红楼梦》是我国古代著名的长篇小说之一，它的别名是：（ ）","options":["《金陵记》","《石头记》","《西厢记》","《琵琶记》"],"answer":1,"explanation":"《红楼梦》的作者是曹雪芹，原名《石头记》，中国古典长篇章回小说，是中国四大名著之一。"},{"id":519,"stem":"成语“一衣带水”中的“水”原指：（）","options":["黄河","长江","淮河","海河"],"answer":1,"explanation":"这个“水”是指长江。原意是指一水之隔，水面狭窄，很容易渡过。后来也常指江河湖海等水域不足以限制人们的交 往。现多用来比喻两国交往，双方虽有河海之隔，但不足以成为交往的障碍。"},{"id":520,"stem":"“问世间，情为何物，直教生死相许”这句诗是谁写的？（）","options":["元好问","柳永","晏殊","李清照"],"answer":0,"explanation":"出自金、元之际著名文学家元好问的《摸鱼儿·雁丘词》。这首咏物词是词人为雁殉情而死的事所感动而作的，寄托 自己对殉情者的哀思。全词紧紧围绕“情”字，以雁拟人，谱写了一曲凄恻动人的恋情悲歌。在词中，作者驰骋丰富的想象，运用比 喻、拟人等手法，对大雁殉情而死的故事，展开了深入细致的描绘，再加以充满悲剧气氛的环境描写的烘托，塑造了忠于爱情、生死 相许的大雁的艺术形象，谱写了一曲凄婉缠绵，感人至深的爱情悲歌，是为中国古代歌颂忠贞爱情的佳词。"},{"id":521,"stem":"中国历史上被誉为“药王”的是：（）","options":["扁鹊","华佗","孙思邈","李时珍"],"answer":2,"explanation":"“药王”其实指的是在隋代和唐代早期的医药学家孙思邈。"},{"id":522,"stem":"下面哪句话是孔子说的？（ ）","options":["有朋自远方来，不亦乐乎！","天下兴亡，匹夫有责。","劳心者治人，劳力者治于人。","老吾老，以及人之老。"],"answer":0,"explanation":"A 是《论语》开篇的第一句；B 的作者是清代著名学者顾炎武；C 出自《孟子》的《滕文公章句上》。D 此句出自《齐 桓晋文之事》，选自《孟子·梁惠王上》。"},{"id":523,"stem":"在古代，人们将乐器分为“丝”、“竹”，分别指弹弦乐器和吹奏乐器，其中哪个是指吹奏乐器？（ ）","options":["丝","竹","金","木"],"answer":1,"explanation":"“丝\"指弦乐器，\"竹\"指管乐器（吹奏乐器），丝竹（或称管弦）作为一种演出形式，早在《晋书·乐志》中就有“丝 竹更相和”、“凡此诸曲，始皆徒歌，既而被之管弦。”"},{"id":524,"stem":"“在天愿做比翼鸟，在地愿为连理枝”这句诗描写的是谁的爱情故事？（）","options":["牛郎和织女","唐明皇和杨贵妃","周瑜和小乔","吕布和貂蝉"],"answer":1,"explanation":"该句出自晚唐白居易的《长恨歌》。这首诗是他有感于唐明皇、杨贵妃的故事而创作的。在这首长篇叙事诗里，作者 叙述了唐玄宗、杨贵妃在安史之乱中的爱情悲剧。"},{"id":525,"stem":"中国人常说“五福临门”，下面哪一项是属于“五福”的？（）","options":["品德高尚","子孙成群","儿孙孝顺","知识丰富"],"answer":0,"explanation":"五福临门是指：第一福是长寿；第二福是富贵；第三福是康宁；第四福是好德；第五福是善终。五福这个名词，原出 于《书经》和《洪范》。现在已成为家喻户晓的辞句了。代表的都是祝愿和好意头，希望得到祝福的人能够长寿、富贵、身体健康且 19959276711（vx 同号） 心灵安宁、有美德、不遭横祸而善终。"},{"id":526,"stem":"“文章千古事，得失寸心知”是谁的名句？（）","options":["李白","杜甫","孟浩然","骆宾王"],"answer":1,"explanation":"出自唐代杜甫的《偶题》，该句意思是：文章是传之千古的事业，而其中甘苦得失只有作者自己心里知道。"},{"id":527,"stem":"“生当作人杰，死亦为鬼雄，至今思项羽，不肯过江东。”是谁咏赞项羽的名句？（）","options":["辛弃疾","李清照","高适","岑参"],"answer":1,"explanation":"出自李清照的《夏日绝句》：“生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。”公元 1127 年（靖康二年）， 金兵入侵中原，掳走徽、钦二帝，赵宋王朝被迫南逃。李清照之夫赵明诚出任建康知府。后城中爆发叛乱，赵明诚不思平叛，反而临 阵脱逃。李清照为国为夫感到耻辱，在路过乌江时，有感于项羽的悲壮，创作此诗。"},{"id":528,"stem":"陛下是古时对君王的尊称，其中“陛”的意思是：（ ）","options":["宫殿的台阶","天的别称","玉玺","牌匾"],"answer":0,"explanation":"“陛”的意思是：宫殿的台阶。东汉许慎《说文》：升高阶也。（译：登上高阶）从阜，坒声。本义是台阶。特指皇 宫的台阶。"},{"id":529,"stem":"下面哪个剧种被称为“中国百戏之师”？（）","options":["京剧","黄梅戏","昆曲","越剧"],"answer":2,"explanation":"昆曲被称为“中国百戏之师”，也被称为“百戏之祖”、“中国戏曲之母”。昆曲有如此称号的原因也是从明朝中期 到清朝中期昆曲是当时影响最大的剧种，并且后来很多剧种都是在昆曲的基础上发展起来的。昆曲是汉族传统戏曲最古老的剧种之一， 中国古老戏曲除了昆曲还有汉剧、善书、湖北大鼓、湖北小曲、长阳南曲、地花鼓等等，这些古老的戏曲对于之后其他种类的剧种的 产生和发展都存在着一定的影响。"},{"id":530,"stem":"我国现在存最早的兵书是：（ ）","options":["《孙子兵法》","《孙膑兵法》","《司马法》","《纪效新书》"],"answer":0,"explanation":"中国现存最早的兵书是《孙子兵法》，也是世界公认的现存最古老的军事理论著作。《孙子兵法》又称《孙武兵法》、 《吴孙子兵法》、《孙子兵书》《孙武兵书》等，是中国现存最早的兵书，也是世界上最早的军事著作，被誉为“兵学圣典”。"},{"id":531,"stem":"唐诗“东边日出西边雨”的下一句是：（）","options":["道是无晴还有晴","也无风雨也无晴","既无晴来也无雨","道是有晴还无晴"],"answer":0,"explanation":"出自中唐诗人刘禹锡的《竹枝词》，原文：“杨柳青青江水平，闻郎江上唱歌声。东边日出西边雨，道是无晴还有晴。” 这是一首描写青年男女爱情的歌。它描写了一个初恋的少女在杨柳青青、江平如镜的清丽的春日里，听到情郎的歌声所产生的内心活 动。"},{"id":532,"stem":"“苦心人，无不负，卧薪尝胆，三千越甲可吞吴”描写的是谁？（）","options":["伍子胥","勾践","李世民","孙权"],"answer":1,"explanation":"“苦心人，天不负，卧薪尝胆，三千越甲可吞吴”描写的是勾践，勾践卧薪尝胆，仅用三千兵马，就灭亡了吴国。这 句话的意思是：苦心人，天也不会辜负他。就像勾践卧薪尝胆，仅以三千越甲，吞并了吴国。"},{"id":533,"stem":"下面哪句诗的作者离开家的时间更长？（ ）","options":["人归落雁后，思发在花前","儿童相见不相识，笑问客从何处来","人生得意须尽欢，莫使金樽空对月。","曾经沧海难为水，除却巫山不是云。"],"answer":1,"explanation":"A 薛道衡《人日思归》：入春才七日，离家已二年。人归落雁后，思发在花前。 B 贺知章《回乡偶书》：少小离家老大回，乡音无改鬓毛催。儿童相见不相识，笑问客从何处来。由此可知，B 句诗的作者离家时间更 长。CD 未涉及离开家。"},{"id":534,"stem":"《在水一方》的歌词来源于：（ ）","options":["《诗经》","《陌上桑》","《楚辞》","《孔雀东南飞》"],"answer":0,"explanation":"《在水一方》的歌词来源于《诗经·蒹葭》。原文： 蒹葭苍苍，白露为霜。所谓伊人，在水一方。 溯洄从之，道阻且长。溯游从之，宛在水中央。 蒹葭萋萋，白露未晞。所谓伊人，在水之湄。 溯洄从之，道阻且跻。溯游从之，宛在水中坻。 19959276711（vx 同号） 蒹葭采采，白露未已。所谓伊人，在水之涘。 溯洄从之，道阻且右。溯游从之，宛在水中沚。"},{"id":535,"stem":"我国古代对于年龄有很多独特的称呼，其中满一百岁被称为：（ ）","options":["期颐","耄耋","不惑之年","杖朝之年"],"answer":0,"explanation":"古代年龄称呼：不满周岁——襁褓；10 岁以下——黄口；幼年——总角、孩提 15 岁左右——束发；男子 20 岁——弱 冠；30 岁——而立之年；40 岁——不惑之年；50 岁——知天命；60 岁——花甲、耳顺之年；70 岁——古稀、致事之年、致政之年； 80 岁——杖朝；八九十岁——耄耋；90 岁——鲐背之年；100 岁——期颐。"},{"id":536,"stem":"文人对各种植物有自己的偏爱，陶渊明喜爱菊花，北宋文豪苏东坡则说过：宁可食无肉，不可（）","options":["居无松","居无竹","居无梅","居无菊"],"answer":1,"explanation":"北宋文豪苏东坡说过“宁可食无肉，不可居无竹”意思是：宁可不吃肉，但住的地方也要有竹子作伴。出自《於潜僧 绿筠轩》。"},{"id":537,"stem":"王实甫在《西厢记》中写道：“淋漓襟袖啼红泪，比司马青衫更湿”，其中“江州司马”指的是：（）","options":["司马相如","崔莺莺","白居易","杜甫"],"answer":2,"explanation":"司马，古代官名，唐代诗人白居易曾贬官为江州司马。司马的衣衫为泪水所湿。形容极度悲伤。白居易《琵琶行》诗： “座中泣下谁最多，江州司马青衫湿。”因此“江州司马”指的是白居易。"},{"id":538,"stem":"“金戈铁马，气吞万里如虎“是谁的词句？（）","options":["岳飞","辛弃疾","王维","苏轼"],"answer":1,"explanation":"出自南宋诗人辛弃疾的《永遇乐·京口北固亭怀古》。原文：千古江山，英雄无觅孙仲谋处。舞榭歌台，风流总被雨 打风吹去。斜阳草树，寻常巷陌，人道寄奴曾住。想当年，金戈铁马，气吞万里如虎。元嘉草草，封狼居胥，赢得仓皇北顾。四十三 年，望中犹记，烽火扬州路。可堪回首，佛狸祠下，一片神鸦社鼓。凭谁问，廉颇老矣，尚能饭否？"},{"id":539,"stem":"“会当凌绝顶，一览众山小”是杜甫的名句，诗人登上了哪座山发出了这样的感慨？（）","options":["黄山","泰山","华山","衡山"],"answer":1,"explanation":"全诗是：“岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生曾云，决眦入归鸟。会当凌绝顶，一览众山 小。”“岱宗”指的是泰山，诗人登上泰山发出的感慨。"},{"id":540,"stem":"《齐民要术》是关于：（ ）","options":["君主如何统治国家的著作","农业生产和农事活动的著作","医学著作","建筑学著作"],"answer":1,"explanation":"《齐民要术》是关于农业的著作。是北朝北魏时期，南朝宋至梁时期，中国杰出农学家贾思勰所著的一部综合性农学 著作，也是世界农学史上最早的专著之一，是中国现存最早的一部完整的农书。被誉为“中国古代农业百科全书”。"},{"id":541,"stem":"孔子为什么“三月不知肉滋味”？（ ）","options":["读到一本好书","听到一段好乐曲","看到一篇好书法","看一场好戏"],"answer":1,"explanation":"三月不知肉味原为孔子用来形容音乐的独特魅力。孔子在齐国的时候听到了《韶》乐，被深深吸引，以至于三月不知 肉味。该句出自春秋时期孔子的《论语·述而》。现亦用以形容清贫，三个月没有吃过肉。"},{"id":542,"stem":"“桃李满天下”的“桃李“指什么？（）","options":["朋友","孩子","病人","学生"],"answer":3,"explanation":"“桃李满天下”的“桃李”字面上指桃树和李树，用以比喻所栽培的学生或所举荐提拔的人才。“桃李满天下”意思 是比喻学生很多，各地都有。出自《资治通鉴·唐纪·武后久视元年》：“天下桃李，悉在公门矣。”"},{"id":543,"stem":"风筝最初是用来做什么的？（ ）","options":["比赛","选取伴侣","通报消息","娱乐健身"],"answer":2,"explanation":"风筝来源于中国，最早的风筝是由古代哲学家墨翟发明的，中国风筝问世后，很快被用于传递信息，飞跃险阻等军事 需要。唐宋时期，由于造纸业的出现，风筝改由纸糊，很快传入民间，成为人们的娱乐的玩具。"},{"id":544,"stem":"“鼎”的最初用途是：（ ）","options":["祭祀用礼器","地位象征物","烹煮器具","求雨器具"],"answer":2,"explanation":"58 19959276711（vx 同号） 【知识小链接】鼎最早是烹饪之器。即是由釜、陶支脚和灶的组合而成。鼎的主要用途是烹煮食物，鼎的三条腿便是灶口和支架，腹 下烧火，可以熬煮油烹食物。自从青铜鼎出现后，它又多了一项功能，成为祭祀神灵的一种重要礼器。"},{"id":545,"stem":"如果你想到图书馆借阅寓言性质的书，在下列书籍中应优先选择哪一本？（ ）","options":["《史记》","《论语》","《庄子》","《老子》"],"answer":2,"explanation":"《庄子》在先秦诸子中独具风格。它吸收了神话创作的精神，大量采用并虚构寓言故事，想象奇特，形象生动。此外， 还善于运用各种譬喻，活泼风趣，睿智深刻。行文有时像风行水上；有时像万斛源泉，随意流出，汪洋恣肆，奇趣横生。总体来说， 庄子散文极具浪漫主义风格，在古代散文中罕有其比，赢得无数文人学士的仰慕。"},{"id":546,"stem":"“三更半夜”中的“三更”指的是几点？（ ）","options":["21 点至 23 点","23 点至凌晨 1 点","凌晨 1 点至 3 点","24 点"],"answer":1,"explanation":"三更又名子时，指的是晚上十一点到第二天凌晨一点这段时间。古人将夜里的时间分为更和点。 一夜等分为五更，一更也等于现在的二个小时，从晚上七时开始起更，一更指七时至九时，二更指九时至十一时，三更指十一时至次 日凌晨一时，四更指一时至三时，五更指三时至五时。"},{"id":547,"stem":"明朝永乐年间，从西洋归来的郑和船队带回了一只西方异域兽“麒麟”，就是现在我们所知的：（）","options":["狮子","金钱豹","河马","长颈鹿"],"answer":3,"explanation":"随郑和船队出航的马欢在《瀛涯胜览》一书中记下了他所见的麒麟：“麒麟，前二足高九尺余，后两足约高六尺，头 抬颈长一丈六尺，首昂后低，人莫能骑。头上有两肉角，在耳边。牛尾鹿身，蹄有三跲，匾口。食粟、豆、面饼。”不难看出，所谓 的麒麟即长颈鹿。"},{"id":548,"stem":"下列古代名曲哪一首是琵琶曲？（）","options":["十面埋伏","高山流水","四面楚歌","秦王破阵乐"],"answer":0,"explanation":"《十面埋伏》是琵琶曲，表现楚汉相争时的垓下决战。《高山流水》是汉族古琴曲，属于中国十大古曲之一，讲述的 是俞伯牙和钟子期互为知己的故事。四面楚歌是楚汉争霸时，项羽被困垓下但仍有战斗力，汉军的韩信为尽快摧垮楚军，于是教汉军 将士楚军家乡的歌曲。《秦王破阵乐》是中国唐朝宫廷乐舞，最著名的歌舞大曲之一。"},{"id":549,"stem":"“老吾老以及人之老”是中华民族的传统美德，这句话是谁最早提出的？（ ）","options":["孔子","孟子","老子","韩非子"],"answer":1,"explanation":"孟子最早提出“老吾老以及人之老”这句话，最早见于《孟子·梁惠王上》。孟子说这话的目的是让当时的齐宣王放 弃对国家和人民实施的霸道之术，进而改为更好更仁爱的王道治国。所谓老吾老以及人之老，幼吾幼以及人之幼，就是用爱心和同理 心去体恤他人。"},{"id":550,"stem":"草书、行书、楷书、隶书四种字体当中哪一种是其余三种的起源？（）","options":["草书","行书","楷书","隶书"],"answer":3,"explanation":"在中国的书法中，草书、行书、楷书、隶书被认为是四种主要的字体形式，其中隶书是其余三种的起源。字体演变过 程：甲骨文——金文——篆书——隶书——草书——楷书——行书。"},{"id":551,"stem":"吃年糕的习俗与下列哪位历史人物有关？（）","options":["伍子胥","范蠡","屈原","范仲淹"],"answer":0,"explanation":"相传春秋末期伍子胥自刎后，越王勾践便举兵伐吴，将吴国都城姑苏城团团围住，吴军困守城中，炊断粮绝，街巷内 妇孺哭声惨不忍闻。他临死前对部下说：“如果国家有苦难，百姓断粮，你们到城墙下挖地三尺可得到粮食。”伍子胥死后，他的部 下被越军包围，城中断粮已饿死不少人，这时有人想起伍子胥的话，就去挖城墙，挖了三尺多深，果然挖到了许多可吃的“城砖”即 年糕，结果打了胜仗。原来是当年伍子胥在姑苏城督造城墙时，已做好了屯粮防饥的准备。从此以后，每逢过年家家户户都做年糕， 年夜饭就吃年糕汤来纪念伍子胥。"},{"id":552,"stem":"“大材小用古所叹，管仲、萧何实流亚”是出游的一句名诗，其中“大材小用”形容的是下面哪位人物？（ ）","options":["韩愈","辛弃疾","庞统","宋玉"],"answer":1,"explanation":"1203 年，辛弃疾被任命为绍兴府知府兼浙江东路安抚使，这一年，辛弃疾已经六十四岁了。他的好朋友陆游知道了， 觉得这是辛弃疾施展自己才能的好机会，为他感到高兴。专门为他写了一首诗，其中有两句是：“大材小用古所叹，管仲、萧何实流 亚”。意思是说：辛弃疾是管仲、萧何一流的英雄人物，现在当浙江东路安抚使，实在是把大材料用在了小地方。"},{"id":553,"stem":"甲骨文最早是在哪种物品上发现的？（ ）","options":["青铜器","药材","墓碑","竹筒"],"answer":1,"explanation":"59 19959276711（vx 同号） 【知识小链接】甲骨文，又称“契文”、“甲骨卜辞”、“殷墟文字”或“龟甲兽骨文”，是迄今为止中国发现的年代最早的成熟文 字系统，是汉字的源头和中华优秀传统文化的根脉。"},{"id":554,"stem":"下列哪个成语典故说的是吕不韦的故事？（）","options":["一字千金","一诺千金","一饭千金","一掷千金"],"answer":0,"explanation":"“一字千金”说的就是吕不韦的故事之一，吕不韦是个商人，但是有政治眼光，有行动能力。他组织人编了《吕氏春 秋》一书，书写成后，吕不韦命令把全文抄出，贴在咸阳城门上，并发出布告：谁能把书中的文字增加一个或减少一个，甚至改动一 个，赏黄金千两。"},{"id":555,"stem":"大家都知道世间上的良缘除了“天”助还少不了一人的帮忙，这就是“红娘”，请问“红娘”的由来出自何处？（）","options":["《白娘子》","《红楼梦》","《西厢记》","《三国演义》"],"answer":2,"explanation":"“红娘”的称呼来自元曲《西厢记》。它是一出家喻户晓、尽人皆知的优秀传统剧目，剧中“玲珑剔透百事精”的小 丫环红娘，为了成全张君瑞和崔莺莺的美满婚事，从中牵针引线，因势利导地终于将莺莺小姐许配给了张生，使“有情人终成眷属”。"},{"id":556,"stem":"“山重水复疑无路，柳暗花明又一村”出自（）","options":["《游山西村》","《乡村四月》","《天净沙•秋思》","《已亥杂诗》"],"answer":0,"explanation":"出自宋代陆游的《游山西村》：“莫笑农家腊酒浑，丰年留客足鸡豚。山重水复疑无路，柳暗花明又一村。箫鼓追随 春社近，衣冠简朴古风存。从今若许闲乘月，拄杖无时夜叩门。”"},{"id":557,"stem":"成语“万事俱备，只欠东风”是出自哪部古典名著。（）","options":["《三国演义》","《水浒传》","《红楼梦》","《西游记》"],"answer":0,"explanation":"出自《三国演义》四十九回。原文为：孔明索纸笔，屏退左右，密书十六字曰：“欲破曹公，宜用火攻，万事俱备， 只欠东风。”原意是周瑜定计火攻曹操，作好了一切准备，忽然想起不刮东风无法胜敌。后以此比喻一切准备工作都做好了，只差最 后一个重要条件。"},{"id":558,"stem":"笔名为“茅盾”的作家是谁？（）","options":["周树人","舒庆春","沈雁冰","谢婉莹"],"answer":2,"explanation":"茅盾——沈雁冰；鲁迅——周树人；冰心——谢婉莹；老舍——舒庆春。"},{"id":559,"stem":"下列哪部是鲁迅的散文集（ ）","options":["《朝花夕拾》","《呐喊》","《野草》","《故乡》"],"answer":0,"explanation":"《朝花夕拾》——散文集；《呐喊》——小说集；《故乡》——短篇小说；《野草》——散文诗集。"},{"id":560,"stem":"“出师未捷身先死，常使英雄泪满襟”是描写谁的诗句？（）","options":["刘备","关云长","诸葛亮","张飞"],"answer":2,"explanation":"本句出自唐代诗人杜甫作品《蜀相》，是诗人杜甫定居成都草堂后，翌年游览武侯祠时创作的一首咏史怀古诗。此诗 借游览古迹，表达了诗人对蜀汉丞相诸葛亮雄才大略、辅佐两朝、忠心报国的称颂以及对他出师未捷而身死的惋惜之情。"},{"id":561,"stem":"“世外桃源”出自于下列哪部作品？（）","options":["《饮酒》","《归园田居》","《归去来兮辞》","《桃花源记》"],"answer":3,"explanation":"“世外桃源”出自陶渊明的《桃花源记》，“世外桃源”现在指不受外界影响的地方或幻想中的美好世界。"},{"id":562,"stem":"《搜神记》的作者是谁？（ ）","options":["老舍","干宝","刘禹锡","李白"],"answer":1,"explanation":"《搜神记》是一部记录古代民间传说中神奇怪异故事的小说集。作者是东晋的史学家干宝。主角有鬼，也有妖怪和神 仙，杂糅佛道。大多篇幅短小，情节简单，设想奇幻，极富浪漫主义色彩。《搜神记》对后世影响深远。"},{"id":563,"stem":"与《木兰诗》合称“乐府双璧”。（）","options":["《陌上桑》","《长歌行》","《孔雀东南飞》","《子夜歌》"],"answer":2,"explanation":"南北朝的《木兰诗》与汉朝的《孔雀东南飞》并称“乐府双璧”或“叙事诗双璧”。这两首诗歌都是叙事长诗，以其 深刻的社会思想意义和极高的艺术成就，为历代文人所推崇。 19959276711（vx 同号）"},{"id":564,"stem":"在《三国演义》中，过五关，斩六将的猛将是（ ）","options":["吕布","关羽","赵云","典韦"],"answer":1,"explanation":"在《三国演义》里面关羽被曹操所擒，在立功报答之后，拜辞曹操，护送二位嫂子，前往河北寻找兄长刘备。从许昌 出发后，沿途经过东岭关、洛阳、汜水关、荥阳和滑州五处城关，斩杀了把关拦路的孔秀、孟坦、韩福、卞喜、王植和秦琪六员大将， 终于得过黄河。"},{"id":565,"stem":"以下哪件事是《水浒》中武松所为？（）","options":["倒拔垂杨柳","汴京城卖刀","醉打蒋门神","智取生辰纲"],"answer":2,"explanation":"倒拔垂杨柳——鲁智深；汴京城卖刀——杨志；醉打蒋门神——武松；智取生辰纲——吴用。"},{"id":566,"stem":"《三国演义》中的“凤雏”是谁？（）","options":["张飞","诸葛亮","孙权","庞统"],"answer":3,"explanation":"《三国演义》中的“凤雏”是庞统。凤雏庵即当年庞统读书的庐舍。座落在金鸾山腰。庞统字士元，湖北襄阳人，人 称凤雏先生，与诸葛亮同为东汉末年隐居襄阳的大名士。当年民间传言，得龙凤中一人，即可得天下。"},{"id":567,"stem":"中国最早的文言志怪小说是什么？（）","options":["《西游记》","《聊斋》","《世说新语》","《搜神记》"],"answer":3,"explanation":"中国最早的文言志怪小说是《搜神记》。《世说新语》是南朝宋刘义庆编撰的一部笔记小说集。《西游记》是中国古 代第一部浪漫主义章回体长篇神魔小说。《聊斋志异》是中国清朝著名小说家蒲松龄创作的文言短篇小说集。"},{"id":568,"stem":"“名不正则言不顺”是哪家的思想？（）","options":["儒家","道家","法家","佛家"],"answer":0,"explanation":"是孔子提出的正名的思想，属于儒家思想。出自《论语·子路》：“名不正则言不顺，言不顺则事不成。”孔子讲到 了正名的重要性，并推导出了名不正的一系列后果。名正才能言顺。所谓不在其位，不谋其政，如果你要想做一件事，可是这件事本 来不属于你管，或者说你还没有取得管的权力，要想取得大家的信任，能顺利办好事就很不容易。"},{"id":569,"stem":"“业精于勤，荒于嬉”是我国哪位古人提出来的思想？（）","options":["孔子","韩愈","老子","欧阳修"],"answer":1,"explanation":"该句出自韩愈的《进学解》，完整句子为：业精于勤，荒于嬉；行成于思，毁于随。意思是说学业由于勤奋而精通， 但它却能荒废在游戏玩耍中。事情由于反复思考而成功，但他却能毁灭于随随便便。"},{"id":570,"stem":"“十年树木，百年树人”出自谁的名言？（）","options":["管仲","孟子","陶行知","孔子"],"answer":0,"explanation":"该句是管仲的名言，出自《管子·权修·第三》。管仲是春秋时期齐国政治家，被誉为“华夏第一相”。《管子》则 是先秦时期各学派的言论汇编，包括法家、儒家、道家、阴阳家、名家、兵家和农家的观点。原文：“一年之计，莫如树谷；十年之 计，莫如树木；终身之计，莫如树人。一树一获者，谷也；一树十获者，木也；一树百获者，人也。”"},{"id":571,"stem":"“破釜沉舟”这个成语出于哪次战争？（）","options":["淝水之战","巨鹿之战","赤壁之战","官渡之战"],"answer":1,"explanation":"破釜沉舟指的是巨鹿之战，是秦末大起义中的一场战争，也是我国历史上著名的以少胜多的战役之一。秦二世三年十 二月，项羽率领数万楚军，以及联合各诸侯义军救援巨鹿，在敌多我寡，各诸侯义军畏缩不前的情况下，项羽命令全军破釜沉舟，烧 掉房屋帐篷，只带三日口粮，以示不胜则死的决心。"},{"id":572,"stem":"“大珠小珠落玉盘”所形容的是什么乐器的弹奏声？（ ）","options":["琵琶","二胡","马琴","竖笛"],"answer":0,"explanation":"“大珠小珠落玉盘”形容的是琵琶的弹奏声，此句出自白居易的《琵琶行》,“大珠小珠落玉盘”是指琵琶声像珠玉落 到盘子里的声音一样清脆动人。"},{"id":573,"stem":"“横看成岭侧成峰，远近高低各不同”是说哪一部名著的思想内容的？（）","options":["《红楼梦》","《三国演义》","《家》","《左传》"],"answer":0,"explanation":"“横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中”这首诗出自宋代著名文学家苏轼《题西林 壁》，它告诉我们要辩证地看问题。对同一对象，看问题的角度不同，得出的结论也不相同。读书也是如此，同一篇作品，看的角度 19959276711（vx 同号） 不同，理解也就相异。 鲁迅先生对《红楼梦》主题的理解有一段精辟的论述：“经学家看见《易》，道学家看见淫，才子看见缠绵，革命家看见排满，流言 家看见宫闱秘事。”《红楼梦》是一部内涵丰厚的作品，正如鲁迅对这部著作的评价一样，由于生活经历的不同，不同的人对作品人 物形象的理解也会不同。因此“横看成岭侧成峰，远近高低各不同”，这一句诗常被后人用来描述我国四大名著中的《红楼梦》。"},{"id":574,"stem":"《红楼梦》中描述的四大家族除了贾、薛、史，还有：（）","options":["林家","王家","刘家","赵家"],"answer":1,"explanation":"红楼梦》中提到四大家族：贾、史、王、薛，这四个家族盛势浩大并且相互牵联，因此盛衰荣辱也是共同的。《红楼 梦》以贾府兴衰为主线，穿插史、王、薛家族兴衰的暗线，表达封建大家庭必然由盛转衰的主题。《红楼梦》对于除贾府之外的家族 兴衰，主要以人物命运为代表进行展现。王氏，王夫人与王熙凤；史氏，史湘云；薛氏，薛姨妈薛宝钗一家。"},{"id":575,"stem":"“八卦炉中逃大圣，五行山下定心猿。”这副对联是哪部章回小说的目录？（ ）","options":["《水浒传》","《西游记》","《红楼梦》","《三国演义》"],"answer":1,"explanation":"这副对联是《西游记》的小说目录，第七回“八卦炉中逃大圣，五行山下定心猿。”"},{"id":576,"stem":"下列哪部作品被鲁迅称为“史家之绝唱，无韵之离骚”的：（ ）","options":["《自治通鉴》","《世说新语》","《诗经》","《史记》"],"answer":3,"explanation":"指的是西汉史学家司马迁撰写的纪传体史书《史记》。它是中国历史上第一部纪传体通史，被列为\"二十四史\"之首，记 载了上至上古传说中的黄帝时代，下至汉武帝元狩元年间共 3000 多年的历史。与后来的《汉书》《后汉书》《三国志》合称\"前四史\"。"},{"id":577,"stem":"“先天下之忧而忧，后天下之乐而乐”出自：（）","options":["岳阳楼记","醉翁亭记","桃花源记","小石潭记"],"answer":0,"explanation":"出自宋代范仲淹的《岳阳楼记》，此句表现出诗人身居江湖，心忧国事，虽遭迫害，仍不放弃理想的顽强意志，生发 出超越个人、心系国家人民的伟大感受，表现出一种更深沉、更壮阔的美德，展现出一种更高尚的理想境界，充满着仁人志士的理想 光辉。"},{"id":578,"stem":"“袅袅兮秋风，洞庭波兮木叶下”，此句出自《楚辞》中的哪篇？（）","options":["离骚","涉江","湘夫人","国殇"],"answer":2,"explanation":"出自楚辞的《九歌·湘夫人》。此诗写湘君期待湘夫人而不至，产生的思慕哀怨之情，诗以湘君思念湘夫人的语调去 写，描绘出那种驰神遥望，祈之不来，盼而不见的惆怅心情。"},{"id":579,"stem":"下列搭配错误的是？（ ）","options":["《两都赋》班固","《两京赋》张衡","《子虚赋》司马相如","《魏都赋》曹植"],"answer":3,"explanation":"《魏都赋》西晋左思作。左思作《三都赋》，由《蜀都》、《吴都》、《魏都》三篇组成。《魏都赋》为其中一篇， 描写了魏都邺的宫室建筑、风土物产等方面情况。"},{"id":580,"stem":"下列选项中不属于《三易》的是？（）","options":["《周易》","《连山》","《归藏》","《易经》"],"answer":3,"explanation":"《三易》是指上古时期的三本著作，分别为《连山》《归藏》和《周易》，其中《连山》和《归藏》都已经失传。《连 山》成书于夏朝，《归藏》成书于商朝，《周易》成书最晚，在周朝时期。"},{"id":581,"stem":"我国历史上著名故事《完璧归赵》的主人公是（ ）","options":["诸葛亮","蔺相如","曹操","越王勾践"],"answer":1,"explanation":"“完璧归赵”讲诉战国时代，赵国得到楚国的和氏璧，秦昭王要用 15 座城池来换和氏璧。赵王派蔺相如带和氏璧去换 城，相如到秦国献璧，发觉秦王没有诚意交换城池，于是设法把和氏璧拿回，并将和氏璧完好带回赵国的故事。"},{"id":582,"stem":"古代的死刑在什么季节行刑？（）","options":["春","夏末","初夏","秋冬"],"answer":3,"explanation":"一般行刑的时间大约集中在 9-10 月之间，所以会有秋后问斩一词，从西周开始就有了秋冬行刑的做法，到了汉朝成了 制度。除了谋反等大罪可以立即处决外，一般死刑犯都要等到秋天霜降后冬至以前才能执行。因秋季带有萧杀之气，再则大概是因冬 天百物萧条，亦是进入一年尾声，亦适合执行。"},{"id":583,"stem":"民间的端午节，相传是为了纪念哪一个人物？（ ）","options":["孔子","司马迁","屈原","汉武帝 62 19959276711（vx 同号）"],"answer":2,"explanation":"战国时期，爱国诗人屈原在端午节这一天抱石跳汨罗江自尽，屈原投江后，人们为了不让鱼虾伤害屈原的躯体，用竹 筒装糯米投入江中，后来发展为吃粽子和赛龙舟两大习俗。人们为了悼念屈原，于是将端午节作为纪念屈原的节日。"},{"id":584,"stem":"关汉卿历史剧的代表作是（ ）","options":["《梧桐雨》","《汉宫秋》","《赵氏孤儿》","《单刀会》"],"answer":3,"explanation":"《梧桐雨》是元代白朴撰写的杂剧剧本。《汉宫秋》是元代文学家马致远创作的杂剧。《赵氏孤儿》是元代纪君祥创 作的杂剧。"},{"id":585,"stem":"梅尧臣诗歌的主要风格是（ ）","options":["平淡浑厚","平易流畅","奔放豪健","生新瘦硬"],"answer":0,"explanation":"梅尧臣，字圣俞，少即能诗，与苏舜钦齐名，号“苏梅”，又与欧阳修并称“欧梅”。他写诗主张写实，反对西昆体， 所作力求平淡、含蓄，被誉为宋诗的“开山祖师”“宋诗第一人”。梅尧臣的诗歌风格是平淡浑厚。"},{"id":586,"stem":"方回称江西诗派“三宗”是指黄庭坚、陈师道与（ ）","options":["苏轼","秦观","吕本中","陈与义"],"answer":3,"explanation":"元代的方回在《瀛奎律髓》中提出“一祖三宗”之说，江西诗派之祖杜甫，诗派之“宗”：黄庭坚、陈师道、陈与义。"},{"id":587,"stem":"元曲在元代被称作（ ）","options":["新诗","新词","新曲","新乐府"],"answer":0,"explanation":"元曲是中国古代文化的瑰宝，它与汉斌、唐诗、宋词、明清小说一道，成为中国古代文人聪明才智的见证。元曲盛于 元代，它不同与唐诗宋词的典雅瑰丽，而是大量使用口语方言，将阳春白雪与下里巴人很好的融合在一起，以其广阔的题材、独特的 风格，以及直白押韵的语言，深得历代文人的青睐。"},{"id":588,"stem":"下列四个成语中与项羽有关的（ ）．","options":["隔岸观火","暗渡陈仓","背水一战","破釜沉舟"],"answer":3,"explanation":"隔岸观火的主人公是范雎、白起。背水一战、暗度陈仓的主人公是韩信。破釜沉舟指的是巨鹿之战，是秦末大起义中 的一场战争，也是我国历史上著名的以少胜多的战役之一。秦二世三年十二月，项羽率领数万楚军，以及联合各诸侯义军救援巨鹿， 在敌多我寡，各诸侯义军畏缩不前的情况下，项羽命令全军破釜沉舟，烧掉房屋帐篷，只带三日口粮，以示不胜则死的决心。"},{"id":589,"stem":"“春秋三传”除了《左传》、《春秋公羊传》还包括（）","options":["《春秋》","《春秋外传》","《春秋谷梁传》","《战国策》"],"answer":2,"explanation":"《春秋三传》即《左氏春秋传》《春秋公羊传》、《春秋谷梁传》，合称“春秋三传”。《春秋》经文言简义深，如 无注释，则无法了解。"},{"id":590,"stem":"被后人称为“正宗”、“集大成”的词人是（）","options":["秦观","李清照","姜夔","周邦彦"],"answer":3,"explanation":"北宋词人周邦彦：被后人认为是词的“集大成者”。周邦彦字美成，男，号清真居士，钱塘（今浙江杭州）人，北宋 著名词人。"},{"id":591,"stem":"提出词“别是一家”的作家是（）","options":["周邦彦","郑光祖","李清照","姜夔"],"answer":2,"explanation":"李清照作《词论》，在理论上确立了词体的独特地位，提出了词“别是一家”之说。她以词应合律为基本立场，强调 了词与音乐的血脉联系以及词与诗的不同之处，并以此来认识、维护词的独特性，严分诗词界限。"},{"id":592,"stem":"《墙头马上》的作者是（ ）","options":["马致远","辛弃疾","石君宝","白朴"],"answer":3,"explanation":"白朴，原名恒，字仁甫，后改名朴，字太素，号兰谷。他是元代著名的杂剧作家，与关汉卿、马致远、郑光祖并称为 元曲四大作家（另有一说为关汉卿、马致远、王实甫、白朴）。"},{"id":593,"stem":"梁启超说“初读《定庵文集》，若受电然”，《定庵文集》的作者是（）","options":["顾炎武","龚自珍","魏源","黄遵宪"],"answer":1,"explanation":"《定庵文集》的作者是龚自珍。原名巩祚，字璱人，号定庵，浙江仁和（今杭州）人。他自幼学习汉学，曾跟从外祖 19959276711（vx 同号） 父、著名汉学家段玉裁学习文字学，后转而研究经世学问和今文经学，擅长诗词文章等等。"},{"id":594,"stem":"《诗经》的传统分类是（ ）","options":["南、风、雅","风、雅、颂","雅、颂、南","南、风、颂."],"answer":1,"explanation":"关于《诗经》中诗的分类，有“四始六义”之说。“四始”指《风》、《大雅》、《小雅》、《颂》的四篇列首位的 诗。 “六义”则指“风、雅、颂，赋、比、兴”。 “风、雅、颂”是按音乐的不同对《诗经》的分类，“赋、比、兴”是《诗经》的表现手法。"},{"id":595,"stem":"《尚书》内容所属的类别是（ ）","options":["哲学散文集","历史散文集","文学散文集","艺术散文集"],"answer":0,"explanation":"《尚书》又称《书》《书经》，是一部多体裁文献汇编，战国时期总称《书》，汉代改称《尚书》，即“上古之书”。 因是儒家五经之一，又称《书经》。内容主要是君王任命官员或赏赐诸侯时发布的政令。"},{"id":596,"stem":"《左传》内容反映的历史时期是（ ）","options":["先秦","西周","春秋","战国"],"answer":2,"explanation":"《左传》记叙了春秋时期 250 多年的历史，主要记录了周王室的衰微，诸侯争霸的历史，对各类礼仪规范、典章制度、 社会风俗、民族关系、道德观念、天文地理、历法时令、古代文献、神话传说、歌谣言语均有记述和评论。"},{"id":597,"stem":"《离骚》在诗歌形式上所属的体式是（）","options":["四言体","五言体","七言体","杂言体"],"answer":2,"explanation":"离骚在诗歌形式上所属的体式是七言体。七言诗是中国诗歌体裁之一，主要特点是每句七字或以七字句为主，而离骚 全诗大部分句子都是七字的，因此离骚属于七言体诗歌。"},{"id":598,"stem":"《史记》的五种体例中，“世家”这种体例是（ ）","options":["记述历史帝王的兴衰沿革","记述特殊人物或集团的事迹","记述重要人物的家庭兴衰","记述王侯各国的史实和状况"],"answer":1,"explanation":"《史记》的五种体例中，“世家”这种体例是历朝诸侯贵族的活动和事迹；《史记》分本纪、表、书、世家、列传五 部分。它以历史上的帝王等政治中心人物为史书编撰的主线，各种体例分工明确，“本纪”记载历代帝王的兴衰和重大历史事件；“表” 是以表格形式呈现的各个历史时期的大事记；“书”是关于天文、历法、水利、经济、文化等方面的专题史；“世家”是历朝诸侯贵 族的活动和事迹；“列传”为历代各阶层有影响人物的传记，有少数篇章记载少数民族等的历史。其中，“本纪”、“世家”、“列 传”三部分，占全书的大部分篇幅，都是以写人物为中心来记载历史的。"},{"id":599,"stem":"《汉书》所属的历史编纂体例是（ ）","options":["编年史","纪传体通史","断代史","国别史"],"answer":2,"explanation":"《汉书》，又称《前汉书》，是中国第一部纪传体断代史，“二十四史”之一。由汉朝东汉时期史学家班固编撰，前 后历时二十余年，于建初年中基本修成，后唐朝颜师古为之释注。其中《汉书》八表由班固之妹班昭补写而成，《汉书》天文志由班 固弟子马续补写而成。《汉书》是继《史记》之后中国古代又一部重要史书，与《史记》《后汉书》《三国志》并称为“前四史”。"},{"id":600,"stem":"刘禹锡的《酬乐天扬州初逢席上见赠》所属的诗歌类型是（）","options":["讽谕诗","感遇诗","咏史诗","山水诗"],"answer":1,"explanation":"刘禹锡的《酬乐天扬州初逢席上见赠》是七言抒情诗。此诗作于唐敬宗宝历二年（826），刘禹锡罢和州刺史返回洛阳， 同时白居易从苏州返洛阳，二人在扬州初逢时，白居易在宴席上作诗赠与刘禹锡，刘禹锡写此诗作答。诗人对所遇事物抒发感慨，属 于感遇诗。"},{"id":601,"stem":"李煜词中最感人的作品是（）","options":["反映宫延享乐生活的艳情词","写离愁别绪的感伤词","抒写亡国的深悲巨痛的篇章","以咏物怀古表达情思的篇章"],"answer":2,"explanation":"李煜词中最感人的作品是《虞美人》，它是书写亡国的生悲剧痛的篇章。原文：虞美人（李煜）春花秋月何时了。往 事知多少。小楼昨夜又东风。故国不堪回首月明中。雕栏玉砌应犹在。只是朱颜改。问君能有几多愁。恰似一江春水向东流。"},{"id":602,"stem":"后人称韩愈为韩昌黎的原因是（ ）","options":["籍贯昌黎","郡望昌黎","被贬昌黎","隐居昌黎"],"answer":1,"explanation":"韩愈之所以叫韩昌黎是因为韩愈的宗族原本是出于昌黎（今河北省昌黎县），因昌黎韩氏是望族，因此韩愈自称“郡 19959276711（vx 同号） 望昌黎”，故世称“韩昌黎”。韩愈晚年任唐朝吏部侍郎，又称韩吏部。"},{"id":603,"stem":"“爆竹声中一岁除，春风送暖入屠苏”，这里的“屠苏”指的是（）","options":["苏州","房屋","酒","庄稼"],"answer":2,"explanation":"屠苏指屠苏酒，饮屠苏酒也是古代过年时的一种习俗，大年初一全家合饮这种用屠苏草浸泡的酒，以驱邪避瘟疫，求 得长寿。"},{"id":604,"stem":"《三十六计》是体现我国古代卓越军事思想的一部兵书，下列不属于《三十六计》的是：（）","options":["浑水摸鱼","反戈一击","笑里藏刀","反客为主"],"answer":1,"explanation":"“反戈一击”不属于三十六计，反戈一击出自明代罗贯中的《三国演义》第十七回，反戈一击指的是调转枪头向原来 所属的阵营进攻，比喻一旦觉悟，回过头来对自己一方的坏人坏事进行揭露和斗争。"},{"id":605,"stem":"1932 年，清华大学招生试题中有一道对对子题，上联“孙行者”，下面下联中最合适的是：（）","options":["胡适之","周作人","郁达夫","唐三藏"],"answer":0,"explanation":"“孙”对“胡”，姓对姓；“适”在古文中是“到、行”的意思，所以“行”对“适”，动词对动词；“之”和“者” 是文言文里的常用虚词，和此所以“之”对“者”，所以“孙行者”对“胡适之”是绝对。"},{"id":606,"stem":"“月上柳梢头，人约黄昏后”描写的是哪个传统节日，（ ）","options":["中秋节","元宵节","端午节","七夕节"],"answer":1,"explanation":"该句描写的是正月十五元宵节。出自宋代欧阳修的《生查子·元夕》。全文：去年元夜时，花市灯如昼。月上柳梢头， 人约黄昏后。今年元夜时，月与灯依旧。不见去年人，泪湿春衫袖。"},{"id":607,"stem":"《百家姓》中没有下面哪个姓，（）","options":["乌","巫","肖","萧"],"answer":2,"explanation":"《百家姓》在北宋初年的吴越地区便已流传开来，虽然没有“肖”这个姓，但是有“萧”姓。据记载，起始于春秋时 期宋国的附属国萧国，后来萧国被楚国所灭，其后代便以萧为姓。"},{"id":608,"stem":"太极拳讲究“以柔克刚.以静制动.以弱胜强”，这和哪位思想家的观点不谋而合，（）","options":["老子","孟子","荀子","孔子"],"answer":0,"explanation":"老子《道德经》原文：天下莫柔弱于水，而攻坚强者若之能胜。其无以易之。柔之胜刚，弱之胜强，天下莫不知，莫 能行。是以圣人云：“受国之垢，是谓社稷主。受国之不详，是谓天下王。”正言若反。这段话是说：天下万物没有比水更柔弱的了， 然而攻击坚强壮之物没有能胜过它的，因而水是没有事物可以代替得了的。柔胜刚，弱胜强，天下没有不知道的，但没有哪个能做到。 因而圣人说：“能承担国家屈辱，才能称得上国家的君主；能承担国家的灾难，才能做天下的君王。”正面的言语好像是在反说一样。 这段话可说是老子“以柔克刚、以弱胜强、以静制动”思想的代表。"},{"id":609,"stem":"度量衡是我国古代使用的计量单位，其中“衡”是指哪个方面的标准，（）","options":["长度","面积","体积","重量"],"answer":3,"explanation":"度量衡是我国古代使用的计量单位衡代表重量的标准。“度”即长度，“量”为容量，“衡”即重量，“度量衡”就 是分别指计量长度、容积、重量的标准或器具。"},{"id":610,"stem":"元太祖铁木真是蒙古草原上的英雄，他被人们尊称为“成吉思汗”，“汗”的意思是大王，那么“成吉思”的意思是：（）","options":["天空","大海","草原","高山"],"answer":1,"explanation":"元太祖铁木真是蒙古草原上的英雄，他被人们尊称为“成吉思汗”，成吉 思汗原名孛儿只斤•铁木真，立国后称成吉思汗。“成吉思”的真正意思是指大海。在大草原上是不可能见到真正意义上的海的，所以 草原上的人们特别向往那神秘莫测、汹涌澎湃、无边无际的大海。"},{"id":611,"stem":"一部著作的完成需要很长的时间，请问下列哪部著作的成书时间最长，（ ）","options":["《徐霞客游记》","《说文解字》","《天工开物》","《梦溪笔谈》"],"answer":0,"explanation":"《徐霞客游记》大约用了 30 年；《说文解字》约用了 21 年时间成书；《天工开物》大约 3 年完成；《梦溪笔谈》大 约用时 7 年。"},{"id":612,"stem":"道家思想在我国影响深远，请问历史中的哪一时期最接近道家所主张的无为而治，（ ）","options":["文景之治","光武中兴","贞观之治","开元盛世"],"answer":0,"explanation":"65 19959276711（vx 同号） 【知识小链接】“文景之治（西汉初年的治世）”最接近道家所主张的无为而治。文景之治是指西汉汉文帝、汉景帝统治时期出现的 治世。汉初，因多年战乱导致社会经济凋敝，汉廷推崇黄老治术，采取“轻徭薄赋”、“与民休息”的政策。汉帝国建立之初，利用 民众对秦王朝残厉法制的不满，顺从民意，进行了政治改革。为与民休养生息，采取了无为而治的统治思想，这也是道家思想第一次 登堂入室。"},{"id":613,"stem":"北京有着三千余年的悠久历史和八百多年的建都史，它在不同朝代也有着不同的称谓，下面哪个不是北京的别称，（ ）","options":["大都","中都","上都","南京"],"answer":2,"explanation":"上都不是北京的别称。上都位于今内蒙古自治区锡林郭勒盟正蓝旗境内，多伦县西北闪电河畔。"},{"id":614,"stem":"墨子的主要思想是“兼爱”，他所反对的“爱有差等”这一观点是哪家学派的，（）","options":["儒家","法家","道家","名家"],"answer":0,"explanation":"儒家主张“仁爱”，至孟子时，形成了一个更加明确的爱人观——“爱有差等”，具体表现为“亲亲——仁民——爱 物”的实践过程。爱有差等为儒家主张，是人性的一部分，是每个人与生俱来，生而固有的普遍本性。"},{"id":615,"stem":"在我国风俗中，常常避讳 73 和 84 这两个岁数，因为这是两位历史人物去世的虚龄。他们是：（ ）","options":["孔子和孟子","老子和庄子","汉高祖和汉武帝","周武王和周文王"],"answer":0,"explanation":"孔子生于公元前 551 年，死于公元前 479 年，虚岁 73 岁；孟子生于公元前 372 年，死于公元前 289 年，虚岁 84 岁。 连圣人和亚圣都无法过去的年龄坎，对普通人来说更是一个巨大的挑战。"},{"id":616,"stem":"下列哪项不是端午节的习俗，（）","options":["挂香包","插艾蒿","登高采菊","喝雄黄酒"],"answer":2,"explanation":"登高采菊不是端午节的习俗，而是重阳节的习俗。重阳节，农历九月初九，二九相重，称为“重九”，民间在该日有 登高的风俗，所以重阳节又称“登高节”。还有重九节、茱萸、菊花节等说法。由于九月初九“九九”谐音是“久久”，有长久之意， 所以常在此日祭祖与推行敬老活动。"},{"id":617,"stem":"孟子说：“君子有三乐”，下列哪项不在其“三乐”之列，（ ）","options":["父母俱存，兄弟无故","仰不愧于天，俯不怍于人","乡里无不称其善也","得天下英才而教育之"],"answer":2,"explanation":"出自《孟子》的《尽心章句上》。一乐家庭平安，二乐心地坦然，三乐教书育人。原文是孟子曰：“君子有三乐，而 王天下不与存焉。父母俱存，兄弟无故，一乐也；仰不愧于天，俯不怍于人，二乐也；得天下英才而教育之，三乐也。”"},{"id":618,"stem":"下列哪个成语典故说的是吕不韦的故事（）","options":["一字千金","一诺千金","一饭千金","一掷千金"],"answer":0,"explanation":"“一字千金”说的就是吕不韦的故事之一，吕不韦是个商人，但是有政治眼光，有行动能力。他组织人编了《吕氏春 秋》一书，书写成后，吕不韦命令把全文抄出，贴在咸阳城门上，并发出布告：谁能把书中的文字增加一个或减少一个，甚至改动一 个，赏黄金千两。"},{"id":619,"stem":"天干地支纪年始于汉代，请问这种纪年是以哪一天为起点的，（）","options":["除夕","正月初一","立春","春分"],"answer":2,"explanation":"“天干地支”这种纪年的新的一年是立春交节之后开始的。“天干地支”纪年法一般指“干支纪年”：是中国历法上 自古以来就一直使用的纪年方法。干支是天干和地支的总称。把干支顺序相配正好六十为一周，周而复始，循环记录，这就是俗称的 “干支表”。"},{"id":620,"stem":"《在水一方》的歌词来源于：（ ）","options":["《诗经》","《离骚》","《楚辞》","《孔雀东南飞》"],"answer":0,"explanation":"《在水一方》的歌词来源于《诗经·蒹葭》。原文： 蒹葭苍苍，白露为霜。所谓伊人，在水一方。 溯洄从之，道阻且长。溯游从之，宛在水中央。 蒹葭萋萋，白露未晞。所谓伊人，在水之湄。 溯洄从之，道阻且跻。溯游从之，宛在水中坻。 蒹葭采采，白露未已。所谓伊人，在水之涘。 溯洄从之，道阻且右。溯游从之，宛在水中沚。"},{"id":621,"stem":"下面哪个剧种被称为“中国百戏之师”，（ ）","options":["京剧","黄梅戏","昆曲","越剧 66 19959276711（vx 同号）"],"answer":2,"explanation":"昆曲被称为“中国百戏之师”，也被称为“百戏之祖”、“中国戏曲之母”。昆曲有如此称号的原因也是从明朝中期 到清朝中期昆曲是当时影响最大的剧种，并且后来很多剧种都是在昆曲的基础上发展起来的。昆曲是汉族传统戏曲最古老的剧种之一， 中国古老戏曲除了昆曲还有汉剧、善书、湖北大鼓、湖北小曲、长阳南曲、地花鼓等等，这些古老的戏曲对于之后其他种类的剧种的 产生和发展都存在着一定的影响。"},{"id":622,"stem":"文人对各种植物有自己的偏爱，陶渊明喜爱菊花，北宋文豪苏东坡则说过：宁可食无肉，不可（）","options":["居无松","居无竹","居无梅","居无菊"],"answer":1,"explanation":"北宋文豪苏东坡说过“宁可食无肉，不可居无竹”意思是：宁可不吃肉，但住的地方也要有竹子作伴。出自《於潜僧 绿筠轩》。"},{"id":623,"stem":"王实甫在《西厢记》中写道：“淋漓襟袖啼红泪，比司马青衫更湿”，其中“司马青衫”指的是：（）","options":["司马相如","崔莺莺","白居易","杜甫"],"answer":2,"explanation":"司马，古代官名，唐代诗人白居易曾贬官为江州司马。司马的衣衫为泪水所湿。形容极度悲伤。白居易《琵琶行》诗： “座中泣下谁最多，江州司马青衫湿。”因此“司马青衫”指的是白居易。"},{"id":624,"stem":"草书、行书、楷书、隶书四种字体当中哪一种是其余三种的起源，（）","options":["草书","行书","楷书","隶书"],"answer":3,"explanation":"在中国的书法中，草书、行书、楷书、隶书被认为是四种主要的字体形式，其中隶书是其余三种的起源。字体演变过 程：甲骨文——金文——篆书——隶书——草书——楷书——行书。"},{"id":625,"stem":"“大材小用古所叹，管仲、萧何实流亚”是陆游的一句名诗，其中“大材小用”形容的是下面哪位人物，（ ）","options":["韩愈","辛弃疾","庞统","宋玉"],"answer":1,"explanation":"1203 年，辛弃疾被任命为绍兴府知府兼浙江东路安抚使，这一年，辛弃疾已经六十四岁了。他的好朋友陆游知道了， 觉得这是辛弃疾施展自己才能的好机会，为他感到高兴。专门为他写了一首诗，其中有两句是：“大材小用古所叹，管仲、萧何实流 亚”。意思是说：辛弃疾是管仲、萧何一流的英雄人物，现在当浙江东路安抚使，实在是把大材料用在了小地方。"},{"id":626,"stem":"以下（ ）不是李白的作品。","options":["《峨眉山月歌》","《登金陵凤凰台》","《雁门太守行》","《渡荆门送别》"],"answer":2,"explanation":"《雁门太守行》是唐代李贺的作品，全诗：“黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。 半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。”"},{"id":627,"stem":"李清照“何须浅碧轻红色，自是花中第一流”说的是（ ）","options":["桂花","梅花","菊花","百合"],"answer":0,"explanation":"出自宋代李清照的《鹧鸪天·桂花》：“暗淡轻黄体性柔，情疏迹远只香留。何须浅碧轻红色，自是花中第一流。”"},{"id":628,"stem":"“两情若是久长时，又岂在朝朝暮暮”出自一首（ ）","options":["渔家傲","鹊桥仙","鹧鸪天","苏幕遮"],"answer":1,"explanation":"出自宋朝秦观的《鹊桥仙》“纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。柔情似水， 佳期如梦，忍顾鹊桥归路！两情若是久长时，又岂在朝朝暮暮。”"},{"id":629,"stem":"江南佳丽地，（）帝王州。","options":["金陵","钱塘","长安","洛阳"],"answer":0,"explanation":"出自南北朝谢朓的《入朝曲》“江南佳丽地，金陵帝王州。逶迤带绿水，迢递起朱楼。飞甍夹驰道，垂杨荫御沟。凝 笳翼高盖，叠鼓送华辀。献纳云台表，功名良可收。”"},{"id":630,"stem":"“无可奈何花落去，似曾相识燕归来”出自（）的《浣溪沙》","options":["苏轼","晏殊","李清照","秦观"],"answer":1,"explanation":"出自宋朝晏殊的《浣溪沙》“一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？无可奈何花落去，似曾相识燕归 来。小园香径独徘徊。”此词虽含伤春惜时之意，却实为感慨抒怀之情。"},{"id":631,"stem":"下列诗句不是描写秋景的是（ ）","options":["竹喧归浣女，莲动下渔舟。","萧萧梧叶送寒声，江上秋风动客情。","一曲高歌一樽酒，一人独钓一江秋。","行到中庭数花朵，蜻蜓飞上玉搔头。 67 19959276711（vx 同号）"],"answer":3,"explanation":"出自唐朝刘禹锡的《和乐天春词》“新妆面面下朱楼，深锁春光一院愁。行到中庭数花朵，蜻蜓飞上玉搔头。”描写 的是春景。"},{"id":632,"stem":"下列不属于浪漫主义文学家的是（）","options":["庄子","孔子","屈原","李白"],"answer":1,"explanation":"孔子，名丘，字仲尼。中国著名的思想家、教育家、政治家，与弟子周游列国十四年。是儒家学派创始人，被称为“大 成至圣先师”，倡导仁义礼智信。李白、屈原、庄子三人属于浪漫主义文学家。"},{"id":633,"stem":"（）的诗作《桃花溪》借用了陶渊明《桃花源记》的意境。","options":["张旭","张籍","李商隐","韦应物"],"answer":0,"explanation":"唐代诗人张旭的诗作《桃花溪》：“隐隐飞桥隔野烟，石矶西畔问渔船。桃花尽日随流水，洞在清溪何处边？”这是 借陶潜《桃花源记》的意境而写的写景诗，这首诗通过对桃花溪幽美景色的描写和对渔人的询问，抒写了作者一种向往世外桃源，追 求美好生活的心情。"},{"id":634,"stem":"对下面成语所及人物的判断不正确的是（ ）。","options":["纸上谈兵--孙膑","一字千金--吕不韦","洛阳纸贵--左思","望梅止渴--曹操"],"answer":0,"explanation":"《史记·廉颇蔺相如列传》记载，战国时赵国名将赵奢的儿子赵括，少时学兵法，善于谈兵，父亲也难不倒他。后来 代廉颇为赵将，只照搬兵书，不知变通。结果在长平之战中被秦兵打败。后用以比喻只凭书本知识空发议论，不能解决实际问题。"},{"id":635,"stem":"下列不是古人对妻子称呼的一项是（）。","options":["糟糠","拙荆","外子","细君"],"answer":2,"explanation":"外子是古时候妻子对丈夫的称呼，内子是古代妻子的称呼，也称内助，略带有谦虚称，反映了旧社会中习惯上男人出 外谋生，女人在家搞家务。"},{"id":636,"stem":"与下列对联相关的人物配对错误的一项是（）。","options":["一代君权痛蚕室，千秋史笔溯龙门（司马迁）","云边雁断胡天月，陇上羊归塞草烟（王昭君）","四面湖山归眼底，万家忧乐到心头（范仲淹）","犹留正气参天地，永剩丹心照古今（文天祥）"],"answer":1,"explanation":"诗句出自唐代文学家温庭筠《苏武庙》：“苏武魂销汉使前，古祠高树两茫然；云边雁断胡天月，陇上羊归塞草烟； 回日楼台非甲帐，去时冠剑是丁年；茂陵不见风侯印，空向秋波哭逝川。”故所指历史人物是苏武。"},{"id":637,"stem":"“桑梓”一词一般用来借指的是（）","options":["田园","故乡","祖先","老伴"],"answer":1,"explanation":"桑梓指家乡、故乡。古代，人们喜欢在住宅周围栽植桑树和梓树，后来人们就用物代处所，用“桑梓”代称家乡。赞 扬某人为家乡造福，往往用“功在桑梓”。"},{"id":638,"stem":"以下著名诗人的合称不正确的是（）。","options":["李白、杜甫合称“李杜”","苏轼、黄庭坚合称“苏黄”","王之涣、孟浩然合称“王孟”","元稹、白居易合称“元白”"],"answer":2,"explanation":"“王孟”指的是王维和孟浩然两位诗人。"},{"id":639,"stem":"我国古代的很多事物都有自己的雅称，我们常把稿费、书画酬金称为（）","options":["谢仪","润笔","束脩","尺素"],"answer":1,"explanation":"润笔，是指拿毛笔泡水这个动作，使用毛笔时通常会先用水泡一泡，把笔毛泡开、泡软，这样毛笔较容易吸收墨汁， 写字时会感觉比较圆润。后来“润笔”被泛指为请人家写文章、写字、作画的报酬。"},{"id":640,"stem":"《大风歌》的作者是（ ）","options":["项羽","刘邦","嵇康","司马相如"],"answer":1,"explanation":"《大风歌》的作者是刘邦，全诗：“大风起兮云飞扬，威加海内兮归故乡，安得猛士兮守四方。”刘邦当上皇帝以后， 在前 195 年，他出兵东征，平定淮南王黥布（也叫英布）的叛乱。回归途中，经过沛县，他邀集家乡旧友和父老兄弟，一起饮酒，在 宴席上他唱起这首大风歌，抒发了他的政治抱负，也表达了他对国事忧虑的心情。 19959276711（vx 同号）"},{"id":641,"stem":"以下四句诗排序正确的是（ ）①林表明霁色②积雪浮云端③终南阴岭秀④城中增暮寒","options":["②③①④","③②①④","①④②③","①④③②"],"answer":1,"explanation":"出自唐代祖咏的《终南望余雪》：“终南阴岭秀，积雪浮云端。林表明霁色，城中增暮寒。”这是一首应试诗。《唐 诗纪事》记载，祖咏年轻时去长安应考，文题是“终南望余雪”，必须写出一首六韵十二句的五言长律。祖咏看完后思考了一下，写 出了四句就搁笔了。他感到这四句已经表达完整，考官让其重写，他拒绝了。"},{"id":642,"stem":"《小重山·昨夜寒蛩不住鸣》这首词，作者写于（ ）","options":["春天","夏天","秋天","冬天"],"answer":2,"explanation":"南宋诗人岳飞的《小重山·昨夜寒蛩不住鸣》全诗：“昨夜寒蛩不住鸣。惊回千里梦，已三更。起来独自绕阶行。人 悄悄，帘外月胧明。白首为功名。旧山松竹老，阻归程。欲将心事付瑶琴。知音少，弦断有谁听？”文中“寒蛩”指的是秋天的蟋蟀， 因此这首词写于秋天。"},{"id":643,"stem":"夜来风雨声，花（）知多少。","options":["谢","落","败","衰"],"answer":1,"explanation":"该句出自唐代诗人孟浩然的《春晓》：“春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。”这首诗是诗人隐居 在鹿门山时所做，意境十分优美。诗人抓住春天的早晨刚刚醒来时的一瞬间展开描写和联想，生动地表达了诗人对春天的热爱和怜惜 之情。"},{"id":644,"stem":"\"夜来风雨声，花落知多少\"中落的是（）","options":["春天的花","夏天的花","秋天的花","冬天的花"],"answer":0,"explanation":"该句出自唐代诗人孟浩然的《春晓》：“春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。”这首诗是诗人隐居 在鹿门山时所做，意境十分优美。诗人抓住春天的早晨刚刚醒来时的一瞬间展开描写和联想，生动地表达了诗人对春天的热爱和怜惜 之情。因此“落”的是春天的花。"},{"id":645,"stem":"《定风波》，原是唐代教坊曲名，后用作词牌，本意是（ ）","options":["平定叛乱","平定风波","乘风破浪","直面风波"],"answer":0,"explanation":"一作《定风波令》，又名《卷春空》、《醉琼枝》。按《定风波》本义应为平定变乱之意。始见于五代后蜀欧阳炯词。"},{"id":646,"stem":"关于\"相知无远近\"，以下说法错误的是（ ）","options":["下一句是\"万里尚为令”","张九龄所写","出自《送韦城李少府》","意思是彼此相互了解的人没有远近之分"],"answer":0,"explanation":"出自唐代张九龄的《送韦城李少府》：“送客南昌尉，离亭西候春。野花看欲尽，林鸟听犹新。别酒青门路，归轩白 马津。相知无远近，万里尚为邻。”该句意思是：知己挚友不分远近。"},{"id":647,"stem":"杜甫《望岳》（岱宗夫如何）中的\"岱宗\"指的是（）","options":["泰山","黄山","华山","嵩山"],"answer":0,"explanation":"全诗是：“岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生曾云，决眦入归鸟。会当凌绝顶，一览众山 小。”“岱宗”指的是泰山，用岱宗指泰山是因为泰山是五岳之首。"},{"id":648,"stem":"“君问归期未有期，巴山夜雨（）。”括号里应当填入（ ）","options":["涨秋霭","涨秋池","涨秋意","涨秋韵"],"answer":1,"explanation":"出自唐代李商隐的《夜雨寄北》：“君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山夜雨时。”"},{"id":649,"stem":"\"君问归期未有期，巴山夜雨涨秋池\"出自（）的诗。","options":["李商隐","柳宗元","白居易","王昌龄"],"answer":0,"explanation":"出自唐代李商隐的《夜雨寄北》：“君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山夜雨时。”"},{"id":650,"stem":"\"龙宫变闾里，水府生禾麦。\"\"闾\"和以下（）同音。","options":["驴","网","绿","鹿"],"answer":0,"explanation":"闾读音[lǘ]，与驴同音。该诗句出自唐代白居易的《自蜀江至洞庭湖口有感而作》。 19959276711（vx 同号）"},{"id":651,"stem":"诗句\"两岸猿声啼不住，轻舟已过万重山\"的作者被誉为（）。","options":["诗圣","诗仙","诗杰","诗鬼"],"answer":1,"explanation":"出自唐代李白的《早发白帝城》：“朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。”李白， 字太白，号青莲居士，又号“谪仙人”。唐代伟大的浪漫主义诗人，被后人誉为“诗仙”，与杜甫并称为“李杜”。诗圣——杜甫， 诗杰——王勃，诗鬼——李贺。"},{"id":652,"stem":"诗句\"两岸猿声啼不住，轻舟已过万重山\"的作者是（）","options":["少陵野老","香山居士","青莲居士","六一居士"],"answer":2,"explanation":"出自唐代李白的《早发白帝城》：“朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。”李白， 字太白，号青莲居士，又号“谪仙人”。唐代伟大的浪漫主义诗人，被后人誉为“诗仙”，与杜甫并称为“李杜”。少陵野老——杜 甫，香山居士——白居易，六一居士——欧阳修。"},{"id":653,"stem":"\"少壮不努力，老大徒伤悲\"出自（）","options":["《短歌行》","《长歌行》","《论语》","《孟子》"],"answer":1,"explanation":"出自乐府诗集的《长歌行》：“青青园中葵，朝露待日晞。阳春布德泽，万物生光辉。常恐秋节至，焜黄华叶衰。百 川东到海，何时复西归。少壮不努力，老大徒伤悲。”"},{"id":654,"stem":"诗句\"采得百花成蜜后，为谁辛苦为谁甜\"描写的是（ ）。","options":["蜂","蝶","蛾","蚊"],"answer":0,"explanation":"出自唐代罗隐的《蜂》：“不论平地与山尖，无限风光尽被占。采得百花成蜜后，为谁辛苦为谁甜？”大中十三年（公 元 859 年）底罗隐至京师，应进士试，历七年不第。作者心灰意冷，后又看见人民辛苦劳作在田间地头与部分朝廷官员不劳而获这样 相对立的情景而产生的愤懑，这可能是罗隐作出这首讽喻不劳而获者的《蜂》的原因。"},{"id":655,"stem":"以下诗句与出处、作者全部正确的一项是（ ）","options":["\"士为知己者死，女为悦己者容。\"选自《论语》，作者孔子和他的弟子。","\"海内存知己，天涯若比邻。\"选自《送杜少府之任蜀州》，作者王之涣。","\"当路谁相假，知音世所稀。\"选自《别王维》，作者孟浩然。","\"莫愁前路无知己，天下谁人不识君。\"选自《别董大》，作者高适。"],"answer":3,"explanation":"\"当路谁相假，知音世所稀。\"选自《留别王维》，作者孟浩然。\"海内存知己，天涯若比邻。\"选自《送杜少府之任蜀州》， 作者王勃。\"士为知己者死，女为悦己者容。\"选自《战国策》，西汉刘向整理编订。"},{"id":656,"stem":"\"我有嘉宾，德音孔昭。\"其中\"德音\"指的是（）","options":["好听的音乐","乐器","美好的品德声誉","人名"],"answer":2,"explanation":"出自先秦诗经·小雅·鹿鸣之什的《鹿鸣》。该句意思是“我有一批好宾客，品德高尚又显耀。”所以“德音”意思 是美好的品德声誉。"},{"id":657,"stem":"在孟子看来，实施仁政的两个要素是（ ）","options":["居高位、选贤才","居高位、法先王","法先王、选贤才","守规矩、选贤才"],"answer":2,"explanation":"孟子的政治思想以性善论为理论基础。他由人皆有四心（恻隐之心、羞恶之心、辞让之心、是非之心）推出人性本善。 孟子曰：“人皆有不忍人之心，先王有不忍人之心，斯有不忍人之政矣，以不忍之心，行不忍之政，治天下可运之掌上。”显然这种 以“不忍之心”而行的“不忍之政”便是“仁政”。实施“仁政”要求政治上法先王，选贤才；生活上与民同乐；经济上“制民恒产”。"},{"id":658,"stem":"以下描述错误的是（ ）","options":["白居易是浪漫主义诗人的代表","白居易是唐朝人","白居易主张\"文章合为时而著，诗歌合为事而作\"","白居易的《自蜀江至洞庭湖口有感而作》记录了洞庭湖水患"],"answer":0,"explanation":"浪漫主义是文艺的基本创作方法之一，浪漫主义诗人代表人物有唐代诗人李白，唐代诗人李贺，战国时期楚国诗人屈 原，唐代诗人李商隐，战国末期辞赋家宋玉等。"},{"id":659,"stem":"诗句\"自将磨洗认前朝\"中\"将\"的意思是（）","options":["快要","带领","希望","拿起"],"answer":3,"explanation":"出自唐代杜牧的《赤壁》：“折戟沉沙铁未销，自将磨洗认前朝。东风不与周郎便，铜雀春深锁二乔。”“自将磨洗 19959276711（vx 同号） 认前朝”意思是自己拿起它又磨又洗，辩认出是前朝的遗物。"},{"id":660,"stem":"柳宗元针对当时的骈文不重内容、空洞无物的弊病，提出了怎样的革新建议？（）","options":["以史为鉴、以文明道","文道合一、以文明道","中庸之道、文道合一","文道合一、以史为鉴"],"answer":1,"explanation":"柳宗元针对当时的骈文不重内容、空洞无物的弊病提出“文道合一、以文明道”。要求文章反映现实，“不平则鸣”， 富于革除时弊的批判精神。文章形式上，提出要革新文体，突破骈文束缚，句式长短不拘，并要求革新语言“务去陈言”、“辞必己 出”。此外，还指出先“立行”再“立言”。这是一种进步的文学主张。"},{"id":661,"stem":"\"身在千山顶上头，突岩深缝妙香稠。非无脚下浮云闹，来不相知去不留。\"这首诗描写的是（）","options":["梅","兰","竹","菊"],"answer":1,"explanation":"出自清代郑板桥的《题画兰》。全诗是借咏物表达高人隐士的情操，孤芳自赏而不为世俗纷扰打动。"},{"id":662,"stem":"以下诗句中描写\"故人庄\"环境之美的诗句是（）","options":["故人具鸡黍，邀我至田家。","绿树村边合，青山郭外斜。","开轩面场圃，把酒话桑麻。","待到重阳日，还来就菊花。"],"answer":1,"explanation":"“绿树村边合，青山郭外斜。”意思是翠绿的树林围绕着村落，一脉青山在城郭外隐隐横斜。"},{"id":663,"stem":"下面作者与篇目配对不正确的是（ ）","options":["《橘颂》屈原","《爱莲说》周敦颐","《醉翁亭记》欧阳修","《石灰吟》杜甫"],"answer":3,"explanation":"《石灰吟》作者是明代于谦，全诗：“千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。”"},{"id":664,"stem":"下面作者与篇目配对不正确的是（ ）","options":["《马说》韩愈","《爱莲说》周敦颐","《黄生借书说》欧阳修","《捕蛇者说》柳宗元"],"answer":2,"explanation":"《黄生借书说》选自清代袁枚的《小仓山房文集》。"},{"id":665,"stem":"以下不属于五岳的是（ ）","options":["泰山","武当山","华山","衡山"],"answer":1,"explanation":"五岳指泰山、华山、衡山、嵩山、恒山。"},{"id":666,"stem":"\"全石以为底，近岸，卷石底以出，（ ）。\"括号里应该填入的是（ ）","options":["为屿，为坻，为岩，为堪","为岩，为堪，为屿，为坻","为堪，为岩，为坻，为屿","为坻，为屿，为堪，为岩"],"answer":3,"explanation":"出自唐代柳宗元的《小石潭记》，上下文为：全石以为底，近岸，卷石底以出，为坻，为屿，为嵁，为岩。青树翠蔓， 蒙络摇缀，参差披拂。"},{"id":667,"stem":"关于重章叠唱的手法，说法正确的是（）","options":["叠唱的部分在不同段落的不同位置","叠唱的部分在同一段落的不同位置","不同语句重复出现","相同或相近语句重复出现"],"answer":3,"explanation":"相同或相近语句重复出现是重章叠唱手法的特点之一，即通过重复使用相同或相近的语句，形成一种回环往复的效果， 增强诗歌的节奏感和音乐性。"},{"id":668,"stem":"以下哪句诗不是岑参所写（ ）","options":["天山雪云常不开，千峰万岭雪崔嵬。","热海亘铁门，火山赫金方。","黄沙西际海，白草北连天。","大漠孤烟直，长河落日圆。"],"answer":3,"explanation":"诗句 D 出自唐代王维的《使至塞上》。此句描写边陲大漠中壮阔雄奇的景象，境界阔大，气象雄浑，一个“孤”字写 出了景物的单调，紧接一个“直”字，却又表现了它的劲拔、坚毅之美。"},{"id":669,"stem":"以下哪句诗不是岑参所写（ ）","options":["天山雪云常不开，千峰万岭雪崔嵬。","撩乱边愁听不尽，高高秋月照长城。","黄沙西际海，白草北连天。","热海亘铁门，火山赫金方。"],"answer":1,"explanation":"B 句出自唐代王昌龄的《从军行七首》。意思是：纷杂的乐舞与思乡的愁绪交织在一起，欲理还乱，无尽无休。此时 19959276711（vx 同号） 秋天的月亮高高地照着长城。"},{"id":670,"stem":"\"不是雪中（），聊装风景（ ）。\"括号里应填（ ）","options":["须送炭，诗要来","须送炭，要诗来","需送炭，诗要来","需送炭，要诗来"],"answer":1,"explanation":"出自宋代范成大的《大雪送炭与芥隐》。 全诗： 无因同拨地炉灰，想见柴荆晚未开。 不是雪中须送炭，聊装风景要诗来。"},{"id":671,"stem":"以下诗词中不属于咏物诗的是（ ）","options":["《雪》——罗隐","《花影》——苏轼","《蜂》——罗隐","《竹石》——郑壁"],"answer":0,"explanation":"罗隐这首诗以《雪》为题，但其立意不在吟咏雪景，而是借题发挥，表达了诗人对统治者的满腔愤怒和不满，流露出 诗人对广大贫苦人民的深刻同情。"},{"id":672,"stem":"以下对刘禹锡与他的《浪淘沙》的描述，正确的是（ ）","options":["有\"诗豪\"之称","写作风格是婉约的","喜欢淘金，所以写了\"千淘万漉虽辛苦\"","在面对磨难、面对不公时十分沮丧"],"answer":0,"explanation":"《浪淘沙九首》是唐代文学家刘禹锡的组诗作品。第一首演绎神话传说，第二首用象征手法表现爱情经受磨难，第三 首写世事流变之理，第四首写游子情怀，第五首描绘锦江风情，第六首揭示劳作与享受的不平，第七首描绘钱塘江潮，第八首写迁客 情怀，第九首再写世事流变之理。这是民歌体诗，既通俗易懂，又非常纯正，无浮华之词。"},{"id":673,"stem":"为《破阵乐·秋风四面足风沙》排序。（）①塞外征人暂别家②秋风四面足风沙③时光早晚到天涯④千里不辞行路远","options":["①③②④","①④②③","③①④②","②①④③"],"answer":3,"explanation":"诗句出自唐代张祜的《破阵乐》。 全诗： 秋风四面足风沙，塞外征人暂别家。 千里不辞行路远，时光早晚到天涯。"},{"id":674,"stem":"以下选项不属于\"六朝如梦鸟空啼\"中\"六朝\"的是（ ）","options":["三国吴、东晋","南朝宋、南朝梁","南唐、明","南朝齐、南朝陈"],"answer":2,"explanation":"该句出自韦庄的《金陵图》。 全诗： 江雨霏霏江草齐，六朝如梦鸟空啼。 无情最是台城柳，依旧烟笼十里堤。 六朝：指吴、东晋、宋、齐、梁、陈。"},{"id":675,"stem":"以下诗人中哪位与其他三位身处不同时代（）","options":["陈子昂","温庭筠","马戴","杜荀鹤"],"answer":0,"explanation":"陈子昂，字伯玉，后世称其为“陈拾遗”，初唐文学家、诗人、诗歌理论家、诗文革新人物之一。温庭筠，本名岐， 字飞卿，又作庭云、廷筠，号温钟馗，世称温方城、温助教。中国晚唐时期诗人、词人。马戴、杜荀鹤均为晚唐著名诗人。"},{"id":676,"stem":"以下\"记梦\"的诗词中，作者是唐代人的选项是（ ）","options":["自在飞花轻似梦，无边丝雨细如愁。","我欲因之梦吴越，一夜飞渡镜湖月。","夜阑卧听风吹雨，铁马兵戈入梦来。","我志在寥阔，畴昔梦登天。"],"answer":1,"explanation":"B 句出自唐代李白的《梦游天姥吟留别》。天姥山隐于云霓明灭之中，引起了诗人探求的想望，诗人进入了梦幻之中， 仿佛在月夜清光的照射下，飞度过明镜一样的镜湖，展现出一幅瑰丽变幻的奇景。"},{"id":677,"stem":"\"若耶溪\"是一条让中国古代文人流连忘返的溪流。下列诗句中，与若耶溪无关的是（ ）","options":["白首垂钓翁，新妆浣纱女。","起坐鱼鸟间，动摇山水影。","徐蝗何泛泛，空水共悠悠。","晓耕翻露草，夜榜响溪石。"],"answer":3,"explanation":"D 句出自唐代柳宗元的《溪居》。公元 810 年（元和五年），诗人被贬至永州已有五年之久，他游览发现风景秀丽的 愚溪，于是在溪水东南筑屋居住，写下愚溪诸咏，这首诗为其中一篇。 19959276711（vx 同号）"},{"id":678,"stem":"以下对于王安石的描述，错误的是（）","options":["因封荆国公又被称王荆公","唐宋八大家之一","杰出的政治家、思想家，卓越的文学家","在宋仁宗时期推行新法，史称王安石变法"],"answer":3,"explanation":"王安石，字介甫，号半山。抚州临川（今江西省抚州市）人。中国北宋时期政治家、文学家、思想家、改革家。宋仁 宗末年，曾作《上仁宗皇帝言事书》，要求对宋初以来的法度进行全盘改革，但未被采纳。宋神宗即位后，任翰林学士，上《本朝百 年无事札子》，继续阐述变法主张，深得神宗赏识。"},{"id":679,"stem":"诗句\"人闲桂花落，夜静春山空\"运用了（ ）修辞手法。","options":["比喻","对偶","拟人","反复"],"answer":1,"explanation":"本句出自唐代王维的《鸟鸣涧》。 全诗： 人闲桂花落，夜静春山空。 月出惊山鸟，时鸣春洞中。 此诗描绘山间春夜中幽静而美丽的景色，侧重于表现夜间春山的宁静幽美。全诗旨在写静，却运用了以动衬静的手法处理，这种反衬 的手法极见诗人的禅心与禅趣。\"时\"是时而，偶尔的意思。"},{"id":680,"stem":"诗句“云母屏风烛影深，长河渐落晓星沉”的作者是（ ）","options":["白居易","李白","李商隐","李煜"],"answer":2,"explanation":"出自唐代李商隐的《嫦娥》。 云母屏风烛影深，长河渐落晓星沉。 嫦娥应悔偷灵药，碧海青天夜夜心。"},{"id":681,"stem":"\"我报路长嗟日暮\"中的\"报\"意为（）","options":["报恩","报仇","前往","回答"],"answer":3,"explanation":"出自宋代李清照的《渔家傲·天接云涛连晓雾》。意思是：我回报天帝路途还很漫长，现在已是黄昏却还未到达。"},{"id":682,"stem":"唐代诗人张九龄字（ ）","options":["子瞻","子寿","子舆","子厚"],"answer":1,"explanation":"张九龄（678 年-740 年），一名博物，字子寿，韶州曲江（今广东韶关西）人，中国唐玄宗开元时的宰相、诗人。张 九龄才思敏捷，文章高雅，诗意超逸，是盛唐前期重要诗人，其五言古诗在唐诗发展中有很高的地位和巨大的影响。"},{"id":683,"stem":"\"不愆不忘，率由旧章。\"中的\"愆\"意为（）","options":["失望","麻烦","忧虑","过失"],"answer":3,"explanation":"该句意思是：不做错事不忘自己的职责，一切都遵循原有的法度章程。愆：过失。"},{"id":684,"stem":"君子敬而无失，与人恭而有礼，四海之内，皆兄弟也。\"出自（）","options":["《论语》","《老子》","《春秋》","《离骚》"],"answer":0,"explanation":"出自《论语·颜渊》。司马牛忧曰：“人皆有兄弟，我独亡。”子夏曰：“商闻之矣：死生有命，富贵在天。君子敬 而无失，与人恭而有礼，四海之内皆兄弟也。君子何患乎无兄弟也？”"},{"id":685,"stem":"关于\"万人操弓，共射一招\"，正确的是（）","options":["下一句是“招招必中”","意思是一万个人用同一种方法拿弓","表达了很多人一起射击，结果没射中","出自《吕氏春秋》"],"answer":3,"explanation":"该句出自《吕氏春秋》。吕不韦，战国时期政治家、思想家，主持编纂了《吕氏春秋》。此句意思为，众人拿着弓箭， 共同射向一个目标，这个目标没有射不中的。这句话强调了团结一心的重要性，鼓励人们应当齐心协力，合作追求目标。"},{"id":686,"stem":"下列诗句不是描写金陵的一项是（ ）","options":["吴宫花草埋幽径，晋代衣冠成古丘。","英雄一去豪华尽，唯有青山似洛中。","最爱湖东行不足，绿杨阴里白沙堤。","三山半落青天外，二水中分白鹭洲。"],"answer":2,"explanation":"C 出自唐代：白居易的《钱塘湖春行》。 孤山寺北贾亭西，水面初平云脚低。 几处早莺争暖树，谁家新燕啄春泥。 乱花渐欲迷人眼，浅草才能没马蹄。 19959276711（vx 同号） 最爱湖东行不足，绿杨阴里白沙堤。 写的是杭州西湖的景色。"},{"id":687,"stem":"诗句\"白日放歌须纵酒，青春作伴好还乡\"的作者被誉为（）","options":["诗圣","诗仙","诗杰","诗鬼"],"answer":0,"explanation":"白日放歌须纵酒，青春作伴好还乡。出自唐代杜甫的《闻官军收河南河北》解释：太阳高照、日光耀耀，放声高歌痛 饮美酒，趁着明媚春光与妻儿一同返回家乡。 杜甫，字子美，自号少陵野老，唐代伟大的现实主义诗人，祖籍襄阳（今属湖北），自其曾祖时迁居巩县（今河南巩义西南）。与李 白合称“李杜”。为了与另两位诗人李商隐与杜牧即“小李杜”区分，杜甫与李白又合称“大李杜”，杜甫也常被称为“老杜”。后 世称其杜拾遗、杜工部，也称他杜少陵、杜草堂。被誉为“诗圣”。"},{"id":688,"stem":"诗句\"不要人夸好颜色，只留清气满乾坤\"描写的是（）。","options":["梅","兰","竹","菊"],"answer":0,"explanation":"出自元代王冕的《墨梅》。诗人赞美墨梅不求人夸，只愿给人间留下清香的美德，实际上是借梅自喻，表达自己对人 生的态度以及不向世俗献媚的高尚情操。"},{"id":689,"stem":"王冕诗句\"不要人夸好颜色，只留清气满乾坤\"形容的是（）","options":["红梅","墨梅","绿梅","白梅"],"answer":1,"explanation":"出自元代王冕的《墨梅》。诗人赞美墨梅不求人夸，只愿给人间留下清香的美德，实际上是借梅自喻，表达自己对人 生的态度以及不向世俗献媚的高尚情操。"},{"id":690,"stem":"在《观沧海》中，曹操没有描写的是（）","options":["大海的壮阔","繁茂的草木、高耸挺拔的树不","成群结队的海上动物","日月运行"],"answer":2,"explanation":"《观沧海》是东汉末年诗人曹操创作的一首四言诗，《步出夏门行》的第一章[1]。这首诗是曹操在碣石山登山望海时， 用饱蘸浪漫主义激情的大笔，所勾勒出的大海吞吐日月、包蕴万千的壮丽景象；描绘了祖国河山的雄伟壮丽，既刻画了高山大海的壮 阔，更表达了诗人以景托志，胸怀天下的进取精神。全诗语言质朴，想象丰富，气势磅礴，苍凉悲壮。"},{"id":691,"stem":"在王昌龄的《从军行》中，没有涉及的内容与情感是（ ）","options":["荒凉的边塞","思乡之情","感恩父母","军旅生活"],"answer":2,"explanation":"《从军行七首》是唐代诗人王昌龄的组诗作品。这组诗以内容相关的七首诗形成连章，反映了复杂丰富的边塞生活。 第一首诗刻画了边疆戍卒怀乡思亲的情景；第二首诗描写征戍者在军中听乐观舞所引起的边愁；第三首诗描写古战场的荒凉景象，写 将军上表请求归葬战死将士骸骨，表现将帅对士卒的爱护之情；第四首诗表现战士们为保卫祖国矢志不渝的崇高精神；第五首诗描写 奔赴前线的戍边将士听到前方部队首战告捷的消息时的欣喜心情，反映了唐军强大的战斗力；第六首诗描写将军欲奔赴边关杀敌立功 的急切心情；第七首诗主要描写山峦叠嶂、烽火遍布的边塞景观。全诗意境苍凉，慷慨激昂，充分显示出盛唐气象。"},{"id":692,"stem":"\"青青园中葵，朝露待日晞\"出自（ ）","options":["诗经","楚辞","汉乐府","元曲"],"answer":2,"explanation":"出自乐府诗集《长歌行》。 青青园中葵，朝露待日晞． 阳春布德泽，万物生光辉。 常恐秋节至，焜黄华叶衰。 百川东到海，何时复西归。 少壮不努力，老大徒伤悲。"},{"id":693,"stem":"\"青青园中葵，朝露待日晞。阳春布德泽，万物生光辉。\"这四句诗出自《汉乐府》中的（ ）","options":["《陌上桑》","《东门行》","《长歌行》","《艳歌行》"],"answer":2,"explanation":"出自乐府诗集《长歌行》。 青青园中葵，朝露待日晞． 阳春布德泽，万物生光辉。 常恐秋节至，焜黄华叶衰。 百川东到海，何时复西归。 少壮不努力，老大徒伤悲。"},{"id":694,"stem":"诗句\"粉身碎骨浑不怕，要留清白在人间\"的作者是（ ）代的。","options":["唐","宋","明","清 74 19959276711（vx 同号）"],"answer":2,"explanation":"出自明代于谦的《石灰吟》：“千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。”这是一首 托物言志诗。作者以石灰作比喻，表达自己为国尽忠，不怕牺牲的意愿和坚守高洁情操的决心。"},{"id":695,"stem":"诗句\"如今直上银河去，同到牵牛织女家\"描写的是（ ）","options":["长江","黄河","湘江","珠江"],"answer":1,"explanation":"出自唐诗人刘禹锡的《浪淘沙》 全诗： 九曲黄河万里沙，浪淘风簸自天涯。 如今直上银河去，同到牵牛织女家。"},{"id":696,"stem":"（ ）的作者是\"唐宋八大家\"之一。","options":["《望庐山瀑布》","《江畔独步寻花》","《观书有感》","《泊船瓜洲》"],"answer":3,"explanation":"唐宋八大家，又称为“唐宋散文八大家”，是唐代和宋代八位散文家的合称，分别为唐代韩愈、柳宗元和宋代欧阳修、 苏洵、苏轼、苏辙、王安石、曾巩八位。《泊船瓜洲》的作者是王安石。"},{"id":697,"stem":"《迢迢牵牛星》引用了（ ）的故事。","options":["精卫填海","夸父逐日","牛郎织女","西天取经"],"answer":2,"explanation":"《迢迢牵牛星》是产生于汉代的一首文人五言诗，是《古诗十九首》之一。此诗借神话传说中牛郎、织女被银河阻隔 而不得会面的悲剧，抒发了女子离别相思之情，写出了人间夫妻不得团聚的悲哀。字里行间，蕴藏着一定的不满和反抗意识。"},{"id":698,"stem":"诗句\"中庭地白树栖鸦，冷露无
