是？烟波江上使人愁。 译文：过去的仙人已经驾着黄鹤飞走了，只留下空荡荡的黄鹤楼。黄鹤一去再也没有回来，千百年来只看见白云悠悠。阳光照耀下的 汉阳树木清晰可见，更能看清芳草繁茂的婴鹉洲。暮色渐渐漫起，哪里是我的家乡？江面烟波渺渺让人更生烦愁。 此诗描写了作者在黄鹤楼上远眺的美好景色，是一首怀古思乡之佳作。前四句写登临怀古，后四句写站在黄鹤楼上的所见所思。 诗歌从题材上分为.山水诗、田园诗、咏史诗、怀古诗、边塞诗、闺怨诗、羁旅诗等。这首诗的题材是怀古思乡诗。"},{"id":1061,"stem":"\"天下才有一石，曹子建独占八斗\"中的\"曹子建\"指的是（）。","options":["曹操","曹不","曹植","曹冲"],"answer":2,"explanation":"这句话出自南宋著名文学家谢灵运，此人才华横溢，诗文歌赋都被推为当世的精妙之作。而谢灵运本人也很自负，他 曾经说.\"天下的文才共有一石（dàn），曹植才高无双，独自占有八斗，我占有一斗。天下其他的人共分另外一斗。"},{"id":1062,"stem":"\"鸡犬之声相闻，老死不相往来\"一语出自（）","options":["《易经》","《老子》","《庄子》","《列子》"],"answer":1,"explanation":"本句出自《老子》，\"邻国相望，鸡犬之声相闻，民至老死不相往来。\"意思是说相邻的两个国家彼此可以望见，两国鸡 狗的叫声都可以听见，各自吃自己的国家丰富的食物，穿自己的衣服，按照自己的风俗生活，直到老死都不发动战争。"},{"id":1063,"stem":"以下词句出自南唐后主李煜的是（ ）","options":["知否？知否？应是绿肥红瘦。","但愿人长久，干里共婵娟。","今宵酒醒何处？杨柳岸，晓风残月。","问君能有几多愁，恰似一江春水向东流。"],"answer":3,"explanation":"A 出自李清照《如梦令·昨夜雨疏风骤》，B 出自苏轼《水调歌头·明月几时有》出自柳永《雨霖铃·寒蝉凄切》，D 出自李煜《虞美人·春花秋月何时了》"},{"id":1064,"stem":"以下著名诗人的合称不正确的是（ ）。","options":["李白、杜甫合称\"李杜\"","苏轼、黄庭坚合称\"苏黄\"","王之涣、孟浩然合称\"王孟\"","元稹、白居易合称\"元白\""],"answer":2,"explanation":"李白和杜甫为\"大李杜\"，也称\"李杜\"，李商隐和杜牧为\"小李杜\"，苏轼、 黄庭坚合称\"苏黄\"，元稹、白居易合称\"元白\"，孟浩然与王维合称为\"王孟\"。王之涣与岑参、 高适、王昌龄为我国唐代著名的四大边塞诗人。"},{"id":1065,"stem":"以善于描写边塞风光著称的诗人是（）","options":["李商隐","柳宗元","白居易","王昌龄"],"answer":3,"explanation":"王昌龄是我国唐代著名的边塞诗人，善于描写边塞风光。"},{"id":1066,"stem":"下列不属于唐代著名边塞诗人的是（）","options":["高适","王昌龄","岑参","王勃"],"answer":3,"explanation":"王之涣与岑参、高适、王昌龄为我国唐代著名的四大边塞诗人。"},{"id":1067,"stem":"以下诗人中哪位不以写边塞诗见长（ ）","options":["王昌龄","王之涣","王冕","岑参 117 19959276711（vx 同号）"],"answer":2,"explanation":"王冕字元章，号竹斋、煮石山农，亦号食中翁、梅花屋主等，元朝画家、诗人、书法家、篆刻家。王冕一生爱好梅花， 尤以墨梅知名。"},{"id":1068,"stem":"以下诗人中哪位不以写边塞诗见长（ ）","options":["王昌龄","韦应物","王之涣","岑参"],"answer":1,"explanation":"韦应物是山水田园诗派诗人。"},{"id":1069,"stem":"以下四首作品，朝代、作者全部对应正确的是（ ）","options":["《念奴娇·赤壁怀古》【宋】辛弃疾","《南乡子·登京口北固亭有怀》【宋】苏轼","《卖花声·怀古》【元】张可久","《山坡羊·潼关怀古》【清】张养浩"],"answer":2,"explanation":"《念奴娇·赤壁怀古》的作者是苏轼，字子瞻，号东坡居士，是宋代文学最高成就的代表，其诗善用夸张比喻，独具 风格，与黄庭坚并称\"苏黄\"，其词开放豪迈，与辛弃疾并称\"劳辛\"，其散文著述宏富，豪放自如，与欧阳修并称\"欧苏\"，为\"唐宋八大家 \"之一。本词首句大江东去，浪淘尽，千古风流人物。 《南乡子·登京口北固亭有怀》的作者是辛弃疾，这是一首怀古诗，这首诗中，简简单单引用了三国时期的几个典故，表面夸赞了曹 操、刘备、孙权等三个人，实际上更是利用对袁绍的不屑，表现对金人的藐视，通过对刘表父子的讽刺，借以抒发自己对南宋投降派 不思进取的批判。 《卖花声·怀古》的作者是张可久，这首曲慨叹秦汉时统治者之间的战争和各民族间的战争，给老百姓造成了深重的灾难，表现了作 者同情人民的思想感情。 《山坡羊·潼关怀古》的作者是张养浩，朝代是元，此曲抚今追昔，由历代王朝的兴衰引到人民百姓的苦难，一针见血地点出了封建 统治与人民的对立，表现了作者对历史的思索和对人民的同情。"},{"id":1070,"stem":"以下与“赤壁”相关的诗（词）中，对应作者不正确的是（ ）","options":["东风不与周郎便，铜雀春深锁二乔。——杜牧","大江东去，浪淘尽，千古风流人物。——苏子由","新破荆州得水军，鼓行夏口气如云。——苏输","踏碎铁鞋三百緉，不在危峰绝壁。——辛弃疾"],"answer":1,"explanation":"B 出自宋代文学家苏轼的词作《念奴娇·赤壁怀古》，苏子由一般指苏辙，是苏轼的弟弟。"},{"id":1071,"stem":"\"故国神游，多情应笑我，早生华发\"中的\"华发\"是指（）","options":["装饰华美的发型","花白的头发","长长的头发","头发掉落"],"answer":1,"explanation":"选自苏轼《念奴娇·赤壁怀古》苏轼〔宋代） 大江东去，浪淘尽，千古风流人物。故垒西边，人道是，三国周郎赤壁。 乱石穿空，惊涛拍岸，卷起千堆雪。江山如画，一时多少豪杰。 遥想公瑾当年，小乔初嫁了，雄姿英发。羽扇纶巾，谈笑间，樯橹灰飞烟灭。 故国神游，多情应笑我，早生华发。人生如梦，一尊还酹江月。 诗意：大江之水滚滚不断向东流去，滔滔巨浪淘尽千古英雄人物。那旧营垒的西边，人们说那就是三国时周郎大破曹兵的赤壁。岸边 乱石林立，像要刺破天空，惊人的巨浪拍击着江岸，激起的浪花好似千万堆白雪。雄壮的江山奇丽如图画，一时间涌现出多少英雄豪 杰。遥想当年的周瑜春风得意，小乔刚刚嫁给了他做妻子，英姿雄健风度翩翩神采照人。手摇羽扇头戴纶巾，谈笑之间，就把强敌的 战船烧得灰飞烟灭。如今我身临古战场神游往昔，可笑我有如此多的怀古柔情，竟如同未老先衰般鬓发斑白。人生犹如一场梦，且洒 一杯酒祭奠江上的明月。华发（fà）：花白的头发。"},{"id":1072,"stem":"\"遥想公瑾当年，小乔初嫁了，雄姿英发。\"其中的\"公瑾\"指的是（）","options":["诸葛亮","周瑜","刘备","曹操"],"answer":1,"explanation":"本句取自苏轼《念奴娇·赤壁怀古》，公瑾指三国时吴国名将周瑜，字公瑾，他少年得志，二十四为中郎将，掌管东 吴重兵，吴中皆呼为\"周郎\"。"},{"id":1073,"stem":"\"羽扇纶巾，谈笑间，樯橹灰飞烟灭\"句中\"羽扇纶巾\"形容的是（）","options":["诸葛亮","周瑜","孙权","鲁肃"],"answer":1,"explanation":"这个题目很容易选错 A，本句是取自苏轼《念奴娇·赤壁怀古》，在苏轼《念奴娇·赤壁怀古》中的周瑜年轻有为， 意气风发，胸襟广阔，年少有为，是苏轼心中十分仰慕的英雄。"},{"id":1074,"stem":"以下哪首不属于怀古诗词（ ）","options":["《念奴娇·赤壁怀古》","《夜雨寄北》","《泊秦淮》","《南乡子·登京口北固亭有怀》 118 19959276711（vx 同号）"],"answer":1,"explanation":"本题记怀古诗词有：《念奴娇·赤壁怀古》《泊秦淮》《南乡子·登京口北固亭有怀》《台城》，不属于怀古诗词的 有：《观沧海》《夜雨寄北》《过故人庄》"},{"id":1075,"stem":"《出师表》是诸葛亮出师伐（ ）前写的一篇奏章。","options":["吴","魏","蜀","羌"],"answer":1,"explanation":"《出师表》是诸葛亮出师伐魏临行前写给后主刘禅的奏章。文中以恳切的言辞，劝说后主要继承先帝遗志，广开言路， 严明赏罚，亲贤臣，远小人，完成兴复汉室的大业。也表达了诸葛亮报答先帝的知遇之恩的真挚感情和北定中原的决心。\"臣本布衣， 躬耕于南阳\"的\"躬耕\"，字面意思是\"亲自耕种\"，实指隐居农村。 诸葛亮为蜀汉基业\"鞠躬尽瘁，死而后已\"，在历代咏赞诸葛亮的诗篇中，杜甫的七律《蜀相》堪称绝唱，在尾联写道\"出师未捷身先死， 长使英雄泪满襟\"，\"出师\"句指的是诸葛亮为了伐魏，曾经六出祁山的事。表现出诗人对诸葛亮献身精神的崇高景仰和对他事业未竟的 痛惜心情。杜甫的七律佳作很多，被誉为\"古今七律第一\"的是《登高》。"},{"id":1076,"stem":"\"臣本布衣，躬耕于南阳\"中的\"臣\"是（）","options":["管仲","孙膑","诸葛亮","陶渊明"],"answer":2,"explanation":"选自诸葛亮的《出师表》，本句意思是：我本来是平民百姓，在南阳务农亲耕。"},{"id":1077,"stem":"\"臣本布衣，躬耕于南阳\"句中\"躬\"的意思是（）","options":["亲身","恭敬","躬身","一种农具"],"answer":0,"explanation":"躬耕，字面意思是\"亲身耕种\"，实指隐居农村。"},{"id":1078,"stem":"\"三顾频烦天下计，两朝开济老臣心\"中\"老臣\"指的是（）。","options":["诸葛亮","王允","褚遂良","魏征"],"answer":0,"explanation":"本句出自唐代诗人杜甫作品《蜀相》，是诗人杜甫定居成都草堂后，翌年游览武侯祠时创作的一首咏史怀古诗。此诗 借游览古迹，表达了诗人对蜀汉丞相诸葛亮雄才大略、辅佐两朝、忠心报国的称颂以及对他出师未捷而身死的惋惜之情。 丞相祠堂何处寻？锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音。 三顾频烦天下计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。 题目的意思是.刘备为统一天下而三顾茅庐，问计于诸葛亮，辅佐两代君主的老臣忠心耿耿。\"老臣\"指的是诸葛亮。首诗中诗人要寻找 的是丞相诸葛亮的祠堂。"},{"id":1079,"stem":"从体裁上看，杜甫的《蜀相》是一首（ ）","options":["五言律诗","七言律诗","咏怀诗","写景抒情诗"],"answer":1,"explanation":"蜀相杜甫（唐代） 丞相祠堂何处寻？锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音。 三顾频烦天下计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。 这是一首七言律诗。诗歌从体裁上分为古体诗和近体诗，唐以后才出现近体诗，但唐以后仍有诗人创作古体诗，唐以前一定是古体诗 （如晋陶渊明的诗歌）。 古体诗：起源是《诗经》古代最早的诗歌总集，之后有屈原的《楚辞》、汉乐府民歌、乐府歌行体等都是古体诗。近体诗：分为五言 绝句（20 字），五言律诗（40 字）、七言绝句（28 字）、七言律诗（56 字）七言律诗：分为首联、颔联、颈联、尾联。"},{"id":1080,"stem":"千古名句\"出师未捷身先死，长使英雄泪满襟\"出自哪首诗？（）","options":["《石灰吟》","《过零丁洋》","《蜀相》","《示儿》"],"answer":2,"explanation":"同上，这句诗的意思：出师还没有取得最后的胜利就先去世了，常使后世的英雄泪满衣襟。指诸葛亮多次出师伐魏， 未能取胜，最后卒于五丈原军中。"},{"id":1081,"stem":"下列有错别字的一项是（ ）","options":["风急天高猿啸哀","渚清沙白鸟飞回","万里悲秋常做客","百年多病独登台"],"answer":2,"explanation":"C 的正确是\"万里悲秋常作客\"，取自唐代杜甫的《登高》，也是被后人盛赞的\"古今七言律第一\"的作品.：《登高》 风急天高猿啸哀，渚清沙白鸟飞回。 无边落木萧萧下，不尽长江滚滚来。 万里悲秋常作客，百年多病独登台。 艰难苦恨繁霜鬓，潦倒新停浊酒杯。 其中\"万里悲秋常作客\"是对诗人一生的写照，因为经常漂泊寄人篱下，所以存有作客之忧愁，而正因此时常令诗人悲从中来。诗人的境 遇令人同情，感怀身世黯然泪下。写登高所见所感。写由漂泊困顿和世道艰难交织而来的迟暮之悲，虽为一时登临所起，却是写尽一 生悲哀，浓郁的感伤气氛，高度凝炼地概括了意境，因而作客具有被逼无奈而被迫寄居在别处之意，本身感觉低人一等，而做客则是 访问别人，自己被别人敬当客人之意。 19959276711（vx 同号）"},{"id":1082,"stem":"在晚年发出\"万里悲秋，百年多病\"感叹的是（）","options":["少陵野老","河东先生","醉吟先生","山谷道人"],"answer":0,"explanation":"本句诗词出自唐·杜甫《登高》，诗句：万里悲秋常作客，百年多病独登台。意思是身在万里之外，感伤这萧瑟的秋 天和常年客居他乡的生活，年老多病，我独自一人登上高台。 杜甫，字子美，自号少陵野老，唐代伟大的现实主义诗人，人称为\"诗圣\"，他的诗被称为\"诗史\"，与李白合称\"李杜\"，后世也称杜草堂。"},{"id":1083,"stem":"《马说》的作者是（ ）","options":["梁启超","韩愈","柳宗元","刘伯温"],"answer":1,"explanation":"《马说》的作者是韩愈，当时韩愈初登仕途，不得志。曾经三次上书宰相求擢用，但结果是\"待命\"40 余日。《马说》 用托物寓意的写法和层层深入的结构方式。先从正面提出论点.世有伯乐，然后有千里马。\"说明伯乐对千里马命运的决定性作用，从千 里马和伯乐的依赖关系出发，说明千里马被埋没是不可避免的。表达了作者对统治者不能识别人才、摧残人才、埋没人才的强烈愤慨 的发泄。"},{"id":1084,"stem":"何处望神州？满眼风光（ ）。","options":["望湖楼","岳阳楼","黄鹤楼","北固楼"],"answer":3,"explanation":"取自辛弃疾《南乡子·登京口北固亭有怀》，何处望神州？满眼风光北固楼。千古兴亡多少事？悠悠。不尽长江滚滚 流。年少万兜整，坐断东南战未休。天下英雄谁敌手？曹刘。生子当如孙仲谋。\"北固楼\"在今镇江市北固山上，下临长江。词人登上北 固亭以望神州，看到的却是北固楼的优美风光。然而，那时候却是山河破碎，国家处于风雨飘摇之中，这对于爱国诗人来说，触景生 情，心念家国，哪里有兴致去欣赏美景。"},{"id":1085,"stem":"\"何处望神州？满眼风光北固楼。\"中的\"北固楼\"在（ ）","options":["扬州","南京","杭州","镇江"],"answer":3,"explanation":""},{"id":1086,"stem":"《逍遥游》的作者是（ ）","options":["孟子","老子","惠子","庄子"],"answer":3,"explanation":"《逍遥游》是《庄子》的第一篇，集中代表了庄子的哲学思想。\"逍遥游\"是指\"没有任何束缚、自由自在地活动\"。"},{"id":1087,"stem":"《送东阳马生序》中的\"序\"所指的文体是（ ）","options":["书序","赠序","别序","自序。"],"answer":1,"explanation":"公元 1378 年，宋濂告老还乡的第二年，应诏去朝见，同乡晚辈马君则前来拜访，宋濂写下了此篇赠序，介绍自己的学 习经历和学习态度，以勉励他人勤奋。"},{"id":1088,"stem":"情投意合的朋友叫\"莫逆之交\"，辈分不同、年龄相差较大的朋友叫\"忘年交\"，亲如兄弟的朋友叫\"（ ）\"","options":["刎颈之交","金兰之交","布衣之交","平民之交"],"answer":1,"explanation":"贫贱而地位低下时结交的朋友叫\"贫贱之交\"；情谊契合、亲如兄弟的朋友叫\"金兰之交\"；同生死、共患难的朋友叫\"刎颈 之交\"；在遇到磨难时结成的朋友叫\"患难之交\"；情投意合、友谊深厚的朋友叫\"莫逆之交\"；从小一块儿长大的异性好朋友叫\"竹马之交\"； 以平民身份相交往的朋友叫\"布衣之交\"；辈分不同、年龄相差较大的朋友叫\"忘年交\"；不拘于身份、形迹的朋友叫\"忘形交\"；不因贵贱 的变化而改变深厚友情的朋友叫\"车笠交\"；在道义上彼此支持的朋友叫\"君子交\"；心意相投、相知很深的朋友叫\"神交\"。"},{"id":1089,"stem":"下列诗词名句、题目、作者对应完全正确的一项是（ ）。","options":["渭城朝雨浥轻尘，客舍新新柳色青。《送元二使安西》唐·王维","葡萄美酒夜光杯，欲饮琵琶马上催。《凉州词》唐·王维","问渠哪得清如许？为有源头活水来。《读书有感》宋·朱熹","春风又绿江南岸，明月何时照我还？《泊船瓜洲》宋·王安石"],"answer":3,"explanation":"A 的诗句应为\"渭城朝雨浥轻尘，客舍青青柳色新。\"B 的作者是王翰，C 的出处是宋·朱熹《观书有感》。"},{"id":1090,"stem":"\"九曲（）万里沙，浪淘风簸自天涯\"句中\"（ ）\"里应填（ ）","options":["江河","长河","黄河","银河"],"answer":2,"explanation":"\"九曲黄河万里沙，浪淘风簸自天涯\"出自唐·刘禹锡《浪淘沙》，意思是万里黄河弯弯曲曲挟带着泥沙，波涛滚滚如巨 风掀簸来自天涯。"},{"id":1091,"stem":"关于《鹿柴》的作者，下列说法错误的是？（ ）","options":["字摩诘，号摩诘居士 120 19959276711（vx 同号）","有\"七绝圣手\"之称","世称\"王右丞\"，与孟浩然合称\"王孟\"","代表作有《九月九日忆山东兄弟》《山居秋暝》"],"answer":1,"explanation":"《鹿柴》的作者是王维，字摩诘，号摩诘居士，王维参禅悟理，精通诗书音画，以诗名盛于开元、天宝间，尤长五言， 多咏山水田园，与孟浩然合称\"王孟\"，因笃诚奉佛，有\"诗佛\"之称。代表作有《九月九日忆山东兄弟》《山居秋暝》《鸟鸣涧》等。\" 七绝圣手\"是唐代诗人王昌龄。"},{"id":1092,"stem":"\"七绝圣手\"指的是唐代诗人（）。","options":["刘长卿","刘禹锡","王昌龄","王维"],"answer":2,"explanation":"\"七绝圣手\"是唐代诗人王昌龄。"},{"id":1093,"stem":"诗句（ ）的作者被誉为\"七绝圣手\"。","options":["泉眼无声惜细流，树阴照水爱晴柔。","蓬头稚子学垂纶，侧坐莓苔草映身。","停车坐爱枫林晚，霜叶红于二月花。","洛阳亲友如相问，一片冰心在玉壶。"],"answer":3,"explanation":"A 出自宋朝诗人杨万里创作的一首七言绝句小池》；B 出自唐代诗人胡令能的作品《小儿垂钓》；C 出自唐代诗人杜牧 作品《山行》；D 出自唐代诗人王昌龄作品《芙蓉楼送辛渐首》，\"七绝圣手\"是唐代诗人王昌龄。"},{"id":1094,"stem":"\"寒雨连江夜入吴，平明送客楚山孤\"中的\"吴\"指的是现在的（）","options":["江苏南部、浙江北部一带","四川盆地及其附近地区","黄河流域","秦岭以南地区"],"answer":0,"explanation":"本句出自唐代诗人王昌龄作品《芙蓉楼送辛渐二首》 寒雨连江夜入吴，平明送客楚山孤。洛阳亲友如相问，一片冰心在玉壶。 诗意：冷雨连夜洒遍吴地江天，清晨送走你后，独自面对着楚山离愁无限！到了洛阳，如果洛阳亲友问起我来，就请转告他们，我的 心依然像玉壶里的冰那样晶莹纯洁！ 注释：芙蓉楼：原名西北楼，登临可以俯瞰长江，遥望江北，在润州（今江苏省镇江市）西北。辛渐：诗人的一位朋友。寒雨：秋冬 时节的冷雨。连江：雨水与江面连成一片，形容雨很大。吴：古代国名，这里泛指江苏南部、浙江北部一带。平明：天亮的时候。客： 指作者的好友辛渐。楚山：楚地的山。这里的楚也指南京一带。孤：独自，孤单一人。洛阳：现位于河南省西部、黄河南岸。冰心： 比喻纯洁的心。玉壶：玉做的壶。比喻人品性高洁。 此诗为一首送别诗。是唐代诗人王昌龄，是早晨在江边为辛渐饯别的情景。此诗苍茫的江雨和孤峙的楚山，不仅烘托出诗人送别时的 凄寒孤寂之情，更展现了诗人开朗的胸怀和坚强的性格。屹立在江天之中的孤山与冰心置于玉壶的比象之间又形成一种有意无意的照 应，令人自然联想到诗人孤介傲岸、冰清玉洁的形象，使精巧的构思和深婉的用意融化在一片清空明澈的意境之中。"},{"id":1095,"stem":"“葡萄美酒夜光杯，欲饮琵琶马上催”选自（ ）","options":["《出塞》","《凉州词》","《塞下曲》","《从军行》"],"answer":1,"explanation":"本句选自王翰的《凉州词二首·其一》葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回。 王翰是唐代著名的边塞诗人。本句的意思是：酒筵上甘醇的葡萄美酒盛满在精美的夜光杯之中，歌伎们弹奏起急促欢快的琵琶声助兴 催饮，想到即将跨马奔赴沙场杀敌报国，战士们个个豪情满怀。"},{"id":1096,"stem":"\"东风夜放花千树\"这是辛弃疾的名篇中的一句，这首词描写的传统节日是（）","options":["七夕节","元宵节","中秋节","重阳节"],"answer":1,"explanation":"本句取自辛弃疾《青玉案·元夕》，写正月十五元宵节的晚上，满城灯火，尽情狂欢的景象。\"东风夜放花干树，更吹 落，星如雨\"意思是一簇簇的礼花飞向天空，然后像星雨一样散落下来。一开始就把人带进\"火树银花\"的节日狂欢之中。\"东风夜\"化用岑 参的忽如一夜春风来，千树万树梨花开。"},{"id":1097,"stem":"塞下秋来风景异，（ ）雁去无留意。","options":["洛阳","咸阳","衡阳","岳阳"],"answer":2,"explanation":"本句取自范仲淹《渔家傲·秋思》，\"塞下秋来风景异，衡阳雁去无留意。\"边境上秋天一来风景全异，向衡阳飞去的雁 群毫无留恋的情意。\"衡阳雁去\"是说传说秋天北雁南飞，至湖南衡阳回雁峰而止，不再南飞。表面写的是雁，实在写人。即连大雁都不 愿在这儿呆下去了，更何况人？但是。边塞军人毕竟不是候鸟，他们却坚守在边塞。"},{"id":1098,"stem":"\"燕然未勒归无计\"中的\"燕然未勒\"的意思是（）","options":["科举考试失败","没有赚到足够的钱","战事未平，功名未立","没有后代"],"answer":2,"explanation":"本句出自北宋杰出的文学家范仲淹作品《渔家傲·秋思》\"浊酒一杯家万里，燕然未勒归无计\"。整首词表现将士们的英 19959276711（vx 同号） 雄气概及艰苦生活，意境开阔苍凉，形象生动鲜明。 燕然未勒指战事未平，功名未立。燕然即燕然山，今名杭爱山，在今蒙古国境内。"},{"id":1099,"stem":"《寻隐者不遇》的作者是（）","options":["杜牧","李绅","岑参","贾岛"],"answer":3,"explanation":"《寻隐者不遇》作者是唐代的贾岛。\"松下问童子，言师采药去。只在此山中，云深不知处。\"在苍松下，我询问了年少 的学童；他说，师傅已经采药去了山中。他还对我说：就在这座大山里，可是山中云雾缭绕，不知他的行踪。"},{"id":1100,"stem":"泥融飞（），沙暖睡（ ）。填入括号内恰当的一项是（ ）","options":["蝴蝶；野鸭","蝴蝶；鸳鸯","燕子；鸳鸯","燕子；野鸭"],"answer":2,"explanation":"本句选自《绝句》唐·杜甫，\"迟日江山丽，春风花草香。泥融飞燕子，沙暖睡鸳鸯。\"沐浴在春光下的江山显得格外秀 丽，春风送来花草的芳香。泥土随着春天的来临而融化变得松软，燕子衔泥筑巢，暖和的沙子上睡着成双成对的鸳鸯。本诗描绘出在 初春灿烂阳光的照耀下，浣花溪一带明净绚丽的春景。"},{"id":1101,"stem":"\"两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。\"下列关于这首诗的作者及体裁表述正确的是（）","options":["杜甫律诗","杜甫绝句","杜牧律诗","杜牧绝句"],"answer":1,"explanation":"本诗选自唐代杜甫写的《绝句》，两只黄鹂在翠绿的柳树间鸣叫，一行白鹭直冲向蔚蓝的天空。坐在窗前可以看见西 岭千年不化的积雪，门前停泊着自万里外的东吴远行而来的船只。这首《绝句》是诗人住在成都浣花溪草堂时写的，描写了草堂周围 明媚秀丽的春天景色。第一句采用了对偶的修辞手法，\"两\"和\"一\"相对，一横一纵，展开了一个非常明媚的自然景色。"},{"id":1102,"stem":"\"远上寒山石径斜\"的下一句是（）","options":["千里江陵一日还","拂堤杨柳醉春烟","白云生处有人家","菊残犹有傲霜枝"],"answer":2,"explanation":"本句出自唐代杜牧的《山行》：远上寒山石径斜，白云生处有人家。停车坐爱枫林晚，霜叶红于二月花。这首诗描绘 的是秋之色，展现出一幅动人的山林秋色图。"},{"id":1103,"stem":"《送友人》一诗在题材上属于（）","options":["抒情诗","七言律诗","送别诗","五言律诗"],"answer":2,"explanation":"本句出自唐代李白的《送友人》 青山横北郭，白水绕东城。此地一为别，孤蓬万里征。 浮云游子意，落日故人情。挥手自兹去，萧萧班马鸣。 这是一首情意深长的送别诗，作者通过送别环境的刻画、气氛的渲染，表达出依依惜别之意。"},{"id":1104,"stem":"李白的《送友人》送的是哪位友人（）","options":["孟浩然","贺知章","汪伦","诗中未提及"],"answer":3,"explanation":"史学界还没有定论，主流观点认为\"送友人\"这个标题是后人加的，因为李白赠诗，往往都会加友人名字和地点。譬如《黄 鹤楼送孟洁然之广陵》。"},{"id":1105,"stem":"《送友人》一诗在体裁上属于（）","options":["抒情诗","七言律诗","送别诗","五言律诗"],"answer":3,"explanation":"诗歌体裁可分为古代诗歌和新诗两类，古代诗歌又可分为近体诗和古体诗（古风），近体诗又分为格律诗（律诗（五 言律诗、七言律诗）、绝句（五言绝句、七言绝句））、词、曲；新诗包括自由诗（五四以来产生的白话诗）、散文诗（以散文形式 表现抒情诗内容）、民歌（民间流传，集体创作的诗）。 诗歌的题材可分为①写景抒情诗②咏物言志诗③即事感怀诗④怀古咏史诗⑤边塞征战诗。"},{"id":1106,"stem":"\"菊残犹有傲霜枝\"的上联是（）","options":["天街小雨润如酥","最是一年春好处","荷尽已无擎雨盖","春城无处不飞花"],"answer":2,"explanation":"本句取自宋代苏轼《赠刘景文》：荷尽已无擎雨盖，菊残犹有傲霜枝。一年好景君须记，最是橙黄橘绿时。"},{"id":1107,"stem":"下列无错别字的一项是（ ）","options":["江山如此多娇，引无数英雄竞折腰","看银装素裹，分外妖娆","属风流人物，还看今朝","沧山如海，残阳如血"],"answer":0,"explanation":"B 是：看红妆素裹；C 是：数风流人物；D 是：苍山如海。 19959276711（vx 同号）"},{"id":1108,"stem":"以战国时屈原的创作为代表的新诗体是（）","options":["诗经","楚辞","大赋","乐府"],"answer":1,"explanation":"楚辞是战国中晚期产生于南方长江流域楚地，由楚国的诗人吸收南方民歌的精华，融合上古神话传说，创造出的一种 新体诗。楚辞体打破了《诗经》四字一句的死板格式，是对中国古代诗歌发展的一次大的解放。楚辞的特点是结构宏伟、想象丰富、 句式灵活，以屈原、宋玉等为代表作家，代表作品包括屈原《离骚》、《九歌》、《九章》等。"},{"id":1109,"stem":"王子乔是中国古代文学中对（ ）的代称。","options":["仙人","文人","官员","帝王"],"answer":0,"explanation":"王子乔喻指仙人。约前 565 年—前 549 年的东周人，是汉族传说中神仙，为黄帝后裔，东周灵王姬泄心的太子，本名 姬晋，字子乔，人称太子晋，世称王子晋或王子乔，是王氏的始祖。"},{"id":1110,"stem":"\"婕妤\"这个称号是由（）设立的。","options":["汉元帝","汉文帝","汉武帝","汉宣帝"],"answer":2,"explanation":"婕妤是汉代宫中嫔妃的等级称号，由汉武帝设立。初期为皇后以下最高位，后来降低，称号一直沿用到明代。"},{"id":1111,"stem":"下列对班婕妤《怨歌行》中\"出入君怀袖\"一句中的\"君\"理解最恰当的是（）","options":["君子","意中人","君王","姑娘"],"answer":1,"explanation":"该诗又题为《团扇诗》《纨扇诗》《怨诗》，是一首著名的宫怨诗。君指意中人。"},{"id":1112,"stem":"\"裁为合欢扇，团团似明月\"出自（ ）的作品。","options":["钩戈夫人","班婕妤","赵婕妤","王昭君"],"answer":1,"explanation":"出自班婕妤的《怨歌行》。 新裂齐纨素，鲜洁如霜雪。 裁为合欢扇，团团似明月。 出入君怀袖，动摇微风发。 常恐秋节至，凉飚夺炎热。 弃捐箧笥中，恩情中道绝。"},{"id":1113,"stem":"现存最早的宫怨诗是？（）","options":["班婕妤《怨歌行》","王昌龄《长信秋词》","谢脁《玉阶怨》","刘长卿《长门怨》"],"answer":0,"explanation":"汉代班婕妤的《怨歌行》是现存最早的宫怨诗，班婕妤是汉成帝刘骜妃子，西汉女作家、著名才女，中国文学史上以 辞赋见长的女作家之一。善诗赋，有美德。初为少使，立为婕妤。唐宋是宫怨诗的鼎盛时期。"},{"id":1114,"stem":"诗句\"飞流直下三千尺，疑是银河落九天\"描写的是（ ）的景象。","options":["泰山","黄山","华山","庐山"],"answer":3,"explanation":"本句取自唐朝李白的《望庐山瀑布》 日照香炉生紫烟，遥看瀑布挂前川。 飞流直下三千尺，疑是银河落九天。 这首诗形象地描绘了庐山瀑布雄奇壮丽的景色，反映了诗人对祖国大好河山的无限热爱。\"飞流直下三千尺，疑是银河落九天\"此句运用 了比喻、夸张的修辞手法。\"三千尺\"运用了夸张的手法写的，极写山之高峻。"},{"id":1115,"stem":"下列无错别字的一项是（ ）。","options":["虎踞龙盘今胜昔，天翻地覆慨而慷","天若有情天亦老，人间正道是苍桑","取义成人今日事，人间遍种自由花","灵台无计逃神矢，风雨如磐谙故园"],"answer":0,"explanation":"B.天若有情天亦老，人间正道是沧桑。 C.取义成仁今日事，人间遍种自由花。 D.灵台无计逃神矢，风雨如 磐暗故园"},{"id":1116,"stem":"下列不属于编年体史书的是（ ）。","options":["《春秋》","《史记》","《左传》","《资治通鉴》"],"answer":1,"explanation":"编年体：以年代为线索编排有关历史事件。编年体史书以时间为中心，按年、月、日顺序记述史事。因为它以时间为 经，以史事为纬，比较容易反映出同一时期各个历史事件的联系。 纪传体，东亚史书的一种形式，以为人物立传记（皇帝的传记称“纪”，一般人的称“传”，特殊情形的人物称“载记”，记载制度、 19959276711（vx 同号） 风俗、经济等称“志”，以表格排列历史大事称“表”）的方式记叙史实。"},{"id":1117,"stem":"汉下白登道，胡窥（ ）湾。","options":["青海","碧海","黄河","北海"],"answer":0,"explanation":"“汉下白登道，胡窥青海湾。”出自唐代李白的《关山月》。 解释：当年汉兵直指白登山道，吐蕃觊觎青海大片河山。"},{"id":1118,"stem":"下列句子都出自《伤仲永》，其中朗读停顿不正确的一项是（ ）。","options":["未尝/识书具","借旁近/与之","父/利其然也","余闻之/也久"],"answer":3,"explanation":"“余闻之也久”意思是：我听到这件事情已经很久了。断句的标志：语气词“也”字后面需停顿。应改为：余闻之也/ 久。"},{"id":1119,"stem":"以下不属于竹林七贤的是（）","options":["孔融","山涛","王戎","阮籍"],"answer":0,"explanation":"竹林七贤指的是三国魏正始年间，嵇康、阮籍、山涛、向秀、刘伶、王戎及阮咸七人。"},{"id":1120,"stem":"诗句\"露从今夜白，月是故乡明\"的作者是？（）","options":["张九龄","李白","杜甫","李商隐"],"answer":2,"explanation":"本句选自唐代杜甫的《月夜忆舍弟》。 戍鼓断人行，边秋一雁声。露从今夜白，月是故乡明。 有弟皆分散，无家问死生。寄书长不达，况乃未休兵。 诗意：戍楼上的更鼓声断绝了人行，秋夜的边塞传来了孤雁哀鸣。从今夜就进入了白露节气，月亮还是故乡的最明亮。虽有兄弟但都 离散各去一方，已经无法打听到他们的消息。寄往洛阳城的家书老是不能送到，何况战乱频繁还没有停止。 《月夜忆舍弟》是唐代诗人杜甫创作的一首五律。此诗首联和颔联写景，烘托出战争的氛围。颈联和尾联在此基础上写兄弟因战乱而 离散，居无定处，杏无音讯，于是思念之情油然而生，特别是在入秋以后的白露时节，在戌楼上的鼓声和失群孤雁的哀鸣声的映衬之 下，这种思念之情越发显得深沉和浓烈。全诗托物咏怀，格调沉郁哀伤，真挚感人。"},{"id":1121,"stem":"以下诗句中，不是描写初春景象的是（）","options":["诗家清景在新春，绿柳才黄半未匀。","天街小雨润如酥，草色遥看近却无。","忽如一夜春风来，千树万树梨花开。","风回云断雨初晴，返照湖边暖复明。"],"answer":2,"explanation":"C 选自唐代岑参的《白雪歌送武判官归京》；是岑参边塞诗的代表作，这是一首描写冬天景象的诗，此诗描写西域八 月飞雪的壮丽景色，抒写塞外送别、雪中送客之情，表现离愁和乡思，却充满奇思异想，并不令人感到伤感。"},{"id":1122,"stem":"\"墙角数枝梅，凌寒独自开\"中的梅和（）被世人喻为花中四君子。","options":["松，竹、兰","菊、竹、兰","菊、松、竹","兰、竹、荷"],"answer":1,"explanation":"本句选自宋代王安石的《梅花》，中国古诗文中常提到的梅、兰、竹、菊是花中四君子，其中，梅迎寒而开，美丽绝 俗，而且具有傲霜斗雪的特征，是坚韧不拔的人格的象征。兰，一则花朵色淡香清，二则多生于幽僻之处，故常被看作是谦谦君子的 象征。竹，也经冬不凋，且自成美景，它刚直、谦逊，不亢不卑，潇洒处世，常被看作不同流俗的高雅之士的象征。菊，它不仅清丽 淡雅、芳香袭人，还艳于百花凋后，不与群芳争列，故历来被用来象征恬然自处、傲然不屈的高尚品格。"},{"id":1123,"stem":"诗句\"遥知不是雪，为有暗香来\"描写的植物是（）。","options":["梅","兰","竹","菊"],"answer":0,"explanation":"本句选自宋代王安石的《梅花》，是一首咏物诗，本句的意思是：远远的就知道洁白的梅花不是雪，因为有梅花的幽 香传来。全诗以梅花的坚强和高洁品格喻示那些像诗人一样，处于艰难、恶劣的环境中依然能坚持操守、主张正义，为国家强盛而不 畏排挤和打击的人。"},{"id":1124,"stem":"诗句\"遥知不是雪，为有暗香来\"出自一首（）。","options":["送别诗","哲理诗","咏物诗","边塞诗"],"answer":2,"explanation":"本句选自宋代王安石的《梅花》，是一首咏物诗。"},{"id":1125,"stem":"下列哪句诗的作者是唐寅？（ ）","options":["桃花潭水深千尺，不及汪伦送我情。","平生不敢轻言语，一叫千门万户开。 124 19959276711（vx 同号）","路人借问遥招手，怕得鱼惊不应人。","停车坐爱枫林晚，霜叶红于二月花。"],"answer":1,"explanation":"A 是李白的《赠汪伦》，B 是唐寅的《画鸡》，C 是胡令能的《小儿垂钓》，D 是杜牧的《山行》。"},{"id":1126,"stem":"\"谁言千里自今夕，离梦杳如关塞长\"出自一首（）","options":["送别诗","怀古诗","田园诗","边塞诗"],"answer":0,"explanation":"选自唐代薛涛的《送友人》，这是送别诗中的名篇。全诗四句，前两句写别浦晚景，第三句是对友人的慰勉，末句抒 写离情之苦。此诗的最大特点是隐含了《诗经》名篇《秦风·兼葭》的意境，运用引用的修辞手法，以景开篇，以情点题，层层推进， 处处曲折，可谓兼有委曲、含蓄的特点。这二句的意思是：谁说朋友之情能在一夕之间完结呢？可离别后连相逢的梦也杳无踪迹，它 竟像迢迢关塞那样遥远。"},{"id":1127,"stem":"远看（）有色，近听（ ）无声。括号内应填入（ ）","options":["山；人","山；水","水；人","水；山"],"answer":1,"explanation":"本句取自唐代王维的《画》，远看山有色，近听水无声。春去花还在，人来鸟不惊。此诗为诗人赞画之作。"},{"id":1128,"stem":"“两岸青山相对出，孤帆一片日边来”中的\"青山\"是（）","options":["敬亭山","天门山","黄山","寒山"],"answer":1,"explanation":"本句出自唐代诗人李白作品《望天门山》 天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。 诗意.长江犹如巨斧，劈开天门雄峰，碧绿江水滚滚东流到这里，又回旋向北流去。两岸青山互相对峙美景难分高下，一只小船从太阳 升起的地方悠悠驶来。 注释：天门山：位于安徽省和县与芜湖市长江两岸，两山隔江对峙，形同天设的门户，天门由此得名。楚江：即长江。因为古代长江 中游地带属楚国，所以叫楚江。回：回漩，回转。两岸青山：分别指东梁山和西梁山，东梁山和西梁山合称为天门山。"},{"id":1129,"stem":"以下别称正确的是（ ）","options":["\"诗佛\"王勃、\"诗圣\"杜甫、\"诗仙\"李白","\"诗骨\"陈子昂、\"诗狂\"贺知章、\"诗豪\"孟郊","\"诗鬼\"李贺、\"诗圣\"杜甫、\"诗仙\"李白","\"诗狂\"贺知章、\"诗魔\"白居易、\"诗豪\"王昌龄"],"answer":2,"explanation":"作者称号： 李白——诗仙王维——诗佛白居易——诗魔苏轼——诗神 杜甫——诗圣李贺——诗鬼王勃——诗杰孟郊——诗囚 贺知章——诗狂刘禹锡——诗豪贾岛——诗奴陈子昂——诗骨 杜牧——杜紫薇王昌龄——诗家天子&七绝圣手刘长卿——五言长城"},{"id":1130,"stem":"\"五言长城\"指的是唐代诗人（ ）","options":["刘长卿","刘禹锡","王昌龄","王维"],"answer":0,"explanation":"刘长卿——五言长城"},{"id":1131,"stem":"下列对应有错误的一项是（ ）","options":["王维——诗佛","刘禹锡——诗豪","白居易——诗狂","李贺——诗鬼"],"answer":2,"explanation":"白居易——诗魔、诗王。"},{"id":1132,"stem":"有“诗狂”之称的唐代诗人是（ ）","options":["杜甫","白居易","贺知章","刘禹锡"],"answer":2,"explanation":"贺知章——诗狂"},{"id":1133,"stem":"“黑云压城城欲摧”的下一句是（ ）","options":["半卷红旗临易水","霜重鼓寒声不起","角声满天秋色里","甲光向日金鳞开"],"answer":3,"explanation":"本句出自唐朝李贺的《雁门太守行》。 黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。 半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。 诗意：敌兵滚滚而来，犹如黑云翻卷，想要摧倒城墙；战士们的铠甲在阳光照射下金光闪烁。号角声响彻秋夜的长空，边塞上将士的 血迹在寒夜中凝为紫色。红旗半卷，援军赶赴易水；夜寒霜重，鼓声郁闷低沉。为了报答国君的赏赐和厚爱，手操宝剑甘愿为国血战 19959276711（vx 同号） 到死。 李贺有”诗鬼”之称，是与”诗圣”杜甫、”诗仙”李白、”诗佛”王维，齐名的唐代著名诗人。著有《昌谷集》。李贺是中唐的浪 漫主义诗人，与李白、李商隐称为唐代三李。 注释：雁门太守行：古乐府曲调名。雁门，郡名。古雁门郡大约在今山西省西北部，是唐王朝与北方突厥部族的边境地带。 本诗中的”易水”出自战国时期的《易水歌》，”易水”既表明交战的地点，又暗示将士们具有”风萧萧兮易水寒，壮士一去兮不复 还”那种壮怀激烈的豪情。”黄金台”的典故出自《战国策》，”黄金台”是求贤若渴的象征。诗人借用典故表现将士们誓死杀敌、 报效朝廷的决心，从而也映射出自己的报国之志。 《雁门太守行》是唐代诗人李贺运用乐府古题创作的一首描写战争场面的诗歌。此诗用浓艳斑驳的色彩描绘悲壮惨烈的战斗场面，奇 异的画面准确地表现了特定时间、特定地点的边塞风光和瞬息万变的战争风云。"},{"id":1134,"stem":"诗句“黑云压城城欲摧，甲光向日金鳞开”的作者被誉为（ ）","options":["诗圣","诗仙","诗杰","诗鬼"],"answer":3,"explanation":"李贺——诗鬼"},{"id":1135,"stem":"对王之涣的《凉州词》一一黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。理解不当的是（ ）","options":["诗的前两句以远川高山衬托\"孤城\"，描绘出边塞的雄阔苍凉之景。","\"杨柳\"是双关语，既指音乐的曲调，又指现实中的杨柳树。","诗用\"何须\"二字，由边塞图景描绘转入情感抒发。","全诗写了戍边者不能还乡的怨情，情绪消极悲切。"],"answer":3,"explanation":"本首诗调苍凉悲壮，虽写满抱怨但却并不消极颓废，表现了盛唐时期人们宽广豁达的胸襟。"},{"id":1136,"stem":"\"羌笛何须怨杨柳，春风不度玉门关\"中的\"杨柳\"指的是（）","options":["美好的春天","春天的柳树","送别的曲调","思念的家乡"],"answer":2,"explanation":"\"杨柳\"也是双关语，既指音乐的曲调，又指现实中的杨柳树。"},{"id":1137,"stem":"以下不属于古诗词中离别送别意象的是（）","options":["白云","杨柳","夕阳","长亭"],"answer":0,"explanation":"古诗词里常见的送别、惜别意象有.杨柳、春草、春色、夕阳、秋、长亭、南浦、落花、水、酒等等。由于\"柳\"与\"留\" 谐音，汉代以来，常以折柳相赠来寄托依依惜别之情。\"长亭\"是陆上的送别之地。\"南浦\"是水边的送别之所。白云洁白无瑕、自由不羁， 一般象征着美好的品格，清高的气节，白云还有漂浮不定的含义，诗人们也用来比作命运多舛。"},{"id":1138,"stem":"诗句“蒌蒿满地芦芽短，正是河豚欲上时”描写的是（）情景。","options":["春季","夏季","秋季","冬季"],"answer":0,"explanation":"诗句出自宋代苏轼的《惠崇春江晚景二首》，解释：河滩上长满了蒌蒿，芦苇也长出短短的新芽，而河豚此时正要逆 流而上，从大海回游到江河里来了。此句描写了一派春意盎然、欣欣向荣的景象。"},{"id":1139,"stem":"诗句“遥望洞庭山水翠，白银盘里一青螺”运用了（）的修辞手法。","options":["拟人","夸张","比喻","对偶"],"answer":2,"explanation":"诗句出自唐代刘禹锡的《望洞庭》，意思是遥望洞庭，山青水绿，林木葱茏的洞庭山耸立在泛着白光的洞庭湖里，就 像白银盘里的一只青螺。"},{"id":1140,"stem":"“已似长沙傅，从今又几年”中，没有用到的表现手法是（）","options":["用典","比喻","抒情","疑问"],"answer":1,"explanation":"诗句出自唐代刘长卿的《新年作》，意思是我已和长太傅一样被贬为长沙太傅，今后还要几年才有还乡机会？诗句借 贾谊自况，抒发贬谪悲愤。用到的表现手法有用典、抒情和疑问"},{"id":1141,"stem":"李商隐的《夜雨寄北》中，写出对未来欢聚的向往之情的诗句是（）","options":["君问归期未有期，巴山夜雨涨秋池。","何当共剪西窗烛，却话巴山夜雨时。","待到重阳日，还来就菊花。","但愿人长久，千里共婵娟。"],"answer":1,"explanation":"“何当共剪西窗烛，却话巴山夜雨时。”意思是什么时候我们才能一起秉烛长谈，相互倾诉今宵巴山夜雨中的思念之 情。"},{"id":1142,"stem":"“白也诗无敌，飘然思不群”中“白”是指（ ）","options":["李白","白居易","白朴","白行简"],"answer":0,"explanation":"126 19959276711（vx 同号） 【知识小链接】出自唐代杜甫的《春日忆李白》：“白也诗无敌，飘然思不群。清新庾开府，俊逸鲍参军。渭北春天树，江东日暮云。 何时一樽酒，重与细论文。”这一句是说：李白的诗作无人能敌，他那高超的才思也远远的超出一般人。"},{"id":1143,"stem":"北风卷地白草折，胡天（ ）即飞雪。","options":["七月","八月","九月","十月"],"answer":1,"explanation":"出自唐代岑参的《白雪歌送武判官归京》。 解释：北风席卷大地吹折了白草，塞北的天空八月就飘降大雪。"},{"id":1144,"stem":"“不受千钟禄”中的“钟”是古代容量单位。下列不是古代容量单位的是（ ）","options":["里","斗","斛","石"],"answer":0,"explanation":"“里”是中国古代使用的长度计量单位。"},{"id":1145,"stem":"香山居士是（）","options":["白居易","欧阳修","苏轼","李清照"],"answer":0,"explanation":"香山居士——白居易；六一居士——欧阳修；东坡居士——苏轼；易安居士——李清照。"},{"id":1146,"stem":"《舟过安仁》中，小童撑起的伞的作用是（）","options":["遮阳","遮雨","使风","挡风"],"answer":2,"explanation":"《舟过安仁》是南宋诗人杨万里创作的一首七言绝句。 全诗：一叶渔船两小童，收篙停棹坐船中。怪生无雨都张伞，不是遮头是使风。 这首诗意思是一只渔船上，有两个小孩子，他们收起了竹竿，停下了船桨，坐在船中。 怪不得没下雨他们就张开了伞，原来他们不是为了遮雨，而是想利用伞当帆让船前进啊。"},{"id":1147,"stem":"“独在异乡为异客，每逢佳节倍思亲”中的“客”是（ ）","options":["孟浩然","韦应物","王安石","王维"],"answer":3,"explanation":"诗句出自唐代王维的《九月九日忆山东兄弟》，是诗人十七岁时在长安所作，意思是独自远离家乡难免总有一点凄凉， 每到重阳佳节倍加思念远方的亲人。“客”指诗人自己。"},{"id":1148,"stem":"“仰天大笑出门去，我辈岂是蓬蒿人”出自（ ）的作品","options":["李白","刘禹锡","屈原","辛弃疾"],"answer":0,"explanation":"出自唐代李白的《南陵别儿童入京》。 解释：仰面朝天纵声大笑着走出门去，我怎么会是长期身处草野之人？"},{"id":1149,"stem":"“此去泉台招旧部，旌旗十万斩阎罗”出自（ ）的诗作","options":["毛泽东","朱德","陈毅","鲁迅"],"answer":2,"explanation":"诗句出自陈毅的《梅岭三章》： 断头今日意如何？创业艰难百战多。 此去泉台招旧部，旌旗十万斩阎罗。 南国烽烟正十年，此头须向国门悬。 后死诸君多努力，捷报飞来当纸钱。 投身革命即为家，血雨腥风应有涯。 取义成仁今日事，人间遍种自由花。"},{"id":1150,"stem":"“千里来寻故地，旧貌变新颜”一句出自（）","options":["《清平乐·六盘山》","《西江月·井冈山》","《水调歌头·重上井冈山》","《忆秦娥·娄山关》"],"answer":2,"explanation":"出自近现代毛泽东的《水调歌头·重上井冈山》。 全诗： 久有凌云志，重上井冈山。千里来寻故地，旧貌变新颜。到处莺歌燕舞，更有潺潺流水，高路入云端。过了黄洋界，险处不须看。 风雷动，旌旗奋，是人寰。三十八年过去，弹指一挥间。可上九天揽月，可下五洋捉鳖，谈笑凯歌还。世上无难事，只要肯登攀。"},{"id":1151,"stem":"下列诗句有错别字的一项是（ ）","options":["沧海月明珠有泪","蓝田日暖玉生烟","旧时王榭堂前燕","飞入寻常百姓家"],"answer":2,"explanation":"C 出自唐代刘禹锡《乌衣巷》： 19959276711（vx 同号） 朱雀桥边野草花，乌衣巷口夕阳斜。 旧时王谢堂前燕，飞入寻常百姓家。"},{"id":1152,"stem":"《醉翁亭记》的作者是（ ）","options":["韩愈","柳宗元","苏轼","欧阳修"],"answer":3,"explanation":"《醉翁亭记》是宋代文学家欧阳修创作的一篇文章。文章描写了滁州一带朝暮四季自然景物不同的幽深秀美，滁州百 姓和平宁静的生活，特别是作者在山林中与民一齐游赏宴饮的乐趣。"},{"id":1153,"stem":"“人间有味是清欢”表达了作者（）的人生态度。","options":["清雅豁达","及时行乐","逍遥自在","任性放纵"],"answer":0,"explanation":"“人间有味是清欢”出自宋代苏轼的《浣溪沙·细雨斜风作晓寒》，意思是人间真正有滋味的还是清淡的欢愉。反映 了作者对现实生活的热爱和清雅豁达的精神。"},{"id":1154,"stem":"“海内存知己，天涯若比邻”出自一首（）","options":["哲理诗","送别诗","山水诗","咏怀诗"],"answer":1,"explanation":"出自唐代诗人王勃的《送杜少府之任蜀州》，此诗是送别诗的名作，诗意在慰勉友人勿在离别之时悲哀。"},{"id":1155,"stem":"下列不属于“四书五经”中“五经”的是（）","options":["《诗经》","《尚书》","《南华经》","《易经》"],"answer":2,"explanation":"五经是《诗经》、《尚书》、《礼记》、《周易》、《春秋》五部作品。"},{"id":1156,"stem":"陆游诗《书愤》“出师一表真名世”中提到的《出师表》的作者是（）","options":["司马光","范仲淹","李白","诸葛亮"],"answer":3,"explanation":"《出师表》是三国时期蜀汉丞相诸葛亮在决定北上伐魏、克复中原之前给后主刘禅上书的表文。"},{"id":1157,"stem":"词句“青山遮不住，毕竟东流去”的词牌名是（ ）","options":["蝶恋花","菩萨蛮","沁园春","丑奴儿"],"answer":1,"explanation":"出自宋代辛弃疾的《菩萨蛮·书江西造口壁》，全诗：郁孤台下清江水，中间多少行人泪。西北望长安，可怜无数山。 青山遮不住，毕竟东流去。江晚正愁余，山深闻鹧鸪。"},{"id":1158,"stem":"“雁引愁心去，山衔好月来”运用的修辞手法是（）","options":["夸张","拟人","双关","比喻"],"answer":1,"explanation":"“雁引愁心去，山衔好月来。”出自唐代李白的《与夏十二登岳阳楼》。解释：南飞的大雁带走我忧戚烦闷的心情， 远处的山峰衔来一轮美好的明月。"},{"id":1159,"stem":"成语“柳暗花明”出自古诗（ ）","options":["《江南春》","《忆江南》","《游山西村》","《商山早行》"],"answer":2,"explanation":"出自宋代陆游的《游山西村》：“莫笑农家腊酒浑，丰年留客足鸡豚。山重水复疑无路，柳暗花明又一村。箫鼓追随 春社近，衣冠简朴古风存。从今若许闲乘月，拄杖无时夜叩门。”"},{"id":1160,"stem":"独怜幽草涧边生，上有（ ）深树鸣。","options":["黄莺","黄鹂","喜鹊","新燕"],"answer":1,"explanation":"诗句出自唐代韦应物的《滁州西涧》，“独怜幽草涧边生，上有黄鹂深树鸣。”意思是：最是喜爱涧边生长的幽幽野 草，还有那树丛深处婉转啼唱的黄鹂。"},{"id":1161,"stem":"诗句“千锤万凿出深山，烈火焚烧若等闲”描写的是（）","options":["黄金","宝剑","石灰","美玉"],"answer":2,"explanation":"出自明代于谦的《石灰吟》：“千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。”这是一首 托物言志诗。作者以石灰作比喻，表达自己为国尽忠，不怕牺牲的意愿和坚守高洁情操的决心。"},{"id":1162,"stem":"“草色遥看近却无”这句诗写出了早春草色的特点，不正确的是（ ）","options":["只能远看","稀稀拉拉","似有似无","颜色很淡 128 19959276711（vx 同号）"],"answer":0,"explanation":"“天街小雨润如酥，草色遥看近却无”出自唐代韩愈的《早春呈水部张十八员外》，意思是京城的街道上空丝雨纷纷， 雨丝就像乳汁般细密而滋润，小草钻出地面，远望草色依稀连成一片，近看时却显得稀疏零星。写出了早春草色稀稀拉拉、似有似无、 颜色很淡的特点。"},{"id":1163,"stem":"“青泥何盘盘，百步九折萦岩峦”是李白所写的《蜀道难》中的诗句，其中“青泥”指的是（ ）","options":["一种泥土","一种动物","一座山岭","一个地名"],"answer":2,"explanation":"青泥：青泥岭，在今甘肃徽县南，陕西略阳县北。"},{"id":1164,"stem":"请为古诗排序（）①惟有老梅标致别②岁寒时节自春风③闲花野草斗青红④一着冰霜扫地空","options":["②④③①","①②④③","③④①②","④①③②"],"answer":2,"explanation":"《素梅四六》作者是元代诗人王冕： 闲花野草斗青红，一着冰霜扫地空。 惟有老梅标致别，岁寒时节自春风。"},{"id":1165,"stem":"《山居秋瞑》中的“瞑”指的是（）","options":["清晨","正午","日落","半夜"],"answer":2,"explanation":"《山居秋暝》是唐代诗人王维的山水名篇，全诗： 空山新雨后，天气晚来秋。 明月松间照，清泉石上流。 竹喧归浣女，莲动下渔舟。 随意春芳歇，王孙自可留。 暝：日落，天色将晚。"},{"id":1166,"stem":"下列诗没有提到水禽的是（ ）","options":["始知锁向金笼听，不及林间自在啼。","争渡，争渡，惊起一滩鸥鹭。","关关雎鸠，在河之洲。","白毛浮绿水，红掌拨清波。"],"answer":0,"explanation":"A 出自宋代欧阳修的《画眉鸟》。"},{"id":1167,"stem":"诗句“我来竟何事，高卧沙丘城”中“我”是指（ ）","options":["李白","杜甫","高适","王昌龄"],"answer":0,"explanation":"选自唐代李白的《沙丘城下寄杜甫》我来竟何事，高卧沙丘城。城边有古树，日夕连秋声。鲁酒不可醉，齐歌空复情。 思君若汶水，浩荡寄南征。"},{"id":1168,"stem":"纷纷暮雪下（），风挈红旗冻不翻。","options":["营门","辕门","东门","西门"],"answer":1,"explanation":"“纷纷暮雪下辕门，风掣红旗冻不翻。”出自唐代岑参的《白雪歌送武判官归京》。解释：傍晚辕门前大雪纷纷落下， 红旗冻僵了风也无法牵引。"},{"id":1169,"stem":"“雪沫乳花浮午盏”中“雪沫乳花”指的是（ ）","options":["形容牛奶中泛起白色的泡沫","雪白的花朵","形容煎茶时上浮的白色泡沫","洁白的雪花"],"answer":2,"explanation":"诗句出自《浣溪沙·细雨斜风作晓寒》，雪沫乳花：形容点茶时上浮的白泡。"},{"id":1170,"stem":"“西北望长安，可怜无数山“中“可怜“的意思是（ ）","options":["可爱","可惜","怜惜","稀少"],"answer":1,"explanation":"诗句出自辛弃疾的《菩萨蛮·书江西造口壁》，可怜：可惜。"},{"id":1171,"stem":"《长相思·桥如虹》中“天教称放翁”中的“放翁”是（）的自号。","options":["辛弃疾","陆游","苏轼","李白"],"answer":1,"explanation":"这首诗词是宋代文学家陆游所作，“放翁”是陆游的自号。 19959276711（vx 同号）"},{"id":1172,"stem":"“遥知兄弟登高处，遍插茱萸少一人”描写的传统节日是（）","options":["七夕节","元宵节","中秋节","重阳节"],"answer":3,"explanation":"出自唐代王维的《九月九日忆山东兄弟》：“独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。 ” 九月九日是重阳节。"},{"id":1173,"stem":"诗句“当窗理云鬓，对镜贴花黄”使用的修辞手法是（）","options":["互文","拟人","排比","夸张"],"answer":0,"explanation":"使用了互文、对偶、比喻这三种修辞手法。这句话的意思是对着窗户镜子梳理像云一样的鬓发并贴上了花黄。首先是 互文；由上可知“祥云一样的鬓发”用了比喻；最后是对偶，“当窗”对“对镜”、“理”对“帖”、“云鬓”对“花黄”。"},{"id":1174,"stem":"下列不属于“岁寒三友”的一项是（）","options":["梅","菊","松","竹"],"answer":1,"explanation":"岁寒三友指松、竹、梅。松、竹经冬不凋，梅花耐寒开放，因此有“岁寒三友”之称。出自宋·林景熙《王云梅舍记》。"},{"id":1175,"stem":"处暑之前的节气是（ ）","options":["立秋","秋分","霜降","白露"],"answer":0,"explanation":"二十四节气：立春、雨水、惊蛰、春分、清明、谷雨、立夏、小满、芒种、夏至、小暑、大暑、立秋、处暑、白露、 秋分、寒露、霜降、立冬、小雪、大雪、冬至、小寒、大寒。处暑之前的节气是立秋。"},{"id":1176,"stem":"律诗的第三四两句是（ ）","options":["首联","颈联","颔联","尾联"],"answer":2,"explanation":"首联，是律诗中的第一联，诗的前两句就是首联；颔联，第三，四句就是颔联；颈联，第五，六句就是颈联；尾联， 最后两句就是尾联。\"首联、颔联、颈联、尾联\"通常是出现在七言或者五言律诗当中。"},{"id":1177,"stem":"成语\"三山五岳\"中的\"五岳\"指五座山，其中南岳是（）","options":["泰山","恒山","华山","衡山"],"answer":3,"explanation":"三山五岳泛指名山或各地。三山是古代传说中的东海三座仙山，分别是蓬莱（蓬壶）、方丈（方壶）、瀛洲（瀛壶）； 五岳指泰山、华山、衡山、恒山、嵩山，对应东岳、西岳、南岳、北岳、中岳，三山五岳在中国虽不是最高的山，但都高耸于平原或 盆地之上，这样也就显得格外险峻。泰山是五岳之首，又名岱山、岱宗、岱岳、东岳、泰岳，它位于山东省中部，泰山被古人视为\"直 通帝座\"的天堂，成为百姓崇拜，帝王告祭的神山。"},{"id":1178,"stem":"以下不属于古代传说中的东海三座仙山之一的是（ ）","options":["瀛洲","昆仑","蓬莱","方丈"],"answer":1,"explanation":"三山五岳泛指名山或各地。三山是古代传说中的东海三座仙山，分别是蓬莱（蓬壶）、方丈（方壶）、瀛洲（瀛壶）； 五岳指泰山、华山、衡山、恒山、嵩山，对应东岳、西岳、南岳、北岳、中岳，三山五岳在中国虽不是最高的山，但都高耸于平原或 盆地之上，这样也就显得格外险峻。华山，古称“西岳”，雅称“太华山”，自古以来就有“奇险天下第一山”的说法。"},{"id":1179,"stem":"\"五岳\"指我国五座名山，其中五岳之首是（）","options":["泰山","恒山","华山","衡山"],"answer":0,"explanation":"五岳指泰山、华山、衡山、恒山、嵩山，泰山是五岳之首。"},{"id":1180,"stem":"对诗句\"笛中闻折柳，春色未曾看\"\"折柳\"一词描述正确的一项是（）","options":["一首古曲","一个人名","一个典故","一个动作"],"answer":0,"explanation":"本句取自唐代大诗人李白的组诗作品《塞下曲六首》折柳《折杨柳》，古乐曲名。《折杨柳》为乐府横吹曲，多写行 客的愁苦。"},{"id":1181,"stem":"请为《春夜洛城闻笛》排序（ ）①散入春风满洛城②何人不起故园情③此夜曲中闻折柳④谁家玉笛暗飞声","options":["②④③①","①②④③","③④①②","④①③② 130 19959276711（vx 同号）"],"answer":3,"explanation":"《春夜洛城闻笛》是唐代诗人李白创作的一首七绝。 谁家玉笛暗飞声，散入春风满洛城。此夜曲中闻折柳，何人不起故园情。 此诗抒发了作者客居洛阳夜深人静之时被笛声引起的思乡之情，其前两句描写笛声随春风而传遍阳城，后两句写因闻笛而思乡。全诗 扣紧一个\"闻\"字，抒写自己闻笛的感受，合理运用想象和夸张，感情直率真挚又有余蕴，令人回味无穷。"},{"id":1182,"stem":"下列诗句不是描写春景的是（ ）","options":["沾衣欲湿杏花雨，吹面不寒杨柳风。","小荷才露尖尖角，早有蜻蜓立上头。","碧玉妆成一树高，万条垂下绿丝绦。","天街小雨润如酥，草色遥看近却无。"],"answer":1,"explanation":"B 选自宋代杨万里的《小池》 泉眼无声惜细流，树荫照水爱晴柔。小荷才露尖尖角，早有蜻蜓立上头。 这是一首描写初夏池塘美丽景色的、清新的小诗。"},{"id":1183,"stem":"关于诗句\"月出惊山鸟，时鸣春涧中\"，以下描述不正确的是（）","options":["诗人运用了以动衬静的手法。","诗人想要表达山中的幽静。","诗句中的\"时\"代表时间。","诗人传达出山谷幽静的同时，也展示出山谷中的生机。"],"answer":2,"explanation":"本句出自唐代王维的《鸟鸣涧》，人闲桂花落，夜静春山空。月出惊山鸟，时鸣春洞中。 诗意：寂静的山谷中，只有春桂花在无声的飘落，宁静的夜色中春山一片空寂。月亮升起月光照耀大地时惊动了山中栖鸟，在春天的 溪涧里不时地吗鸟叫。 此诗描绘山间春夜中幽静而美丽的景色，侧重于表现夜间春山的宁静幽美。全诗旨在写静，却运用了以动衬静的手法处理，这种反衬 的手法极见诗人的禅心与禅趣。\"时\"是时而，偶尔的意思。"},{"id":1184,"stem":"以下诗句没有错别字的是（ ）","options":["清明时节雨分分，","陆上行人欲断魂。","借问洒家何处有？","牧童遥指杏花村。"],"answer":3,"explanation":"取自唐代杜牧的《清明》，写于清明节。 清明时节雨纷纷，路上行人欲断魂。借问酒家何处有？牧童遥指杏花村。 \"纷纷\"是形容多。\"雨纷纷\"是春天的细雨纷纷洒洒，也形容着雨中行路者的心情。欲断魂是形容伤感极深，好像灵魂要与身体分开一样。"},{"id":1185,"stem":"诗句\"借问酒家何处有，牧童遥指杏花村\"描写的是（ ）节气的场景。","options":["立春","谷雨","清明","惊蛰"],"answer":2,"explanation":"取自唐代杜牧的《清明》，写于清明节。"},{"id":1186,"stem":"以下对《商山早行》这首诗排序正确的是（ ）①鸡声茅店月，人迹板桥霜。②因思杜陵梦，凫雁满回塘。③槲叶落山路，枳花明驿墙。④晨起动征铎，客行悲故乡。","options":["①③②④","①②③④","④③①②","④①③②"],"answer":3,"explanation":"本诗为唐代温庭筠的《商山早行》：晨起动征铎，客行悲故乡。鸡声茅店月，人迹板桥霜。槲叶落山路，枳花明驿墙。 因思杜陵梦，凫雁满回塘。 诗意：黎明起床，车马的铃铎已叮当作响，出门人踏上旅途，还一心想念故乡。鸡声嘹亮，茅草店沐浴着晓月的余辉；足迹凌乱，木 板桥覆盖着早春的寒霜。枯败的槲叶，落满了荒山的野路；淡白的枳花，照亮了驿站的泥墙。因而想起昨夜梦见杜陵的美好情景，一 群群野雁，正嬉戏在圆而曲折 的池塘。\"鸡声茅店月，人迹板桥霜。\"这两句运用了对偶的修辞手法。在词语中，它是一种修辞方法，两个字数相等、结构相似的语句 表现相关或相反的意思。这两句写清晨旅途中的见闻及感受，语言极其简洁凝练，写景状物真实可感。其中茅店指乡村小客舍，同\"茅 舍\"，用茅草盖成的旅舍。"},{"id":1187,"stem":"诗句\"鸡声茅店月，人迹板桥霜\"使用的修辞手法是（ ）","options":["对比","拟人","对偶","夸张"],"answer":2,"explanation":"\"鸡声茅店月，人迹板桥霜。\"这两句运用了对偶的修辞手法。"},{"id":1188,"stem":"\"鸡声茅店月，人迹板桥霜\"中的\"茅店\"指的是（）","options":["驿站","旅店","茅房","饭店"],"answer":1,"explanation":"茅店指乡村小客舍，同\"茅舍\"，用茅草盖成的旅舍。 19959276711（vx 同号）"},{"id":1189,"stem":"朱熹的《观书有感》（二首）从题材看，都属于（ ）","options":["咏物诗","抒情诗","哲理诗","田园诗"],"answer":2,"explanation":"《观书有感》（二首）是有哲理性的诗，是南宋大学问家朱熹的脍炙人口的名诗。人们在读书后，时常有一种豁然开 朗的感觉，诗中就是以象征的手法，将这种内心感觉化作可以感触的具体行象加以描绘，让读者自己去领略其中的奥妙。"},{"id":1190,"stem":"以下哪位诗人与《钱塘湖春行》的作者身处同一朝代（）","options":["王昌龄","苏轼","王冕","袁枚"],"answer":0,"explanation":"《钱塘湖春行》的作者是唐代白居易，选项中只有王昌龄是唐朝，苏轼是宋朝，王冕是元朝，袁枚是清朝。"},{"id":1191,"stem":"诗句\"若待上林花似锦\"中的\"上林\"是（）","options":["一个地名","一种植物","一个人名","一种动物"],"answer":0,"explanation":"本句取自唐代杨巨源的《城东早春》：诗家清景在新春，绿柳才黄半未匀。若待上林花似锦，出门俱是看花人。 诗意：为诗人喜爱的清新景色，正在这早春之中。绿柳枝头刚刚露出几颗嫩黄的柳眼。若是等到长安城中花开似锦之际，满城都是赏 花郊游之人。城指唐代京城长安。上林指上林苑，故址在今陕西西安市西，建于秦代，汉武帝时加以扩充，为汉宫苑。诗中用来代指 唐朝京城长安。"},{"id":1192,"stem":"唐代诗人杨巨源的诗作《城东早春》，诗题中的\"城\"是（ ）","options":["洛阳","长安","钱塘","开封"],"answer":1,"explanation":"城指唐代京城长安。"},{"id":1193,"stem":"农历二月为（）","options":["孟春","仲春","季春","暮春"],"answer":1,"explanation":"春季的第二个月，即农历二月，传统二月名称是如月，别称花朝。\"春色满园关不住，一枝红杏出墙来。\"宋人叶绍翁的 诗句中的红杏，花开二月故称杏月。又因二月为春季之中，所以又叫仲春。孟春是春季的第一个月，即农历正月。季春和暮春都是指 春季三月，即农历三月春季的末尾阶段。"},{"id":1194,"stem":"\"清晨入古寺，初日照高林\"中的古寺是（ ）。","options":["破山寺","大林寺","竹林寺","少林寺"],"answer":0,"explanation":""},{"id":1195,"stem":"诗句\"接天莲叶无穷碧，映日荷花别样红\"描写了（）的夏日美景。","options":["广州","扬州","苏州","杭州"],"answer":3,"explanation":"诗句出自南宋诗人杨万里的组诗作品《晓出净慈寺送林子方二首》。这两首诗通过描写六月西湖的美丽景色，曲折地 表达对友人林子方的眷恋之情。"},{"id":1196,"stem":"\"何须浅碧深红色，自是花中第一流，梅定妒，菊应羞。画阑开处冠中秋。\"歌咏的是（）","options":["荷花","桂花","茶花","兰花"],"answer":1,"explanation":"本句出自宋代李清照的《鹧鸪天·桂花》，诗句意思是指桂花无须用浅绿或大红的色相去招摇炫弄，它本来就是花中 的第一流。"},{"id":1197,"stem":"下列名言最适合张贴在你的学校教室墙面上的一项是（ ）","options":["不为五斗米折腰","一日不见，如隔三秋","玉不琢，不成器","老骥伏枥，志在千里"],"answer":2,"explanation":"\"玉不琢，不成器\"出自《礼记·学记》，意思是如果玉不精心雕琢，就不能成为有用的器物；如果人不努力学习，也就 不会懂得道理。"},{"id":1198,"stem":"\"儿童相见不相识，笑问客从何处来？\"诗句的\"客\"是（ ）","options":["陆游","王维","诗仙","四明狂客（或记贺知章）"],"answer":3,"explanation":""},{"id":1199,"stem":"刘长卿《苕溪酬梁耿别后见寄》中\"人随流水东西\"后面一句应为（ ）。","options":["鸟向平芜远近","明月前溪后溪","白云千里万里","惆怅长沙谪去 132 19959276711（vx 同号）"],"answer":2,"explanation":"出自唐代刘长卿的《谪仙怨·苕溪酬梁耿别后见寄》 清川永路何极，落日孤舟解携。鸟向平芜远近，人随流水东西。 白云千里万里，明月前溪后溪。惆怅长沙谪去，江潭芳草萋萋。 本诗还有另一个版本，诗名为：《谪仙怨·晴川落日初低》 晴川落日初低，惆怅孤舟解携。乌向平芜远近，人随流水东西。 白云千里万里，明月前溪后溪。独恨长沙谪去，江潭春草萋萋。"},{"id":1200,"stem":"《论语》里有很多关于学习的话，那么以下哪句是在讲述学习的方法呢？（ ）","options":["默而识之，学而不厌，诲人不倦，何有于我哉。","知之为知之，不知为不知，是知也。","学而不思则罔，思而不学则殆。","人而不仁，如礼何？人而不仁，如乐何？"],"answer":2,"explanation":"A 的意思是把所学的知识默黑地记在心中，勤奋学习而不满足，教导别人而不倦怠，对我来说，还有什么遗憾呢？说 的是孔子的治学方法。B 的意思是懂就是懂，不懂就是不懂，这才是真正的智慧。说的是学习态度。D 的意思是做人如果没有仁德，怎 么对待礼仪制度呢？做人如果没有仁德，怎么对待音乐呢？说的是人。C 的意思是学习而不思考就会迷惘无所得；思考而不学习就不 切于事而疑惑不解。讲述的是学习的方法。"},{"id":1201,"stem":"下列对王羲之的描述，不正确的一项是（ ）","options":["王羲之擅长隶书，被称为\"古往今来的佼佼者\"，后人尊称其为\"书圣\"。","王羲之曾与一众文人雅士聚集在会稽山阴的兰亭，写下著名的《兰亭集序》。","王羲之书法精湛，擅长楷书和隶书，但他的书法在当时并不被人们看重。","王羲之是性情中人，所以他会为自己喜欢的鹅替别人抄一遍《道德经》。"],"answer":2,"explanation":"王羲之从小酷爱书法，七岁跟随当时书法家卫夫人学习书法，每天勤学苦练。没有。墨汁、毛笔的时候，他就用手在 衣服上写，有时用树枝在沙地上写，有时夜晚在月光下写。相传，他在浙江绍兴兰亭池边练习书法，洗笔、砚台的水把池水都染黑了， 经过整整二十年的努力，他终于成为举世闻名的书法家。二十七岁成名被世人推崇。"},{"id":1202,"stem":"《从军行·其二》这首诗截取了边塞军旅生活中的一个片断，描写了军中宴乐时弹奏琵琶的场景。以下还有一些诗句，请你说说哪句中出现的不是异域的乐器？（ ）","options":["黄鹤楼中吹玉笛，江城五月落梅花。","转轴拨弦三两声，未成曲调先有情。","中军置酒饮归客，胡琴琵琶与羌笛。","羌笛何须怨杨柳，春风不度玉门关。"],"answer":0,"explanation":"B 的琵琶，C 的胡琴琵琶羌笛，D 的羌笛都属于异域乐器，A 的笛子是迄今为止发现的最古老的汉族乐器，也是汉族乐 器中最具代表性最有民族特色的吹奏乐器。"},{"id":1203,"stem":"下列诗句中，哪个不是王维写的？（ ）","options":["明月松间照，清泉石上流。","返景入深林，复照青苔上。","远树带行客，孤村当落晖。","野旷天低树，江清月近人。"],"answer":3,"explanation":"A 选自王维的《山居秋瞑》，B 选自王维的《鹿柴》，C 选自王维的《送别》，D 选自唐代孟洁然的《宿建德江》"},{"id":1204,"stem":"以下诗句中，哪个是杜甫写的？（ ）","options":["山暝听猿愁，沧江急夜流。","星垂平野阔，月涌大江流。","山随平野尽，江入大荒流。","蝉鸣空桑林，八月萧关道。"],"answer":1,"explanation":"A 出自唐代诗人孟浩然作品《宿桐庐江寄广陵旧游》。此诗是作者离开长安 东游时，途中寄给旧友的。B 出自唐代诗人杜甫作品《旅夜书怀》，是诗人于唐代宗永泰元年（765 年）离开四川成都草堂以后在旅途 中所作。C 出自唐代诗人李白作品《渡荆门送别》。是伟大诗人李白青年时期在出蜀漫游的途中写下的一首五律。D 出自唐代诗人王 昌龄作品《塞上曲·蝉空桑林》。这首乐府歌曲是写非战的。诗由征戍龙边塞庶几不回，而告诫少年莫夸武力，抒发非战之情。"},{"id":1205,"stem":"李白的诗大多有着开阔的视野和无限的想象，下列描写庐山景致的诗句中哪句不是李白写的？（ ）","options":["日照香炉生紫烟，遥看瀑布挂前川。","金阙前开二峰长，银河倒挂三石粱。","庐山东南五老峰，青天削出金芙蓉。","千古犹疑白练飞，一条界破青山色。"],"answer":3,"explanation":"A 出自唐代诗人李白《望庐山瀑布》，B 出自唐代诗人李白《庐山谣寄 卢侍御虚舟》，C 出自唐代诗人李白《登庐山五老峰》，D 出自唐代诗人徐凝《庐山瀑布》"},{"id":1206,"stem":"\"游人不管春将老，来往亭前踏落花\"中的\"亭\"是（ ）","options":["醉翁亭","陶然亭","快哉亭","丰乐亭 133 19959276711（vx 同号）"],"answer":3,"explanation":"本句出自出自宋代文学家欧阳修的组诗作品《丰乐亭游春三首》的第三首，写暮春时节一望无际、郁郁葱葱的美景， 写了暮春时节草木青翠、落红满地的特征，表达了游人对此怀着喜爱和恋恋不舍的感情。句中的\"亭\"是丰乐亭，在滁城西一里许的大丰 山下，欧阳修任滁州（今安徽滁县）知州时所筑，为当时滁州的胜游之地。"},{"id":1207,"stem":"《塞下曲》是唐代诗人李白的组诗作品，共有（ ）首。","options":["3","6","9","12"],"answer":1,"explanation":"《塞下曲六首》是唐代大诗人李白的组诗作品。这六首诗借用唐代流行的乐府题目而写时事与心声，其主题是要求平 定边患。全组诗以乐观高亢的基调和雄浑壮美的意境反映了盛唐的精神风貌，描绘了守边将士在沙场上征战的艰苦生活，歌颂了他们 忠心报国的英勇精神。诗中有对战斗场景的描述，也有对闺中柔情的抒写，内容丰富，意境浑成，格调昂扬，豪气充溢，表现了诗人 高尚的爱国情操。"},{"id":1208,"stem":"成语“翻云覆雨”出自杜甫写的哪首诗（ ）","options":["《贫交行》","《望岳》","《江南逢李龟年》","《春望》"],"answer":0,"explanation":"\"翻云覆雨\"或\"覆雨翻云\"出自唐代杜甫的《贫交行》.翻手作云覆手雨，纷 纷轻薄何须数。君不见管鲍贫时交，此道今人弃如土。此诗感伤交道浅薄，世态炎凉，人情反复，所谓\"人心不古\"。全诗通过正反对比 手法和过情夸张语气的运用，反复咏叹，造成了\"慷慨不可止\"的情韵，吐露出诗人心中郁结的愤懑与悲辛之情。"},{"id":1209,"stem":"以下哪句诗不是描写边塞风光的（）","options":["黄河远上白云间，一片孤城万仞山","大漠孤烟直，长河落日圆。","忽如一夜春风来，千树万树梨花开。","日照香炉生紫烟，遥看瀑布挂前川。"],"answer":3,"explanation":"A 出自唐代诗人王之涣《凉州饲词二首》，本句以一种特殊的视角描绘了黄河远眺的特殊感受，同时也展示了边塞地 区壮阔、荒凉的景色，悲壮苍凉，流落出一股慷概之气。B 出自唐代诗人王维《使至塞上》。是诗人奉命赴边疆慰问将士途中所作的 一首纪行诗，记述出使塞上的旅程以及旅程中所见的塞外风光。C 出自唐代诗人岑参《白雪歌送武判官归京》。此诗描写西域八月飞 雪的壮丽景色，抒写塞外送别、雪中送客之情，表现离愁和乡思，却充满奇思异想，并不令人感到伤感。D 出自唐代诗人李白《望庐 山瀑布》，此诗细致地描写瀑布的具体景象，将飞流直泻的瀑布描写得雄伟奇丽，气象万千，宛如一幅生动的山水画。"},{"id":1210,"stem":"《闻官军收河南河北》一诗的作者与以下哪位诗人处在同一时代（）","options":["王维","屈原","李煜","苏轼"],"answer":0,"explanation":"《闻官军收河南河北》是唐代诗人杜甫的作品。此诗作于唐代宗广德元年（763 年）春。当年正月史朝义自缢，他的部 将李怀仙斩其首来献，安史之乱结束。杜甫听到这消息，不禁惊喜欲狂，手舞足蹈，冲口唱出这首七律。王维是唐朝著名诗人，屈原 是战国时期楚国诗人。李煜是五代十国时南唐国君，苏轼是北宋著名文学家、书法家、诗人。"},{"id":1211,"stem":"\"化作春泥更护花\"中的\"花\"，比喻什么？（）","options":["花朵","家庭","国家","诗人自己"],"answer":2,"explanation":"\"落红不是无情物，化作春泥更护花。\"出自清代诗人龚自珍创作的一首七言绝句《己亥杂诗·其五》，诗句中的花比喻 国家。这首诗写诗人离京的感受。虽然载着\"浩荡离愁\"，却表示仍然要为国为民尽自己最后一份心力。"},{"id":1212,"stem":"\"惆怅东栏一株雪，人生看得几清明\"中，\"清明\"指的是（ ）","options":["清明时节","清澈明朗","清闲安宁","前途光明"],"answer":1,"explanation":"清明指清澈明朗。"},{"id":1213,"stem":"\"惆怅东栏一株雪，人生看得几清明\"中\"雪\"指的是（ ）。","options":["杏花","梅花","雪花","梨花"],"answer":3,"explanation":"雪喻指梨花。"},{"id":1214,"stem":"\"梨花淡白柳深青，柳絮飞时花满城\"，\"柳深青\"的意思是（ ）","options":["春意浓","巷子深","柳絮多","表达作者深情"],"answer":0,"explanation":"柳深青意味着春意浓。"},{"id":1215,"stem":"\"惆怅东栏一株雪，人生看得几清明\"出自（ ）的作品。","options":["王维","苏轼","李商隐","陆游"],"answer":1,"explanation":"本句取自宋朝苏轼的《东栏梨花》 19959276711（vx 同号）"},{"id":1216,"stem":"桃李春风（），江湖夜雨十年灯。","options":["一杯酒","一盏酒","一樽酒","一壶酒"],"answer":0,"explanation":"本句取自宋代黄庭坚的《寄黄几复》：我居北海君南海，寄雁传书谢不能。桃李春风一杯酒，江湖夜雨十年灯。持家 但有四立壁，治病不蕲三折肱。想见读书头已白，隔溪猿哭瘴溪藤。 诗意：我住在北方海滨，而你住在南方海滨，欲托鸿雁传书，它却飞不过衡阳。当年春风下观赏桃李共饮美酒，江湖落魄，一别已是 十年，常对着孤灯听着秋雨思念着你。你支撑生计也只有四堵空墙，艰难至此；你治理国家就像三折肱的良医一样，不需要去请求别 人的经验。想你清贫自守发奋读书，如今头发已白了罢，隔着充满瘴气的山溪，猿猴哀鸣攀援深林里的青藤。"},{"id":1217,"stem":"\"经年尘土满征衣。特特寻芳上翠微\"中的\"翠微\"指的是翠微亭。它坐落在（ ）","options":["安徽贵池","北京香山公园","浙工灵隐寺","江苏狼山"],"answer":0,"explanation":"翠微亭在安徽贵池。"},{"id":1218,"stem":"位于安徽池州的翠微亭。相传是由著名诗人（ ）建造的。","options":["白居易","杜甫","杜牧","李煜."],"answer":2,"explanation":"\"翠微\"指由著名诗人杜牧在安徽贵池（现称池州）南齐山顶上建造的翠微亭。"},{"id":1219,"stem":"从\"灿灿萱草花，罗生北堂下\"可知这首诗描写了（）","options":["父爱","母爱","大自然之美","姐妹之情"],"answer":1,"explanation":"本句出自元代王冕的《墨萱图·其一》 灿灿萱草花，罗生北堂下。南风吹其心，摇摇为谁吐？ 慈母倚门情，游子行路苦。甘旨日以疏，音问日以阻。举头望云林，愧听慧鸟语。 诗意：灿灿的置草花，生在北堂之下。南风吹着萱草，摇摆着是为了谁吐露著芬芳？慈祥的母 亲倚著门盼望着孩子，远行的游子是那样的苦啊！对双亲的奉养每天都在疏远，孩子的音讯每天都 不能传到。抬头看着一片云林，听到慧鸟的叫声思念起来至此很是惭愧。 诗句表达了在外游子对故乡母亲的深切思念之情和不能在母亲身边尽孝的愧疚之情。"},{"id":1220,"stem":"\"灿灿萱草花，罗生北堂下\"的下句是（）","options":["冷艳凝轻露，清香度晚风。","慈母倚门情，游子行路苦。","南风吹其心，摇摇为谁吐？","千戈正飘忽，不用苦思家。"],"answer":2,"explanation":"本句出自元代王冕的《墨萱图·其一》 灿灿萱草花，罗生北堂下。南风吹其心，摇摇为谁吐？ 慈母倚门情，游子行路苦。甘旨日以疏，音问日以阻。举头望云林，愧听慧鸟语。"},{"id":1221,"stem":"\"愧听慧鸟语\"的前一句是（）","options":["举头忘明月","举头望云林","举头望云海","举头望云雨"],"answer":1,"explanation":"元代王冕的《墨萱图·其一》 灿灿萱草花，罗生北堂下。南风吹其心，摇摇为谁吐？ 慈母倚门情，游子行路苦。甘旨日以疏，音问日以阻。举头望云林，愧听慧鸟语。"},{"id":1222,"stem":"\"儿童（）学归来早，忙趁（ ）风放纸鸢。\"括号内应填","options":["放；东","放；春","散；东","散；春"],"answer":2,"explanation":"本句出自清代诗人高鼎作品《村居》。是诗人高鼎晚年归隐于上饶地区，闲居农村时所写的一首七言绝句。《村居》 描写了诗人居住在乡村时因春天来临而喜悦，所见到的春天景象和放学后孩子们放风筝的情景。草长莺飞二月天，拂堤杨柳醉春烟。 儿童散学归来早，忙趁东风放纸鸢。纸鸢泛指风筝，它是一种纸做的形状像老鹰的风筝。鸢是老鹰。"},{"id":1223,"stem":"\"起舞弄清影，何似在人间\"中\"弄\"的意思是（）","options":["玩赏","弄堂、小巷","做","设法取得"],"answer":0,"explanation":"本句出自宋代大文学家苏轼词作《水调歌头·明月几时有》。这首词是中秋望月怀人之作，表达了对胞弟苏辙的无限 思念。弄清影意思是月光下的身影也跟着做出各种舞姿。弄是赏玩的意思。"},{"id":1224,"stem":"苏轼的《水调歌头》中\"兼怀子由\"的\"子由\"指的是（ ）","options":["苏洵","苏辙","佛印","欧阳修"],"answer":1,"explanation":"子由是苏轼的弟弟苏辙的字。 19959276711（vx 同号）"},{"id":1225,"stem":"\"挽弓当挽强，用箭当用长\"出自哪位诗人？（ ）","options":["杜甫","李白","王之涣","辛弃疾"],"answer":0,"explanation":"本句出自《前出塞九首·其六》，是唐代大诗人杜甫的作品。 挽弓当挽强，用箭当用长。射人先射马，擒财先擒王。 杀人亦有限，列国自有疆。苟能制侵陵，岂在多杀伤！ 诗意：拉弓要拉最坚硬的，射箭要射最长的。射人先要射马，擒财先要擒住他们的首领。杀人要有限制，各个国家都有边界。只要能 够制止敌人的侵犯就可以了，难道打仗就是为了多杀人吗？本诗明确写出了诗人对待战争的态度，明确地表达了诗人的政治观点。\"侵 陵\"是侵犯的意思，\"制侵陵\"就是制止侵犯。"},{"id":1226,"stem":"\"射人先射马，擒贼先擒王\"出自（）的诗作。","options":["陈子昂","李白","杜甫","辛弃疾"],"answer":2,"explanation":"本句出自《前出塞九首·其六》，是唐代大诗人杜甫的作品。"},{"id":1227,"stem":"诗句\"苟能制侵陵，岂在多杀伤\"中\"制侵陵\"的意思是（ ）","options":["制止侵犯","制造侵略","建造陵园","没有意义"],"answer":0,"explanation":"\"侵陵\"是侵犯的意思，\"制侵陵\"就是制止侵犯。"},{"id":1228,"stem":"唐代四大女诗人是（ ）","options":["薛涛、李冶、刘采春、鱼玄机","薛涛、卓文君、花蕊夫人、黄蛾","薛涛、卓文君、刘采春、鱼玄机","薛涛、卓文君、鱼玄机、黄娥"],"answer":0,"explanation":"唐代的诗歌是中国诗歌的巅峰与代表，据专家考证，在唐朝竟然出现了 207 位女诗人。其中数薛涛、李冶、刘采春、 鱼玄机最为著名，她们并称为\"唐代四大女诗人\"。"},{"id":1229,"stem":"\"俱往矣，数风流人物，还看今朝\"出自毛泽东词（ ）","options":["《沁园春·长沙》","《沁园春·雪》","《水调歌头·游泳》","《清平乐·六盘山》"],"answer":1,"explanation":"本句出自毛泽东词《沁园春·雪》 北国风光，千里冰封，万里雪飘。望长城内外，惟余莽莽；大河上下，顿失滔滔。 山舞银蛇，原驰蜡象，欲与天公试比高。须晴日，看银装素裹，分外妖娆。 江山如此多桥，引无数英雄竞折腰。惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。 一代天骄，成吉思汗，只识弯弓射大雕。俱往矣，数风流人物，还看今朝。 诗意：北方的风光，千里冰封冻，万里雪花飘。望长城内外，只剩下无边无际白茫茫一片。整条黄河，立刻失去了波涛滚滚的水势。 被白雪覆盖的群山好像银蛇在舞动，高原好像白象在奔跑，它们都想试着和老天爷比一下谁更高。等到晴天的时候，看红日和白雪交 相辉映，格外娇艳美好。江山是如此的媚娇，引得无数英雄竞相倾倒。可惜秦始皇、汉武帝，略差文治功劳；唐太宗、宋太祖，稍逊 文学才华。称雄一世的英雄人物，成吉思汗，只知道拉弓射大雕。这些人物都已经过去了，称得上能建功立业的英雄人物，还要看今 天的人们。（\"山舞银蛇，原驰蜡象，欲与天公试比高\"运用了比喻和拟人修辞手法。）"},{"id":1230,"stem":"\"看万山红遍，层林尽染\"出自毛泽东词作（）","options":["《沁园春·雪》","《忆秦娥·娄山关》","《沁园春·长沙》","《沁园春·武昌》"],"answer":2,"explanation":"本句出自中国人民的领袖毛泽东主席作品《沁园春·长沙》。毛泽东于 1925 年晚秋，32 岁时，离开故乡韶山，去广州 主持农民运动讲习所，途经长沙，重游橘子洲，感慨万干，这首词大概是离长沙时所作。通过对长沙秋景的描绘和对青年时代革命斗 争生活的回忆，抒写出革命青年对国家命运的感慨和以天下为己任，蔑视反动统治者，改造旧中国的豪情壮志。 《沁园春·长沙》：独立寒秋，湘江北去，橘子洲头。看万山红遍，层林尽染；漫江碧透，百舸争流。鹰击长空，鱼翔浅底，万类霜 天竞自由。怅寥廓，问苍茫大地，谁主沉浮？携来百侣曾游，忆往昔峥嵘岁月稠。恰同学少年，风华正茂；书生意气，挥斥方遒。指 点江山，激扬文字，粪土当年万户侯。曾记否，到中流击水，浪遏飞舟！"},{"id":1231,"stem":"下列出自《沁园春·长沙》的各组词语中没有错别字的一组是（ ）","options":["曼江碧透、鱼翔浅底、嵘荣岁月","遒劲激扬、浪竭飞舟、苍茫大地","层林尽染、书生义气、百舸争流","中流击水、风华正茂、鹰击长空"],"answer":3,"explanation":"A 漫江碧透、峥嵘岁月；B 浪遏飞舟；C 书生意气、百舸争流。"},{"id":1232,"stem":"对《沁园春·长沙》中的语句解释不正确的一项是（ ）","options":["\"层林尽染\"是说山上一层层的枫树叶变红，像是被染色了一样。","\"万类霜天竞自由\"意为一切生物都在秋光中竞相过着自由自在的生活。 136 19959276711（vx 同号）","\"书生意气，挥斥方遒\"是说读书人最讲义气。非常豪爽，挥洒自如，一点也不吝啬。","\"到中流击水，浪遏飞舟\"意为当年我们在江中游泳，激起的浪花几乎可以阻止飞快前进的船只。"],"answer":2,"explanation":"挥斥方遒，是说热情奔放，劲头正足。"},{"id":1233,"stem":"名句\"润物细无声\"出自（）的诗作《春夜喜雨》。","options":["白居易","李白","杜甫","王勃"],"answer":2,"explanation":"本句出自唐代诗人杜甫作品《春夜喜雨》。此诗运用拟人手法，以极大的喜悦之情细致地描绘了春雨的特点和成都夜 雨的景象，热情地讴歌了来得及时、滋润万物的春雨，是一首传神入化、别具风韵的咏雨诗。 好雨知时节，当春乃发生。随风潜入夜，润物细无声。 野径云俱黑，江船火独明。晓看红湿处，花重锦官城。 锦官城故址在今天成都市南，亦称锦城。三国蜀汉时管理织锦之官驻此，故名。后人有用作成都的别称。"},{"id":1234,"stem":"\"晓看红湿处，花重锦官城\"中\"锦官城\"指的是（）","options":["长安","成都","洛阳","杭州"],"answer":1,"explanation":"锦官城故址在今天成都市南，亦称锦城。"},{"id":1235,"stem":"\"丞相祠堂何处寻，锦官城外柏森森\"中的\"锦官城\"在现在的（ ）。","options":["成都","重庆","西安","北京"],"answer":0,"explanation":"锦官城故址在今天成都市南，亦称锦城。"},{"id":1236,"stem":"下列古诗不是表达对家乡的思念的是（ ）","options":["近乡情更怯，不敢问来人。","随风潜入夜，润物细无声。","烽火连三月，家书抵万金。","举头望明月，低头思故乡。"],"answer":1,"explanation":"B 是赞美雨水。"},{"id":1237,"stem":"以下这些咏梅的诗词，作者按顺序分别是（）①遥知不是雪，为有暗香来。 ②梅须逊雪三分白，雪却输梅一段香。③疏影横斜水清浅，暗香浮动月黄昏。 ④零落成泥碾作尘，只有香如故。","options":["王安石、林逋、陆游、卢梅坡","王安石、卢梅坡、林逋、陆游","林逋、王安石、陆游、卢梅坡","陆游、卢梅坡、王安石、林逋"],"answer":1,"explanation":"①出自北宋诗人王安石所作的一首五言绝句《梅花》，②出自南宋诗人户梅坡创作的七言绝句组诗作品《雪梅二首》， ③出自宋代诗人林逋创作的七言律诗组诗作品《山园小梅二首》，④出自南宋爱国诗人陆游创作的一首词《卜算子·咏梅》。"},{"id":1238,"stem":"诗句\"梅须逊雪三分白，雪却输梅一段香\"的作者是（）代的。","options":["唐","宋","明","清"],"answer":1,"explanation":"出自南宋诗人户梅坡创作的七言绝句组诗作品《雪梅二首》"},{"id":1239,"stem":"《七律·长征》体现全诗中心思想的句子是（ ）","options":["红军不怕远征难，万水千山只等闲。","五岭逶迤腾细浪，乌蒙磅礴走泥丸。","金沙水拍云崖暖，大渡桥横铁索寒。","更喜岷山千里雪，三军过后尽开颜。"],"answer":0,"explanation":"《七律·长征》是一首七言律诗，这首诗写于 1935 年 10 月，当时毛泽东率领中央红军越过岷山，长征即将结束。回 顾长征一年来所战胜的无数艰难险阻，他满怀喜悦的战斗豪情。 红军不怕远征难，万水千山只等闲。五岭逶迤腾细浪，乌蒙磅礴走泥丸。 金沙水拍云崖暖，大渡桥横铁索寒。更喜岷山千里雪，三军过后尽开颜。 本诗的第一句体现了全诗中心思想，红军不怕万里长征路上的一切艰难困苦，把千山万水都看得极为平常。逶迤读作 wēiyí，形容 道路、山脉、河流等弯弯曲曲，连绵不断的样子。 尽开颜的意思是：红军的长征到达目的地了，他们取得了胜利，所以个个都笑逐颜开。"},{"id":1240,"stem":"关于《七律·长征》，下列词语的解释不正确的一项是（ ）","options":["等闲：不怕困难，不可阻挡","逶迤：弯弯曲曲、连绵不断","三军：泛指全军","尽开颜：尽情欢笑"],"answer":3,"explanation":"尽开颜的意思是：红军的长征到达目的地了，他们取得了胜利，所以个个都笑逐颜开。 19959276711（vx 同号）"},{"id":1241,"stem":"关于毛泽东《七律·长征》下列说法错误的是（ ）","options":["《七律·长征》高度概括了长征路上的各种艰难险阻","\"逶迤\"形容山很高，难以翻越","\"乌蒙磅礴走泥丸\"指险峻的乌蒙山在红军战士脚下就像是小泥球一样","\"尽开颜\"指红军长征到达目的地取得了胜利所以笑逐颜开"],"answer":1,"explanation":"逶迤形容道路、山脉、河流等弯弯曲曲，连绵不断的样子。"},{"id":1242,"stem":"《出师表》是一篇奏章。它的主要内容是诸葛亮出师伐（）前向刘禅陈述的意见。","options":["东吴","魏","南蛮。","蜀"],"answer":1,"explanation":"通常所说的《出师表》一般指《前出师表》。出师表以诸葛亮实行了一系列比较正确的政治和经济措施，使蜀汉境内 呈现兴旺景象。为了实现全国统一，诸葛亮在平息南方叛乱之后，于 227 年决定北上伐魏，夺取凉州，临行之前上书后主刘禅，以恳 切委婉的言辞劝勉后主要广开言路、严明赏罚、亲贤远佞，以此兴复汉室；同时也表达自己以身许国，忠贞不二的思想。"},{"id":1243,"stem":"\"昼短苦夜长，何不秉烛游\"一句所体现的人生态度是？（）","options":["及时行乐","适时怡情","逍遥世外","自我消沉"],"answer":0,"explanation":"本句出自汉代的一首文人五言诗《生年不满百》，是《古诗十九首》之一。此诗感慨人生苦短，劝人通达世事，及时 行乐，不必为那些毫无益处的事而日夜烦忧，并讽刺了那些贪图富贵者不懂得领悟人生的愚昧无知，同时也表现了人生毫无出路的痛 苦。诗的前四句\"生年不满百，常怀千岁忧。昼短苦夜长，何不秉烛游！\"说人生短暂，主张人应当及时行乐；后六句进一步游乐人生中 的三种主张.要及时、不惜费、不要企慕神仙。"},{"id":1244,"stem":"\"孤鸿号外野，翔鸟鸣北林。\"一句运用了（）表现手法。","options":["排比","拟人","以动衬静","以静衬动"],"answer":2,"explanation":"本句取自三国时期魏诗人阮籍所作《咏怀·夜中不能寐》，这是《咏怀诗》中的第一首。夜中不能寐，起坐弹鸣琴。 薄帷鉴明月，清风吹我襟。孤鸿号外野，翔鸟鸣北林。徘徊将何见？忧思独伤心。 \"孤鸿号外野，翔鸟鸣北林。\"采用以动衬静的表现方法写出了寂静凄清的环境，以映衬诗人孤独苦闷的心情，句中的\"鸿\"指的是大雁， 孤鸿就是失群的大雁。\"北林\"一词出自《诗经·秦风·晨风》，后人往往用\"北林\"一词表示忧伤。整首诗歌表达了诗人内心愤懑、悲凉、 落寞、忧虑等复杂的感情。"},{"id":1245,"stem":"\"孤鸿号外野，翔鸟鸣北林\"中的\"鸿\"指的是（ ）","options":["燕子","仙鹤","大雁","鹞鹰"],"answer":2,"explanation":"\"鸿\"指的是大雁。"},{"id":1246,"stem":"\"孤鸿号外野，翔鸟鸣北林\"中\"北林\"一词出自《诗经》，常用来表示（）","options":["闲适","空旷","忧伤","自由"],"answer":2,"explanation":"\"北林\"一词出自《诗经·秦风·晨风》，后人往往用\"北林\"一词表示忧伤。"},{"id":1247,"stem":"下列诗句出自阮籍《咏怀》的是（ ）","options":["郁有涧底松，离离山上苗","夜中不能寐，起坐弹鸣琴","朱门何足荣，未若托蓬莱","涉江采芙蓉，兰泽多芳草"],"answer":1,"explanation":"阮籍《咏怀》：夜中不能寐，起坐弹鸣琴。薄帷鉴明月，清风吹我襟。孤鸿号外野，翔鸟鸣北林。徘徊将何见？忧思 独伤心。"},{"id":1248,"stem":"\"蝉噪林逾静，鸟鸣山更幽\"出自（）的诗作。","options":["王维","王籍","王观","王安石"],"answer":1,"explanation":"本句出自南朝王籍创作的一首五言古诗《入若耶溪》。 徐艘何泛泛，空水共悠悠。阴霞生远岫，阳景逐回流。 蝉噪林逾静，鸟鸣山更幽。此地动归念，长年悲倦游。 诗中所写为作者泛舟若耶溪的所见所闻，并寓含长久羁留他乡的思归之念。诗开头两句写诗人乘小船入溪游玩，三四句写眺望远山时 所见到的景色，五六句用以动衬静的手法来渲染山林的幽静，最后两句写诗人面对林泉美景，不禁厌倦宦游，产生归隐之意。若耶溪 在绍兴市东南，发源于离城区里的若耶山（今称化山），沿途纳三十六溪溪水，北入鉴湖。早年上游流经群山，下游两岸竹木丰茂， 是一处非常幽雅的旅游胜地。阴霞是指山北面的云霞。阳景指太阳在水中的影子。"},{"id":1249,"stem":"“蝉噪林逾静，鸟鸣山更幽”的表现手法是（ ）","options":["以静衬动","以动衬静","动静结合","情景交融 138 19959276711（vx 同号）"],"answer":1,"explanation":"诗歌五六句用以动衬静的手法来渲染山林的幽静。"},{"id":1250,"stem":"“阴霞生远岫，阳景逐回流”中“阳景”的意思是（ ）","options":["南面的景色","阳面的景色","南面的影子","太阳的影子"],"answer":3,"explanation":"阳景指太阳在水中的影子。"},{"id":1251,"stem":"与诗句“万籁此俱寂，但余钟磬音”有异曲同工之妙的是（ ）","options":["潮平两岸阔，风正一帆悬。","蝉噪林逾静，鸟鸣山更幽.","海阔凭鱼跃，天高任鸟飞。","举头望明月，低头思故乡。"],"answer":1,"explanation":"用以动衬静的手法。"},{"id":1252,"stem":"与“蝉噪林逾静，鸟鸣山更幽”在写作手法上异曲同工的是（ ）","options":["五月天山雪，无花只有寒","深林人不知，明月来相照","万籁此俱寂，但余钟磬音","野旷天低树，江清月近人"],"answer":2,"explanation":"用以动衬静的手法"},{"id":1253,"stem":"\"潮平两岸阔\"的下一句是（）","options":["江入大荒流","月涌大江流","风正一帆悬","江春入旧年"],"answer":2,"explanation":"本句出自唐代诗人王湾作品《次北固山下》。客路青山外，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江 春入旧年。乡书何处达？归雁洛阳边。诗意：旅途在青山外，在碧绿的江水前行舟。潮水涨满，两岸之间水面宽阔，顺风行船恰好把 帆儿高悬。夜幕还没有褪尽，旭日已在江上冉冉升起，还在旧年时分，江南已有了春天的气息。寄出去的家信不知何时才能到达，希 望北归的大雁捎到洛阳去。 此诗以准确精练的语言描写了冬末春初时作者在北固山下停泊时所见到青山绿水、潮平岸阔等壮丽之景，抒发了作者深深的思乡之情。"},{"id":1254,"stem":"\"海日生残夜\"的下一句是（）","options":["风正一帆悬","江春入旧年","江入大荒流","月涌大江流"],"answer":1,"explanation":"本句出自唐代诗人王湾作品《次北固山下》。客路青山外，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江 春入旧年。"},{"id":1255,"stem":"《诗经》中描写地方民间风俗的是（）","options":["风","小雅","颂","大雅"],"answer":0,"explanation":"中国古代第一部诗歌总集是《诗经》，诗经中描写地方风民间风俗的是风。风、雅、颂是指我国第一部诗歌总集《诗 经》的三个部分。 风是不同地区的地方音乐。《风》诗是从郑、齐、魏、唐、秦、陈、桧、曹、豳等 15 个地区采集上来的土风歌谣。共 160 篇。大部分 是民歌。雅是周王朝直辖地区的音乐，即所谓正声雅乐。《雅》诗是宫廷宴享或朝会时的乐歌。除《小雅》中有少量民歌外，大部分 是贵族文人的作品。颂是宗庙祭祀的舞曲歌辞，内容多是歌颂祖先的功业的。全部是贵族文人的作品。"},{"id":1256,"stem":"\"风\"“雅”“颂”与（）有关。","options":["《诗经》","《橘颂》","《孟子》","《春秋》"],"answer":0,"explanation":"风、雅、颂是指我国第一部诗歌总集《诗经》的三个部分。"},{"id":1257,"stem":"中国古代第一部诗歌总集是（ ）","options":["《论语》","《诗经》","《春秋》","《易经》"],"answer":1,"explanation":"中国古代第一部诗歌总集是《诗经》。"},{"id":1258,"stem":"以下作品都出自《诗经》，其中不属于\"风\"这一类别的是（）","options":["《无衣》","《蒹葭》","《硕鼠》","《鹿鸣》"],"answer":3,"explanation":"《诗经》分为《风》、《雅》、《颂》三部分，《风》包括《周南》、《召南》、《抑风》、《庸风》、《卫风》、 《王风》、《郑风》、《齐风》、《魏风》、《唐风》、《秦风》《陈风》、《桧风》、《曹风》、《幽风》，共十五《国风》，诗 一百六十篇；风是指是带有地方色彩的音乐，十五\"国风\"，即十五个地方的民间歌谣。题目中的《鹿鸣》出自《诗经·小雅》，是《小 雅》的首篇，为先秦宫廷乐歌。 19959276711（vx 同号）"},{"id":1259,"stem":"\"蒹葭苍苍，白露为霜\"中\"蒹葭\"指（）","options":["芦苇","荷花","兰草","水稻"],"answer":0,"explanation":"兼葭苍苍，白露为霜。所谓伊人，在水一方。出自作品《诗经》中的《国风·秦风·兼葭》。兼葭指初生的芦苇。白 露指清晨的露水，比喻存在时间极短促的事物。"},{"id":1260,"stem":"\"蒹葭苍苍，白露为霜\"，《蒹葭》一诗中的\"白露\"意为（）","options":["白颜色的露水","二十四节气之一，在农历九月八日或九日","秋天的露水","清晨的露水，比喻存在时间极短促的事物"],"answer":3,"explanation":"兼葭苍苍，白露为霜。所谓伊人，在水一方。出自作品《诗经》中的《国风·秦风·兼葭》。白露指清晨的露水，比 喻存在时间极短促的事物，"},{"id":1261,"stem":"以下属于汉乐府的是（ ）","options":["《九歌》","《鹿鸣》","《陌上桑》","《采莲赋》"],"answer":2,"explanation":"《九歌》是《楚辞》的篇名；《鹿呜》出自《诗经·小雅》；《采莲赋》是南朝梁元帝萧绎写的一篇体物抒情小赋； 《陌上桑》是一篇立意严肃、笔调该谐的乐府叙事诗。"},{"id":1262,"stem":"杜牧的《赤壁》是一首（ ）","options":["五言绝句","七言绝句","五言律诗","七言律诗"],"answer":1,"explanation":"《赤壁》是唐代诗人杜牧创作的一首七言绝句： 折戟沉沙铁未销，自将磨洗认前朝。 东风不与周郎便，铜雀春深锁二乔。 诗人即物感兴，托物咏史，点明赤壁之战关系到国家存亡，社稷安危；同时暗指自己胸怀大志不被重用，以小见大。"},{"id":1263,"stem":"以下与\"赤壁\"相关的诗（词）中，对应作者不正确的是（ ）","options":["东风不与周郎便，铜雀春深锁二乔。——杜少陵","大江东去，浪淘尽，千古风流人物。——苏东坡","新破荆州得水军，鼓行夏口气如云。——苏辙","踏碎铁鞋三百緉，不在危峰绝壁。——辛弃疾"],"answer":0,"explanation":"杜少陵一般指杜甫。A 选自杜牧的《赤壁》。"},{"id":1264,"stem":"以下没有错字的一句是（ ）","options":["绿蚁新醅酒","来日倚窗前","非是籍秋风","萧关逢侯骑"],"answer":0,"explanation":"A 出自唐代诗人白居易作品《问刘十九》，B 的正确是\"来日绮窗前\"， 绮窗是指雕画花纹的窗户。C 的正确是\"非是藉秋风\"，藉的意思是凭借。D 的正确是\"萧 关逢候骑\"，候骑是指骑马的侦察兵。"},{"id":1265,"stem":"《乌衣巷》描写的景致位于（）","options":["长安","洛阳","金陵","姑苏"],"answer":2,"explanation":"唐代诗人刘禹锡的《乌衣巷》是一首抚今吊古的诗篇，是怀古组诗《金陵五题》中的第二首。此诗凭吊昔日东晋南京 秦淮河上朱雀桥和南岸的乌衣巷的繁华鼎盛，而今野草丛生，荒凉残照，感慨沧海桑田，人生多变。《乌衣巷》描写的景致位于现在 的南京，古代称金陵。"},{"id":1266,"stem":"下列（ ）与描写中秋有关。","options":["十轮霜景转庭梧","寒食东风御柳斜","月落乌啼霜满天","玉漏银壶且莫催"],"answer":0,"explanation":"A 写的是中秋月，B 写于寒食节，C 没有具体节日。D 写于元宵节。"},{"id":1267,"stem":"《过零丁洋》描写的地点位于现如今的（ ）","options":["湖北","湖南","广东","广西"],"answer":2,"explanation":"《过零丁洋》是宋代大臣文天祥在 1279 年经过零丁洋时所作的诗作。零丁洋即\"伶丁洋\"，现在广东省珠江口外。"},{"id":1268,"stem":"以下是咏物诗的是（ ）","options":["《金陵怀古》","《山居秋瞑》","《江雪》","《石灰吟》"],"answer":3,"explanation":"140 19959276711（vx 同号） 【知识小链接】《金陵怀古》是怀古诗，《山居秋瞑》是一首山水田园诗，《江雪》是一首山水诗，《石灰吟》是咏物诗，是于谦写 的一首托物言志的七言绝句。"},{"id":1269,"stem":"以下诗歌中并非咏史诗的是（ ）","options":["杜牧《题乌江亭》","杜甫《咏怀古迹》","刘禹锡《金陵怀古》","于谦《石灰吟》"],"answer":3,"explanation":"ABC 均为咏史诗，D《石灰吟》的作者是于谦，这是一首咏物诗，托物言志，作者以石灰作比喻，表达自己为国尽忠， 不怕牺牲的意愿和坚守高洁、贞洁自守情操的决心。"},{"id":1270,"stem":"《石灰吟》“千锤万凿出深山”的作者是（）","options":["龚自珍","于谦","郑板桥","唐伯虎"],"answer":1,"explanation":"《石灰吟》是咏物诗，是于谦写的一首托物言志的七言绝句。"},{"id":1271,"stem":"下面哪两个诗人是同一朝代的是（ ）","options":["林升柳永","王维王安石","晏殊于谦","郑谷文天祥"],"answer":0,"explanation":"林升是宋朝，c 王安石是宋朝，王维是唐朝，晏殊是宋朝，于谦是明期朝，郑谷是唐朝，文天祥是宋朝，杜牧是唐朝， 黄庭坚是宋朝。"},{"id":1272,"stem":"下面哪两个诗人是同一朝代的是（）","options":["王维王安石","黄庭坚柳永","晏殊杜牧","郑谷文天祥"],"answer":1,"explanation":"王维是唐朝，王安石是宋朝；黄庭坚和柳永都是宋朝；晏殊是宋朝，杜牧是唐朝；郑谷是唐朝，文天祥是宋朝。"},{"id":1273,"stem":"下列不是王维的诗句的一项是（ ）","options":["明月松间照，清泉石上流。","返景入深林，复照青苔上。","远树带行客，孤村当落晖。","墙角数枝梅，凌寒独自开。"],"answer":3,"explanation":"A 出自唐代诗人王维作品《山居秋暝》，B 出自唐代诗人王维作品《鹿柴》，c 出自唐代诗人王维作品《送綦毋潜落第 还乡》，D 出自北宋诗人王安石所作的一首五言绝句《梅花》"},{"id":1274,"stem":"下列不是王维的诗句的一项是（ ）","options":["明月松间照，清泉石上流。","返景入深林，复照青苔上。","海内存知己，天涯若比邻。","远树带行客，孤村当落晖。"],"answer":2,"explanation":"C 出自唐代诗人王勃的《送杜少府之任蜀州》。"},{"id":1275,"stem":"下列不是清明节习俗的是（）","options":["放风筝","扫墓","插茱萸","春游"],"answer":2,"explanation":"插茱萸是重阳节的风俗，《九月九日忆山东兄弟》里面说道\"遍插茱萸少一人\"，农历九月九就是重阳节。"},{"id":1276,"stem":"苏轼诗《饮湖上初晴雨后》中的\"湖\"指的是（）。","options":["洞庭湖","白马湖","西湖","太湖"],"answer":2,"explanation":"《饮湖上初晴后雨其二》是宋代文学家苏轼的作品。 水光澍滟晴方好，山色空濠雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。 诗句对西湖美景的全面描写概括品评，尤其是后二句被认为是对西湖的恰当评语。潋滟是水波荡漾、波光闪动的样子。"},{"id":1277,"stem":"\"水光潋滟晴方好\"中\"潋滟\"的意思是（）","options":["色彩缤纷","波光闪动","清澈见底","水面平静"],"answer":1,"explanation":"《饮湖上初晴后雨其二》是宋代文学家苏轼的作品。 水光澍滟晴方好，山色空濠雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。 \"潋滟\"的意思是波光闪动。"},{"id":1278,"stem":"\"欲把西湖比西子，淡妆浓抹总相宜\"出自（）的诗作。","options":["欧阳修","苏轼","王安石","杨万里"],"answer":1,"explanation":"出自宋代文学家苏轼的作品《饮湖上初晴后雨其二》。 19959276711（vx 同号）"},{"id":1279,"stem":"已是黄昏独自愁，更著风和雨。\"出自一首描写（）的词。","options":["菊花","兰花","梅花","杏花"],"answer":2,"explanation":"本句出自南宋爱国诗人陆游创作的一首词《卜算子·咏梅》，这首词以清新的情调写出了傲然不屈的梅花，暗喻了自 己的坚贞不屈。"},{"id":1280,"stem":"以下与\"秋\"无关的一项是（）","options":["夕阳西下，断肠人在天涯。","洛阳城里见秋风，欲作家书意万重。","晴空一鹤排云上，便引诗情到碧霄。","零落成泥碾作尘，只有香如故。"],"answer":3,"explanation":"A 选自《天净沙·秋思》B 选自《秋思》C 选自《秋词二首·其一》，D 出自南宋爱国诗人陆游创作的一首词《卜算子·咏 梅》，这一句作者从民族国家的利益出发，做出生命的表白，悲忧中透出一种坚贞的自信。"},{"id":1281,"stem":"《滕王阁诗》中\"滕王高阁临江渚\"的江指（）","options":["赣江","长江","汉江","钱塘江"],"answer":0,"explanation":"本句出自唐代诗人王勃创作的一首七言古诗《滕王阁诗》，滕王阁的故址在今天江西南昌赣江之滨，江南三大名楼之 一。江指赣江。"},{"id":1282,"stem":"诗句\"身向榆关那畔行\"中的\"榆关\"指的是（）","options":["山海关","玉门关","居庸关","嘉峪关"],"answer":0,"explanation":"出自清代词人纳兰性德的作品《长相思·山一程》。 山一程，水一程，身向榆关那畔行，夜深千帐灯。 风一更，雪一更，聒碎乡心梦不成，故园无此声。 词中描写将士在外对故乡的思念，抒露着情思深苦的绵长心境。榆关即今山海关。"},{"id":1283,"stem":"\"山一程，水一程，身向榆关那畔行，夜深千帐灯\"的作者所属朝代是（）","options":["唐","宋","元","清"],"answer":3,"explanation":"出自清代词人纳兰性德的作品《长相思·山一程》。 山一程，水一程，身向榆关那畔行，夜深千帐灯。 风一更，雪一更，聒碎乡心梦不成，故园无此声。"},{"id":1284,"stem":"《孟子》与以下哪三部著作合在一起被称作\"四书\"?（）","options":["《论语》《中庸》《大学》","《史记》《论语》《大学》","《史记》《论语》《中庸》","《大学》《中庸》《史记》"],"answer":0,"explanation":"四书是《大学》、《中庸》、《论语》、《孟子》四部作品。五经是《诗经》、《尚书》、《礼记》、《周易》、《春 秋》五部作品。"},{"id":1285,"stem":"\"寒食节\"在汉民族绵延两千余年，通常在\"清明节\"前一两日，只吃冷食。相传寒食节是为了纪念（）。","options":["屈原","伯夷、叔齐","介子推","苏武"],"answer":2,"explanation":"寒食节是纪念春秋时期的介之推。据史籍记载，春秋时期，晋国公子重耳为躲避祸乱而流亡他国长达十九年，大臣介 子推始终追随左右、不离不弃。重耳后来成为一代名君\"晋文公\"。但介子推不求利禄，与母亲归隐绵山，晋文公为了迫其出山相见而下 令放火烧山，介子推坚决不出山、最终被火焚而死。晋文公感念忠臣之志，将其葬于绵山，修祠立庙，并下令在介子推死难之日禁火 寒食，以寄哀思，这就是\"寒食节\"的由来。"},{"id":1286,"stem":"为便于整理和利用，需要对典籍分类，经史子集四部分类法渐渐成为中国古代图书分类法的主流。《周易》一书属于（ ）部。","options":["经","史","子","集"],"answer":0,"explanation":"《周易》亦称《易经》，属于经部。"},{"id":1287,"stem":"下列诗句中的大雁意象不表示思乡怀人之情的一项是（ ）。","options":["朱敦儒《西江月》：\"云间鸿雁草间虫。共我一般做梦。\"","李清照《一剪梅》：\"云中谁寄锦书来，雁字回时，月满西楼。\"","王维《伊州歌》：\"征人去日殷勤嘱，归雁来时数附书。\"","王湾《次北固山下》：\"乡书何处达，归雁洛阳边。\""],"answer":0,"explanation":"A 的\"云间鸿雁草间虫，共我一般做梦。\"意思是作者回首往事，虽无所成，万事将空，人生如梦，但这梦中幸有天上的 19959276711（vx 同号） 鸿雁，草间的虫。句中的雁没有表示思乡怀人之情。"},{"id":1288,"stem":"下列成语与其他三项意思不同的一项是（ ）。","options":["江心补漏","防微杜渐","积谷防饥","未雨绸缪"],"answer":0,"explanation":"\"江心补漏\"的意思是船到江心才补漏洞，指临到紧急关头才设法补救，为时已晚。B，C，D 的意思都是在错误或坏事 刚露出苗头时就及时制止，不让它发展。"},{"id":1289,"stem":"成语\"七月流火\"出自诗经，它用来形容（）。","options":["炎炎夏日","春去夏来","酷暑转凉","夏日流萤"],"answer":2,"explanation":"\"七月流火\"是天气热极转凉的转折，是从最热开始转凉，指夏去秋来，寒天将至。"},{"id":1290,"stem":"《三十六计》是体现我国古代卓越军事思想的一部兵书，下列（ ）不属于\"三十六计\"。","options":["浑水摸鱼","反戈一击","笑里藏刀","反客为主"],"answer":1,"explanation":"反戈一击不属于《三十六计》，出处《尚书·武成》;\"前徙倒戈，攻于后以北。"},{"id":1291,"stem":"唐代诗人中\"王孟韦柳\"的组合主要致力于（）的创作。","options":["边塞诗","山水田园诗","乐府诗","应制诗"],"answer":1,"explanation":"\"王孟韦柳\"是盛唐王维、孟浩然、中唐韦应物、柳宗元的合称，为唐代继承陶渊明田园诗而发展成独特的唐代山水田园 诗歌流派的代表。"},{"id":1292,"stem":"\"字字看来皆是血，十年辛苦不寻常\"说的是（）的成书过程。","options":["《红楼梦》","《水浒传》","《三国演义》","《西游记》"],"answer":0,"explanation":"本句出自清代曹雪芹的《回前诗》，意思是《红楼梦》一书倾注了大量心血，字字滴血句句含泪，耗尽毕生的精力极 不寻常。"},{"id":1293,"stem":"诗句\"劝君更尽一杯酒，西出阳关无故人\"的作者是（）","options":["王维","高适","岑参","杜甫"],"answer":0,"explanation":"本句出自唐代诗人王维作品《送元二使安西》。是诗人送朋友去西北边疆时作的诗。阳关在今甘肃省敦煌县西南。"},{"id":1294,"stem":"\"西出阳关无故人\"中的\"阳关\"位于现在的（）省。","options":["甘肃","陕西","青海","山西"],"answer":0,"explanation":"本句出自唐代诗人王维作品《送元二使安西》。是诗人送朋友去西北边疆时作的诗。阳关在今甘肃省敦煌县西南。"},{"id":1295,"stem":"\"太宗朝有王著者学右军书，深得其法\"中\"右军\"指的是书法家（）。","options":["王羲之","欧阳询","颜真卿","柳公权"],"answer":0,"explanation":"王羲之，字逸少，汉族，东晋时期著名书法家，有\"书圣\"之称。琅琊（今属山东临沂）人，后迁会稽山阴（今浙江绍兴） ， 晚年隐居剡县金庭。王羲之历任秘书郎、宁远将军、江州喇史，后为会稽内史，领右将军。所以也称\"王右军\"。"},{"id":1296,"stem":"诗句“古人学问无遗力，少壮工夫老始成。”的意思是（ ）","options":["古时候的人们学习是不遗余力的，往往年轻时就开始努力，到了老年才取得成功。","古时候的人们学习，往往年轻时不努力，到了老年才开始拼尽全力。","古人的学问从来不保留，他们传授给年轻人，到了老年正好都传授完。","古人使出全力来学习，不过年轻时积累很少，到了老年才刚开始有所收获。"],"answer":0,"explanation":"本句出自宋代陆游的《冬夜读书示子聿》 古人学问无遗力，少壮工夫老始成。 纸上得来终觉浅，绝知此事要躬行。 这首诗是诗人于公元 1199 年于山阴写给二十一岁小儿子陆聿的。本诗告诉读者做学问要有孜孜不倦、持之以恒的精神。一个既有书本 知识，又有实践精神的人，才是真止有字问时人。\"古人学问无遗力，少壮工夫老始成。\"赞扬了古人刻苦学习的精神以及做学问的艰难。 说明只有少年时养成良好的学习习惯，竭尽全力地打好扎实基础，将来才能成就一番事业。\"纸上得来终觉浅，绝知此事要躬行。\"强调 实践的重要性。"},{"id":1297,"stem":"千古名句\"纸上得来终觉浅，绝知此事要躬行。\"出自（ ）","options":["《冬夜读书示子聿》","《长歌行》","《警世贤文·勤奋篇》","《龟虽寿》"],"answer":0,"explanation":"143 19959276711（vx 同号） 【知识小链接】本句出自宋代陆游的《冬夜读书示子聿》 古人学问无遗力，少壮工夫老始成。 纸上得来终觉浅，绝知此事要躬行。"},{"id":1298,"stem":"\"纸上得来终觉浅，绝知此事要躬行\"出自（）的诗作。","options":["韩愈","王安石","范仲淹","陆游"],"answer":3,"explanation":"本句出自宋代陆游的《冬夜读书示子聿》 古人学问无遗力，少壮工夫老始成。 纸上得来终觉浅，绝知此事要躬行。"},{"id":1299,"stem":"诗句\"月落乌啼霜满天，江枫渔火对愁眠\"描写的是（）境内的景色。","options":["广州","扬州","苏州","杭州"],"answer":2,"explanation":"本句出自唐代诗人张继的《枫桥夜泊》，是唐朝安史之乱后，诗人张继途经寒山寺时，写下的一首羁旅诗。这是写愁 的代表作。枫桥在今苏州市阊门外。寒山寺在枫桥附近，始建于南朝梁代。相传因唐代僧人寒山、拾得曾住此而得名。在今天的苏州 市西枫桥镇。姑苏是苏州的别称，因城西南有姑苏山而得名。"},{"id":1300,"stem":"张继《枫桥夜泊》\"姑苏城外寒山寺\"中\"姑苏\"是指现在的（）","options":["杭州","扬州","苏州","常州"],"answer":2,"explanation":"姑苏，就是苏州。苏州古称平江，又称姑苏，位于江苏省东南太湖之滨，长江三角洲中部，是中国著名的历史文化名 城。"},{"id":1301,"stem":"\"危楼高百尺，手可摘星辰\"运用的修辞手法是（）","options":["夸张","拟人","对比","比喻"],"answer":0,"explanation":"本句出自唐代诗人李白作品《夜宿山寺》， 危楼高百尺，手可摘星辰。不敢高声语，恐惊天上人。 诗意：山上寺院好似有百丈之高，站在上边仿佛都能摘下星辰。不敢高声说话，唯恐惊 动了天上的仙人。 注释：宿：住，过夜。危楼：高楼，这里指山顶的寺庙。危：高。百尺：虚指，不是实数，这里形容楼很高。星辰：天上的星星统称。 语：说话。恐：唯恐，害怕。惊：惊动。此诗运用了极其夸张的手法，描写了寺中楼宇的高耸，表达了诗人对古代庙宇工程艺术的惊 叹以及名对神仙般生活的向往和追求之情。"},{"id":1302,"stem":"\"危楼高百尺，手可摘星辰\"句中\"危\"的意思是（ ）","options":["夸张","拟人","危险","高"],"answer":3,"explanation":"危楼：高楼，这里指山顶的寺庙。"},{"id":1303,"stem":"下列诗句不是描写夏景的是（ ）","options":["泉眼无声惜细流，树阴照水爱晴柔。","童孙未解供耕织，也傍桑阴学种瓜。","夜来风雨声，花落知多少。","黄梅时节家家雨，青草池塘处处蛙。"],"answer":2,"explanation":"A 出自宋朝诗人杨万里的《小池》，描写的是初夏季节，B 出自南宋诗人范成大《四时田园杂兴》中的\"夏日田园杂兴\"。 这首诗写于初夏江南的田园景色。C 出自唐代诗人孟浩然作品《春晓》，写的春天的早晨。D 出自南宋诗人赵师秀《约客》。这首诗 写的是诗人在一个风雨交加的夏夜独自期客的情景。"},{"id":1304,"stem":"下列诗句不是描写夏景的是（ ）","options":["泉眼无声惜细流，树阴照水爱晴柔。","童孙未解供耕织，也傍桑阴学种瓜。","黄梅时节家家雨，青草池塘处处蛙。","一年好景君须记，最是橙黄橘绿时。"],"answer":3,"explanation":"【知识小链】D 出自宋朝苏轼《赠刘景文》，写在橙子金黄、橘子青绿的秋末冬初的时节。"},{"id":1305,"stem":"下列不属于唐代新乐府运动倡导者的是（ ）","options":["白居易","元好问","元稹","李绅"],"answer":1,"explanation":"新乐府运动是由唐代诗人白居易、元稹、张籍、李绅等所倡导，主张恢复古代的采诗制度，发扬《诗经》和汉魏乐府 讽喻时事的传统，使诗歌起到\"补察时政\"，\"泄导人情\"的作用，强调以自创的新的乐府题目咏写时事，故名新乐府。"},{"id":1306,"stem":"\"一骑红尘妃子笑，无人知是荔枝来。\"句中\"妃子\"指的是（ ）","options":["赵飞燕","杨玉环","王昭君","武则天"],"answer":1,"explanation":"144 19959276711（vx 同号） 【知识小链接】本句出自唐代诗人杜牧作品《过华清宫绝句三首》，诗句借古讽今，选取了唐玄宗不惜劳民伤财为杨贵妃（杨玉环） 供应荔枝，表达了诗人对最高统治者的穷奢极欲的无比愤慨之情。"},{"id":1307,"stem":"\"知有儿童挑促织，深夜篱落一灯明\"中的\"促织\"指的是（）","options":["蟋蟀","蚂蚱","蜘蛛","蚂蚁"],"answer":0,"explanation":"本句出自南宋诗人叶绍翁所作《夜书所见》。萧萧的秋风吹动梧桐叶，送来阵阵寒意，客游在外的诗人不禁思念起自 己的家乡。促织俗称蟋蟀，有的地区又叫蛐蛐。"},{"id":1308,"stem":"\"黄四娘家花满蹊，千朵万朵压枝低\"中，\"蹊\"的意思是（）","options":["院子","小溪边","小路","篱笆"],"answer":2,"explanation":"出自唐代诗人杜甫作品《江畔独步寻花其六》，黄四娘是杜甫住成都草堂时的邻居。蹊指小路。"},{"id":1309,"stem":"诗句\"梅子金黄杏子肥，麦花雪白菜花稀\"描写的是（）的场景。","options":["春季","夏季","秋季","冬季"],"answer":1,"explanation":"出自南宋的诗人范成大作品《四时田园杂兴其一》，这首诗写初夏江南的田园景色。诗中用梅子黄、杏子肥、麦花白、 菜花稀，写出了夏季南方农村景物的特点，有花有果，有色有形。"},{"id":1310,"stem":"\"生当作人杰，死亦为鬼雄\"一句运用的修辞方法是（）","options":["对偶","比喻","排比","夸张"],"answer":0,"explanation":"本句出自宋代李清照的五言绝句《夏日绝句》 生当做人杰，死亦为鬼雄。至今思项羽，不肯过江东。 这是一首借古讽今、抒发悲愤的怀古诗。这二句运用了对偶的修辞手法。其作用是使得诗句整齐匀称，节奏感强，高度概括。"},{"id":1311,"stem":"李清照《夏日绝句》中提到的历史人物是（）","options":["曹操","刘备","项羽","刘邦"],"answer":2,"explanation":"本句出自宋代李清照的五言绝句《夏日绝句》 生当做人杰，死亦为鬼雄。至今思项羽，不肯过江东。"},{"id":1312,"stem":"\"至今思项羽，不肯过江东\"出自（）","options":["《乌江怀古》","《乌江怀项羽》","《题乌江亭》","《夏日绝句》"],"answer":3,"explanation":"本句出自宋代李清照的五言绝句《夏日绝句》 生当做人杰，死亦为鬼雄。至今思项羽，不肯过江东。"},{"id":1313,"stem":"诗句\"云母屏风烛影深，长河渐落晓星沉\"描写的是（ ）的故事。","options":["夸父","精卫","嫦娥","后羿"],"answer":2,"explanation":"出自唐代李商隐的《嫦娥》。 云母屏风烛影深，长河渐落晓星沉。 嫦娥应悔偷灵药，碧海青天夜夜心。"},{"id":1314,"stem":"王翰的《凉州词》是一首（）题材的诗。","options":["送别","边塞","思乡","田园"],"answer":1,"explanation":"《凉州词》是王翰的边塞诗，全诗：葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回？"},{"id":1315,"stem":"下列古诗中，（）是杨万里的作品。","options":["《池上》","《惠崇春江晚景》","《山行》","《宿新市徐公店》"],"answer":3,"explanation":"《池上》白居易；《惠崇春江晚景》苏轼；《山行》杜牧；《宿新市徐公店》杨万里。"},{"id":1316,"stem":"如果古人要举办一场父子类的亲子节目，下列哪一组诗人不适合参加。（ ）","options":["杜审言，杜甫","晏殊，晏几道","苏洵，苏轼","曹操，曹植"],"answer":0,"explanation":"杜审言，字必简，襄州襄阳（今湖北襄阳）人，晋征南将军杜预的远裔，\"诗圣\"杜甫的祖父。唐代诗人。杜审言与李峤、 崔融、苏味道被称为\"文章四友\"，是唐代\"近体诗\"的奠基人之一，作品多朴素自然。其五言律诗，格律谨严。后人辑有《杜审言诗集》。 19959276711（vx 同号）"},{"id":1317,"stem":"下列哪一个称号不是属于李白的（）。","options":["酒仙","诗圣","诗仙","谪仙人"],"answer":1,"explanation":"李白，字太白，号青莲居士，又号“谪仙人”。唐代伟大的浪漫主义诗人，被后人誉为“诗仙”，与“诗圣”杜甫并 称为“李杜”。"},{"id":1318,"stem":"“但使龙城飞将在”中的“飞将”是（）","options":["指南宋的岳飞","指汉朝的李广","指三国的周瑜","指东汉的曹操"],"answer":1,"explanation":"诗句出自唐代王昌龄《出塞》：秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。此句意思是： 倘若龙城的飞将李广如今还在，绝不许匈奴南下牧马度过阴山。“飞将”指的是李广。"},{"id":1319,"stem":"\"但使龙城飞将在，不教胡马度阴山\"的作者是（）","options":["王翰","岑参","卢纶","王昌龄"],"answer":3,"explanation":"诗句出自唐代王昌龄《出塞》：秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。"},{"id":1320,"stem":"下列哪句诗的作者是“中兴四大诗人”之一？（ ）","options":["小荷才露尖尖角，早有蜻蜓立上头","窗含西岭千秋雪，门泊东吴万里船","飞流直下三千尺，疑是银河落九天","欲把西湖比西子，淡妆浓抹总相宜"],"answer":0,"explanation":"中兴四大诗人，又称南宋四大家，是中国南宋前期尤袤、杨万里、范成大、陆游四位诗人的合称。A 选自宋代杨万里 的《小池》：泉眼无声惜细流，树荫照水爱晴柔。小荷才露尖尖角，早有蜻蜓立上头。这是一首描写初夏池塘美丽景色的、清新的小 诗。B 选自唐代杜甫写的《绝句》；C 出自唐代李白的《望庐山瀑布》；D 出自宋代文学家苏轼的《饮湖上初晴后雨其二》。"},{"id":1321,"stem":"诗句“头上红冠不用裁，满身雪白走将来”描写的动物是（）","options":["鹅","鹤","鸡","鸽"],"answer":2,"explanation":"诗句出自明代唐寅的《画鸡》：头上红冠不用裁，满身雪白走将来。平生不敢轻言语，一叫千门万户开。描写的动物 是鸡。"},{"id":1322,"stem":"诗句“头上红冠不用裁，满身雪白走将来”的作者是（ ）","options":["苏轼","陆游","白居易","唐伯虎"],"answer":3,"explanation":"诗句出自明代唐寅的《画鸡》：头上红冠不用裁，满身雪白走将来。平生不敢轻言语，一叫千门万户开。"},{"id":1323,"stem":"\"梅子黄时日日晴，小溪泛尽却山行\"描写的季节是（）","options":["初春","初夏","暮秋","暮冬"],"answer":1,"explanation":"出自宋代曾几的《三衢道中》：“梅子黄时日日晴，小溪泛尽却山行。绿阴不减来时路，添得黄鹂四五声。”描写的 季节是初夏。"},{"id":1324,"stem":"诗句\"梅子黄时日日晴，小溪泛尽却山行\"的作者是（）。","options":["曾巩","曾几","袁枚","岑参"],"answer":1,"explanation":"出自宋代曾几的《三衢道中》：“梅子黄时日日晴，小溪泛尽却山行。绿阴不减来时路，添得黄鹂四五声。”"},{"id":1325,"stem":"\"秦皇汉武，略输文采；唐宗宋祖，稍逊风骚\"句中\"风骚\"分别指《诗经》中的（）和《楚辞》中的《离骚》。","options":["秦风","郑风","卫风","国风"],"answer":3,"explanation":"“风骚”是《诗经•国风》和《楚辞•离骚》的并称，它们同被视为汉族诗歌发展的源流，对后世汉族文学影响深远。后 代用来泛称文学，在文坛居于领袖地位或在某方面领先叫领风骚。现在常指举止轻佻，行为放荡。"},{"id":1326,"stem":"\"五十弦翻塞外声\"中的\"翻\"，意为（）","options":["演奏","唱响","越过","超越"],"answer":0,"explanation":"出自宋代辛弃疾的《破阵子·为陈同甫赋壮词以寄之》，意思是让乐器奏起雄壮的军乐鼓舞士气。翻：演奏。"},{"id":1327,"stem":"《楚辞》是我国最早的（ ）诗歌总集。","options":["现实主义","浪漫主义","梦幻主义","古典主义"],"answer":1,"explanation":"146 19959276711（vx 同号） 【知识小链接】《楚辞》开创了中国浪漫主义文学先河。《诗经》开创了中国现实主义文学先河。"},{"id":1328,"stem":"苏轼\"东坡居士\"这个号的由来，与下列哪个地方有关？（）","options":["汴州","凉州","黄州","荆州"],"answer":2,"explanation":"东坡居士是苏东坡的自号，与他被贬黄州有关。北宋元丰三年二月，苏轼因“乌台诗案”贬去黄州，官府安排他的第 一个落脚点就是城南的定惠院。居住寺院，虽然不是很理想的处所，但对初来乍到、惊魂未定，政治上遭受极大打击的苏轼来说，无 疑是个修身养性的好地方。因为靠着微廉的俸禄，实在无法养活家人。于是他便在黄州城外的东坡上开荒种地，自号“东坡居士”。"},{"id":1329,"stem":"“孟夏”是指农历几月？（）","options":["四月","五月","六月","七月"],"answer":0,"explanation":"孟夏是指农历的四月份，包括立夏和小满两个节气。出自《礼记·月令》：“孟夏之月，日在毕。”农历的四季每个 季节都有“孟、仲、季”的排列。“孟”为最长，“季”为最幼。孟夏、仲夏、季夏分别对应农历的 4、5、6 月份。农历的四月也称： 余月、阴月、梅月、清和月、初夏、孟夏等等。"},{"id":1330,"stem":"诗句\"子规声里雨如烟\"中的\"子规\"是指（）。","options":["燕子","杜鹃","喜鹊","仙鹤"],"answer":1,"explanation":"出自宋代翁卷的《乡村四月》，解释：天空中烟雨蒙蒙，杜鹃声声啼叫。子规：杜鹃。"},{"id":1331,"stem":"孟浩然与（）齐名，同为唐代山水田园诗派的代表人物。","options":["王勃","王绩","王昌龄","王维"],"answer":3,"explanation":"孟浩然与王维合称为\"王孟\"，同为唐代山水田园诗派的代表人物。"},{"id":1332,"stem":"与诗题《古朗月行》中\"行\"的意思不同的是（）","options":["《从军行》","《山行》","《长歌行》","《琵琶行》"],"answer":1,"explanation":"“行”是古诗的一种体裁，统称“歌行体”，此时念 xíng。它的特点是音律自由，句长不一，富于变化。朗月行， 是乐府旧题。"},{"id":1333,"stem":"欧阳修是北宋时期著名的文学家和诗人，他号\"醉翁\"，晚号\"（）\"。","options":["香山居士","清真居士","六如居士","六一居士"],"answer":3,"explanation":"欧阳修，字永叔，号醉翁，晚号六一居士，北宋政治家、文学家、史学家。"},{"id":1334,"stem":"\"暖风（）得游人醉，（ ）把杭州作汴州。\"括号内应填（ ）","options":["曛；只","曛；直","熏；指","熏；直"],"answer":3,"explanation":"出自宋代林升的《题临安邸》：“山外青山楼外楼，西湖歌舞几时休？暖风熏得游人醉，直把杭州作汴州。”"},{"id":1335,"stem":"孟浩然的《宿建德江》是一首（）。","options":["五言绝句","七言绝句","五言律诗","七言律诗"],"answer":0,"explanation":"《宿建德江》是唐代诗人孟浩然的诗作。这是一首刻画秋江暮色的诗，是唐人五绝中的写景名篇。作者把小船停靠在 烟雾迷蒙的江边想起了以往的事情，因而以舟泊暮宿作为自己的抒发感情的归宿，写出了作者羁旅之思。"},{"id":1336,"stem":"诗句\"我劝天公重抖擞，不拘一格降人才\"的作者是（）代的。","options":["唐","宋","明","清"],"answer":3,"explanation":"出自清代龚自珍的《己亥杂诗》。 解释：我奉劝上天要重新振作精神，不要拘泥一定规格以降下更多的人才。"},{"id":1337,"stem":"\"我劝天公重抖擞，不拘一格降人才\"出自龚自珍的（）","options":["《辛丑杂诗》","《己亥杂诗》","《庚子杂诗》","《戊戌杂诗》"],"answer":1,"explanation":"出自清代龚自珍的《己亥杂诗》。 解释：我奉劝上天要重新振作精神，不要拘泥一定规格以降下更多的人才。"},{"id":1338,"stem":"下列不属于《诗经》\"六义\"的一项是（ ）。","options":["赋","兴","歌","雅 147 19959276711（vx 同号）"],"answer":2,"explanation":"《诗经》是中国文学史上第一部诗歌总集，收入西周初期至春秋中叶间的诗歌三百零五篇。所谓《诗经》中的\"六义\"，是指\"风、雅、 颂\"三种诗歌形式与\"赋、比、兴\"三种表现手法。"},{"id":1339,"stem":"以下诗句中，哪句和其他诗句抒发的情感不同？（ ）","options":["苟利国家生死以，岂因祸福避趋之。","我寄愁心与明月，随风直到夜郎西。","臣心一片磁针石，不指南方不肯休。","位卑未敢忘忧国，事定犹须待阖棺。"],"answer":1,"explanation":"B 出自唐代李白的《闻王昌龄左迁龙标遥有此寄》，意思是我把我忧愁的心思寄托给明月，希望能随着你一直到夜郎 以西。这句诗表达了作者对朋友的关心。A 出自林则徐的《赴成登程口占示家人二首》，这首诗是林则徐写给妻子的家书，这句话的 意思是：为了国家利益，我们可以奉献生死，同时，我们不能有福就做这件事情，对自己有害的事情就不做。C 出自宋代文天祥的《扬 子江》，意思是：我的心就像那一根磁针，不永远指向南方誓不罢休。D 出自宋代陆游的《病起书怀》，意思是：虽然职位低微却从 未敢忘记忧虑国事，但若想实现统一理想，只有死后才能盖棺定论。"},{"id":1340,"stem":"以下写\"月\"的诗句中，对应作者正确的是（ ）","options":["海上生明月，天涯共此时。——张子瞻","但愿人长久，千里共婵娟。——苏辙","隔千里兮共明月。——屈原","江天一色无纤尘，皎皎空中孤月轮。——张若虚"],"answer":3,"explanation":"A 出自唐代张九龄的《望月怀远》；B 出自宋代苏轼的《水调歌头·明月几时有》；C 出自南北朝谢庄的《月赋》。"},{"id":1341,"stem":"\"上善若水。水善利万物而不争\"一语出自（）。","options":["《易经》","《老子》","《庄子》","《列子》"],"answer":1,"explanation":"出自《道德经》第八章。意思是最高境界的善行就好像水一样。水善于滋润万物而不与万物相争"},{"id":1342,"stem":"杜牧的《泊秦淮》是一首（ ）","options":["五言绝句","七言绝句","五言律诗","七言律诗"],"answer":1,"explanation":"《泊秦淮》：烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。绝句又称为截句、断句、短句、 绝诗，它是近体诗的一种形式，各家对其解释并不一致。绝句由四句组成，分为律绝和古绝，其中律绝有严格的格律要求，常见的绝 句有五言绝句和七言绝句。"},{"id":1343,"stem":"科举制的诞生朝代是（ ）。","options":["汉朝","唐朝","魏晋","隋朝"],"answer":3,"explanation":"隋文帝时，废除了前朝的选官制度，注意考查人才的学识，初步建立起通过考试选拔人才的制度。隋炀帝时，进士科 的创立，标志着科举制的正式确立。此后，科举制成为历朝选拔官吏的主要制度。"},{"id":1344,"stem":"《列子》是（）家学派著作。","options":["儒","道","墨","兵"],"answer":1,"explanation":"《列子》又名《冲虚经》，属于道家的一部经典著作。其思想主旨近于老庄，追求了一种冲虚自然的境界。"},{"id":1345,"stem":"以下不属于爱国诗人屈原作品的是（）","options":["《离骚》","《九歌》","《天问》","《楚辞》"],"answer":3,"explanation":"《楚辞》是最早的浪漫主义诗歌总集及浪漫主义文学源头。西汉末年，刘向将屈原、宋玉的作品以及汉代淮南小山、东方朔、王褒、 刘向等人承袭屈原、宋玉的作品汇编成集，计十六篇，定名为《楚辞》。"},{"id":1346,"stem":"下列书信称谓语用法正确的是（ ）。","options":["苏轼写信给父亲苏洵，可使用\"如晤\"","李白写信给朋友杜甫，可使用\"大鉴\"","曾巩写信给老师欧阳修，可使用\"知悉\"","左光斗写信给学生史可法，可使用\"钧鉴\""],"answer":1,"explanation":"\"如晤\"用于晚辈；\"知悉\"，旧时多用于上对下的文书；\"钧鉴\"是书信中敬请收信人阅知的敬辞，用于尊长或上级。"},{"id":1347,"stem":"下列成语典故与韩信有关的是（）","options":["隔岸观火","风声鹤唳","背水一战","破釜沉舟"],"answer":2,"explanation":"隔岸观火的主人公是范雎、白起；风声鹤唳的主人公是苻坚；破釜沉舟指的是巨鹿之战，主人公是项羽。关于韩信的 成语故事有：胯下之辱；一饭千金；推陈出新；明修栈道、暗度陈仓；背水一战；十面埋伏；功高震主；多多益善；鸟尽弓藏；成也 萧何、败也萧何等。 19959276711（vx 同号）"},{"id":1348,"stem":"\"一门三父子，都是大文豪。诗赋传千古，峨嵋共比高。\"这首诗中的\"三父子\"指的是（ ）。","options":["苏洵、苏轼、苏辙","杜甫、杜牧、杜苟鹤","曹操、曹丕、曹植","班彪、班固、班超"],"answer":0,"explanation":"三苏（苏轼、苏辙、苏洵）"},{"id":1349,"stem":"与下列对联相关的人物配对错误的一项是（）。","options":["一代君权痛蚕室，千秋史笔溯龙门（司马迁）","云过雁断胡天月，陇上羊归塞草烟（王昭君）","四面湖山归眼底，万家忧乐到心头（范仲淹）","犹留正气参天地，永剩丹心照古今（文天祥）"],"answer":1,"explanation":"B 出自唐代温庭筠的《苏武庙》 解释：羁留北海音书断绝，头顶胡天明月；荒陇牧羊回来，茫茫草原已升暮烟。"},{"id":1350,"stem":"下列句中\"可怜\"，与\"可怜夜半虚前席，不问苍生问鬼神\"（李商隐《贾生》）句中\"可怜\"意思相同的一项是（）。","options":["可怜无定河边骨，犹是春闺梦里人。（王瀚《凉州词》）","可怜身上衣正单，心忧炭贱愿天寒。（白居易《卖炭翁》）","戍卒叫，函谷举，楚人一炬，可怜焦土。（杜牧《阿房宫赋》）","可怜陌上离离草，一种逢春各短长。（陆游《平水》）"],"answer":2,"explanation":"\"可怜夜半虚前席，不问苍生问鬼神\"与“戍卒叫，函谷举，楚人一炬，可怜焦土。”中\"可怜\"意思都是可惜。"},{"id":1351,"stem":"陆游《诉衷情》中\"当年万里觅封侯\"一句用了（）投笔从戎、建功异域的典故。","options":["班固","班超","霍光","霍去病"],"answer":1,"explanation":"用班超投笔从戎、立功异域“以取封候”的典故，表达自己报效祖国，收拾旧河山的壮志。"},{"id":1352,"stem":"关于\"落红不是无情物，化作春泥更护花。\"说法错误的是（）","options":["出自《已亥杂诗》","由龚自珍所写","落红指的是诗人心仪的女子","表达了报国之心"],"answer":2,"explanation":"这里把落红指的是辞官的人，即诗人自己。"},{"id":1353,"stem":"唐代诗人杜牧写有不少抒情写景的小诗，下面的（ ）出自杜牧之手。","options":["《望天门山》","《清明》","《题临安邸》","《岁暮归南山》"],"answer":1,"explanation":"杜牧的《清明》，全诗：清明时节雨纷纷，路上行人欲断魂。借问酒家何处有？牧童遥指杏花村。"},{"id":1354,"stem":"唐代诗人杜牧写有不少抒情写景的小诗，下面的（ ）出自杜牧之手。","options":["《游山西村》","《岁暮归南山》","《题临安邸》","《江南春》"],"answer":3,"explanation":"杜牧的《江南春》，全诗：千里莺啼绿映红，水村山郭酒旗风。南朝四百八十寺，多少楼台烟雨中。"},{"id":1355,"stem":"\"苟利国家生死以\"表达了作者的（）","options":["自卑之情","不满之心","爱国之心","愤世嫉俗的心情"],"answer":2,"explanation":"出自林则徐的《赴成登程口占示家人二首》，这首诗是林则徐写给妻子的家书，这句话的意思是：为了国家利益，我 们可以奉献生死，同时，我们不能有福就做这件事情，对自己有害的事情就不做。表达了作者的爱国之心。"},{"id":1356,"stem":"征蓬出汉塞，归雁入（ ）。","options":["苍天","胡天","边关","中原"],"answer":1,"explanation":"出自唐代王维的《使至塞上》： 单车欲问边，属国过居延。 征蓬出汉塞，归雁入胡天。 大漠孤烟直，长河落日圆。 萧关逢候骑，都护在燕然。"},{"id":1357,"stem":"以下哪位诗人与《次北固山下》的作者身处同一朝代（）","options":["王昌龄","苏轼","王冕","袁枚"],"answer":0,"explanation":"《次北固山下》的作者是唐代诗人王湾，选项中只有王昌龄是唐朝。苏轼是宋朝诗人，王冕是元朝诗人，袁枚是清朝 19959276711（vx 同号） 诗人。"},{"id":1358,"stem":"以下哪位诗人与《逢入京使》的作者身处同一朝代（）","options":["王昌龄","苏轼","王冕","袁枚"],"answer":0,"explanation":"《逢入京使》的作者是唐代诗人岑参，选项中只有王昌龄是唐朝。苏轼是宋朝诗人，王冕是元朝诗人，袁枚是清朝诗 人。"},{"id":1359,"stem":"下列不属于\"初唐四杰\"的是（）","options":["骆宾王","贺知章","王勃","卢照邻"],"answer":1,"explanation":"“初唐四杰”是中国唐代初年，文学家王勃、杨炯、卢照邻、骆宾王的合称，简称为“王杨卢骆”。"},{"id":1360,"stem":"与杨炯、卢照邻、骆宾王并称\"初唐四杰\"的是（）","options":["杜审言","李峤","王昌龄","王勃"],"answer":3,"explanation":"“初唐四杰”是中国唐代初年，文学家王勃、杨炯、卢照邻、骆宾王的合称，简称为“王杨卢骆”。"},{"id":1361,"stem":"下列是范仲淹代表作的是（ ）","options":["《滕王阁序》","《资治通鉴》","《铜雀台赋》","《岳阳楼记》"],"answer":3,"explanation":"《滕王阁序》王勃；《资治通鉴》司马光；《铜雀台赋》曹植。"},{"id":1362,"stem":"被称为\"亚圣\"的是（）。","options":["孔子","孟子","荀子","曾子"],"answer":1,"explanation":"孟子，名轲，字子舆，儒家学说代表人物，与“至圣”孔子并称为“孔孟”。"},{"id":1363,"stem":"《岳阳楼记》中的岳阳楼在现今的（）省。","options":["江西","湖北","湖南","山西"],"answer":2,"explanation":"岳阳楼在现今的湖南省。 【知识小链接】江南三大名楼指的是：江西南昌的滕王阁、湖北武汉的黄鹤楼，湖南岳阳的岳阳楼。"},{"id":1364,"stem":"谥号是古代帝王、贵族、大臣或其他有地位的人死后被加的带有褒贬意义的称号。范仲淹的谥号是（ ）。","options":["武穆","文正","文定","文达"],"answer":1,"explanation":"范仲淹谥号“文正”，世称“范文正公”。"},{"id":1365,"stem":"现在我们常用\"阳春白雪\"和\"下里巴人\"指代高雅和通俗。这两个成语最初指的是（）。","options":["文章","人物","音乐","舞蹈"],"answer":2,"explanation":"“阳春白雪”和“下里巴人”这两个成语最初指的是乐曲。“阳春白雪”在战国时代成为楚国的艺术性较高，难度较 大的歌曲。后来泛指高深的、不通俗的文学艺术。“下里巴人”原指战国时代楚国民间流行的一种歌曲。后来比喻通俗的文学艺术。 “阳春白雪”为其反面，比喻高深、不通俗的文学艺术。"},{"id":1366,"stem":"以下事物与其代称对应不正确的是（）。","options":["\"尺素\"代指书籍","\"双鲤\"代指书信","\"丝竹\"代指音乐","\"手谈\"代指下围棋"],"answer":0,"explanation":"“尺素”：书写用的一尺长左右的白色生绢，借指小的画幅，短的书信。"},{"id":1367,"stem":"\"千岩万壑不辞劳，远看方知出处高。溪涧岂能留得住，终归大海作波涛。\"这首诗吟咏的对象是（ ）","options":["雪","瀑布","暴雨","高山"],"answer":1,"explanation":"出自唐代李忱的《瀑布联句》： 千岩万壑不辞劳，远看方知出处高。——黄檗 溪涧岂能留得住，终归大海作波涛。——李忱 这是一首托物言志的诗，描绘了冲决一切、气势磅礴的瀑布。"},{"id":1368,"stem":"\"学无常师\"中的\"常师\"意思是（ ）。","options":["经常的老师","固定的老师","常常拜师","经常做老师 150 19959276711（vx 同号）"],"answer":1,"explanation":"出自《论语·子张》的内容，意思是求学没有固定的老师。指凡有点学问、长处的人都是老师。\"常师\"意思是固定的老 师。"},{"id":1369,"stem":"刘禹锡诗句\"花开时节动京城\"咏的是（ ）","options":["荷花","牡丹","桃花","芍药"],"answer":1,"explanation":"出自唐代刘禹锡的《赏牡丹》： 庭前芍药妖无格，池上芙蕖净少情。 唯有牡丹真国色，花开时节动京城。"},{"id":1370,"stem":"\"昆山玉碎凤凰叫，芙蓉泣露香兰笑。十二门前融冷光，二十三丝动紫皇\"这几句诗是作者欣赏什么乐器时所产生的联想？（）。","options":["琵琶","箜篌","古琴","古筝"],"answer":1,"explanation":"出自唐代李贺的《李凭箜篌引》。 赏析：“昆山”句是以声写声，着重表现乐声的起伏多变；“芙蓉”句则是以形写声，刻意渲染乐声的优美动听，用比喻的手法描绘 了李凭弹奏箜篌的音乐特色。"},{"id":1371,"stem":"以下表时间的副词，用来表示时间不长或\"一会儿\"的是（）。","options":["尝","昔","旋","方"],"answer":2,"explanation":"旋：随即；不久。《促织》：“旋见鸡伸颈摆扑。”尝：曾经。昔：以前。方：刚刚，才。"},{"id":1372,"stem":"下列诗文中没有关于思念父母典故的一项是（ ）。","options":["知不足赞扬明明，贵以展臣蓼莪之思。（曹植《上卞太后谋表》）","缅邈寄书黄犬后，凄凉陟咕白云前。（李纲《次退之蓝关韵》）","中园日涉非无趣，保此千钟慰北堂。（王安石《和微之林亭》）","关河愁欲遍，缟纻竟谁亲。（顾炎武《过李子德》之四）"],"answer":3,"explanation":"顾炎武是明末清初的著名思想家、史学家、语言学家，他主张经世致用，注重实践和经验，强调以史为鉴，对明朝的 灭亡进行了深入的思考和总结。同时，他也提倡尊重自然、崇尚实践，反对空谈和虚浮，对后世产生了深远的影响。"},{"id":1373,"stem":"下列不是古人对妻子称呼的一项是（）","options":["糟糠","拙荆","外子","细君"],"answer":2,"explanation":"外子是古时候妻子对丈夫的称呼，内子是古代妻子的称呼，也称内助，略带有谦虚称，反映了旧社会中习惯上男人出 外谋生，女人在家搞家务。"},{"id":1374,"stem":"以下勤学典故与主人公对应正确的是（）","options":["韦编三绝——孔子","目不窥园——孙敬","凿壁偷光——车胤","囊萤夜读——苏秦"],"answer":0,"explanation":"目不窥园——董仲舒；凿壁偷光——匡衡；囊萤夜读——车胤。"},{"id":1375,"stem":"以下不属于史学家“三班”的是（）。","options":["班超","班固","班昭","班彪"],"answer":0,"explanation":"三班指汉朝的三位历史学家：父亲班彪，儿子班固，和幼女班昭。"},{"id":1376,"stem":"\"三杯两盏淡酒，怎敌他、晚来风急\"出自以下哪个词牌？（）","options":["卜算子","声声慢","采桑子","钗头凤"],"answer":1,"explanation":"出自宋代诗人李清照的《声声慢·寻寻觅觅》：“寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。 三杯两盏淡酒，怎敌他、晚来风急？雁过也，正伤心，却是旧时相识。满地黄花堆积。憔悴损，如今有谁堪摘？守着窗儿，独自怎生 得黑？梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！”"},{"id":1377,"stem":"以下哪句诗和其他诗句表达的意思不同？（ ）","options":["四海皆兄弟，谁为行路人。","若知四海皆兄弟，何处相逢非故人。","落地为兄弟，何必骨肉亲。","遥知兄弟登高处，遍插茱萸少一人。"],"answer":3,"explanation":"选项 A、B、C 描写的是朋友之交，D 表达的则是对家人的思念。 19959276711（vx 同号）"},{"id":1378,"stem":"\"停杯投箸不能食\"中的\"箸\"指的是（）","options":["勺子","碗","筷子","铲子"],"answer":2,"explanation":"这是李白《行路难》中的句子：停杯投箸不能食，拔剑四顾心茫然.。字面的意思是：我放下酒杯扔掉筷子不想喝酒了， 拔出宝剑环顾四周，心里一片茫然.。"},{"id":1379,"stem":"《记承天寺夜游》的写作构思角度是（）","options":["托物言志","以物喻人","即景生情","类比象征"],"answer":2,"explanation":"《记承天寺夜游》这篇短文，对澄澈透明的美妙的月色作了极其生动形象的描绘，真实地记录了作者当时生活的一个 片段，透露出他在贬谪中感慨深微而又随缘自适、自我排遣的特殊心境。"},{"id":1380,"stem":"春天，被古人称之为\"柳眼\"的是（）","options":["柳树的枝条","柳树的叶芽","柳树的树干","柳树的根"],"answer":1,"explanation":"\"柳眼\"是柳树的叶芽，早春初生的柳叶如人睡眼初展，因以为称。"},{"id":1381,"stem":"诗句\"晨起动征铎，客行悲故乡。\"中的\"征铎\"指的是（）","options":["马鞍","远行车马所挂的铃铛","马的嘶叫声","马车的车轮"],"answer":1,"explanation":"唐代温庭筠的《商山早行》：晨起动征铎，客行悲故乡。鸡声茅店月，人迹板桥霜。槲叶落山路，枳花明驿墙。因思 杜陵梦，凫雁满回塘。 诗意：黎明起床，车马的铃铎已叮当作响，出门人踏上旅途，还一心想念故乡。 \"征铎\"指的是远行车马所挂的铃铛。"},{"id":1382,"stem":"\"向来枉费推移力，此日中流自在行\"中的\"向来\"指的是（）","options":["本来","向着来的地方","原先","一贯如此"],"answer":2,"explanation":"此句出自宋代朱熹的《观书有感·其二》，全诗： 昨夜江边春水生，蒙冲巨舰一毛轻。 向来枉费推移力，此日中流自在行。 向来：原先，指春水上涨之前。"},{"id":1383,"stem":"\"深林人不知，明月来相照\"，出自唐代王维的《竹里馆》。当时作者的心态是（ ）","options":["忧愁","思念","闲适","孤单"],"answer":2,"explanation":"唐代王维的《竹里馆》： 独坐幽篁里，弹琴复长啸。 深林人不知，明月来相照。 \"深林人不知，明月来相照\"意思是：深深的山林中无人知晓，只有一轮明月静静与我相伴。此诗写隐者的闲适生活以及情趣，描绘了诗 人月下独坐、弹琴长啸的悠闲生活，遣词造句简朴清丽，传达出诗人宁静、淡泊的心情，表现了清幽宁静、高雅绝俗的境界。"},{"id":1384,"stem":"“西风落日草斑斑，云薄秋空鸟独还”这两句诗句，出自明代于谦的诗作（ ）","options":["《上太行》","《上太行山上》","《太行山》","《太行山上》"],"answer":0,"explanation":"出自明代于谦的《上太行山》： 西风落日草斑斑，云薄秋空鸟独还。 两鬓霜华千里客，马蹄又上太行山。"},{"id":1385,"stem":"\"浮云游子意，落日故人情\"是《送友人》中的（ ）","options":["首联","额联","颈联","尾联"],"answer":2,"explanation":"唐代李白的《送友人》： 青山横北郭，白水绕东城。此地一为别，孤蓬万里征。 浮云游子意，落日故人情。挥手自兹去，萧萧班马鸣。 这是一首情意深长的送别诗，作者通过送别环境的刻画、气氛的渲染，表达出依依惜别之意。 \"首联、颔联、颈联、尾联\"分别为： 首联，是律诗中的第一联，诗的前两句就是首联；颔联，第三，四句就是颔联； 颈联，第五，六句就是颈联；尾联，最后两句就是尾联。 19959276711（vx 同号）"},{"id":1386,"stem":"\"莫愁前路无知己，天下谁人不识君\"中的\"君\"指的是（）","options":["高适","岑参","董大","韦应物"],"answer":2,"explanation":"诗句出自唐代高适的《别董大》，这是高适的一首送别诗，送别的对象是琴师董庭兰。"},{"id":1387,"stem":"\"日出江花红胜火，春来江水绿如蓝\"使用了（）修辞手法。","options":["夸张","反问","拟人","对偶"],"answer":3,"explanation":"诗句出自唐朝白居易的《忆江南》：“江南好，风景旧曾谙。日出江花红胜火，春来江水绿如蓝。能不忆江南？”意 思是江南的风景多么美好，如画的风景久已熟悉。春天到来时，太阳从江面升起，把江边的鲜花照得比火红，碧绿的江水绿得胜过蓝 草。怎能叫人不怀念江南？日出江山红胜火春来江水绿如蓝一句运用了比喻”和“对偶”的修辞方法。 用“花”比作“火”，“日出”与“春来”，“江花”与“江水”，“红胜火”与“绿如蓝”相对应 。"},{"id":1388,"stem":"\"日出江花红胜火，春来江水绿如蓝\"的词牌名是（）","options":["清平乐","卜算子","丑奴儿","忆江南"],"answer":3,"explanation":"诗句出自唐朝白居易的《忆江南》：“江南好，风景旧曾谙。日出江花红胜火，春来江水绿如蓝。能不忆江南？”"},{"id":1389,"stem":"关于\"日出江花红胜火，春来江水绿如蓝\"，下列年代、作者和题目均正确的一项是？（）","options":["唐孟浩然《忆江南》","唐白居易《忆江南》","唐白居易《采莲曲》","宋苏东坡《采莲曲》"],"answer":1,"explanation":"诗句出自唐朝白居易的《忆江南》：“江南好，风景旧曾谙。日出江花红胜火，春来江水绿如蓝。能不忆江南？”"},{"id":1390,"stem":"李白《菩萨蛮》\"平林漠漠烟如_，寒山一带伤心\"，空格处应填入的词是（）。","options":["幕；雾","云；泪","练；翠","织；碧"],"answer":3,"explanation":"唐代李白的《菩萨蛮·平林漠漠烟如织》：平林漠漠烟如织，寒山一带伤心碧。暝色入高楼，有人楼上愁。玉阶空伫 立，宿鸟归飞急。何处是归程？长亭更短亭。"},{"id":1391,"stem":"\"宫、商、角、徵、羽\"是我国古代的音阶，它们被统称为（ ）","options":["五律","五音","五声","五阶"],"answer":1,"explanation":"“宫、商、角、徵、羽”（读音为 gōng shāng jué zhǐ yǔ）是我国五声音调中五个不同音的名称，类似现在简谱 中的 1、2、3、5、6。即宫等于 1（Do），商等于 2（Re），角等于 3（Mi），徵等于 5（So），羽等于 6（La），亦称作五音。"},{"id":1392,"stem":"\"遥知兄弟登高处，遍插茱萸少一人\"中，\"一人\"是指（）。","options":["王之涣","杜甫","王维","李白"],"answer":2,"explanation":"诗句出自王维诗《九月九日忆山东兄弟》，意思是远远想到兄弟们身佩茱萸登上高处，也会因为少我一人而生遗憾之 情。王维写作此诗时，独自一人漂泊在洛阳与长安之间，“一人”是指王维自己。"},{"id":1393,"stem":"以下（）不是王安石的作品。","options":["《江上》","《伤仲永》","《登飞来峰》","《题都城南庄》"],"answer":3,"explanation":"《题都城南庄》是唐代诗人崔护。"},{"id":1394,"stem":"“思君若汶水，浩荡寄南征”中“君”指的是（）","options":["李白","苏轼","杜甫","董大"],"answer":2,"explanation":"选自唐代李白的《沙丘城下寄杜甫》：我来竟何事，高卧沙丘城。城边有古树，日夕连秋声。鲁酒不可醉，齐歌空复 情。思君若汶水，浩荡寄南征。"},{"id":1395,"stem":"诗句\"过江千尺浪，入竹万竿斜\"的作者是唐代诗人（）","options":["李白","李绅","李贺","李峤"],"answer":3,"explanation":"出自唐代李峤的《风》：“解落三秋叶，能开二月花。过江千尺浪，入竹万竿斜。”"},{"id":1396,"stem":"诗句“过江千尺浪，入竹万竿斜”描绘的是（ ）","options":["风","云","雷","电"],"answer":0,"explanation":"153 19959276711（vx 同号） 【知识小链接】出自唐代李峤的《风》：“解落三秋叶，能开二月花。过江千尺浪，入竹万竿斜。”这首诗写出了风的力量。"},{"id":1397,"stem":"\"李白乘舟将欲行，忽闻岸上踏歌声\"是李白赠送给（）的诗。","options":["杜甫","孟浩然","汪伦","王昌龄"],"answer":2,"explanation":"出自唐代李白的送别诗《赠汪伦》： 李白乘舟将欲行，忽闻岸上踏歌声。 桃花潭水深千尺，不及汪伦送我情。"},{"id":1398,"stem":"（）乘舟将欲行，忽闻岸上踏歌声。","options":["杜甫","李白","汪伦","王昌龄"],"answer":1,"explanation":"出自唐代李白的送别诗《赠汪伦》： 李白乘舟将欲行，忽闻岸上踏歌声。 桃花潭水深千尺，不及汪伦送我情。"},{"id":1399,"stem":"以下将思念化作月亮写进诗里的诗作中，哪首是李白创作的（）","options":["《望月怀远》","《宿建德江》","《月夜忆舍弟》","《月下独酌》"],"answer":3,"explanation":"《望月怀远》的作者是唐代诗人张九龄；《宿建德江》的作者是唐代诗人孟浩然；《月夜忆舍弟》的作者是唐代诗人 杜甫。"},{"id":1400,"stem":"\"欲穷千里目，更上一层楼\"中的\"楼\"是（）。","options":["黄鹤楼","鹳雀楼","岳阳楼","望湖楼"],"answer":1,"explanation":"诗句出自唐代王之涣的《登鹳雀楼》：白日依山尽，黄河入海流。欲穷千里目，更上一层楼。意思是站在高楼上，只 见夕阳依傍着山峦慢慢沉落，滔滔黄河朝着大海汹涌奔流。想要看到千里之外的风光，那就要再登上更高的一层楼。"},{"id":1401,"stem":"\"欲穷千里目，更上一层楼\"形容的是诗人在（）看到的风景。","options":["鹳雀楼","岳阳楼","黄鹤楼","滕王阁"],"answer":0,"explanation":"诗句出自唐代王之涣的《登鹳雀楼》：白日依山尽，黄河入海流。欲穷千里目，更上一层楼。意思是站在高楼上，只 见夕阳依傍着山峦慢慢沉落，滔滔黄河朝着大海汹涌奔流。想要看到千里之外的风光，那就要再登上更高的一层楼。"},{"id":1402,"stem":"六一居士是（）","options":["白居易","欧阳修","苏轼","李清照"],"answer":1,"explanation":"欧阳修，字永叔，号醉翁，晚号六一居士，北宋政治家、文学家、史学家。 香山居士——白居易；东坡居士——苏轼；易安居士——李清照。"},{"id":1403,"stem":"欧阳修是北宋时期著名的文学家和诗人，他号\"醉翁\"，晚号\"（）","options":["香山居士","清真居士","六如居士","六一居士"],"answer":3,"explanation":"欧阳修，字永叔，号醉翁，晚号六一居士，北宋政治家、文学家、史学家。"},{"id":1404,"stem":"《孟子》是由孟子及其弟子共同编撰而成的，它是什么学派的经典著作？（）","options":["法家","道家","墨家","儒家"],"answer":3,"explanation":"孟子名轲，字子舆，与孔子并称“孔孟”，战国时期儒家思想代表人物之一，中国古代思想家、哲学家、政治家、教 育家。"},{"id":1405,"stem":"以下哪首作品不是诗人在借古抒怀（）","options":["《蜀相》","《越中览古》","《台城》","《鹿柴》"],"answer":3,"explanation":"《鹿柴》是唐代诗人王维所著的写景诗，全诗：空山不见人，但闻人语响。返景入深林，复照青苔上。意思是：幽静 的山谷里看不见人，只听到人说话的声音。落日余光映入了深林，又照在幽暗处的青苔上。"},{"id":1406,"stem":"\"沙场秋点兵\"的后一句是（）","options":["梦回吹角连营","马作的卢飞快","醉里挑灯看剑","弓如霹雳弦惊"],"answer":1,"explanation":"出自宋代辛弃疾的《破阵子·为陈同甫赋壮词以寄之》：醉里挑灯看剑，梦回吹角连营。八百里分麾下炙，五十弦翻 塞外声，沙场秋点兵。马作的卢飞快，弓如霹雳弦惊。了却君王天下事，赢得生前身后名。可怜白发生！ 19959276711（vx 同号）"},{"id":1407,"stem":"李龟年是唐代著名的音乐家，杜甫写有《江南逢李龟年》一诗。诗题中的\"江南\"在现在的（ ）","options":["湖南","江苏","福建","浙江"],"answer":0,"explanation":"唐代杜甫的《江南逢李龟年》： 岐王宅里寻常见，崔九堂前几度闻。 正是江南好风景，落花时节又逢君。 江南：这里指今湖南省一带。"},{"id":1408,"stem":"\"湖光秋月两相和，潭面无风镜未磨\"描写了（）的景色","options":["江西鄱阳湖","江苏太湖","湖南洞庭湖","浙江西湖"],"answer":2,"explanation":"出自唐代刘禹锡的《望洞庭》：“湖光秋月两相和，潭面无风镜未磨。遥望洞庭山水翠，白银盘里一青螺。”诗中描 写了秋夜月光下洞庭湖的优美景色。微波不兴，平静秀美，分外怡人。诗人飞驰想像，以清新的笔调，生动地描绘出洞庭湖水宁静、 祥和的朦胧美，勾画出一幅美丽的洞庭山水图。"},{"id":1409,"stem":"\"湖光秋月两相和，潭面无风镜未磨\"形容的湖泊位于今天的（）省。","options":["湖南","湖北","河南","河北"],"answer":0,"explanation":"出自唐代刘禹锡的《望洞庭》：“湖光秋月两相和，潭面无风镜未磨。遥望洞庭山水翠，白银盘里一青螺。”洞庭湖： 湖名，今湖南省北部。"},{"id":1410,"stem":"易安体是（ ）作品的艺术风格。","options":["杨万里","辛弃疾","李清照","陆游"],"answer":2,"explanation":""},{"id":1411,"stem":"稼轩体是（）作品的艺术风格。","options":["杨万里","辛弃疾","李清照","陆游"],"answer":1,"explanation":"“稼轩体”是辛弃疾词的风格特征，辛弃疾号稼轩，是一位具有英雄气慨的词人，才气纵横，笔力超拔。他的词不仅 内容丰富，在艺术上驰骋百家，转益多师，而且有极大的开拓和创新。他以散文句法入词，以经子诗赋之语入词，以词说理，带来了 词体的大解放。无论作长调或小令，都充分表现了自己的才情和体现了自己的人格。他继苏轼之后极大地开拓了词境，使词在与乐分 离之后，仍能够作为一种内容充实，、形式多样化的新体格健诗独立存在。他的词不仅“横绝六合，扫空万古”，而且“包罗万象”。 这种在宋代词坛别开生面、既慷慨豪放又温婉妩媚，而以豪放悲壮为主导风格的词，人们称之为“稼轩体”。"},{"id":1412,"stem":"下面诗句所描写花卉与其他三项不同的一项是（ ）","options":["不要人夸好颜色，只留清气满乾坤","何须浅碧深红色，自是花中第一流","任他桃李争欢赏，不为繁华易素心","怕愁贪睡独开迟，自恐冰容不入时"],"answer":1,"explanation":"不要人夸好颜色，只留清气满乾坤——梅花；何须浅碧深红色，自是花中第一流——桂花；任他桃李争欢赏，不为繁 华易素心——梅花；怕愁贪睡独开迟，自恐冰容不入时——梅花"},{"id":1413,"stem":"以下古文与作者没有对应的是（）","options":["《师说》韩愈","《陋室铭》刘禹锡","《捕蛇者说》柳宗元","《前赤壁赋》曾巩"],"answer":3,"explanation":"《前赤壁赋》一般指《赤壁赋》，是北宋文学家苏轼创作的一篇赋。"},{"id":1414,"stem":"诗句\"故人具鸡黍，邀我至田家\"中\"具\"的意思是（）","options":["工具","都","准备","具体"],"answer":2,"explanation":"出自唐代孟浩然的《过故人庄》：“故人具鸡黍，邀我至田家。绿树村边合，青山郭外斜。 开轩面场圃，把酒话桑麻。待到重阳日，还来就菊花。”该句意思是：老朋友准备丰盛的饭菜，邀请我到他田舍做客。具：准备。"},{"id":1415,"stem":"对诗句\"我寄愁心与明月，随风直到夜郎西\"以下描述正确的一项是（）","options":["\"我\"指的是王昌龄","夜郎是人名","从诗句中可以体会到亲情的珍贵","这句诗表达了作者对朋友的关心"],"answer":3,"explanation":"诗句出自唐代李白的《闻王昌龄左迁龙标遥有此寄》。 全诗： 杨花落尽子规啼，闻道龙标过五溪。 我寄愁心与明月，随君直到夜郎西。 “我”指李白，“夜郎”是国名。 19959276711（vx 同号）"},{"id":1416,"stem":"《永遇乐·京口北固亭怀古》中提到的人物是以下哪一个？（）","options":["萧何","韩信","刘备","孙权"],"answer":3,"explanation":"南宋诗人辛弃疾的《永遇乐·京口北固亭怀古》原文：千古江山，英雄无觅孙仲谋处。舞榭歌台，风流总被雨打风吹 去。斜阳草树，寻常巷陌，人道寄奴曾住。想当年，金戈铁马，气吞万里如虎。元嘉草草，封狼居胥，赢得仓皇北顾。四十三年，望 中犹记，烽火扬州路。可堪回首，佛狸祠下，一片神鸦社鼓。凭谁问，廉颇老矣，尚能饭否？"},{"id":1417,"stem":"\"天生丽质难自弃，一朝选在君王侧\"描写的是（）","options":["西施","王昭君","武则天","杨玉环"],"answer":3,"explanation":"出自唐代白居易的《长恨歌》，此句描写了杨玉环的美貌，同时揭示了李杨二人故事的悲剧因素，又唤起和统领着全 诗。"},{"id":1418,"stem":"\"不畏浮云遮望眼，自缘身在最高层\"诗人写这首诗所登的是（）","options":["庐山","泰山","飞来峰","五老峰"],"answer":2,"explanation":"出自北宋诗人王安石的《登飞来峰》，原文为：飞来山上千寻塔，闻说鸡鸣见日升。不畏浮云遮望眼，自缘身在最高 层。"},{"id":1419,"stem":"下列不属于咏物诗的是（ ）","options":["红豆生南国，春来发几枝。","沉舟侧畔千帆过，病树前头万木春。","墙角数枝梅，凌寒独自开。","千锤万凿出深山，烈火焚烧若等闲。"],"answer":1,"explanation":"B 选自唐代刘禹锡的赠诗《酬乐天扬州初逢席上见赠》，这首诗是唐代诗人刘禹锡于敬宗宝历二年（826）冬，罢和州 刺史后，回归洛阳，途经扬州，与罢苏州刺史后也回归洛阳的白居易相会时所作。"},{"id":1420,"stem":"下列不属于咏物诗的是（ ）","options":["红豆生南国，春来发几枝。","碧玉妆成一树高，万条垂下绿丝绦。","蝉噪林逾静，鸟鸣山更幽。","千锤万凿出深山，烈火焚烧若等闲。"],"answer":2,"explanation":"C 出自南北朝王籍的写景诗《入若耶溪》。"},{"id":1421,"stem":"十二地支的正确顺序为（）","options":["子丑寅卯巳辰午未申酉戌亥","子丑寅卯辰巳未午申酉戌亥","子丑寅卯辰巳午未申酉戌亥","子丑寅卯辰巳午未酉申戌亥"],"answer":2,"explanation":"十二地支，又称十二支，即：子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥的总称。"},{"id":1422,"stem":"李白诗\"故人西辞黄鹤楼\"句中的\"故人\"是（）。","options":["杜甫","王维","白居易","孟浩然"],"answer":3,"explanation":"出自唐代李白的《黄鹤楼送孟浩然之广陵》：“故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际 流。”\"故人\"指孟浩然。"},{"id":1423,"stem":"诗句\"孤帆远影碧空尽，唯见长江天际流\"描写的是在（）看到的景色。","options":["鹳雀楼","黄鹤楼","岳阳楼","望江楼"],"answer":1,"explanation":"出自唐代李白的《黄鹤楼送孟浩然之广陵》：“故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际 流。”"},{"id":1424,"stem":"词句\"最喜小儿亡赖，溪头卧剥莲蓬\"的词牌名是（）。","options":["青玉案","卜算子","清平乐","念奴娇"],"answer":2,"explanation":"出自宋代辛弃疾的《清平乐·村居》：茅檐低小，溪上青青草。醉里吴音相媚好，白发谁家翁媪？ 大儿锄豆溪东，中儿正织鸡笼。最喜小儿亡赖，溪头卧剥莲蓬。"},{"id":1425,"stem":"\"相看两不厌，只有敬亭山\"运用了（）手法。","options":["比喻","对偶","拟人","反复"],"answer":2,"explanation":"出自唐代李白的《独坐敬亭山》：“众鸟高飞尽，孤云独去闲。相看两不厌，只有敬亭山。”该句大意是“敬亭山和 我对视着，谁都看不够，看不厌，看来理解我的只有这敬亭山了。” 这两句话运用了拟人的修辞手法，将敬亭山人格化、个性化，把诗人与敬亭山紧紧地联系在一起，表达了诗人与敬亭山之间的深厚感 19959276711（vx 同号） 情。"},{"id":1426,"stem":"\"相看两不厌，只有（）。\"句中\"（ ）\"里应填（ ）","options":["终南山","敬亭山","天阁山","太行山"],"answer":1,"explanation":"出自唐代李白的《独坐敬亭山》：“众鸟高飞尽，孤云独去闲。相看两不厌，只有敬亭山。”"},{"id":1427,"stem":"\"篱落疏疏一径深\"的下一句是（）","options":["麦花雪白菜花稀","树头新绿未成阴","小溪泛尽却山行","拂堤杨柳醉春烟"],"answer":1,"explanation":"出自宋代杨万里的《宿新市徐公店》：篱落疏疏一径深，树头新绿未成阴。儿童急走追黄蝶，飞入菜花无处寻。"},{"id":1428,"stem":"诗句\"家家乞巧望秋月，穿尽红丝几万条\"描写的是（）。","options":["上元节","七夕节","中元节","中秋节"],"answer":1,"explanation":"出自唐代林杰的《乞巧》。此句简明扼要，形象生动地再现了七夕节的民俗活动，体现出人民过节时的喜悦之情。"},{"id":1429,"stem":"诗句\"王师北定中原日，家祭无忘告乃翁\"是诗人陆游写给（）的诗。","options":["父母","兄弟","孩子","朋友"],"answer":2,"explanation":"出自宋代陆游的《示儿》：“死去元知万事空，但悲不见九州同。王师北定中原日，家祭无忘告乃翁。”示儿：写给 儿子们看。"},{"id":1430,"stem":"\"待到山花烂漫时，她在丛中笑\"形容的是（）","options":["桃花","荷花","菊花","梅花"],"answer":3,"explanation":"出自毛泽东的《卜算子·咏梅》。全诗为：风雨送春归，飞雪迎春到。已是悬崖百丈冰，犹有花枝俏。俏也不争春， 只把春来报。待到山花烂漫时，她在丛中笑。"},{"id":1431,"stem":"\"此曲只应天上有，人间能得几回闻。\"出自《赠花卿》，这首诗的作者是？（ ）","options":["王勃","杜甫","贺知章","李龟年"],"answer":1,"explanation":""},{"id":1432,"stem":"下列不是出自孟浩然诗作的是（ ）","options":["待到重阳日，还来就菊花。","夜来风雨声，花落知多少。","深林人不知，明月来相照。","野旷天低树，江清月近人。"],"answer":2,"explanation":"C 出自王维的《竹里馆》：独坐幽篁里，弹琴复长啸。深林人不知，明月来相照。"},{"id":1433,"stem":"\"不识庐山真面目，只缘身在此山中\"中的\"缘\"理解正确的一项是（）","options":["机会","由于","边缘","理由"],"answer":1,"explanation":"出自宋代著名文学家苏轼《题西林壁》：“横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中”。 缘：因为；由于。"},{"id":1434,"stem":"\"苍苍（），杳杳钟声晚。\"句中\"（ ）\"里应填（ ）","options":["寒山寺","竹林寺","大林寺","香积寺"],"answer":1,"explanation":"“苍苍竹林寺，杳杳钟声晚。”出自唐代刘长卿的《送灵澈上人》 意思是青苍的竹林寺，近晚时传来深远的钟声。"},{"id":1435,"stem":"\"日长睡起无情思，闲看儿童捉（）花\"句中\"（ ）\"里应填（ ）","options":["杨","柳","桃","杏"],"answer":1,"explanation":"
