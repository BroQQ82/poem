“日长睡起无情思，闲看儿童捉柳花。”出自宋代杨万里的《闲居初夏午睡起·其一》。解释：漫长的夏日，从午睡 中醒来不知做什么好，只懒洋洋的看着儿童追逐空中飘飞的柳絮。"},{"id":1436,"stem":"\"卷地风来忽吹散，望湖楼下水如天。\"描绘的季节是（）","options":["春天","夏天","秋天","冬天"],"answer":1,"explanation":"此句出自宋代苏轼的《六月二十七日望湖楼醉书五首》。解释：忽然间狂风卷地而来，吹散了满天的乌云，而那西湖 的湖水碧波如镜，明媚温柔。此诗描绘了夏季望湖楼的美丽雨景。 19959276711（vx 同号）"},{"id":1437,"stem":"诗句\"童孙未解供耕织，也傍桑阴学种瓜\"是一首（）题材的诗。","options":["送别","边塞","闺怨","田园"],"answer":3,"explanation":"出自南宋诗人范成大的田园诗《四时田园杂兴》，这首诗写于初夏江南的田园景色。"},{"id":1438,"stem":"诗句\"牧童归去横牛背，短笛无腔信口吹\"的作者是（）","options":["陶渊明","杨万里","雷震","孟浩然"],"answer":2,"explanation":"出自宋代雷震的《村晚》。诗人描绘了一幅饶有生活情趣的农村晚景图，刻画了一个悠闲俏皮的牧童形象，写出牧童 无忧无虑、悠闲自在的情趣。"},{"id":1439,"stem":"诗句\"谁言寸草心，报得三春晖\"描写的是（）。","options":["父爱","母爱","师生情","友情"],"answer":1,"explanation":"出自唐代孟郊的《游子吟》：“慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。” 《游子吟》是孟郊在溧阳所写。作者早年漂泊无依，直到五十岁时才得到了一个溧阳县尉，结束了长年的漂泊流离生活，便将母亲接 来住。诗人饱尝了世态炎凉，更觉亲情可贵，于是写出这首感人至深的颂母之诗。"},{"id":1440,"stem":"\"谁言寸草心\"的下联是（）","options":["复照青苔上","报得三春晖","孤云独去闲","凌寒独自开"],"answer":1,"explanation":"出自唐代孟郊的《游子吟》：“慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。” 《游子吟》是孟郊在溧阳所写。作者早年漂泊无依，直到五十岁时才得到了一个溧阳县尉，结束了长年的漂泊流离生活，便将母亲接 来住。诗人饱尝了世态炎凉，更觉亲情可贵，于是写出这首感人至深的颂母之诗。"},{"id":1441,"stem":"\"碧玉妆成一树高，万条垂下绿丝绦\"写的是（）","options":["松","樟","柳","榆"],"answer":2,"explanation":"诗句出自唐代贺知章的《咏柳》：碧玉妆成一树高，万条垂下绿丝绦。不知细叶谁裁出，二月春风似剪刀。"},{"id":1442,"stem":"\"碧玉妆成一树高，万条垂下绿丝绦\"描写的是（）的景色。","options":["春","夏","秋","冬"],"answer":0,"explanation":"诗句出自唐代贺知章的《咏柳》：碧玉妆成一树高，万条垂下绿丝绦。不知细叶谁裁出，二月春风似剪刀。描写的是 早春景色。"},{"id":1443,"stem":"诗句“独在异乡为异客，每逢佳节倍思亲”写于（ ）。","options":["上元节","中元节","中秋节","重阳节"],"answer":3,"explanation":"诗句出自唐代王维的《九月九日忆山东兄弟》，是诗人十七岁时在长安所作，意思是独自远离家乡难免总有一点凄凉， 每到重阳佳节倍加思念远方的亲人。“客”指诗人自己。"},{"id":1444,"stem":"\"乱入池中看不见，闻歌始觉有人来\"两句诗的作者是（）","options":["王昌龄","王勃","白居易","刘禹锡"],"answer":0,"explanation":"诗句出自唐代王昌龄的《采莲曲二首》。解释：混入莲池中不见了踪影，听到歌声四起才觉察到有人前来。"},{"id":1445,"stem":"\"乱入池中看不见，闻歌始觉有人来\"出自（）","options":["《采莲诗》","《采莲词》","《采莲歌》","《采莲曲》"],"answer":3,"explanation":"诗句出自唐代王昌龄的《采莲曲二首》。解释：混入莲池中不见了踪影，听到歌声四起才觉察到有人前来。"},{"id":1446,"stem":"\"敲成玉磬穿林响，忽作玻璃碎地声\"的作者还写了（）","options":["家家乞巧望秋月，穿尽红丝几万条","但使龙城飞将在，不教胡马度阴山","欲把西湖比西子，淡妆浓抹总相宜","小荷才露尖尖角，早有蜻蜓立上头"],"answer":3,"explanation":"出自宋朝杨万里的《稚子弄冰》：“稚子金盆脱晓冰，彩丝穿取当银铮（钲）。敲成玉磬穿林响，忽作玻璃（瓈）碎 地声。”他还写了《小池》：“泉眼无声惜细流，树阴照水爱晴柔。小荷才露尖尖角，早有蜻蜓立上头。”"},{"id":1447,"stem":"下列诗句描写的对象，与李白无关的是（ ）","options":["笔落惊风雨，诗成泣鬼神","世人皆欲杀，吾意独怜才 158 19959276711（vx 同号）","为人性僻耽佳句，语不惊人死不休","痛饮狂歌空度日，飞扬跋扈为谁雄"],"answer":2,"explanation":"C 出自唐代杜甫的《江上值水如海势聊短述》：“为人性僻耽佳句，语不惊人死不休。老去诗篇浑漫与，春来花鸟莫 深愁。新添水槛供垂钓，故着浮槎替入舟。焉得思如陶谢手，令渠述作与同游。”此诗是诗人面对如大海汹涌的江水，抒发内心感受 的叙怀之作。诗写于安史之乱时，诗人流落四川成都，寄居草堂，一次观锦江“水如海势”，波涛汹涌，则触景生情，感慨万端，但 又无从说起，只好“聊短述”，抒写了他激愤的、自我解脱的、一时的人生感悟。"},{"id":1448,"stem":"杜甫《客至》\"花径不曾缘客扫，蓬门今始为君开\"一联表达的情感是（）","options":["伤感","悲愤","欣喜","无奈"],"answer":2,"explanation":"作者采用与客谈话的口吻，增强了宾主接谈的生活实感。上句说，长满花草的庭院小路，还没有因为迎客打扫过。下 句说，一向紧闭的家门，今天才第一次为你崔明府打开。寂寞之中，佳客临门，一向闲适恬淡的主人不由得喜出望外。"},{"id":1449,"stem":"下列不是端午习俗的是（ ）","options":["包粽子","划龙舟","插茱萸","挂艾草"],"answer":2,"explanation":"插茱萸是重阳节的习俗。"},{"id":1450,"stem":"王昌龄《从军行》\"青海长云暗雪山\"中的\"雪山\"指的是（）","options":["博格达山","阿尔金山","贺兰山","祁连山"],"answer":3,"explanation":"此句出自唐代王昌龄的《从军行七首·其四》： 青海长云暗雪山，孤城遥望玉门关。 黄沙百战穿金甲，不破楼兰终不还。 雪山：即祁连山，山巅终年积雪，故云。"},{"id":1451,"stem":"\"捐躯赴国难，视死忽如归\"出自（）的作品。","options":["岳飞","于谦","曹操","曹植"],"answer":3,"explanation":"出自两汉曹植的《白马篇》。 解释：为国家解危难奋勇献身，把死亡看得像回家一样平常。 赏析：此句气势慷慨激昂，歌颂了武艺高强的青年英雄，表现出英雄们精忠报国的志向，体现出捐躯为国、视死如归的崇高精神境界。"},{"id":1452,"stem":"\"惟有门前镜湖水，春风不改旧时波\"中的\"镜湖\"在现在（）","options":["绍兴","苏州","湖州","镇江"],"answer":0,"explanation":"B 本句出自唐代贺知章的《回乡偶书》，全诗：离别家乡岁月多，近来人事半消磨。惟有门前镜湖水，春风不改旧时 波。镜湖：湖泊名，在今浙江绍兴会稽山的北麓，方圆三百余里。贺知章的故乡就在镜湖边上。"},{"id":1453,"stem":"下列诗句中，（ ）作者不是杜甫。","options":["国破山河在，城春草木深","山随平野尽，江入大荒流","岱宗夫如何，齐鲁青未了","星垂平野阔，月涌大江流"],"answer":1,"explanation":"“山随平野尽，江入大荒流”出自唐代诗人李白作品《渡荆门送别》。意思是青山渐渐消失，平野一望无边。长江滔 滔奔涌，流入广袤荒原。"},{"id":1454,"stem":"中国古代的地理名著《水经注》的作者是（）","options":["徐霞客","沈括","郦道元","张衡"],"answer":2,"explanation":"《水经注》是古代中国地理名著，共四十卷。作者是北魏晚期的郦道元。"},{"id":1455,"stem":"\"东边日出西边雨，道是无晴却有晴\"出自（）的诗。","options":["苏轼","辛弃疾","刘禹锡","李商隐"],"answer":2,"explanation":"出自中唐诗人刘禹锡的《竹枝词》，原文：“杨柳青青江水平，闻郎江上唱歌声。东边日出西边雨，道是无晴还有晴。” 这是一首描写青年男女爱情的歌。它描写了一个初恋的少女在杨柳青青、江平如镜的清丽的春日里，听到情郎的歌声所产生的内心活 动。"},{"id":1456,"stem":"《阳关三叠》古琴曲是根据下面哪位诗人的作品谱写的？（）","options":["王维","李白","李贺","李商隐"],"answer":0,"explanation":"《阳关三叠》，是一首古琴曲，又名《阳关曲》、《渭城曲》，是根据唐代诗人王维的七言绝句《送元二使安西》谱 写的一首著名的艺术歌曲。 19959276711（vx 同号）"},{"id":1457,"stem":"下列关于黄鹂的诗句和作者，完全准确的一项是（）","options":["\"漠漠水田飞白鹭，阴阴夏木啭黄鹂。\"——王维","\"映阶碧草自春色，隔叶黄鹂空好音。\"——晏殊","\"池上碧苔三四点，也低黄鹂一两声。\"——杜甫","\"池上碧苔三四点，叶底黄鹂一两声。\"——韦应物"],"answer":0,"explanation":"“池上碧苔三四点，叶底黄鹂一两声”作者晏殊。“映阶碧草自春色，隔叶黄鹂空好音”作者杜甫。"},{"id":1458,"stem":"\"竹杖芒鞋轻胜马\"中的\"芒鞋\"是指（）","options":["用谷物做的鞋子","有光芒的鞋子，","用草做的鞋子","用竹子做的鞋子"],"answer":2,"explanation":"出自苏轼的词作《定风波·莫听穿林打叶声》，“芒鞋”是草鞋。"},{"id":1459,"stem":"\"昨夜江边春水生，蒙冲巨舰一毛轻\"，\"蒙冲\"的意思是（）","options":["古代战舰名","猛力冲洗","蒙骗","横冲直撞"],"answer":0,"explanation":"此句出自宋代朱熹的《观书有感·其二》，全诗： 昨夜江边春水生，蒙冲巨舰一毛轻。 向来枉费推移力，此日中流自在行。 蒙冲：古代攻击性很强的战舰名，这里指大船。"},{"id":1460,"stem":"\"遗民泪尽胡尘里，南望（）又一年。\"句中\"（ ）\"应填","options":["中原","故乡","王师","君王"],"answer":2,"explanation":"出自陆游的《秋夜将晓出篱门迎凉有感》： 迢迢天汉西南落，喔喔邻鸡一再鸣。 壮志病来消欲尽，出门搔首怆平生。 三万里河东入海，五千仞岳上摩天。 遗民泪尽胡尘里，南望王师又一年。"},{"id":1461,"stem":"\"遗民泪尽胡尘里，南望王师又一年\"中，\"遗民\"的意思是（）","options":["中原人民","孤儿","灾民","在金占领区生活的汉族人民"],"answer":3,"explanation":"出自陆游的《秋夜将晓出篱门迎凉有感》： 迢迢天汉西南落，喔喔邻鸡一再鸣。 壮志病来消欲尽，出门搔首怆平生。 三万里河东入海，五千仞岳上摩天。 遗民泪尽胡尘里，南望王师又一年。 遗民：指在金占领区生活的汉族人民，却认同南宋王朝统治的人民。"},{"id":1462,"stem":"以下诗句中没有错别字的一句是（ ）","options":["多少长安名利客，机关算尽不如君。","山穷水尽疑无路，柳暗花明又一村。","死去元知万事空，但悲不见九洲同。","王师北定中原日，家祭无忘告乃翁。"],"answer":3,"explanation":"正确诗句应为： A.多少长安名利客，机关用尽不如君。 B.山穷水复疑无路，柳暗花明又一村。 C.死去元知万事空，但悲不见九州同。"},{"id":1463,"stem":"\"多少长安名利客，机关用尽不如君\"中的\"机关\"指的是（）","options":["办理事务的部门","周密而巧妙的计谋","控制机械运行的部分","用机械控制"],"answer":1,"explanation":"此句出自宋代黄庭坚的《牧童诗》，解释：长安城内那些追逐名利的人啊，用尽心机也不如你这样清闲自在。机关： 心机，周密而巧妙的计谋。"},{"id":1464,"stem":"下面哪句话最接近孟子在《生于忧患，死于安乐》中所要表达的观点？（）","options":["以铜为鉴可以正衣冠；以史为鉴可以知兴替。","忧劳可以兴国，逸豫可以亡身。","先天下之忧而忧，后天下之乐而乐。","蓬生麻中不扶自直，白沙在涅与之俱黑。"],"answer":1,"explanation":"《生于忧患，死于安乐》是战国时期思想家孟子所作议论文。这篇文章通过舜、傅说等古代圣贤在困境中振作精神、 奋发努力而终于大有所为的事实，说明一个人想要完成自己的天赋使命，必须经历种种挫折和考验，进而分析一个国家的生死存亡亦 是如此，最后推出论点“生于忧患而死于安乐”。 19959276711（vx 同号） “忧劳可以兴国，逸豫可以亡身，自然之理也。”出自宋代欧阳修的《伶官传序》。意思是：忧虑辛劳会使国家兴盛，安闲享乐会使 自身灭亡，这是自然的道理。"},{"id":1465,"stem":"如果你要在自己的房间里贴一副勉励自己的对联，以下哪一联不太适合呢？（）","options":["发奋识遍天下字，立志读尽人间书。一一苏轼","黑发不知勤学早，白首方悔读书迟。一一颜真卿","少年易老学难成，一寸光阴不可轻。一一朱熹","沉舟侧畔千帆过，病树前头万木春。一一刘禹锡"],"answer":3,"explanation":"出自唐代刘禹锡的《酬乐天扬州初逢席上见赠》，意思是翻覆的船只旁仍有千千万万的帆船经过；枯萎树木的前面也 有万千林木欣欣向荣。"},{"id":1466,"stem":"古人有许多惜时的金句，哪一句意思和其他略有不同？（）","options":["少壮不努力，老大徒伤悲。","明日复明日，明日何其多！我生待明日，万事成蹉跎。","莫等闲、白了少年头，空悲切。","一寸光阴一寸金，寸金难买寸光阴。"],"answer":3,"explanation":"D 是俗语，出自《增广贤文》，意思是一寸光阴和一寸长的黄金一样昂贵，而一寸长的黄金却难以买到一寸光阴。形 容时光宝贵。"},{"id":1467,"stem":"请找出下面哪一句诗让你体会出其中蕴含的爱国情怀？（）","options":["当年万里觅封侯，匹马戍梁州。一一陆游","帘卷西风，人比黄花瘦。一一李清照","衣带渐宽终不悔，为伊消得人憔悴。一一柳永","竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。一一苏轼"],"answer":0,"explanation":"出自宋代陆游的《诉衷情·当年万里觅封侯》。 解释：回想当年为了建功立业封侯加爵，单枪匹马奔赴边境戍守梁州。 词人再现了往日壮志凌云，奔赴抗敌前线的勃勃英姿，体现词人报效祖国的壮志。"},{"id":1468,"stem":"在王冕的诗作中，描写梅花的最多，那么以下哪首王冕的诗作不是关于梅花的呢？（ ）","options":["树景经秋减，湖光入座宽。门前旧矶石，闲却钓鱼竿。","清苦良自持，忘言养高洁。夜静月明多，开门满山雪。","潇洒托身溪谷，清高不染红尘。数点幽花的砾，包藏万斛阳春。","肯同凡卉争妍？自与高人索笑。他年鼎秉调和；不改山林节操。"],"answer":0,"explanation":"A 出自元代王冕的《秋吟其二》，此诗展现了王冕对秋天景色的观察与反思。"},{"id":1469,"stem":"下面几首诗中，哪一首不属于托物言志诗？（ ）","options":["大雪压青松，青松挺且直。要知松高洁，待到雪化时。——《青松》陈毅","我家洗砚池边树，朵朵花开淡墨痕。不要人夸颜色好，只留清气满乾坤。——《墨梅》王冕","咬定青山不放松，立根原在破岩中。千磨万击还坚劲，任尔东西南北风。——《竹石》郑昼","碧玉妆成一树高，万条垂下绿丝绦。不知细叶谁裁出，二月春风似剪刀。——《咏柳》贺知章"],"answer":3,"explanation":"《咏柳》是唐代诗人贺知章写的一首七言绝句，是一首咏物诗。诗中巧妙地运用了拟人的修辞手法，刻画出了春天的 美好和大自然的工巧，表达了诗人对春天的无限热爱。"},{"id":1470,"stem":"\"庭有枇杷树，吾妻死之年所手植也，今已亭亭如盖矣\"是《项脊轩志》中的名句，作者将妻子亲手种下的枇杷树比作\"盖\"，表达了他对妻子的深深思念。小朋友们，你们知道其中的\"盖\"字指的是什么吗？（ ）","options":["瓶盖","盖子","雨伞","遮蔽物"],"answer":2,"explanation":"此句意思是：庭院中有一株枇杷树，是妻子去世那年我亲手种植的，如今已经高高挺立着，枝叶繁茂像伞一样了。\"盖 \"指雨伞。"},{"id":1471,"stem":"以下不是杭州的别名的是（）","options":["钱塘","江宁","武林","江干"],"answer":1,"explanation":"杭州别名有临安，钱塘，武林，杭城，江干。江宁为南京的别称，南京的别名有金陵、建业、扬州、建邺、建康、秦 淮、升州、蒋州、冶城、越城、石头城、袜陵、上元、白下、集庆、应天、江宁、天京等。"},{"id":1472,"stem":"以下不是南京的别名的是（ ）。","options":["金陵","武林","建业","建康 161 19959276711（vx 同号）"],"answer":1,"explanation":"武林是杭州的别名。南京的别名有金陵、建业、扬州、建邺、建康、秦淮、升州、蒋州、冶城、越城、石头城、袜陵、 上元、白下、集庆、应天、江宁、天京等。"},{"id":1473,"stem":"以下并非指称酒的一项是（）。","options":["杜康","金波","钓诗钩","嘉木英"],"answer":3,"explanation":"古代形容酒的别称有.杜康、欢伯、杯中物、壶觞、壶中物、清酌、昔酒、缥酒、青州从事、平原督邮、曲生、曲秀才、 曲道士、曲居士、曲蘖、春、茅柴、忘忧物、扫愁帚、钓诗钩、狂药、酒兵、般若汤、清圣、金波、浊贤。嘉木英指的是茶叶。"},{"id":1474,"stem":"曹操诗句：\"慨当以慷，忧思难忘，何以解忧？惟有杜康。\"其中的\"杜康\"是指（）","options":["人名","美酒","音乐","美女"],"answer":1,"explanation":"出自两汉曹操的《短歌行》。大致意思是：宴会上歌声慷慨激昂，心中的忧愁却难以遗忘。靠什么来排解忧闷？唯有 豪饮美酒。杜康指的是美酒。"},{"id":1475,"stem":"下列不属于词牌名的一项是（）","options":["临江仙","苏幕遮","塞下曲","点绛唇"],"answer":2,"explanation":"常见的词牌名主要有长相思、渔歌子、苏幕遮、永遇乐、虞美人、清平乐、采桑子、雨霖铃、菩萨蛮、醉花阴、浣溪 沙、临江仙、水调歌头、渔家傲、鹊桥仙、点绛唇、相见欢、捣练子、生查子等。塞下曲是古时的一种军歌。《塞下曲》是唐代王昌 龄所作的乐府曲。"},{"id":1476,"stem":"下列不属于词牌名的一项是（）。","options":["江城子","苏幕遮","浣溪沙","塞下曲"],"answer":3,"explanation":"常见的词牌名主要有长相思、渔歌子、苏幕遮、永遇乐、虞美人、清平乐、采桑子、雨霖铃、菩萨蛮、醉花阴、浣溪 沙、临江仙、水调歌头、渔家傲、鹊桥仙、点绛唇、相见欢、捣练子、生查子等。塞下曲是古时的一种军歌。《塞下曲》是唐代王昌 龄所作的乐府曲。"},{"id":1477,"stem":"以下诗句中填入\"三月\"有误的一项是（）。","options":["（三月）残花落更开，小檐日日燕飞来","人间（三月）芳菲尽，山寺桃花始盛开","故人西辞黄鹤楼，烟花（三月）下扬州","洛阳（三月）梨花飞，秦地行人春欲归"],"answer":1,"explanation":"B 句出自《大林寺桃花》，唐朝诗人白居易所写，正确诗句为：人间四月芳菲尽，山寺桃花始盛开。"},{"id":1478,"stem":"\"人间四月芳菲尽，山寺桃花始盛开。\"句中\"寺\"指的是（）","options":["大林寺","遗爱寺","寒山寺","竹林寺"],"answer":0,"explanation":"出自《大林寺桃花》，唐朝诗人白居易所写，“寺”指的是大林寺。"},{"id":1479,"stem":"以下并非出自杜甫《客至》的诗句是（ ）。","options":["花径不曾缘客扫，蓬门今始为君开","盘飧市远无兼味，樽酒家贫只旧酷","岂有文章惊海内？漫劳车马驻江干","舍南舍北皆春水，但见群鸥日日来"],"answer":2,"explanation":"《客至》唐杜甫 舍南舍北皆春水，但见群鸥日日来。 花径不曾缘客扫，蓬门今始为君开。 盘飧市远无兼味，樽酒家贫只旧醅。 肯与邻翁相对饮，隔篱呼取尽馀杯。"},{"id":1480,"stem":"今天的广东肇庆以出产文房用品（）而著称。","options":["歙砚","澄泥砚","洮河砚","端砚"],"answer":3,"explanation":"中国有四大名砚，洮砚、端砚、盒砚、澄泥砚，端砚诞生在唐代初期广东肇庆，款现产于安徽歙县，洮河砚产于甘肃 西南洮砚乡的洮河水底。"},{"id":1481,"stem":"原比喻兄弟之间应该互相爱护、互相帮助的成语是（ ）。","options":["李代桃僵","投桃报李","鸠占鹊巢","松柏后凋"],"answer":0,"explanation":"\"李代桃僵\"这句成语，出自一首乐府诗。原比喻兄弟互相爱护、互相帮助，后转用来比喻互相顶替或代人受过。投桃报 李比喻友好往来或互相赠送东西。鸠占鹊巢比喻强占别人的住屋。松柏后凋比喻有志之士在艰险的环境中奋斗到最后。 19959276711（vx 同号）"},{"id":1482,"stem":"苏轼《西江月》中\"中秋谁与共孤光\"的下一句应是（ ）。","options":["人生几度新凉","看取眉头鬓上","月明多被云妨","把盏凄然北望"],"answer":3,"explanation":"西江月·世事一场大梦苏轼（宋代） 世事一场大梦，人生几度新凉？夜来风叶已鸣廊。看取眉头鬓上。 酒贱常愁客少，月明多被云妨。中秋谁与共孤光。把盏凄然北望。"},{"id":1483,"stem":"下列诗人属于同一朝代的一项是（ ）","options":["王安石、孟郊、杜审言","陈子昂、李商隐、寇准","范成大、柳宗元、苏轼","李白、杜牧、王昌龄"],"answer":3,"explanation":"A 中王安石属于宋代，B 中寇准属于宋代，C 中范成大和苏轼属于宋代。"},{"id":1484,"stem":"在我国古代的诗文中，银河有不少富于诗意的别称。以下不属于银河别称的是（）。","options":["明河","广寒","天河","星汉"],"answer":1,"explanation":"古诗文中银河的别称有：天河，天汉，星河，星汉，明河，银湾，银浦，云汉，长河，绛河。古诗文中月亮的别称有： 嫦娥，素娥，婵娟，玉兔，玉盘，团扇，金波，冰轮，广寒、圆盘，蟾蜍，望舒、蟾宫等。"},{"id":1485,"stem":"下列中可以指代月亮的是（）。","options":["羲和","白驹","东君","望舒"],"answer":3,"explanation":"古诗文中月亮的别称有：嫦娥，素娥，婵娟，玉兔，玉盘，团扇，金波，冰轮，广寒，圆盘，蟾蜍，望舒，蟾宫等。"},{"id":1486,"stem":"下列不是月亮代称的是（ ）","options":["蝉娟","玉盘","金乌","蟾宫"],"answer":2,"explanation":"金乌指的是太阳。古诗文中月亮的别称有：嫦娥，素娥，婵娟，玉兔，玉盘，团扇，金波，冰轮，广寒，圆盘，蟾蜍， 望舒，蟾宫等。"},{"id":1487,"stem":"以下说法不正确的是（ ）","options":["在古代，年老而没有妻子的男人叫\"鳏\"","年老而没有丈夫的女人叫\"寡\"","幼年死去母亲的叫\"孤\"","年老而没有子女的叫\"独\""],"answer":2,"explanation":"年老的男人没有妻子的叫\"鳏\"（鳏夫，读 guān），年老的女人没有丈夫的叫\"寡\"（寡妇），年老而没有子女的叫\"独\"， 幼年死去父亲的叫\"孤\"（孤儿孤女）。幼年死去母亲故古文一般写作\"幼年丧母\"或\"襁褓时丧母\"。"},{"id":1488,"stem":"以下诗句中哪一句能让人感受到\"一方有难，八方支援，团结一心，共克时艰\"的力量（ ）","options":["水流天地内，如身有血脉。","相知无远近，万里尚为邻。","此地一为别，孤蓬万里征。","会当凌绝顶，一览众山小。"],"answer":1,"explanation":"A 出自《自蜀江至洞庭湖口有感而作》，作者是唐朝白居易，这首诗分为三个部分。第一部分写浩瀚的长江的气势及 大禹治水的功绩。第二部由写长江转到写洞庭、青草二湖湖水侵蚀农田，造成不好的情况。第三部分写作者希望大禹\"复生\"，通过兴修 水利，实现\"水府生禾麦\"的愿望。这句的意思是水流在天地中间，就象人身的血管。B 出自唐朝诗人张九龄《送韦城李少府》，意思是 只要彼此相互了解，即使相隔万里也可以成为邻居。C 出自唐朝李白的《送友人》意思是我们将在这里离别，你就要像飞蓬一样踏上 万里征程。D 出自杜甫的名篇《望岳》，通过描绘泰山雄伟磅礴的气象，热情赞美了泰山高大巍峨的气势和神奇秀丽的景色，流露出 了对祖国山河的热爱之情。"},{"id":1489,"stem":"以下诗句中并非描绘江南春景的是（ ）","options":["一年好景君须记，最是橙黄橘绿时","日出江花红胜火，春来江水绿如蓝","小楼一夜听春雨，深巷明朝卖杏花","千里莺啼绿映红，水村山郭酒旗风"],"answer":0,"explanation":"A 出自苏轼的《赠刘景文》，这句的意思是：以为一年的好景将尽，你要记住，最美的景是在橙子金黄、橘子青绿的 秋末冬初的时节啊。B 出自白居易的《忆江南》，这句的意思是春天到来时，太阳从江面升起，把江边的鲜花照得比火红，碧绿的江 水绿得胜过蓝草。C 出自陆游的《临安春雨初霁》，意思是，我一个人独自住在这座小楼，听了一夜的春雨，清朝起来的时候，总是 能够多到那巷子深处，卖杏花的声音。D 出自杜牧的《江南春》，这句诗给我们描绘了江南春天里花红柳绿的景色。辽阔的千里江南， 黄莺在欢乐地歌唱，从丛绿树映着簇簇红花；傍水的村庄、依山的城郭、迎风招展的酒旗。"},{"id":1490,"stem":"以下诗句与作者对应错误的一项是（ ）","options":["苟利国家生死以，岂因祸福避趋之。——林则徐","独怜幽草润边生，上有黄鹂深树鸣。——韦应物","风萧萧兮易水寒，壮士一去兮不复还！——陈子昂 163 19959276711（vx 同号）","落红不是无情物，化作春泥更护花。——龚自珍"],"answer":2,"explanation":"B 出自唐朝韦应物的《滁州西涧》，一首写景的诗，描写春游滁州西涧赏景和晚潮带雨的野渡所见，这二句诗意.最是 喜爱涧边生长的幽幽野草，还有那树丛深处婉转啼唱的黄鹂。通过写爱幽草而轻黄鹂，以喻乐守节，而嫉高媚。 A 出自林则徐的《赴成登程口占示家人二首》，这首诗是林则徐写给妻子的家书，这句话的意思是：为了国家利益，我们可以奉献生 死，同时，我们不能有福就做这件事情，对自己有害的事情就不做。 C 出自秦佚名《荆轲歌》，意思是风声萧萧地吹，易水寒气袭人，壮士在此远去，不完成任务誓不回还！陈子昂是唐代诗人，代表《登 幽州台歌》，诗句：前不见古人，后不见来者。念天地之悠悠，独怆然而涕下！这是一首怀古咏史诗，诗人登上幽州台，想到古代燕 昭王为招纳天下贤士而建黄金台的事，忍不住想到自己的才能得不到赏识，于是悲从中来，抒发了怀才不遇、生不逢时的哀叹和感慨。 D 出自龚自珍的《己亥杂诗》，意思是从枝头上掉下来的落花不是无情之物，即使化作春泥，也甘愿培育美丽的春花成长。"},{"id":1491,"stem":"以下关于\"山水田园诗\"的介绍不正确的是（）。","options":["是古代诗歌创作中的一种常见的重要题材","源于南北朝的谢灵运和晋代陶渊明","唐代以王维、孟浩然为代表","以描写农村及边塞风光以及隐居生活见长"],"answer":3,"explanation":"山水田园诗，古代汉族诗歌之一。源于南北朝的谢灵运和晋代陶渊明，以唐代王维、孟浩然、宋代杨万里、范成大为 代表。这类诗以描写自然风光、农村景物以及安逸恬淡的隐居生活见长。诗境隽永优美，风格恬静淡雅，语言清丽洗练，多用白描手 法。"},{"id":1492,"stem":"以下对年龄的称谓，不正确的是（ ）","options":["三十岁一一而立之年","四十岁一一不惑之年","五十岁一一耄耋之年","六十岁一一耳顺之年"],"answer":2,"explanation":"年龄的称谓如下：不满周岁-襁褓，23 岁-孩提，女孩 7 岁-年，男孩 8 岁-韶年，幼年总称尝总角，10 岁以下一黄口。 13-15 岁叫舞勺之年，15-20 岁叫舞像之年，12 岁（女）叫金钗之年，13 岁（女）叫豆蔻年华，15 岁（女）叫及笄之年，16 岁（女） 叫碧玉年华，20 岁（女）叫桃李年华，24 岁（女）叫花信年华，30 岁（女）叫老徐娘。20 岁（男）叫弱冠，30 岁（男）叫而立之年， 40 岁（男）叫不惑之年。50 岁叫年逾半百、知命之年、艾服之年、大衍之年；60 岁叫花甲、耳顺之年、杖乡之年；70 岁叫古稀、杖 国之年、致事之年、致政之年；80 岁叫杖朝之年；90 岁鲐背之年；100 岁叫期颐。"},{"id":1493,"stem":"以下对《题临安邸》描述不正确的是（）","options":["讽喻诗","墙头诗","政治诗","写景诗"],"answer":3,"explanation":"《题临安邸》是一首政治讽刺诗，是宋代诗人林升题于临安一家旅店墙壁上的诗。公元 1126 年，金人攻陷北宋首都汴 梁，俘虏了徽宗、钦宗两个皇帝，中原国土全被金人侵占，至此北宋灭亡，南宋偏安于江南，政治上腐败无能。在这样的背景下作者 写下此诗，借以讽刺当时的南宋统治阶级纸醉金迷，军政废弛，苟且偷安的行为。"},{"id":1494,"stem":"以下不属于皇帝自称的是（）。","options":["朕","寡人","陛下","孤"],"answer":2,"explanation":"正常情况下，皇帝一般自称为\"朕\"、\"孤\"、\"雾人\"。殿下是中国古代对皇帝、皇后、皇太子、诸王的敬称。"},{"id":1495,"stem":"以下不属于\"楷书四大家\"的是（）。","options":["柳公权","欧阳询","颜真卿","褚遂良"],"answer":3,"explanation":"楷书四大家\"是欧阳询、颜真卿、柳公权、赵孟頫。"},{"id":1496,"stem":"以下并非送别诗的是（ ）","options":["王昌龄《芙蓉楼送辛渐》","高适《别董大》","刘长卿《送灵澈上人》","王维《九月九日忆山东兄弟》"],"answer":3,"explanation":"《九月九日忆山东兄弟》是唐代诗人王维创作的诗歌。此诗写出了游子的思乡怀亲之情。"},{"id":1497,"stem":"以下被称为\"苦吟诗人\"的是（）","options":["李白","王维","孟浩然","孟郊"],"answer":3,"explanation":"原指中唐和晚唐诗坛中以徘徊吟哦的心境和殚精竭虑的态度进行创作，对每个字词进行仔细推敲锤炼的诗人。现在， 人们也经常把勤于创作潜心创作的诗人称为苦吟诗人。代表人物有贾岛、姚合、孟郊、周贺等诗人。"},{"id":1498,"stem":"辛弃疾的《清平乐·村居》中，主人公家中一共有（）个孩子。","options":["1","2","3","4"],"answer":2,"explanation":"《清平乐·村居》全诗： 茅檐低小，溪上青青草。醉里吴音相媚好，白发谁家翁媪？ 19959276711（vx 同号） 大儿锄豆溪东，中儿正织鸡笼。最喜小儿亡赖，溪头卧剥莲蓬。"},{"id":1499,"stem":"下面与诗题《古朗月行》中\"行\"的意思不同的是（ ）","options":["《从军行》","《山行》","《长歌行》","《琵琶行》"],"answer":1,"explanation":"《古朗月行》中\"行\"是指乐府诗歌体裁。《山行》的“行”是指行走。"},{"id":1500,"stem":"下列与曹植无关的一项是（ ）","options":["陈思王","才高八斗","视死如归","《典论·论文》"],"answer":3,"explanation":"《典论》是曹丕为魏太子时精心结撰的一部论著。"},{"id":1501,"stem":"下列写景诗句，描写春季的一项是（）。","options":["黄梅时节家家雨，青草池塘处处蛙。","西塞山前白鹭飞，桃花流水鳜鱼肥。","忽如一夜春风来，千树万树梨花开。","一道残阳铺水中，半江瑟瑟半江红。"],"answer":1,"explanation":"出自唐代张志和的《渔歌子·西塞山前白鹭飞》 解释：西塞山前白鹭在自由地翱翔，江岸桃花盛开，江水中肥美的鳜鱼欢快地游来游去。 “桃花流水鳜鱼肥”点出江南水乡最美好的季节——正是桃花盛开，江水猛涨，鳜鱼正肥时。"},{"id":1502,"stem":"下列诗句中，与“萎蒿满地芦芽短，正是河豚欲上时”季节相同的是（ ）","options":["接天莲叶无穷碧，映日荷花别样红。","碧玉妆成一树高，万条垂下绿丝绦。","小荷才露尖尖角，早有蜻蜓立上头。","遥知兄弟登高处，遍插茱萸少一人。"],"answer":1,"explanation":"“萎蒿满地芦芽短，正是河豚欲上时”“天街小雨润如酥，草色遥看近却无”描述的都是春天的景象。"},{"id":1503,"stem":"下列诗句中，用字完全正确的是（）","options":["春朝带雨晚来急，野度无人舟自横。","春潮带雨晚来急，野度无人舟自横。","春朝带雨晚来急，野渡无人舟自横。","春潮带雨晚来急，野渡无人舟自横。"],"answer":3,"explanation":"出自唐代韦应物的《滁州西涧》独怜幽草涧边生，上有黄鹂深树鸣。春潮带雨晚来急，野渡无人舟自横。"},{"id":1504,"stem":"下列哪首诗与\"雪\"无关？（ ）","options":["长安有贫者，为瑞不宜多。","日暮苍山远，天寒白屋贫。","千山鸟飞绝，万径人踪灭。","寒日生戈剑，阴云摇旆旌。"],"answer":3,"explanation":"D 出自唐代沈佺期的《横吹曲辞·出塞》： 十年通大漠，万里出长平。 寒日生戈剑，阴云摇旆旌。 饥乌啼旧垒，疲马恋空城。 辛苦皋兰北，胡霜损汉兵。 意思是：十年穿越大漠，万里穿越长平。寒日照亮战剑，阴云中飘荡旌旗。饥饿的乌鸦啼叫在古老的城垒上，疲惫的马匹渴望归队的 空城。辛苦地北上到皋兰，胡人的寒霜削弱了汉族的战士。"},{"id":1505,"stem":"下列关于李清照的说法，正确的一项是（ ）","options":["李清照号义安居士，宋代女词人。","李清照是婉约词派代表人物，但其作品并不都是内敛含蓄的。","李清照的创作风格被称为稼轩体。","李清照与陆游、苏轼、辛弃疾并称为\"宋词四大家\""],"answer":1,"explanation":"李清照号易安居士，宋代婉约派代表词人，有“千古第一才女”之称。李清照词，人称“易安词”、“漱玉词”，以 其号与集而得名。李清照与辛弃疾、苏轼、柳永并称为\"宋词四大家\"。 宋词四大家"},{"id":1506,"stem":"下列关于《逢入京使》的诗句，没有错误的一句是（ ）","options":["故园东望路漫漫","双袖龙钟泪始干","马上相逢无笔纸","凭君转语报平安"],"answer":0,"explanation":"《逢入京使》唐代：岑参 故园东望路漫漫，双袖龙钟泪不干。 马上相逢无纸笔，凭君传语报平安。"},{"id":1507,"stem":"下列称谓与\"陶靖节\"同类的一项是（ ）","options":["陆放翁","柳河东","范文正","杜少陵 165 19959276711（vx 同号）"],"answer":2,"explanation":"陶渊明私谥靖节，世称靖节先生。范仲淹谥号“文正”，世称“范文正公”。"},{"id":1508,"stem":"下列不是儒家代表人物的是（）","options":["孟子","列子","荀子","曾子"],"answer":1,"explanation":"列子名御寇，亦作圄寇，又名寇，字云。战国前期道家代表人物。"},{"id":1509,"stem":"王昌龄《巴陵送李十二》中的“李十二”是（ ）","options":["李绅","李峤","李白","李贺"],"answer":2,"explanation":"唐代王昌龄的《巴陵送李十二》：“摇曳巴陵洲渚分，清江传语便风闻。山长不见秋城色，日暮蒹葭空水云。”李白 排行十二是因为在同辈中排行第十二，所以称为李十二。"},{"id":1510,"stem":"王安石的《梅花》是一首（ ）","options":["哲理诗","送别诗","咏物诗","抒情诗"],"answer":2,"explanation":"宋代王安石的《梅花》，是一首咏物诗。全诗以梅花的坚强和高洁品格喻示那些像诗人一样，处于艰难、恶劣的环境 中依然能坚持操守、主张正义，为国家强盛而不畏排挤和打击的人。"},{"id":1511,"stem":"唐代王勃的《滕王阁序》中的\"落霞与孤鹜齐飞，秋水共长天一色\"中的\"鹜\"是指（）","options":["野鸭","大雁","飞鸟","麻雀"],"answer":0,"explanation":"出自唐代王勃的《滕王阁序》 解释：落日映射下的彩霞与孤独的野鸭一齐飞翔，秋天的江水和辽阔的天空连成一片，浑然一色。 鹜：野鸭。"},{"id":1512,"stem":"唐代大诗人杜甫写有《咏怀古迹五首·其三》一诗。\"明妃\"指的是（ ）","options":["貂蝉","西施。","王昭君","杨玉环"],"answer":2,"explanation":"《咏怀古迹五首·其三》： 群山万壑赴荆门，生长明妃尚有村。 一去紫台连朔漠，独留青冢向黄昏。 画图省识春风面，环珮空归夜月魂。 千载琵琶作胡语，分明怨恨曲中论。 明妃：指王昭君。"},{"id":1513,"stem":"唐代并称\"三李\"的诗人不包括（）","options":["李白","李贺","李商隐","李绅"],"answer":3,"explanation":"李白、李商隐和李贺合称为唐代三李。"},{"id":1514,"stem":"苏轼自号\"东坡居士\"，是因为他仰慕哪一位前人？（）","options":["李白","杜甫","李商隐","白居易"],"answer":3,"explanation":"白居易于忠州刺史任上，曾在州治东门外山坡上辟园“东坡”，并有《步东坡》《东坡种花二首》等诗篇传世，苏轼 通过取号“东坡”、化用“闲人”语典等方式，对其仰慕的唐代大诗人白居易，加以敬奉、效法，"},{"id":1515,"stem":"诗句\"远芳侵古道，晴翠接荒城。\"出自（）的诗。","options":["王之涣","王勃","贺知章","白居易"],"answer":3,"explanation":"出自唐代白居易的《赋得古原草送别》 解释：远处芬芳的野草遮没了古道，阳光照耀下碧绿连荒城。"},{"id":1516,"stem":"诗句\"铜雀春深锁二乔\"中，\"铜雀\"是（）","options":["一种比喻","一种建筑","一种装饰","—种鸟类"],"answer":1,"explanation":"《赤壁》是唐代诗人杜牧创作的一首七言绝句： 折戟沉沙铁未销，自将磨洗认前朝。 东风不与周郎便，铜雀春深锁二乔。 铜雀：即铜雀台，曹操在今河北省临漳县建造的一座楼台，楼顶里有大铜雀，台上住姬妾歌妓，是曹操暮年行乐处。 19959276711（vx 同号）"},{"id":1517,"stem":"干古名句\"海上生明月，天涯共此时\"的作者不可能看到过以下哪本著作（）","options":["《史记》","《大唐西域记》","《资治通鉴》","《昭明文选》"],"answer":2,"explanation":"诗句出自唐代张九龄的《望月怀远》，《资治通鉴》是司马光则是奉宋英宗和宋神宗之命编撰的一部编年体通史。"},{"id":1518,"stem":"宫女如花满春殿，只今惟有（）飞。","options":["鹧鸪","黄莺","子规","白鹭"],"answer":0,"explanation":"《越中览古》是唐代伟大诗人李白的怀古之作。全诗： 越王勾践破吴归，义士还乡尽锦衣。 宫女如花满春殿，只今惟有鹧鸪飞。"},{"id":1519,"stem":"格律诗中被称为\"颈联\"的是（）。","options":["第一联","第二联","第三联","第四联"],"answer":2,"explanation":"首联，是律诗中的第一联，诗的前两句就是首联；颔联，第三，四句就是颔联；颈联，第五，六句就是颈联；尾联， 最后两句就是尾联。\"首联、颔联、颈联、尾联\"通常是出现在七言或者五言律诗当中。"},{"id":1520,"stem":"杜甫诗句\"出师未捷身先死，长使英雄泪满襟\"歌颂的是（）。","options":["刘备","诸葛亮","蒋琬","费祎"],"answer":1,"explanation":"出自唐代杜甫的《蜀相》：“丞相祠堂何处寻？锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音。三顾频烦天下 计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。”这首七律《蜀相》，抒发了诗人对诸葛亮才智品德的崇敬和功业未遂的 感慨。全诗熔情、景、议于一炉，既有对历史的评说，又有现实的寓托，在历代咏赞诸葛亮的诗篇中，堪称绝唱。"},{"id":1521,"stem":"成语\"一衣带水\"中的\"水\"指的是（）","options":["黄河","淮河","长江","珠江"],"answer":2,"explanation":"这个“水”是指长江。原意是指一水之隔，水面狭窄，很容易渡过。后来也常指江河湖海等水域不足以限制人们的交 往。现多用来比喻两国交往，双方虽有河海之隔，但不足以成为交往的障碍。"},{"id":1522,"stem":"成语\"守望相助\"出自（）","options":["《中庸》","《论语》","《大学》","《孟子》"],"answer":3,"explanation":"出自《孟子·滕文公上》。它的意思是，协同看守瞭望，彼此提供帮助，指人与人之间要互帮互助、和睦共处。"},{"id":1523,"stem":"成语\"三山五岳\"中的\"五岳\"指五座山，其中南岳是（）","options":["泰山","恒山","华山","衡山"],"answer":3,"explanation":"五岳指泰山、华山、衡山、恒山、嵩山，对应东岳、西岳、南岳、北岳、中岳，三山五岳在中国虽不是最高的山，但 都高耸于平原或盆地之上，这样也就显得格外险峻。"},{"id":1524,"stem":"\"五岳\"是中国五大名山的合称，其中\"中岳\"是（）","options":["泰山","嵩山","华山","黄山"],"answer":1,"explanation":"五岳指泰山、华山、衡山、恒山、嵩山，对应东岳、西岳、南岳、北岳、中岳，三山五岳在中国虽不是最高的山，但 都高耸于平原或盆地之上，这样也就显得格外险峻。"},{"id":1525,"stem":"成语（）与《夏日绝句》中所提及的历史人物无关（ ）","options":["四面楚歌","破釜沉舟","霸王别姬","卧薪尝胆"],"answer":3,"explanation":"卧薪尝胆的主要人物是勾践。"},{"id":1526,"stem":"曾说出\"功名只应马上取，真正英雄一丈夫\"的是（）","options":["李清照","辛弃疾","李白","岑参"],"answer":3,"explanation":"出自唐代岑参的《送李副使赴碛西官军》 解释：功名富贵只向马上求取，您不愧是一位英雄大丈夫。 19959276711（vx 同号）"},{"id":1527,"stem":"曹操（）一诗中的\"山不厌高，海不厌深\"被刘禹锡在《陋室铭》中化用为\"山不在高，有仙则名；水不在深，有龙则灵\"这一千古名句。（ ）","options":["《短歌行》","《龟虽寿》","《观沧海》","《蒿里行》"],"answer":0,"explanation":"曹操《短歌行》。 对酒当歌，人生几何！ 譬如朝露，去日苦多。 慨当以慷，忧思难忘。 何以解忧？唯有杜康。 青青子衿，悠悠我心。 但为君故，沉吟至今。 呦呦鹿鸣，食野之苹。 我有嘉宾，鼓瑟吹笙。 明明如月，何时可掇？ 忧从中来，不可断绝。 越陌度阡，枉用相存。 契阔谈讌，心念旧恩。 月明星稀，乌鹊南飞。 绕树三匝，何枝可依？ 山不厌高，海不厌深。 周公吐哺，天下归心。"},{"id":1528,"stem":"别号指中国古代人在名字之外的自称，简称号。以下别号不正确的是（ ）。","options":["李白号\"青莲居士\"","白居易号\"香山居士\"","苏轼号\"东坡居士\"","杜甫号\"少陵居士\""],"answer":3,"explanation":"杜甫字子美，自号少陵野老，唐代伟大的现实主义诗人，后世称其杜拾遗、杜工部，也称他杜少陵、杜草堂。"},{"id":1529,"stem":"被誉为\"天下第一行书\"的是（）","options":["《寒食帖》","《兰亭序》","《祭侄文稿》","《伯远帖》"],"answer":1,"explanation":"兰亭集序是中国晋代书圣王羲之在浙江绍兴兰渚山下以文会友，写出的“天下第一行书”，也称《兰亭序》、《临河 序》、《禊帖》、《三月三日兰亭诗序》等。"},{"id":1530,"stem":"被誉为\"天下第二行书\"的是（）","options":["《寒食帖》","《兰亭序》","《祭侄文稿》","《伯远帖》"],"answer":2,"explanation":"《祭侄文稿》（全称为《祭侄赠赞善大夫季明文》）是唐代书法家颜真卿于唐乾元元年（758 年）创作的行书纸本书法 作品。《祭侄文稿》与东晋王羲之的《兰亭序》、北宋苏轼的行书《黄州寒食帖》并称为“天下三大行书”，亦被誉为“天下行书第 二”。"},{"id":1531,"stem":"被誉为\"岭南第一人\"，曾官居宰相的诗人是（）","options":["韩愈","李绅","范仲淹","张九龄"],"answer":3,"explanation":"张九龄，又名博物，字子寿，，是有史以来从岭南走出的第一位宰相，被誉为“岭南第一人”。"},{"id":1532,"stem":"被后人誉为“孤篇压全唐”的作品是（）","options":["白居易《长恨歌》","李白《将进酒》","张若虚《春江花月夜》","白居易《琵琶行》"],"answer":2,"explanation":"《春江花月夜》是唐代诗人张若虚的诗作。此诗沿用陈隋乐府旧题，运用富有生活气息的清丽之笔，以月为主体，以 江为场景，描绘了一幅幽美邈远、惝恍迷离的春江月夜图，抒写了游子思妇真挚动人的离情别绪以及富有哲理意味的人生感慨，表现 了一种迥绝的宇宙意识，创造了一个深沉、寥廓、宁静的境界。《春江花月夜》是唐代张若虚的孤篇压倒全唐的诗。"},{"id":1533,"stem":"《小石潭记》的作者是（ ）","options":["昌黎先生","柳永州","刘河东","柳柳州"],"answer":3,"explanation":"《小石潭记》作者是唐朝诗人柳宗元。柳宗元字子厚，唐代杰出诗人、哲学家、儒学家乃至成就卓著的政治家，唐宋 八大家之一。因为他是河东人，人称柳河东，又因终于柳州刺史任上，又称柳柳州。柳宗元出身河东柳氏，与刘禹锡并称“刘柳”， 与韩愈并称为“韩柳”，与王维、孟浩然、韦应物并称“王孟韦柳”。 19959276711（vx 同号）"},{"id":1534,"stem":"《闻官军收河南河北》表达了诗人（ ）的心情。","options":["愤恨","遗憾","喜悦","怀念"],"answer":2,"explanation":"763 年，这一年出现了一件大好事，即长达八年之久的安史之乱进入尾声，官军向安禄山的老窝河北范阳一带进发，叛 军史朝义兵败自杀，其他叛军将领也多投降，唐朝官兵全部平息了这场祸乱。这时期的杜甫流离辗转在四川成都一带，官军大捷的消 息传到成都，杜甫听到后无比兴奋激动，随即写下了被称为“生平第一快诗”的《闻官军收河南河北》：“剑外忽传收蓟北，初闻涕 泪满衣裳。却看妻子愁何在，漫卷诗书喜欲狂。白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。”"},{"id":1535,"stem":"《台城》的作者韦庄是什么时代的诗人？（）","options":["初唐","盛唐","中唐","晚唐"],"answer":3,"explanation":"韦庄，字端己，晚唐诗人、词人，五代时前蜀宰相。韦庄工诗，与温庭筠同为“花间派”代表作家，并称“温韦”。 所著长诗《秦妇吟》反映战乱中妇女的不幸遭遇，在当时颇负盛名，与《孔雀东南飞》《木兰诗》并称“乐府三绝”。"},{"id":1536,"stem":"《鹿鸣》中，\"我有嘉宾，德音孔昭。\"其中\"孔昭\"的意思是（）","options":["人名","非常耀眼","姓氏","有些闪亮"],"answer":1,"explanation":"出自先秦诗经·小雅·鹿鸣之什的《鹿鸣》。该句意思是“我有一批好宾客，品德高尚又显耀。”\"孔昭\"的意思是非常 耀眼。"},{"id":1537,"stem":"“仲秋”是指几月？（）","options":["六月","七月","八月","九月"],"answer":2,"explanation":"八月在古代被称为桂月、壮月、仲秋、中秋、仲商、桂秋、正秋、商吕、竹春等。其中，桂月是因为农历八月桂花飘 香，故名桂月；壮月是因为八月正当秋季之中，所以又称“仲秋”。"},{"id":1538,"stem":"\"造化钟神秀，阴阳割昏晓\"中\"造化\"指的是（）","options":["缘分","运气","制造","大自然"],"answer":3,"explanation":"\"造化钟神秀，阴阳割昏晓\"本句出自唐代诗人杜甫作品《望岳》。 望岳杜甫（唐代） 岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。 荡胸生层云，决眦入归鸟。会当凌绝顶，一览众山小。 造化：大自然。"},{"id":1539,"stem":"\"月黑见渔灯，孤光一点萤\"出自（）","options":["夜书所见","宿建德江","舟夜书所见","枫桥夜泊"],"answer":2,"explanation":"出自清代查慎行的《舟夜书所见》 解释：漆黑无月的夜里，河面上飘着一艘渔船，孤独的灯光像是一点萤火。"},{"id":1540,"stem":"\"我报路长嗟日暮，学诗谩有惊人句\"这句词中，释义正确的是（）","options":["报：报答","嗟：慨叹","谩：怠慢","惊人：惊吓"],"answer":1,"explanation":"出自《渔家傲·天接云涛连晓雾》，作者是宋代词人李清照。此句意思是：我回报天帝路途还很漫长，现在已是黄昏 却还未到达。即使我学诗能写出惊人的句子，又有什么用呢？嗟：慨叹。报：回答。谩：徒，空。惊人句，化用《江上值水如海上势 聊短述》有“语不惊人死不休”诗句。"},{"id":1541,"stem":"\"问渠那得清如许，为有源头活水来\"的含义是（）","options":["事物有一定的归宿","饮水思源，不能忘本","要不断接受新事物，才能保持思想的活跃与进步","事情已成定局，难以挽回"],"answer":2,"explanation":"出自宋代朱熹的《观书有感二首·其一》，意思是要问池塘里的水为何这样清澈呢？是因为有永不枯竭的源头源源不 断地为它输送活水。\"问渠那得清如许，为有源头活水来\"借水之清澈，是因为有源头活水不断注入，暗喻人要心灵澄明，就得认真读书， 时时补充新知识。因此人们常常用来比喻不断学习新知识，才能达到新境界。"},{"id":1542,"stem":"\"问君何能尔\"的前一句是（）","options":["心远地自偏","而无车马喧？","此中有真意","悠然见南山"],"answer":1,"explanation":"《饮酒（其五）》晋陶渊明 19959276711（vx 同号） 结庐在人境，而无车马喧。 问君何能尔？心远地自偏。 采菊东篱下，悠然见南山。 山气日夕佳，飞鸟相与还。 此中有真意，欲辨已忘言。"},{"id":1543,"stem":"\"位卑未敢忘忧国，事定犹须待阖棺\"的作者是（）","options":["陆游","辛弃疾","文天祥","于谦"],"answer":0,"explanation":"出自宋代陆游的《病起书怀》，意思是虽然职位低微却从未敢忘记忧虑国事，但若想实现统一理想，只有死后才能盖 棺定论。"},{"id":1544,"stem":"\"停车坐爱枫林晚，霜叶红于二月花\"中，\"坐\"的意思是（）","options":["坐下","座位","因为","所以"],"answer":2,"explanation":"出自唐代杜牧的《山行》，意思是只因爱那枫林晚景我把马车停下，霜染的枫叶胜过鲜艳二月的花。坐：因为。"},{"id":1545,"stem":"\"潭中鱼可百许头\"句中\"可\"的意思是（）","options":["大约","可以","可能","正好"],"answer":0,"explanation":"出自唐代柳宗元的《小石潭记》，意思是潭中的鱼大约有一百来条。可：大约。表示估计数目。"},{"id":1546,"stem":"\"诗鬼\"指的是诗人（）","options":["孟郊","贾岛","李商隐","李贺"],"answer":3,"explanation":"李贺——诗鬼 孟郊——诗囚 贾岛——诗奴"},{"id":1547,"stem":"\"千里黄云白日曛，北风吹雁雪纷纷\"中\"曛\"的意思是（）","options":["穿透","昏暗","包围","照射"],"answer":1,"explanation":"出自唐代高适的《别董大二首》，意思是：千里黄云蔽天日色暗昏昏，北风吹着归雁大雪纷纷。曛：昏暗。"},{"id":1548,"stem":"\"此中有真意，欲辨已忘言\"出自（ ）","options":["《论语》","《冬夜读书示子聿》","《饮酒》（其五）","《观书有感》"],"answer":2,"explanation":"《饮酒（其五）》晋陶渊明 结庐在人境，而无车马喧。 问君何能尔？心远地自偏。 采菊东篱下，悠然见南山。 山气日夕佳，飞鸟相与还。 此中有真意，欲辨已忘言。"},{"id":1549,"stem":"\"春归何处？寂寞无行路。若有人知春去处。唤取归来同住。\"运用了什么修辞手法？（）","options":["比喻","拟人","排比","夸张"],"answer":1,"explanation":"黄庭坚的《清平乐·春归何处》，全诗： 春归何处？寂寞无行路。若有人知春去处，唤取归来同住。 春无踪迹谁知？除非问取黄鹂。百啭无人能解，因风飞过蔷薇。 此句意思是：春天将归向何处？现在的我却找不到春的踪迹。如果有人知道春天的去处，请叫它仍旧回来和我同住。"},{"id":1550,"stem":"\"臣心一片磁针石，不指南方不肯休\"出自（）","options":["岳飞《满江红》","辛弃疾《正气歌》","文天祥《过零丁洋》","文天祥《扬子江》"],"answer":3,"explanation":"出自宋代文天祥的《扬子江》 解释：我的心就像那一根磁针，不永远指向南方誓不罢休。"},{"id":1551,"stem":"\"人之好我，示我周行。\"\"周行\"指的是（）","options":["一个地方","大道理","信物","官名"],"answer":1,"explanation":"出自《诗经·小雅·鹿鸣》，意思是那人关心我，给我指示了正确的道路。周行（háng）：大道。比喻道理、正理。 19959276711（vx 同号）"},{"id":1552,"stem":"\"林表明霁色，城中增暮寒。\"这句诗出自（）","options":["《夜雪》","《江雪》","《终南望馀雪》","《村雪夜坐》"],"answer":2,"explanation":"出自唐代诗人祖咏创作的一首五言绝句《终南望馀雪》。全诗： 终南阴岭秀，积雪浮云端。 林表明霁色，城中增暮寒。"},{"id":1553,"stem":"\"无情最是台城（），依旧烟笼（ ）。\"括号里应填（ ）","options":["雪；百丈冰","水；泊岸舟","柳；十里堤","景；照关西"],"answer":2,"explanation":"《台城》（江雨霏霏江草齐）全诗： 江雨霏霏江草齐，六朝如梦鸟空啼。 无情最是台城柳，依旧烟笼十里堤。"},{"id":1554,"stem":"\"坐添百万户，书我司徒籍\"中的\"司徒籍\"指的是（）","options":["一个叫司徒籍的人","政府统计的表册","司徒家族的书籍","作者本人"],"answer":1,"explanation":"出自唐白居易的《自蜀江至洞庭湖口有感而作》，\"司徒籍\"指的是政府统计的表册。"},{"id":1555,"stem":"郑燮作为\"扬州八怪\"之一，他的作品被世人称为\"三绝\"的是（）","options":["书、诗、词","书、画、诗","画、诗、词","画、书、词"],"answer":1,"explanation":"郑燮，字克柔，号理庵，又号板桥，人称板桥先生。清代书画家、文学家。擅画兰、竹、石、松、菊等，而画兰竹五 十余年，成就最为突出。其诗书画，世称“三绝”，是清代比较有代表性的文人画家。"},{"id":1556,"stem":"\"沅水通波接武冈\"其中\"武冈\"位于（）","options":["湖南省","贵州省","广西省","四川省"],"answer":0,"explanation":"出自唐代：王昌龄的《送柴侍御》，武冈：县名，在湖南省西部。"},{"id":1557,"stem":"诗句\"一水护田将绿绕，两山排闼送青来\"使用了哪种修辞手法（）","options":["排比","夸张","引用","拟人"],"answer":3,"explanation":"出自宋代王安石的《书湖阴先生壁（其一）》 解释：庭院外一条小河护卫环绕着园田，将绿苗紧紧环绕；两座青山打开门来为人们送来绿色。"},{"id":1558,"stem":"诗句\"两山排闼送青来\"中\"闼\"的意思是（）","options":["敲门声","小门","门内","门楼上的小屋"],"answer":1,"explanation":"宋代王安石的《书湖阴先生壁（其一）》：“茅檐长扫净无苔，花木成畦手自栽。一水护田将绿绕，两山排闼（tà） 送青来。”闼：小门。"},{"id":1559,"stem":"诗句\"两山排闼送青来\"中\"闼\"字的发音与以下哪个汉字相同（）","options":["姐","塔","踏","大"],"answer":2,"explanation":"宋代王安石的《书湖阴先生壁（其一）》：“茅檐长扫净无苔，花木成畦手自栽。一水护田将绿绕，两山排闼（tà） 送青来。”"},{"id":1560,"stem":"诗句\"乡村四月闲人少，才了蚕桑又插田\"的作者是（ ）。","options":["杨万里","范成大","翁卷","王维"],"answer":2,"explanation":"出自宋代翁卷的《乡村四月》： 绿遍山原白满川，子规声里雨如烟。 乡村四月闲人少，才了蚕桑又插田。 这首诗以白描手法写江南农村（今乐清市淡溪镇）初夏时节的景象。"},{"id":1561,"stem":"\"盈\"在诗句\"不堪盈手赠，还寝梦佳期\"中的意思与其在以下哪个词语中的意思相同（）","options":["充盈","盈利","盈先生","盈余"],"answer":0,"explanation":"出自唐代张九龄的《望月怀远》，全文：海上生明月，天涯共此时。情人怨遥夜，竟夕起相思。灭烛怜光满，披衣觉 露滋。不堪盈手赠，还寝梦佳期。此句意思是：不能把美好的月色捧给你，只望能够与你相见在梦乡。盈：满（指那种满荡荡的充盈 的状态）。 19959276711（vx 同号）"},{"id":1562,"stem":"《水浒传》一百零八将里有（ ）位女性。","options":["一位","两位","三位","四位"],"answer":2,"explanation":"《水浒传》一百零八将里有 3 位女性，分别是排名 59 名，有着绰号“一丈青”的扈三娘；排名 101 名，绰号“母大虫” 的顾大嫂；排名 103 名，有着绰号“母夜叉”的孙二娘。"},{"id":1563,"stem":"词牌名《浣溪沙》的本意是咏古代一美女浣纱的溪水，这位美女是（ ）","options":["西施","王昭君","貂蝉","杨玉环"],"answer":0,"explanation":"调名“浣纱溪”的本意即咏春秋越国美女西施浣纱的溪水。"},{"id":1564,"stem":"\"故园（）路漫漫\"括号里应填（ ）","options":["东望","西望","南望","北望"],"answer":0,"explanation":"出自唐代岑参的《逢入京使》。意思是：向东遥望长安家园路途遥远，思乡之泪沾湿双袖难擦干。 赏析：此句塑造了一位西行途中的旅人形象，朴素、真切地再现了诗人想家想到极点的情态，流露出对故园深切的思念之情。"},{"id":1565,"stem":"诗句\"双袖龙钟泪不干\"中的\"龙钟\"的意思是（）","options":["身体衰老的样子","行动不便的样子","流眼泪的样子","无意义"],"answer":2,"explanation":"“双袖龙钟泪不干”出自唐代岑参的《逢入京使》，意思是热泪湿双袖还不断流淌。龙钟：涕泪淋漓的样子。"},{"id":1566,"stem":"\"二拍\"《初刻拍案惊奇》《二刻拍案惊奇》的作者是（）","options":["刘鹗","施耐庵","冯梦龙","凌蒙初"],"answer":3,"explanation":"《初刻拍案惊奇》与合称“二拍”《二刻拍案惊奇》，为明末凌濛初编著拟话本小说集。"},{"id":1567,"stem":"诗人与朝代配对错误的是（ ）","options":["杜牧——唐","张九龄——唐","范成大——唐","李清照——宋"],"answer":2,"explanation":"范成大（1126-1193），字至能，号称石湖居士。南宋诗人。谥文穆。与杨万里、陆游、尤袤合称南宋“中兴四大诗人”。"},{"id":1568,"stem":"诗人与朝代配对错误的是（ ）","options":["杜牧一一唐","张九龄一一宋","范成大一一宋","李清照一一宋"],"answer":1,"explanation":"张九龄：唐开元尚书丞相，诗人。字子寿，一名博物，汉族，韶州曲江（今广东韶关市）人。"},{"id":1569,"stem":"唐代文学家罗隐的字是（ ）","options":["昭谏","牧之","义山","承吉"],"answer":0,"explanation":"罗隐，字昭谏，新城（今浙江省杭州市富阳区新登镇）人，唐代诗人。"},{"id":1570,"stem":"孟浩然《过故人庄》中\"过\"的意思是（）","options":["经过","拜访","超过","错过"],"answer":1,"explanation":"《过故人庄》是唐代诗人孟浩然的一首田园诗。全诗：“故人具鸡黍，邀我至田家。绿树村边合，青山郭外斜。开轩 面场圃，把酒话桑麻。待到重阳日，还来就菊花。” 过：拜访。"},{"id":1571,"stem":"孟浩然的《过故人庄》是一首（）题材的诗。","options":["送别","边塞","思乡","田园"],"answer":3,"explanation":"《过故人庄》：“故人具鸡黍，邀我至田家。绿树村边合，青山郭外斜。开轩面场圃，把酒话桑麻。待到重阳日，还 来就菊花。” 《过故人庄》是一首田园诗，描写农家恬静闲适的生活情景，也写老朋友的情谊。通过写田园生活的风光，写出作者对这种生活的向 往。"},{"id":1572,"stem":"以下传统节日，被孟浩然写进唐诗《过故人庄》里的是（）","options":["元宵节","清明节","重阳节","中秋节"],"answer":2,"explanation":"《过故人庄》是唐代诗人孟浩然的一首田园诗。全诗：“故人具鸡黍，邀我至田家。绿树村边合，青山郭外斜。开轩 19959276711（vx 同号） 面场圃，把酒话桑麻。待到重阳日，还来就菊花。”"},{"id":1573,"stem":"关于\"虽九死其犹未悔\"，说法正确的是（）","options":["上一句是“亦余心之所善兮”","屈原十分不满自己的遭遇，要求平反","屈原后悔自己做的事","屈原死了九次"],"answer":0,"explanation":"“亦余心之所善兮，虽九死其犹未悔。”出自先秦屈原的《离骚》。 解释：我真心爱好修身洁行，即使死多次也不会后悔。"},{"id":1574,"stem":"\"佁然不动\"中的\"佁然\"意为：（）","options":["悠然自得的样子","呆呆的样子","安静的样子","沉默的样子"],"answer":1,"explanation":"佁然不动：呆呆地一动不动。佁然，呆呆的样子。"},{"id":1575,"stem":"以下选项中，所列出的词人都是婉约派的一项是：（ ）","options":["柳永、李清照、晏殊","李煜、李清照、辛弃疾","苏轼、温庭筠、秦观","温庭筠、晏殊、岳飞"],"answer":0,"explanation":"婉约派为中国宋词流派。婉约，即婉转含蓄。其特点主要是内容侧重儿女风情，结构深细缜密，音律婉转和谐，语言 圆润清丽，有一种柔婉之美。婉约派的代表人物有柳永、张先、晏殊、晏几道、欧阳修、秦观、贺铸、周邦彦、李清照、李煜等。"},{"id":1576,"stem":"李白在《行路难》中写道：\"玉盘珍羞直万钱\"，其中的\"玉盘\"和\"珍羞\"分别指（）","options":["玉做的盘子，羞愧","精美的食具，珍贵的菜肴","玉做的吊坠，珍贵的菜肴","精美的食具，羞愧"],"answer":1,"explanation":"此句意思是：玉盘里的菜肴珍贵值万钱。玉盘：精美的食具。珍羞：珍贵的菜肴。羞：同“馐”，美味的食物。"},{"id":1577,"stem":"《十拍子》是唐代教坊曲，以讨叛为主题，歌颂唐太宗讨伐四方之武功。《十拍子》也叫：（ ）","options":["卜算子","江城子","破阵子","渔歌子"],"answer":2,"explanation":"破阵子，词牌名，又名“十拍子”等。"},{"id":1578,"stem":"\"无情最是台城柳\"的前一句是（）","options":["依旧烟笼十里堤","江雨霏霏江草齐","台城六代竞豪华","六朝如梦鸟空啼"],"answer":3,"explanation":"该句出自韦庄的《金陵图》。 全诗： 江雨霏霏江草齐，六朝如梦鸟空啼。 无情最是台城柳，依旧烟笼十里堤。"},{"id":1579,"stem":"\"江雨霏霏江草齐\"的下句是（）","options":["依旧烟笼十里堤","无情最是台城柳","六朝如梦鸟空啼","台城六代竞豪华"],"answer":2,"explanation":"该句出自韦庄的《金陵图》。 全诗： 江雨霏霏江草齐，六朝如梦鸟空啼。 无情最是台城柳，依旧烟笼十里堤。"},{"id":1580,"stem":"以下不属于\"三皇\"的是（）","options":["伏羲","女娲",   try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { answered:{}, wrong:{}, star:{}, seqPos:0 };
}
let STATE = loadState();
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
}

function toast(msg, ms=1800){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), ms);
}

// ---------- routing / view state ----------
let VIEW = { name:'home' };
let SESSION = null; // {ids:[...], pos:0, mode:'seq'|'random'|'group'|'wrong'|'star', correctCount:0}

const app = document.getElementById('app');

function render(){
  if(VIEW.name === 'home') renderHome();
  else if(VIEW.name === 'practice') renderPractice();
  else if(VIEW.name === 'summary') renderSummary();
}

function stats(){
  const answeredIds = Object.keys(STATE.answered);
  const answeredCount = answeredIds.length;
  let correct = 0;
  answeredIds.forEach(id=>{ if(STATE.answered[id].correct) correct++; });
  const wrongCount = Object.keys(STATE.wrong).length;
  const starCount = Object.keys(STATE.star).length;
  const acc = answeredCount ? Math.round(correct/answeredCount*100) : 0;
  return {answeredCount, correct, wrongCount, starCount, acc};
}

function groupInfo(gIndex){
  const start = gIndex*GROUP_SIZE+1;
  const end = Math.min(start+GROUP_SIZE-1, TOTAL);
  let done=0, correct=0;
  for(let id=start; id<=end; id++){
    const a = STATE.answered[id];
    if(a){ done++; if(a.correct) correct++; }
  }
  return {start, end, done, total: end-start+1, correct};
}

function renderHome(){
  const s = stats();
  const numGroups = Math.ceil(TOTAL/GROUP_SIZE);
  let groupsHtml = '';
  for(let g=0; g<numGroups; g++){
    const gi = groupInfo(g);
    const isDone = gi.done === gi.total;
    groupsHtml += `<button class="group-cell ${isDone?'done':''}" onclick="startGroup(${g})">
      <div class="g-title">${gi.start}-${gi.end}</div>
      <div class="g-prog">${isDone ? '✅ 已完成' : gi.done+'/'+gi.total}</div>
    </button>`;
  }

  app.innerHTML = `
    <header class="top">
      <div>
        <h1>📜 古诗文1600题</h1>
        <div class="sub">刷题小站 · 教师版精讲</div>
      </div>
    </header>

    <div class="pill-stat">
      <div class="stat-card"><div class="num">${s.answeredCount}</div><div class="lab">已练习</div></div>
      <div class="stat-card"><div class="num">${s.acc}%</div><div class="lab">正确率</div></div>
      <div class="stat-card"><div class="num">${s.wrongCount}</div><div class="lab">错题本</div></div>
      <div class="stat-card"><div class="num">${s.starCount}</div><div class="lab">收藏</div></div>
    </div>

    <div class="section-title">🎯 开始练习</div>
    <div class="menu-grid">
      <button class="menu-card" onclick="startSequential()">
        <div class="emoji">📖</div>
        <div class="title">继续顺序刷题</div>
        <div class="desc">从第 ${Math.min(STATE.seqPos+1, TOTAL)} 题接着练</div>
      </button>
      <button class="menu-card" onclick="startFromScratch()">
        <div class="emoji">🔁</div>
        <div class="title">从头重新刷题</div>
        <div class="desc">从第 1 题重新开始</div>
      </button>
      <button class="menu-card" onclick="startRandom()">
        <div class="emoji">🎲</div>
        <div class="title">随机练习</div>
        <div class="desc">打乱全部1600题</div>
      </button>
      <button class="menu-card wide" onclick="startWrongBook()">
        <div>
          <div class="title">📕 错题本</div>
          <div class="desc">集中攻克做错的题目</div>
        </div>
        <span class="badge ${s.wrongCount? '' : 'muted'}">${s.wrongCount} 题</span>
      </button>
      <button class="menu-card wide" onclick="startStarBook()">
        <div>
          <div class="title">⭐ 我的收藏</div>
          <div class="desc">重点标记的题目</div>
        </div>
        <span class="badge gold ${s.starCount? '' : 'muted'}">${s.starCount} 题</span>
      </button>
    </div>

    <div class="section-title">🔢 跳转到指定题号</div>
    <div class="jumpbar">
      <input id="jumpInput" type="number" min="1" max="${TOTAL}" placeholder="输入 1-${TOTAL} 的题号">
      <button class="btn" onclick="jumpTo()">跳转</button>
    </div>

    <div class="section-title">📚 分组练习（每组100题）</div>
    <div class="group-grid">${groupsHtml}</div>

    <div class="section-title">⚙️ 其它</div>
    <div class="menu-grid">
      <button class="menu-card" onclick="resetProgress()">
        <div class="emoji">🔄</div>
        <div class="title">重置进度</div>
        <div class="desc">清空所有记录</div>
      </button>
    </div>

    <div class="footer-note">共 ${TOTAL} 题 · 数据来源：2026古诗文1600题【教师版】<br>答题记录仅保存在本设备浏览器中</div>
  `;
}

function jumpTo(){
  const v = parseInt(document.getElementById('jumpInput').value, 10);
  if(!v || v<1 || v>TOTAL){ toast('请输入 1-'+TOTAL+' 之间的题号'); return; }
  const ids = [];
  for(let i=v; i<=TOTAL; i++) ids.push(i);
  SESSION = {ids, pos:0, mode:'jump', correctCount:0, startCount: STATE_answeredSnapshot()};
  VIEW = {name:'practice'};
  render();
}

function STATE_answeredSnapshot(){
  return Object.keys(STATE.answered).length;
}

function startSequential(){
  let start = STATE.seqPos+1;
  if(start>TOTAL) start = 1;
  const ids = [];
  for(let i=start; i<=TOTAL; i++) ids.push(i);
  SESSION = {ids, pos:0, mode:'seq', correctCount:0};
  VIEW = {name:'practice'};
  render();
}

function startFromScratch(){
  // Starts a fresh sequential run from question 1. Does NOT clear existing
  // answered/wrong/star records - it just begins a new pass through all questions.
  const ids = [];
  for(let i=1; i<=TOTAL; i++) ids.push(i);
  SESSION = {ids, pos:0, mode:'seq', correctCount:0};
  VIEW = {name:'practice'};
  render();
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startRandom(){
  const ids = shuffle(QUESTIONS.map(q=>q.id));
  SESSION = {ids, pos:0, mode:'random', correctCount:0};
  VIEW = {name:'practice'};
  render();
}

function startGroup(gIndex){
  const gi = groupInfo(gIndex);
  const ids = [];
  for(let i=gi.start;i<=gi.end;i++) ids.push(i);
  SESSION = {ids, pos:0, mode:'group', correctCount:0};
  VIEW = {name:'practice'};
  render();
}

function startWrongBook(){
  const ids = Object.keys(STATE.wrong).map(Number).sort((a,b)=>a-b);
  if(!ids.length){ toast('错题本是空的，快去练习吧～'); return; }
  SESSION = {ids, pos:0, mode:'wrong', correctCount:0};
  VIEW = {name:'practice'};
  render();
}

function startStarBook(){
  const ids = Object.keys(STATE.star).map(Number).sort((a,b)=>a-b);
  if(!ids.length){ toast('还没有收藏任何题目～'); return; }
  SESSION = {ids, pos:0, mode:'star', correctCount:0};
  VIEW = {name:'practice'};
  render();
}

function resetProgress(){
  if(confirm('确定要清空全部练习记录吗？此操作不可恢复。')){
    STATE = { answered:{}, wrong:{}, star:{}, seqPos:0 };
    saveState();
    toast('已重置');
    render();
  }
}

function goHome(){
  VIEW = {name:'home'};
  SESSION = null;
  render();
}

function qById(id){
  return QUESTIONS[id-1];
}

let ANSWERED_THIS_Q = false;

function renderPractice(){
  if(!SESSION || SESSION.pos >= SESSION.ids.length){
    VIEW = {name:'summary'};
    render();
    return;
  }
  const id = SESSION.ids[SESSION.pos];
  const q = qById(id);
  ANSWERED_THIS_Q = false;
  const pct = Math.round((SESSION.pos)/SESSION.ids.length*100);
  const isStar = !!STATE.star[id];
  const modeLabel = {seq:'顺序练习', random:'随机练习', group:'分组练习', wrong:'错题本', star:'收藏本', jump:'跳题练习'}[SESSION.mode] || '';

  const prevAnswer = STATE.answered[id];

  app.innerHTML = `
    <div class="practice-top">
      <button class="icon-btn" onclick="exitPractice()">✕</button>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${SESSION.pos+1}/${SESSION.ids.length}</div>
      <button class="icon-btn ${isStar?'active':''}" id="starBtn" onclick="toggleStar(${id})">${isStar?'★':'☆'}</button>
    </div>
    <div class="qcard">
      <div class="qnum">第 ${id} 题 · ${modeLabel}${prevAnswer? (prevAnswer.correct? ' · 上次答对 ✓' : ' · 上次答错 ✗') : ''}</div>
      <div class="qstem">${escapeHtml(q.stem)}</div>
      <div class="options" id="optionsWrap"></div>
      <div class="explain" id="explainBox">
        <div class="exp-title">📖 解析</div>
        <div id="explainText"></div>
      </div>
    </div>
    <div class="practice-actions">
      <button class="btn secondary" id="nextBtn" style="display:none" onclick="nextQuestion()">下一题 →</button>
    </div>
    <div class="hint">点击选项作答，键盘可按 1-4 或 A-D 选择，Enter/空格 下一题</div>
  `;

  const wrap = document.getElementById('optionsWrap');
  q.options.forEach((opt, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${'ABCD'[idx]}</span><span>${escapeHtml(opt)}</span>`;
    btn.onclick = ()=>selectOption(idx, q, id);
    wrap.appendChild(btn);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function selectOption(idx, q, id){
  if(ANSWERED_THIS_Q) return;
  ANSWERED_THIS_Q = true;
  const correct = idx === q.answer;
  const opts = document.querySelectorAll('#optionsWrap .opt');
  opts.forEach((el,i)=>{
    el.classList.add('disabled');
    el.onclick = null;
    if(i===q.answer) el.classList.add('correct');
    if(i===idx && !correct) el.classList.add('wrong');
  });
  document.getElementById('explainText').textContent = q.explanation || '暂无解析';
  document.getElementById('explainBox').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';

  STATE.answered[id] = { correct, ts: Date.now() };
  if(correct){
    delete STATE.wrong[id];
    SESSION.correctCount++;
  } else {
    STATE.wrong[id] = true;
  }
  // remember progress so "继续顺序刷题" can resume from wherever you last left off,
  // regardless of which mode (sequential / random / group / wrong book) you were practicing in
  STATE.seqPos = Math.max(STATE.seqPos, id);
  saveState();

  const s = stats();
  if(s.answeredCount>0 && s.answeredCount % 100 === 0){
    toast('🎉 已累计练习 '+s.answeredCount+' 题，继续加油！');
  }
}

function toggleStar(id){
  if(STATE.star[id]) delete STATE.star[id];
  else STATE.star[id] = true;
  saveState();
  const btn = document.getElementById('starBtn');
  const isStar = !!STATE.star[id];
  btn.textContent = isStar? '★':'☆';
  btn.classList.toggle('active', isStar);
}

function nextQuestion(){
  SESSION.pos++;
  render();
}

function exitPractice(){
  goHome();
}

document.addEventListener('keydown', (e)=>{
  if(VIEW.name !== 'practice') return;
  const key = e.key.toUpperCase();
  const map = {'1':0,'2':1,'3':2,'4':3,'A':0,'B':1,'C':2,'D':3};
  if(map.hasOwnProperty(key) && !ANSWERED_THIS_Q){
    const opts = document.querySelectorAll('#optionsWrap .opt');
    if(opts[map[key]]) opts[map[key]].click();
  } else if((e.key === 'Enter' || e.key === ' ') && ANSWERED_THIS_Q){
    e.preventDefault();
    nextQuestion();
  }
});

function renderSummary(){
  const total = SESSION.ids.length;
  const correct = SESSION.correctCount;
  const acc = total? Math.round(correct/total*100):0;
  let emoji = '🌱';
  if(acc>=90) emoji='🏆'; else if(acc>=75) emoji='🎉'; else if(acc>=50) emoji='💪';
  app.innerHTML = `
    <div class="summary-card">
      <div class="big-emoji">${emoji}</div>
      <h2>本组练习完成！</h2>
      <div class="score">${correct} / ${total}</div>
      <div style="color:var(--ink-soft);font-size:13px;">正确率 ${acc}%</div>
      <div class="summary-actions">
        <button class="btn" onclick="goHome()">返回首页</button>
        <button class="btn secondary" onclick="startWrongBook()">练习错题本</button>
      </div>
    </div>
  `;
}

const AUTH_KEY = "gsw_poetry1600_auth_ok";
const AUTH_USER = "woshishuaige";
const AUTH_PASS = "woshishuaige";

function isAuthed(){
  return localStorage.getItem(AUTH_KEY) === '1';
}

function boot(){
  if(isAuthed()){
    document.getElementById('loginScreen').style.display = 'none';
    app.style.display = '';
    render();
  } else {
    app.style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginUser').focus();
  }
}

document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if(u === AUTH_USER && p === AUTH_PASS){
    localStorage.setItem(AUTH_KEY, '1');
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginScreen').style.display = 'none';
    app.style.display = '';
    render();
  } else {
    document.getElementById('loginError').textContent = '用户名或密码错误';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
});

boot();
</script>
</body>
</html>
